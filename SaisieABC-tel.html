      return '<div class="mes-active" style="color:#0c6b2f;">◆ S\'applique à la <b>voix active</b></div>'+rg.html()+
      '<div class="stepper-label">Clé</div>'+
      '<div class="row-grid row-4" id="clef-pick"><button class="k clef-small" data-clef="treble">𝄞</button><button class="k clef-small" data-clef="treble8" title="Sol octaviée (sonne une octave plus bas)"><svg width="20" height="30" viewBox="0 0 20 30" style="vertical-align:middle;"><text x="10" y="21" font-size="23" font-family="serif" text-anchor="middle" fill="currentColor">𝄞</text><text x="10" y="29" font-size="8" font-weight="bold" font-family="serif" text-anchor="middle" fill="currentColor">8</text></svg></button><button class="k clef-small" data-clef="bass">𝄢</button><button class="k" id="clef-others" title="Clés d\'ut (alto, ténor)" style="font-size:26px;">Autres ▾</button></div>'+
      '<div class="row-grid row-2" id="clef-others-row" style="margin-top:3px;'+(showOthers?'':'display:none;')+'">'+
        '<button class="k clef-small" data-clef="alto" title="Clé d\'ut 3e ligne (alto)"><svg width="34" height="30" viewBox="0 0 34 30" style="vertical-align:middle;"><text x="11" y="15" font-size="21" font-family="serif" text-anchor="middle" dominant-baseline="central" fill="currentColor">𝄡</text><text x="26" y="15" font-size="9" font-weight="bold" font-family="sans-serif" text-anchor="middle" dominant-baseline="central" fill="currentColor">alto</text></svg></button>'+
        '<button class="k clef-small" data-clef="tenor" title="Clé d\'ut 4e ligne (ténor)"><svg width="40" height="30" viewBox="0 0 40 30" style="vertical-align:middle;"><text x="11" y="15" font-size="21" font-family="serif" text-anchor="middle" dominant-baseline="central" fill="currentColor">𝄡</text><text x="29" y="15" font-size="9" font-weight="bold" font-family="sans-serif" text-anchor="middle" dominant-baseline="central" fill="currentColor">tén.</text></svg></button>'+
      '</div>'}
    function rebind(){
      rg.bind(document.getElementById('panel-body'));
      const rf=()=>document.querySelectorAll('#clef-pick .k[data-clef], #clef-others-row .k[data-clef]').forEach(b=>b.classList.toggle('active',b.dataset.clef===pick));
      rf();
      document.querySelectorAll('#clef-pick .k[data-clef], #clef-others-row .k[data-clef]').forEach(b=>b.addEventListener('click',()=>{pick=b.dataset.clef;rf()}));
      const ob=document.getElementById('clef-others');
      if(ob)ob.addEventListener('click',()=>{const row=document.getElementById('clef-others-row');if(row)row.style.display=(row.style.display==='none')?'':'none';});
    }
    openPanel({
      title:'Clé',body:controls(),hideActions:true,extraButtons:['Annuler','Appliquer'],
      onMount:rebind,
      onExtra:(w)=>{
        if(w==='Annuler'){closePanel();return}
        // Son conservé : on ne transpose pas les notes ; seul l'affichage change selon la clé.
        // Plage X→Y : on pose la clé au début, on nettoie l'intérieur, et on restaure après.
        const startMi=Math.min(rg.getFrom(),rg.getTo())-1;
        const endMi=Math.max(rg.getFrom(),rg.getTo())-1;
        const clefAfter=clefAt(Math.min(endMi+1,state.measures.length-1));
        const hadAfter=state.clefChanges[endMi+1]!==undefined;
        if(startMi===0){state.pieceClef=pick;delete state.clefChanges[0]}
        else state.clefChanges[startMi]=pick;
        for(let mi=startMi+1;mi<=endMi;mi++)delete state.clefChanges[mi];
        if(endMi+1<state.measures.length&&!hadAfter&&clefAfter!==pick){
          state.clefChanges[endMi+1]=clefAfter;
        }
        state.sel={m:startMi,s:0};
        cleanupAccidentals();pushHistory();closePanel();render();
      }
    });
  });

  function updateBadge(){
    document.getElementById('ww-tag').textContent=window.innerWidth||0;
    document.getElementById('wh-tag').textContent=window.innerHeight||0;
    const sw=document.getElementById('score');
    if(sw){
      const r=sw.getBoundingClientRect();
      document.getElementById('dim-w').textContent=Math.round(r.width);
      document.getElementById('dim-h').textContent=Math.round(r.height);
      // Mode ligne unique : afficher le nombre de mesures et la largeur de contenu
      const nMes=(state.measures||[]).length;
      const lc=state._layoutCache;
      const cw=lc?lc.contentPxW:0;
      document.getElementById('svg-h').textContent=nMes+' mes · ligne unique · contenu '+cw+'px';
    }
  }
  // Sélection d'une note/silence par clic sur la portée
  document.getElementById('score').addEventListener('click',(e)=>{
    const t=e.target;
    if(!t||t.tagName!=='rect')return;
    const m=t.getAttribute('data-m');
    const s=t.getAttribute('data-s');
    if(m===null||s===null)return;
    const mi=parseInt(m,10),si=parseInt(s,10);
    if(isNaN(mi)||isNaN(si))return;
    if(mi<0||mi>=state.measures.length)return;
    if(si<0||si>=state.measures[mi].length)return;
    // Sélection d'une portion de notes (2 clics) : intercepte le clic.
    if(state._notePick){state._notePick(mi,si);return;}
    // Si un sélecteur de plage est ouvert : le clic remplit la valeur de la ligne active
    if(state._rangePick){state._rangePick(mi+1);return;}
    state.sel={m:mi,s:si};
    render();
  });

  let resizeTimer=null;
  window.addEventListener('resize',()=>{
    updateBadge();
    if(resizeTimer)clearTimeout(resizeTimer);
    resizeTimer=setTimeout(()=>{render()},120);
  });
  updateBadge();

  // Clic sur la partition : selectionner le slot/mesure cliques
  document.getElementById('score').addEventListener('click',(e)=>{
    const t=e.target;
    if(!t||t.dataset.m===undefined||t.dataset.s===undefined)return;
    const m=parseInt(t.dataset.m,10);
    const s=parseInt(t.dataset.s,10);
    if(isNaN(m)||isNaN(s))return;
    if(state._rangePick){if(m>=0&&m<state.measures.length)state._rangePick(m+1);return;}
    if(state.measures[m]&&state.measures[m][s]){
      state.sel={m,s};
      render();
      // Jouer la note cliquée (silences ignorés). Aperçu sonore court.
      playSelectedSlot();
    }
  });

  rebuildMeasures();pushHistory();render();
})();
</script>
