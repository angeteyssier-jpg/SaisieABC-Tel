      // si on rouvre la liste, prévisualiser le morceau courant
      if(selIdx>=0){previewTuneAbc(tunes[selIdx].abc);refreshSel()}
      document.getElementById('ct-sort-file').addEventListener('click',()=>{sortMode='file';renderList();refreshSortBtns()});
      document.getElementById('ct-sort-xnum').addEventListener('click',()=>{sortMode='xnum';renderList();refreshSortBtns()});
      document.getElementById('ct-sort-alpha').addEventListener('click',()=>{sortMode='alpha';renderList();refreshSortBtns()});
      document.getElementById('ct-cancel').addEventListener('click',()=>{loadFrom(prevSnap);render();closePanel()});
      document.getElementById('ct-open').addEventListener('click',()=>{
        if(selIdx<0){alert('Cliquez d\u2019abord sur un morceau pour le prévisualiser.');return}
        // Confirmer : charger proprement (nom de fichier + historique) puis fermer
        loadTuneAbc(tunes[selIdx].abc,fileName);
        // mémoriser pour le bouton Liste
        lastMultiTunes=tunes;lastMultiFileName=fileName;lastMultiIndex=selIdx;updateListBtn();
        closePanel();
      });
    }});
  }
  // ===== Réunion de voix (pistes) en accords =====
  // Fusionne la piste `src` DANS la piste `dst` : pour chaque mesure, les notes de src
  // sont empilées sur la note de dst qui occupe la même position temporelle.
  // Règle de durée (déjà établie) : la durée d'un slot résultant reste celle de dst
  // (on ne change pas la grille de dst ; on ajoute seulement des hauteurs au stack).
  // Les notes de src qui tombent entre deux notes de dst sont rattachées à la note de dst
  // active à cet instant (celle dont l'intervalle [offset, offset+durée) contient l'instant).
  function mergeTrackInto(dstTrack, srcTrack) {
    const nMes = Math.max(dstTrack.measures.length, srcTrack.measures.length);
    for (let mi = 0; mi < nMes; mi++) {
      const dstMeas = dstTrack.measures[mi] || [];
      const srcMeas = srcTrack.measures[mi] || [];
      if (!dstTrack.measures[mi]) dstTrack.measures[mi] = dstMeas;
      // Offsets de début de chaque slot dst
      const dstOffsets = []; let acc = 0;
      for (const s of dstMeas) { dstOffsets.push(acc); acc += effDur(s); }
      // Pour chaque note de src, trouver le slot dst actif à son offset de début
      let sOff = 0;
      for (const sSlot of srcMeas) {
        const sDur = effDur(sSlot);
        if (sSlot.type === 'note') {
          // Trouver le slot dst dont l'intervalle contient sOff
          let target = -1;
          for (let k = 0; k < dstMeas.length; k++) {
            const a = dstOffsets[k], b = a + effDur(dstMeas[k]);
            if (sOff >= a - 1e-6 && sOff < b - 1e-6) { target = k; break; }
          }
          if (target < 0 && dstMeas.length) target = dstMeas.length - 1;
          if (target >= 0) {
            const d = dstMeas[target];
            if (d.type === 'rest') {
              // dst est un silence : le remplacer par la note de src (conserve la durée du silence)
              const nd = { type: 'note', note: sSlot.note, octave: sSlot.octave, dur: d.dur, dot: d.dot };
              if (sSlot.acc) nd.acc = sSlot.acc;
              if (d.tuplet) { nd.tuplet = d.tuplet; nd.tupletId = d.tupletId; if (d.tupletNormal !== undefined) nd.tupletNormal = d.tupletNormal; }
              dstMeas[target] = nd;
            } else {
              // dst est une note : empiler la hauteur de src (et celles de son stack) si non déjà présentes
              d.stack = d.stack || [];
              const present = new Set([d.note + ':' + d.octave + ':' + (d.acc||'')]);
              d.stack.forEach(x => present.add(x.note + ':' + x.octave + ':' + (x.acc||'')));
              const addNote = (nn) => {
                const key = nn.note + ':' + nn.octave + ':' + (nn.acc||'');
                if (!present.has(key)) { const o = { note: nn.note, octave: nn.octave }; if (nn.acc) o.acc = nn.acc; d.stack.push(o); present.add(key); }
              };
              addNote(sSlot);
              if (sSlot.stack) sSlot.stack.forEach(addNote);
              if (!d.stack.length) delete d.stack;
            }
          }
        }
        sOff += sDur;
      }
    }
    return dstTrack;
  }

  // ===== Parseur MusicXML (score.xml extrait d'un .mxl ou .xml direct) =====
  function parseMusicXml(xmlText, fileName) {
    let doc;
    try { doc = new DOMParser().parseFromString(xmlText, 'application/xml'); }
    catch(e) { alert('Erreur lecture XML : ' + e.message); return false; }
    const err = doc.querySelector('parsererror');
    if (err) { alert('XML invalide : ' + err.textContent.slice(0,200)); return false; }

    // --- Helpers XML ---
    function txt(el, tag) { const c = el.querySelector(tag); return c ? c.textContent.trim() : ''; }
    function num(el, tag, def) { const v = txt(el, tag); return v ? parseFloat(v) : def; }

    // --- En-têtes globaux ---
    const headers = { X:'1', T:'', C:'', N:'', H:'', F:'', Z:'', P:'', W:'' };
    const workTitle = txt(doc, 'work-title');
    const movTitle  = txt(doc, 'movement-title');
    headers.T = workTitle || movTitle || '';
    doc.querySelectorAll('creator').forEach(c => {
      if (c.getAttribute('type') === 'composer') headers.C = c.textContent.trim();
    });
    // Couplets supplémentaires (W:) éventuellement stockés par cette app à l'export
    const wf = doc.querySelector('miscellaneous-field[name="abc-words"]');
    if (wf) headers.W = wf.textContent.replace(/\r/g,'');
    // Accumulateur : les <words> LONGS (blocs de structure/paroles, type EasyABC) ne sont pas des
    // annotations ponctuelles ; on les regroupe en W: d'en-tête plutôt que de les coller sur une note.
    const collectedWords = [];
    const collectedWordsSeen = new Set();
    function isLongWords(w){ return w && (w.length > 40 || w.split(/\s+/).length > 6); }

    // --- Tempo global (1ère direction sound) ---
    let globalTempo = 80, globalBeatUnit = 1, globalBeatDotted = false;
    const firstSound = doc.querySelector('sound[tempo]');
    if (firstSound) globalTempo = parseFloat(firstSound.getAttribute('tempo')) || 80;
    const firstMM = doc.querySelector('metronome');
    if (firstMM) {
      const bu = txt(firstMM, 'beat-unit') || 'quarter';
      const dotted = !!firstMM.querySelector('beat-unit-dot');
      const pm = parseFloat(txt(firstMM, 'per-minute')) || globalTempo;
      const unitMap = { whole:4, half:2, quarter:1, eighth:0.5, '16th':0.25, '32nd':0.125, '64th':0.0625 };
      const uq = (unitMap[bu] || 1) * (dotted ? 1.5 : 1);
      globalTempo = pm * uq;           // canonique en noires/min
      globalBeatUnit = unitMap[bu] || 1;
      globalBeatDotted = dotted;
    }
    // --- Changements de tempo en cours de morceau (lus sur la 1re partie) ---
    const tempoChanges = {};
    {
      const firstPart = doc.querySelector('part');
      if (firstPart) {
        const umap = { whole:4, half:2, quarter:1, eighth:0.5, '16th':0.25, '32nd':0.125, '64th':0.0625 };
        const meas = firstPart.querySelectorAll('measure');
        meas.forEach((mEl, mi) => {
          if (mi === 0) return;          // la 1re mesure définit le tempo initial (déjà lu)
          let t = null;
          const mm = mEl.querySelector('metronome');
          if (mm) {
            const bu2 = txt(mm, 'beat-unit') || 'quarter';
            const dot2 = !!mm.querySelector('beat-unit-dot');
            const pm2 = parseFloat(txt(mm, 'per-minute'));
            if (!isNaN(pm2)) t = pm2 * (umap[bu2] || 1) * (dot2 ? 1.5 : 1);
          }
          if (t === null) {
            const snd = mEl.querySelector('sound[tempo]');
            if (snd) { const v = parseFloat(snd.getAttribute('tempo')); if (!isNaN(v)) t = v; }
          }
          if (t !== null) tempoChanges[mi] = t;
        });
      }
    }

    // --- Parts : une piste par <part> ---
    const partEls = Array.from(doc.querySelectorAll('score-partwise > part, part'));
    if (!partEls.length) { alert('Aucune partie trouvée dans ce MusicXML.'); return false; }

    // map part-id → name
    const partNames = {};
    doc.querySelectorAll('score-part').forEach(sp => {
      const id = sp.getAttribute('id') || '';
      const n = txt(sp, 'part-name') || id;
      partNames[id] = n;
    });

    const tracks = [];

    partEls.forEach((partEl, pi) => {
      const partId = partEl.getAttribute('id') || ('P' + (pi + 1));
      const partName = partNames[partId] || ('V' + (pi + 1));

      const measureEls = partEl.querySelectorAll('measure');

      // Détecter toutes les voix distinctes présentes dans cette part (ordre d'apparition)
      const voiceOrder = [];
      partEl.querySelectorAll('note').forEach(n => {
        const v = n.querySelector('voice');
        const vid = v ? v.textContent.trim() : '1';
        if (!voiceOrder.includes(vid)) voiceOrder.push(vid);
      });
      if (!voiceOrder.length) voiceOrder.push('1');

      // Une piste par voix de la part. Nom : "Part" si une seule voix, sinon "Part vN".
      voiceOrder.forEach((targetVoice, vidx) => {
        const trackName = (voiceOrder.length === 1) ? partName : (partName + ' v' + targetVoice);

      // État de lecture de la part (recalculé pour chaque voix : attributs = communs à la part)
      let divisions = 4;            // durée d'une noire en <duration>
      let keySig = 0;
      let clef = 'treble';
      let meter = '4/4';
      let pieceMeter = null, pieceKeySig = null, pieceClef = null, pieceUnit = null;
      const timeChanges = {}, keyChanges = {}, clefChanges = {}, repeats = {};
      const measures = [];
      // État tie/slur AU NIVEAU DE LA VOIX (pas de la mesure) pour gérer les liaisons
      // qui traversent les barres de mesure.
      const tieKeys = new Set();
      let lastNoteSlot = null;   // dernière note ajoutée (toutes mesures confondues)
      let slurOpen = false;

      measureEls.forEach((mEl, mi) => {
        // --- Attributs ---
        const attrEl = mEl.querySelector('attributes');
        if (attrEl) {
          const div = num(attrEl, 'divisions', 0);
          if (div > 0) divisions = div;

          const fifthsEl = attrEl.querySelector('fifths');
          if (fifthsEl) {
            const f5 = parseInt(fifthsEl.textContent, 10);
            keySig = Math.max(-7, Math.min(7, f5));
            if (pieceMeter === null || mi === 0) {
              if (pi === 0 || pi > 0) {} // always set
            }
            if (mi === 0) pieceKeySig = keySig;
            else keyChanges[mi] = keySig;
          }

          const timeEl = attrEl.querySelector('time');
          if (timeEl) {
            const beats = txt(timeEl, 'beats');
            const beatType = txt(timeEl, 'beat-type');
            if (beats && beatType) {
              const m = beats + '/' + beatType;
              if (mi === 0) { pieceMeter = m; meter = m; }
              else { timeChanges[mi] = m; meter = m; }
            }
          }

          const clefEl = attrEl.querySelector('clef');
          if (clefEl) {
            const sign = txt(clefEl, 'sign').toUpperCase();
            const line = parseInt(txt(clefEl, 'line') || '0', 10);
            const octChg = parseInt(txt(clefEl, 'clef-octave-change') || '0', 10);
            if (sign === 'F') clef = 'bass';            // fa (toute ligne → fa 4e par défaut)
            else if (sign === 'C') {
              // Clé d'ut : ligne 3 = alto, ligne 4 = ténor. Autres lignes (soprano/mezzo/baryton)
              // ramenées au plus proche pour ne pas s'afficher de travers.
              clef = (line >= 4) ? 'tenor' : 'alto';
            }
            else if (sign === 'G' && octChg === -1) clef = 'treble8';
            else clef = 'treble';                        // sol (et clés de sol exotiques)
            if (mi === 0) pieceClef = clef;
            else clefChanges[mi] = clef;
          }
        }

        // Unité ABC : si 4/4 ou 2/4 → 1/8, sinon 1/16
        if (pieceMeter === null) pieceMeter = '4/4';
        if (pieceClef === null) pieceClef = 'treble';
        if (pieceKeySig === null) pieceKeySig = 0;

        // --- Reprises / barlines ---
        mEl.querySelectorAll('barline').forEach(bl => {
          const loc = bl.getAttribute('location') || '';
          const rp = bl.querySelector('repeat');
          if (rp) {
            const dir = rp.getAttribute('direction');
            if (!repeats[mi]) repeats[mi] = {};
            if (dir === 'forward') repeats[mi].start = true;
            if (dir === 'backward') repeats[mi].end = true;
          }
          const ending = bl.querySelector('ending');
          if (ending && ending.getAttribute('type') === 'start') {
            const n = parseInt(ending.getAttribute('number') || '1', 10);
            if (!repeats[mi]) repeats[mi] = {};
            repeats[mi].volta = n;
          }
        });

        // --- Notes ---
        // La <duration> MusicXML est en "divisions" (fractions de noire selon <divisions>)
        // effDur en noires = xmlDur / divisions
        const slots = [];

        // Convertit une durée brute (en noires) vers {dur, dot} de notre modèle
        function toDurDot(durQ) {
          let dur = durQ, dot = false;
          const trial = durQ * 2 / 3;
          if (trial >= 0.0625 - 1e-6 && trial <= 4 + 1e-6) {
            const l2 = Math.log2(trial);
            if (Math.abs(Math.round(l2) - l2) < 1e-6) { dur = trial; dot = true; }
          }
          if (!dot) {
            const l2 = Math.log2(durQ);
            const rounded = Math.pow(2, Math.round(l2));
            if (Math.abs(rounded - durQ) < 0.01) dur = rounded;
          }
          return { dur, dot };
        }
        // Extrait les infos d'une note <note> (hauteur, altération, paroles, liaisons)
        function extractNoteInfo(nEl) {
          const pitchEl = nEl.querySelector('pitch');
          if (!pitchEl) return null;
          const step = txt(pitchEl, 'step').toUpperCase();
          const alter = num(pitchEl, 'alter', 0);
          const octXml = num(pitchEl, 'octave', 4);
          const octInternal = octXml - 4 + (clef === 'treble8' ? 1 : 0);
          let acc = '';
          if (alter === 1) acc = '^';
          else if (alter === -1) acc = '_';
          else if (alter === 2) acc = '^^';
          else if (alter === -2) acc = '__';
          else if (alter === 0) {
            const accidentalEl = nEl.querySelector('accidental');
            if (accidentalEl && accidentalEl.textContent.trim() === 'natural') acc = '=';
          }
          let lyric = '';
          const verses = {};
          nEl.querySelectorAll('lyric').forEach(lyricEl => {
            let vnum = parseInt(lyricEl.getAttribute('number') || '1', 10);
            if (!vnum || vnum < 1) vnum = 1;
            const syllabic = txt(lyricEl, 'syllabic');
            const textEl = lyricEl.querySelector('text');
            const sylText = textEl ? textEl.textContent.trim() : '';
            if (!sylText) return;
            verses[vnum] = (syllabic === 'begin' || syllabic === 'middle') ? sylText + '-' : sylText;
          });
          lyric = verses[1] || '';
          let tieStop = false, tieStart = false;
          nEl.querySelectorAll('tie').forEach(t => {
            const tp = t.getAttribute('type');
            if (tp === 'stop') tieStop = true;
            if (tp === 'start') tieStart = true;
          });

          // --- Ornements / articulations / slur (dans <notations>) ---
          const orn = [];
          let slurStart = false, slurStop = false;
          const notationsEl = nEl.querySelector('notations');
          if (notationsEl) {
            // Slurs
            notationsEl.querySelectorAll('slur').forEach(s => {
              const tp = s.getAttribute('type');
              if (tp === 'start') slurStart = true;
              if (tp === 'stop') slurStop = true;
            });
            // Ornements
            const ornEl = notationsEl.querySelector('ornaments');
            if (ornEl) {
              if (ornEl.querySelector('trill-mark')) orn.push('T');
              if (ornEl.querySelector('turn, delayed-turn, inverted-turn')) orn.push('M');
              if (ornEl.querySelector('mordent, inverted-mordent')) orn.push('P');
            }
            // Articulations
            const artEl = notationsEl.querySelector('articulations');
            if (artEl) {
              if (artEl.querySelector('accent, strong-accent')) orn.push('L');
              if (artEl.querySelector('staccato, staccatissimo')) orn.push('.');
            }
            // Point d'orgue (fermata) — peut être hors articulations
            if (notationsEl.querySelector('fermata')) orn.push('H');
            // Technique : coups d'archet
            const techEl = notationsEl.querySelector('technical');
            if (techEl) {
              if (techEl.querySelector('up-bow')) orn.push('u');
              if (techEl.querySelector('down-bow')) orn.push('v');
            }
          }
          // Fermata peut aussi être directement sous <note>
          if (!orn.includes('H') && nEl.querySelector('fermata')) orn.push('H');

          return { step, alter, octXml, octInternal, acc, lyric, verses, tieStop, tieStart, orn, slurStart, slurStop };
        }

        // Map du <type> MusicXML vers durée nominale en noires
        const TYPE_DUR = { 'whole':4, 'half':2, 'quarter':1, 'eighth':0.5, '16th':0.25, '32nd':0.125, '64th':0.0625 };

        // Parse un <harmony> MusicXML en symbole d'accord texte (ex. "Cm7", "G/B")
        function parseHarmony(hEl) {
          const rootEl = hEl.querySelector('root');
          const kindEl = hEl.querySelector('kind');
          if (!rootEl) return '';
          let s = txt(rootEl, 'root-step');
          const ra = num(rootEl, 'root-alter', 0);
          if (ra === 1) s += '#'; else if (ra === -1) s += 'b';
          // Type d'accord → suffixe usuel
          const kind = kindEl ? kindEl.textContent.trim() : '';
          const kindText = kindEl ? (kindEl.getAttribute('text') || '') : '';
          const KIND_MAP = {
            'major': '', 'minor': 'm', 'augmented': 'aug', 'diminished': 'dim',
            'dominant': '7', 'major-seventh': 'Maj7', 'minor-seventh': 'm7',
            'diminished-seventh': 'dim7', 'augmented-seventh': 'aug7',
            'half-diminished': 'm7b5', 'major-minor': 'mMaj7',
            'major-sixth': '6', 'minor-sixth': 'm6',
            'dominant-ninth': '9', 'major-ninth': 'Maj9', 'minor-ninth': 'm9',
            'dominant-11th': '11', 'major-11th': 'Maj11', 'minor-11th': 'm11',
            'dominant-13th': '13', 'major-13th': 'Maj13', 'minor-13th': 'm13',
            'suspended-second': 'sus2', 'suspended-fourth': 'sus4',
            'power': '5', 'pedal': '', 'other': '', 'none': ''
          };
          if (kindText) s += kindText;
          else if (KIND_MAP[kind] !== undefined) s += KIND_MAP[kind];
          // Basse (slash chord)
          const bassEl = hEl.querySelector('bass');
          if (bassEl) {
            let b = txt(bassEl, 'bass-step');
            const ba = num(bassEl, 'bass-alter', 0);
            if (ba === 1) b += '#'; else if (ba === -1) b += 'b';
            if (b) s += '/' + b;
          }
          return s;
        }
        // Pré-scan : associer chaque <harmony> à la première <note> de la voix cible qui le suit.
        // (Les symboles d'accord sont attachés à la voix en cours d'extraction.)
        const harmonyForNote = new Map();
        const wordsForNote = new Map();
        {
          let pendingHarmony = '';
          let pendingWords = '';
          Array.from(mEl.children).forEach(child => {
            if (child.tagName === 'harmony') {
              const h = parseHarmony(child);
              if (h) pendingHarmony = h;
            } else if (child.tagName === 'direction') {
              // Texte libre au-dessus : <direction-type><words>…</words>
              // (on ignore les directions de tempo/métronome déjà gérées ailleurs)
              if (!child.querySelector('metronome')) {
                const wEls = child.querySelectorAll('direction-type words');
                if (wEls && wEls.length) {
                  const w = Array.from(wEls).map(e => e.textContent).join('').replace(/\s+/g,' ').trim();
                  if (w) {
                    if (isLongWords(w)) {
                      // bloc long → W: d'en-tête (regroupé en haut, comme EasyABC), pas sur une note
                      if (!collectedWordsSeen.has(w)) { collectedWordsSeen.add(w); collectedWords.push(w); }
                    } else {
                      pendingWords = pendingWords ? (pendingWords + ' ' + w) : w;
                    }
                  }
                }
              }
            } else if (child.tagName === 'note') {
              const v = child.querySelector('voice');
              const vid = v ? v.textContent.trim() : '1';
              if (vid === targetVoice && !child.querySelector('chord')) {
                if (pendingHarmony) { harmonyForNote.set(child, pendingHarmony); pendingHarmony = ''; }
                if (pendingWords) { wordsForNote.set(child, pendingWords); pendingWords = ''; }
              }
            }
          });
        }

        // Regrouper les notes voix 1 en "événements" : chaque événement = une note seule
        // ou un accord (note de tête + notes <chord/> suivantes).
        const events = [];   // { durQ (curseur), notes:[{nEl, info}], isRest, tuplet... }
        const noteEls = Array.from(mEl.querySelectorAll('note'));
        noteEls.forEach(nEl => {
          const voiceEl = nEl.querySelector('voice');
          const voice = voiceEl ? voiceEl.textContent.trim() : '1';
          if (voice !== targetVoice) return;
          if (nEl.querySelector('grace')) return;

          const isChordNote = !!nEl.querySelector('chord');
          const isRest = !!nEl.querySelector('rest');
          const xmlDur = num(nEl, 'duration', divisions);
          const durQ = xmlDur / divisions;

          if (isChordNote && events.length > 0 && !events[events.length - 1].isRest) {
            // Note simultanée : rattacher à l'événement (accord) précédent.
            const ev = events[events.length - 1];
            const info = extractNoteInfo(nEl);
            if (info) ev.notes.push({ nEl, info, durQ });
            ev.durChordMax = Math.max(ev.durChordMax, durQ);
          } else {
            // Nouvel événement : c'est la note "porteuse" du curseur temporel.
            // --- Détection n-uplet ---
            // <time-modification><actual-notes>3</actual-notes><normal-notes>2</normal-notes>
            // <type> donne la durée nominale visuelle (croche, noire...)
            let tupletActual = 0, tupletNormal = 0, nominalDurQ = 0;
            const tmEl = nEl.querySelector('time-modification');
            if (tmEl) {
              tupletActual = parseInt(txt(tmEl, 'actual-notes') || '0', 10);
              tupletNormal = parseInt(txt(tmEl, 'normal-notes') || '0', 10);
            }
            const typeStr = txt(nEl, 'type');
            if (typeStr && TYPE_DUR[typeStr] !== undefined) {
              nominalDurQ = TYPE_DUR[typeStr];
              if (nEl.querySelector('dot')) nominalDurQ *= 1.5;
            }
            // Marqueurs de début/fin de groupe n-uplet (notations/tuplet)
            let tupStart = false, tupStop = false;
            nEl.querySelectorAll('notations tuplet, tuplet').forEach(t => {
              const tp = t.getAttribute('type');
              if (tp === 'start') tupStart = true;
              if (tp === 'stop') tupStop = true;
            });
            events.push({
              cursorDurQ: durQ, durChordMax: durQ,
              notes: [{ nEl, info: isRest ? null : extractNoteInfo(nEl), durQ }],
              isRest,
              tupletActual, tupletNormal, nominalDurQ, tupStart, tupStop,
              harmony: harmonyForNote.get(nEl) || '',
              words: wordsForNote.get(nEl) || ''
            });
          }
        });

        // Construire les slots à partir des événements
        // Gestion n-uplet : un groupe partage un tupletId. On l'ouvre au tupStart et le ferme au tupStop.
        let curTupletId = null, curTupletN = 0, curTupletNormal = 2;
        events.forEach(ev => {
          // Détecter appartenance à un n-uplet : actual>normal (ex. 3 dans l'espace de 2)
          const inTuplet = ev.tupletActual > 0 && ev.tupletNormal > 0 && ev.tupletActual > ev.tupletNormal;

          if (ev.isRest) {
            const { dur, dot } = toDurDot(ev.cursorDurQ);
            const restSlot = { type: 'rest', dur, dot };
            // Un silence peut faire partie d'un n-uplet
            if (inTuplet) {
              if (ev.tupStart || curTupletId === null) { curTupletId = nextTupletId++; curTupletN = ev.tupletActual; curTupletNormal = ev.tupletNormal; }
              restSlot.tuplet = curTupletN;
              restSlot.tupletId = curTupletId;
              if (curTupletNormal !== 2) restSlot.tupletNormal = curTupletNormal;
              // durée nominale de la figure
              if (ev.nominalDurQ > 0) { const nd = toDurDot(ev.nominalDurQ); restSlot.dur = nd.dur; restSlot.dot = nd.dot; }
              if (ev.tupStop) { curTupletId = null; curTupletN = 0; curTupletNormal = 2; }
            }
            if (ev.harmony) restSlot.chord = ev.harmony;
            if (ev.words) restSlot.text = ev.words;
            slots.push(restSlot);
            return;
          }
          const chordDurQ = ev.cursorDurQ;
          let { dur, dot } = toDurDot(chordDurQ);

          // Première note = tête du slot ; les autres → stack
          const head = ev.notes[0].info;
          if (!head) return;

          // --- N-uplet : on utilise la durée NOMINALE de la figure (issue du <type>).
          // Notre effDur applique le ratio normal/n (normal stocké dans tupletNormal si ≠ 2).
          // Standards 3:2, 5:2, 6:2, 7:2 → normal=2 (implicite). Exotiques 7:4, 5:4… → normal explicite.
          let slotTuplet = 0, slotTupletId = null, slotTupletNormal = 2;
          if (inTuplet) {
            if (ev.tupStart || curTupletId === null) { curTupletId = nextTupletId++; curTupletN = ev.tupletActual; curTupletNormal = ev.tupletNormal; }
            slotTuplet = curTupletN;
            slotTupletId = curTupletId;
            slotTupletNormal = curTupletNormal;
            if (ev.nominalDurQ > 0) { const nd = toDurDot(ev.nominalDurQ); dur = nd.dur; dot = nd.dot; }
          }

          const slot = { type: 'note', note: head.step, octave: head.octInternal, dur, dot };
          if (head.acc) slot.acc = head.acc;
          if (head.lyric) slot.lyric = head.lyric;
          // Couplets 2,3,… (slot.verses[0] = couplet 2)
          if (head.verses) {
            const vnums = Object.keys(head.verses).map(n => parseInt(n, 10)).filter(n => n >= 2);
            if (vnums.length) {
              const maxV = Math.max.apply(null, vnums);
              const arr = [];
              for (let v = 2; v <= maxV; v++) arr.push(head.verses[v] || '');
              while (arr.length && !arr[arr.length - 1]) arr.pop();
              if (arr.length) slot.verses = arr;
            }
          }
          if (slotTuplet) { slot.tuplet = slotTuplet; slot.tupletId = slotTupletId; if (slotTupletNormal !== 2) slot.tupletNormal = slotTupletNormal; }
          // Symbole d'accord (harmony)
          if (ev.harmony) slot.chord = ev.harmony;
          // Texte libre au-dessus (words)
          if (ev.words) slot.text = ev.words;
          // Ornements / articulations
          if (head.orn && head.orn.length) slot.orn = head.orn.slice();

          // Notes empilées (accord)
          if (ev.notes.length > 1) {
            slot.stack = [];
            for (let k = 1; k < ev.notes.length; k++) {
              const ni = ev.notes[k].info;
              if (!ni) continue;
              const stackNote = { note: ni.step, octave: ni.octInternal };
              if (ni.acc) stackNote.acc = ni.acc;
              slot.stack.push(stackNote);
            }
            if (!slot.stack.length) delete slot.stack;
          }

          // Liaisons de tenue (tie) : on traite la tête de l'accord (notre modèle lie au niveau du slot).
          // On marque tieToNext sur la DERNIÈRE note ajoutée (lastNoteSlot), qui peut appartenir
          // à la mesure précédente — c'est ce qui permet aux liaisons de traverser les barres.
          const tieKey = head.step + head.octXml + head.alter;
          if (head.tieStop && tieKeys.has(tieKey)) {
            if (lastNoteSlot && lastNoteSlot.type === 'note') lastNoteSlot.tieToNext = true;
            tieKeys.delete(tieKey);
          }
          if (head.tieStart) tieKeys.add(tieKey);

          // Liaison de phrasé (slur) : en MusicXML, le slur va de la note "start" à la note "stop".
          // Dans notre modèle, chaque note de la chaîne (sauf la dernière) porte slurToNext.
          // IMPORTANT : notre modèle n'a qu'UN lien par note (linkToNext). Si la note démarre
          // aussi une liaison de tenue (tieStart), le tie est prioritaire (lien sonore réel) :
          // on ne pose pas slurToNext dessus, ce qui évite des liaisons de phrasé parasites.
          if (head.slurStart) slurOpen = true;
          if (slurOpen && !head.slurStop && !head.tieStart) slot.slurToNext = true;
          if (head.slurStop) slurOpen = false;

          slots.push(slot);
          lastNoteSlot = slot;   // mémoriser pour le prochain tie/slur (y compris inter-mesure)

          // Durée non représentable par une figure simple/pointée (ex. note DOUBLE ou TRIPLE pointée
          // venant d'un MusicXML : 1,75 / 1,875…). Notre modèle ne gère que la pointée simple.
          // Plutôt que de laisser une durée « bâtarde » qui s'affiche de travers, on découpe la note
          // en figures propres LIÉES entre elles (ex. noire pointée ⌣ croche pour 1,75), sauf en n-uplet.
          if (!slotTuplet) {
            const want = chordDurQ;
            const clean = isCleanValue(want);
            if (!clean) {
              // Décomposition EXACTE en valeurs simples décroissantes (toujours juste), liées.
              // Ex. noire double-pointée 1,75 → noire ⌣ croche ⌣ double.
              const eps = 1e-6; const BASES = [4,2,1,0.5,0.25,0.125,0.0625];
              const pieces = []; let rem = +want.toFixed(6);
              for (const b of BASES) { while (rem >= b - eps) { pieces.push({dur:b,dot:false}); rem = +(rem-b).toFixed(6); } }
              if (pieces.length > 1) {
                // remplacer le slot poussé par la suite de figures liées
                slots.pop();
                pieces.forEach((p, i) => {
                  const c = Object.assign({}, slot, { dur: p.dur, dot: p.dot });
                  if (slot.stack) c.stack = slot.stack.map(x => Object.assign({}, x));
                  if (i < pieces.length - 1) c.tieToNext = true;
                  else { if (slot.tieToNext) c.tieToNext = true; else delete c.tieToNext; }
                  if (i > 0) { delete c.chord; delete c.text; delete c.lyric; delete c.verses; delete c.orn; }
                  slots.push(c);
                  lastNoteSlot = c;
                });
              }
            }
          }

          // Fermer le groupe n-uplet après cette note
          if (inTuplet && ev.tupStop) { curTupletId = null; curTupletN = 0; curTupletNormal = 2; }
        });

        if (slots.length > 0) measures.push(slots);
        else {
          // mesure vide → soupir (déduit de la métrique)
          const { num: n, den: d } = parseMeter(meter);
          const beatD = 4 / d;
          const cap = n * beatD;
          const rests = [];
          let rem = cap;
          const UNITS = [4, 2, 1, 0.5, 0.25, 0.125];
          for (const u of UNITS) while (rem >= u - 1e-6) { rests.push({ type:'rest', dur: u, dot: false }); rem -= u; }
          measures.push(rests.length ? rests : [{ type:'rest', dur: beatD, dot: false }]);
        }
      });

      // Déduire pieceUnit
      const { num: mn, den: md } = parseMeter(pieceMeter || '4/4');
      pieceUnit = (mn / md < 0.75) ? '1/16' : '1/8';

      tracks.push(makeTrack({
        name: trackName,
        measures,
        pieceMeter: pieceMeter || '4/4',
        pieceUnit,
        pieceKeySig: pieceKeySig || 0,
        pieceClef: pieceClef || 'treble',
        timeChanges,
        keyChanges,
        clefChanges,
        repeats
      }));
      });  // fin boucle voix
    });

    if (!tracks.length) { alert('Aucune piste importée.'); return false; }

    // Regrouper les blocs <words> longs collectés en lignes W: d'en-tête (présentation EasyABC).
    if (collectedWords.length) {
      const existing = (headers.W || '').trim();
      const merged = (existing ? existing.split('\n') : []).concat(collectedWords);
      headers.W = merged.join('\n');
    }

    // Fonction d'application finale au state (après éventuelle réunion de voix)
    function applyTracks(finalTracks) {
      state.headers = headers;
      state.tracks = finalTracks;
      state.activeTrack = 0;
      state.tempo = globalTempo;
      state.tempoChanges = tempoChanges;
      state.tempoBeatUnit = globalBeatUnit;
      state.tempoBeatDotted = globalBeatDotted;
      state.tempoDotted = (globalBeatUnit === 1 && globalBeatDotted);
      state.openedFileName = fileName ? fileName.replace(/\.[^.]+$/, '') : null;
      state.sel = { m: 0, s: 0 };
      state.octave = 0;
      lastMultiTunes = null; lastMultiFileName = null; lastMultiIndex = -1; updateListBtn();
      cleanupAccidentals();
      initLinksFromTieSlur();
      pushHistory();
      render();
      const nTracks = finalTracks.length;
      const nNotes = finalTracks.reduce((a, t) => a + t.measures.reduce((b, m) => b + m.filter(s => s.type === 'note').length, 0), 0);
      flash('MusicXML importé : ' + nTracks + ' piste' + (nTracks > 1 ? 's' : '') + ', ' + nNotes + ' notes');
    }

    if (tracks.length <= MAX_TRACKS) {
      applyTracks(tracks);
      return true;
    }

    // --- Trop de voix : proposer de réunir ---
    // L'utilisateur coche les voix à réunir ; les voix cochées sont fusionnées (accords)
    // dans la PREMIÈRE voix cochée. On répète jusqu'à ≤ MAX_TRACKS.
    openVoiceMergePanel(tracks, applyTracks);
    return true;
  }

  // Panneau de réunion de voix.
  // `tracks` : pistes à considérer. `onDone(finalTracks)` appliqué à la fin.
  // `manual` : true = réunion à la demande (pas de limite imposée, bouton « Terminer »).
  function openVoiceMergePanel(tracks, onDone, manual) {
    // Travail sur une copie : chaque entrée = { track, merged:false }
    let working = tracks.map(t => t);
    const checked = new Set();   // indices cochés (à réunir ensemble)

    function controls() {
      let h = manual
        ? '<small>Cochez les voix à réunir (elles seront empilées en accords sur la première cochée), puis « Réunir ». Cliquez « Terminer » quand c\'est fini.</small>'
        : ('<small>Ce morceau contient <b>' + working.length + '</b> voix, le maximum est <b>' + MAX_TRACKS + '</b>.<br>'
          + 'Cochez les voix à réunir (elles seront empilées en accords sur la première cochée), puis « Réunir ». '
          + 'Répétez jusqu\'à ' + MAX_TRACKS + ' voix ou moins.</small>');
      h += '<div class="save-list" id="vm-list" style="max-height:calc(100vh - 360px);">';
      working.forEach((t, i) => {
        const nNotes = t.measures.reduce((a, m) => a + m.filter(s => s.type === 'note').length, 0);
        const on = checked.has(i);
        h += '<div class="item" data-vm="' + i + '" style="' + (on ? 'background:#d3e6fa;outline:2px solid #378add;outline-offset:-2px;' : '') + '">'
          + '<span><input type="checkbox" ' + (on ? 'checked' : '') + ' style="margin-right:8px;"/>'
          + escXml(t.name || ('V' + (i + 1))) + '</span>'
          + '<span style="font-size:24px;color:#5f5e5a;">' + nNotes + ' notes</span></div>';
      });
      h += '</div>';
      h += '<div class="mes-active" style="margin-top:6px;">Voix actuelles : <b>' + working.length + '</b> / ' + MAX_TRACKS + '</div>';
      return h;
    }
    function rebindList() {
      document.querySelectorAll('#vm-list .item[data-vm]').forEach(el => {
        el.addEventListener('click', () => {
          const i = parseInt(el.dataset.vm, 10);
          if (checked.has(i)) checked.delete(i); else checked.add(i);
          refreshBody();
        });
      });
    }
    function refreshBody() {
      const body = document.getElementById('panel-body');
      const actions = body.querySelector('.actions');
      body.innerHTML = controls() + (actions ? actions.outerHTML : '');
      rebindList();
      // re-bind extra buttons
      body.querySelectorAll('[data-extra]').forEach(b => {
        b.addEventListener('click', () => { if (cOnExtra) cOnExtra(b.dataset.extra); });
      });
    }
    openPanel({
      title: 'Réunir des voix', body: controls(), hideActions: true,
      extraButtons: manual ? ['Réunir la sélection', 'Terminer'] : ['Réunir la sélection', 'Ouvrir tel quel'],
      actionsClass: 'two', fullHeight: true,
      onMount: rebindList,
      onExtra: (w) => {
        if (w === 'Ouvrir tel quel') {
          onDone(working.slice(0, MAX_TRACKS));
          closePanel();
          return;
        }
        if (w === 'Terminer') {
          onDone(working);
          closePanel();
          return;
        }
        if (w === 'Réunir la sélection') {
          if (checked.size < 2) { alert('Cochez au moins deux voix à réunir.'); return; }
          const idxs = [...checked].sort((a, b) => a - b);
          const dst = working[idxs[0]];
          for (let k = 1; k < idxs.length; k++) mergeTrackInto(dst, working[idxs[k]]);
          const toRemove = new Set(idxs.slice(1));
          working = working.filter((_, i) => !toRemove.has(i));
          checked.clear();
          if (!manual && working.length <= MAX_TRACKS) {
            onDone(working);
            closePanel();
            return;
          }
          refreshBody();
        }
      }
    });
  }

  // Charge un fichier ArrayBuffer MXL (ZIP) → extrait score.xml → parseMusicXml
  async function loadMxlFile(buffer, fileName) {
    try {
      // Lire le ZIP minimal : trouver score.xml (ou le rootfile) dans le ZIP
      const bytes = new Uint8Array(buffer);
      // Signature ZIP : PK\x03\x04
      if (bytes[0] !== 0x50 || bytes[1] !== 0x4B) {
        // Pas un ZIP → tenter comme XML direct
        const text = new TextDecoder('utf-8').decode(bytes);
        return parseMusicXml(text, fileName);
      }
      // Extraire tous les fichiers du ZIP (method=0 stored ou 8 deflate via DecompressionStream)
      function readUint16LE(b, o) { return b[o] | (b[o+1]<<8); }
      function readUint32LE(b, o) { return (b[o]|(b[o+1]<<8)|(b[o+2]<<16)|(b[o+3]<<24))>>>0; }
      let i = 0;
      let scoreXmlData = null;
      while (i < bytes.length - 4) {
        const sig = readUint32LE(bytes, i);
        if (sig !== 0x04034B50) break; // Local File Header signature
        const method   = readUint16LE(bytes, i + 8);
        const compSize = readUint32LE(bytes, i + 18);
        const nameLen  = readUint16LE(bytes, i + 26);
        const extraLen = readUint16LE(bytes, i + 28);
        const nameBytes = bytes.slice(i + 30, i + 30 + nameLen);
        const name = new TextDecoder('utf-8').decode(nameBytes);
        const dataStart = i + 30 + nameLen + extraLen;
        const compData = bytes.slice(dataStart, dataStart + compSize);
        i = dataStart + compSize;
        // On cherche score.xml ou tout .xml qui n'est pas container.xml
        if (name.endsWith('.xml') && !name.includes('container')) {
          if (method === 0) {
            // Stored : directement utilisable
            scoreXmlData = new TextDecoder('utf-8').decode(compData);
          } else if (method === 8) {
            // Deflate : utiliser DecompressionStream
            try {
              const ds = new DecompressionStream('deflate-raw');
              const writer = ds.writable.getWriter();
              const reader = ds.readable.getReader();
              writer.write(compData);
              writer.close();
              const chunks = [];
              let done = false;
              while (!done) {
                const { value, done: d } = await reader.read();
                if (value) chunks.push(value);
                done = d;
              }
              const total = chunks.reduce((a, c) => a + c.length, 0);
              const out = new Uint8Array(total);
              let off = 0;
              for (const c of chunks) { out.set(c, off); off += c.length; }
              scoreXmlData = new TextDecoder('utf-8').decode(out);
            } catch(e) {
              alert('Décompression MXL échouée : ' + e.message); return false;
            }
          }
          break;
        }
      }
      if (!scoreXmlData) { alert('score.xml introuvable dans le fichier MXL.'); return false; }
      return parseMusicXml(scoreXmlData, fileName);
    } catch(e) {
      alert('Erreur lecture MXL : ' + e.message); return false;
    }
  }

  fileInput.addEventListener('change', (e) => {
    const f = e.target.files[0]; if (!f) return;
    const name = f.name.toLowerCase();
    if (name.endsWith('.mxl')) {
      const r = new FileReader();
      r.onload = (ev) => { loadMxlFile(ev.target.result, f.name); fileInput.value = ''; };
      r.readAsArrayBuffer(f);
    } else if (name.endsWith('.xml')) {
      const r = new FileReader();
      r.onload = (ev) => { parseMusicXml(ev.target.result, f.name); fileInput.value = ''; };
      r.readAsText(f);
    } else {
      // ABC par défaut
      const r = new FileReader();
      r.onload = (ev) => {
        const text = ev.target.result;
        const tunes = splitTunes(text);
        if (tunes.length > 1) { chooseTune(tunes, f.name); }
        else { lastMultiTunes=null; lastMultiFileName=null; lastMultiIndex=-1; updateListBtn(); loadTuneAbc(text, f.name); }
        fileInput.value = '';
      };
      r.readAsText(f);
    }
  });

  document.getElementById('btn-saves').addEventListener('click',()=>{const saves=getSaves();let lh='<div class="save-list">';if(saves.length===0)lh+='<div class="item" style="color:#888780;cursor:default;">Aucune sauvegarde</div>';else saves.forEach((s,i)=>lh+='<div class="item" data-idx="'+i+'"><span>'+s.name+'</span><span class="del" data-del="'+i+'">×</span></div>');lh+='</div>';lh+='<div class="row"><span class="field-label">Nom:</span><input id="sn" type="text" value="'+(state.headers.T||'Morceau').replace(/"/g,'&quot;')+'"/></div>';openPanel({title:'Mémoires',body:lh,hideActions:true,extraButtons:['Annuler','Enregistrer'],onMount:()=>{document.querySelectorAll('.save-list .item[data-idx]').forEach(el=>{el.addEventListener('click',(ev)=>{if(ev.target.dataset.del!==undefined){const idx=parseInt(ev.target.dataset.del,10);const saves=getSaves();saves.splice(idx,1);setSaves(saves);closePanel();return}const idx=parseInt(el.dataset.idx,10);const saves=getSaves();if(saves[idx]&&importStateJson(saves[idx].data))closePanel()})})},onExtra:(w)=>{if(w==='Annuler'){closePanel();return}const name=document.getElementById('sn').value.trim()||'Morceau';const saves=getSaves();const ex=saves.findIndex(s=>s.name===name);const e={name,data:exportState(),date:new Date().toISOString()};if(ex>=0)saves[ex]=e;else saves.push(e);setSaves(saves);closePanel()}})});

  // ============ Export MusicXML compresse (.mxl) ============
  function escapeXml(s){return (s+'').replace(/[<>&"']/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&apos;'}[c]))}
  function clefXml(clefName){
    if(clefName==='bass')return '<clef><sign>F</sign><line>4</line></clef>';
    if(clefName==='treble8')return '<clef><sign>G</sign><line>2</line><clef-octave-change>-1</clef-octave-change></clef>';
    if(clefName==='alto')return '<clef><sign>C</sign><line>3</line></clef>';
    if(clefName==='tenor')return '<clef><sign>C</sign><line>4</line></clef>';
    return '<clef><sign>G</sign><line>2</line></clef>';
  }
  function keyXml(sig){return '<key><fifths>'+sig+'</fifths><mode>major</mode></key>'}
  function timeXml(meter){const{num,den}=parseMeter(meter);return '<time><beats>'+num+'</beats><beat-type>'+den+'</beat-type></time>'}
  function pitchXml(slot,effAcc,octShift){
    const step=slot.note;
    const oct=4+slot.octave+(octShift||0);
    // effAcc: altération effective (en tenant compte armure + heritage de mesure)
    let alter=0;
    if(effAcc==='^')alter=1;
    else if(effAcc==='_')alter=-1;
    else if(effAcc==='=')alter=0;
    let s='<pitch><step>'+step+'</step>';
    if(alter!==0)s+='<alter>'+alter+'</alter>';
    s+='<octave>'+oct+'</octave></pitch>';
    return s;
  }
  function noteTypeXml(slot){
    // duree visuelle (sans n-uplet)
    const d=nominalDur(slot);
    if(d>=4)return 'whole';
    if(d>=2)return 'half';
    if(d>=1)return 'quarter';
    if(d>=0.5)return 'eighth';
    if(d>=0.25)return '16th';
    if(d>=0.125)return '32nd';
    return '64th';
  }
  // Génère <harmony>...</harmony> à partir d'un symbole texte (ex. "Cm7", "G/B").
  function harmonyXml(sym){
    if(!sym)return'';
    const m=sym.match(/^([A-G])([#b]?)(.*)$/);
    if(!m)return'';
    const step=m[1];const alt=m[2];let rest=m[3]||'';
    let bass='';const slash=rest.indexOf('/');
    if(slash>=0){bass=rest.slice(slash+1);rest=rest.slice(0,slash)}
    // Déduire le kind MusicXML depuis le suffixe (table élargie)
    const KIND={
      '':'major','M':'major','maj':'major',
      'm':'minor','min':'minor','-':'minor',
      'aug':'augmented','+':'augmented','+5':'augmented','#5':'augmented',
      'dim':'diminished','°':'diminished','o':'diminished',
      '7':'dominant','dom7':'dominant',
      'Maj7':'major-seventh','maj7':'major-seventh','M7':'major-seventh','Δ':'major-seventh','Δ7':'major-seventh',
      'm7':'minor-seventh','min7':'minor-seventh','-7':'minor-seventh',
      'dim7':'diminished-seventh','°7':'diminished-seventh','o7':'diminished-seventh',
      'aug7':'augmented-seventh','+7':'augmented-seventh','7#5':'augmented-seventh','7+5':'augmented-seventh',
      'm7b5':'half-diminished','ø':'half-diminished','ø7':'half-diminished','-7b5':'half-diminished',
      'mMaj7':'major-minor','mM7':'major-minor','-Maj7':'major-minor',
      '6':'major-sixth','M6':'major-sixth','maj6':'major-sixth',
      'm6':'minor-sixth','min6':'minor-sixth','-6':'minor-sixth',
      '9':'dominant-ninth','7/9':'dominant-ninth',
      'Maj9':'major-ninth','maj9':'major-ninth','M9':'major-ninth',
      'm9':'minor-ninth','min9':'minor-ninth','-9':'minor-ninth',
      '11':'dominant-11th','Maj11':'major-11th','M11':'major-11th','m11':'minor-11th','-11':'minor-11th',
      '13':'dominant-13th','Maj13':'major-13th','M13':'major-13th','m13':'minor-13th','-13':'minor-13th',
      'sus2':'suspended-second','sus4':'suspended-fourth','sus':'suspended-fourth','7sus4':'suspended-fourth','7sus':'suspended-fourth',
      '5':'power','add9':'major','6/9':'major-sixth','69':'major-sixth'
    };
    const known=KIND[rest]!==undefined;
    let kind;
    if(known)kind=KIND[rest];
    else{
      // Heuristique de repli : on devine une base raisonnable, et on conserve le texte exact.
      const r=rest;
      if(/^(maj7|M7|Δ)/i.test(r))kind='major-seventh';
      else if(/^(m|min|-)/.test(r)&&!/^maj/i.test(r)){ kind=/7/.test(r)?'minor-seventh':'minor'; }
      else if(/dim|°|o/.test(r))kind='diminished';
      else if(/aug|\+/.test(r))kind='augmented';
      else if(/sus/.test(r))kind='suspended-fourth';
      else if(/13/.test(r))kind='dominant-13th';
      else if(/11/.test(r))kind='dominant-11th';
      else if(/9/.test(r))kind='dominant-ninth';
      else if(/7/.test(r))kind='dominant';
      else kind='major';
    }
    let x='<harmony>';
    x+='<root><root-step>'+step+'</root-step>';
    if(alt==='#')x+='<root-alter>1</root-alter>';else if(alt==='b')x+='<root-alter>-1</root-alter>';

    // Suffixe canonique que l'import reconstruirait pour ce kind. Si le suffixe tapé en diffère

    // pour un aller-retour fidèle ; sinon on laisse le lecteur formater le kind.
    const CANON={'major':'','minor':'m','augmented':'aug','diminished':'dim','dominant':'7',
      'major-seventh':'Maj7','minor-seventh':'m7','diminished-seventh':'dim7','augmented-seventh':'aug7',
      'half-diminished':'m7b5','major-minor':'mMaj7','major-sixth':'6','minor-sixth':'m6',
      'dominant-ninth':'9','major-ninth':'Maj9','minor-ninth':'m9','dominant-11th':'11','major-11th':'Maj11',
      'minor-11th':'m11','dominant-13th':'13','major-13th':'Maj13','minor-13th':'m13',
      'suspended-second':'sus2','suspended-fourth':'sus4','power':'5'};
    const needText=(rest!==(CANON[kind]!==undefined?CANON[kind]:''));
    x+='<kind'+(needText?' text="'+escapeXml(rest)+'"':'')+'>'+kind+'</kind>';

  // Génère un <note>...</note>. isChordNote=true → ajoute <chord/> (note empilée d'un accord).
  // prevNote = note de tête précédente (cross-mesure) pour détecter tie/slur stop.
  function oneNoteXml(slot,si,meas,lK,lC,dur,isChordNote,prevNote){
    let xml='<note>';
    if(isChordNote)xml+='<chord/>';
    if(slot.type==='rest'){
      xml+='<rest/>';
    } else {
      const effAcc=effectiveAcc(meas,si,lK);
      xml+=pitchXml(slot,effAcc,lC==='treble8'?-1:0);
    }
    xml+='<duration>'+dur+'</duration>';
    xml+='<voice>1</voice>';
    xml+='<type>'+noteTypeXml(slot)+'</type>';
    if(slot.dot)xml+='<dot/>';
    if(slot.type==='note'&&!isChordNote){
      const accDraw=accToDrawFor(meas,si,lK);
      if(accDraw){
        if(accDraw==='^')xml+='<accidental>sharp</accidental>';
        else if(accDraw==='_')xml+='<accidental>flat</accidental>';
        else if(accDraw==='=')xml+='<accidental>natural</accidental>';
      } else if(slot.acc){
        if(slot.acc==='^')xml+='<accidental print-object="no">sharp</accidental>';
        else if(slot.acc==='_')xml+='<accidental print-object="no">flat</accidental>';
        else if(slot.acc==='=')xml+='<accidental print-object="no">natural</accidental>';
      }
    } else if(isChordNote&&slot.acc){
      if(slot.acc==='^')xml+='<accidental>sharp</accidental>';
      else if(slot.acc==='_')xml+='<accidental>flat</accidental>';
      else if(slot.acc==='=')xml+='<accidental>natural</accidental>';
    }
    if(slot.tuplet){
      const normal=(slot.tupletNormal!==undefined&&slot.tupletNormal>0)?slot.tupletNormal:2;
      xml+='<time-modification><actual-notes>'+slot.tuplet+'</actual-notes><normal-notes>'+normal+'</normal-notes></time-modification>';
    }
    // Liaisons de tenue : la note précédente (même dans la mesure d'avant) avait tieToNext
    // ET même hauteur → cette note = stop. Utilise prevNote (cross-mesure), pas meas[si-1].
    let tieStopHere=false;
    if(slot.type==='note'&&!isChordNote&&prevNote&&prevNote.type==='note'&&prevNote.tieToNext){
      if(prevNote.note===slot.note&&prevNote.octave===slot.octave)tieStopHere=true;
    }
    if(tieStopHere)xml+='<tie type="stop"/>';
    if(slot.tieToNext)xml+='<tie type="start"/>';
    let nota='';
    if(tieStopHere)nota+='<tied type="stop"/>';
    if(slot.tieToNext)nota+='<tied type="start"/>';
    // Liaisons de phrasé (slur) : slurToNext → start ; précédente avait slurToNext → stop.
    // Numéro de slur partagé = 1 (chaînes simples). Détection cross-mesure via prevNote.
    if(slot.type==='note'&&!isChordNote){
      const prevSlur=prevNote&&prevNote.type==='note'&&prevNote.slurToNext;
      if(prevSlur)nota+='<slur type="stop" number="1"/>';
      if(slot.slurToNext)nota+='<slur type="start" number="1"/>';
    }
    if(slot.tuplet&&!isChordNote){
      const isFirstT=(si===0||!meas[si-1]||meas[si-1].tupletId!==slot.tupletId);
      const isLastT=(si===meas.length-1||!meas[si+1]||meas[si+1].tupletId!==slot.tupletId);
      if(isFirstT)nota+='<tuplet type="start" bracket="yes"/>';
      if(isLastT)nota+='<tuplet type="stop"/>';
    }
    if(slot.orn&&slot.orn.length&&!isChordNote){
      let orns='';
      slot.orn.forEach(o=>{
        if(o==='~'||o==='T')orns+='<trill-mark/>';
        else if(o==='M')orns+='<turn/>';
        else if(o==='P')orns+='<mordent/>';
        else if(o==='H')nota+='<fermata/>';
        else if(o==='.')nota+='<articulations><staccato/></articulations>';
        else if(o==='L')nota+='<articulations><accent/></articulations>';
        else if(o==='u')nota+='<technical><up-bow/></technical>';
        else if(o==='v')nota+='<technical><down-bow/></technical>';
      });
      if(orns)nota+='<ornaments>'+orns+'</ornaments>';
    }
    if(nota)xml+='<notations>'+nota+'</notations>';
    // Paroles (uniquement sur la note de tête, pas les notes empilées) : un <lyric number> par couplet
    if(slot.type==='note'&&!isChordNote){
      const emitLyric=(raw,vnum)=>{
        if(!raw)return'';
        const hasDash=raw.endsWith('-');
        const syl=(hasDash?raw.slice(0,-1):raw).replace(/~/g,' ');
        const syllabic=hasDash?'begin':'single';
        return '<lyric number="'+vnum+'"><syllabic>'+syllabic+'</syllabic><text>'+escapeXml(syl)+'</text></lyric>';
      };
      xml+=emitLyric(slot.lyric,1);
      if(slot.verses)slot.verses.forEach((v,idx)=>{xml+=emitLyric(v,idx+2)});
    }
    xml+='</note>\n';
    return xml;
  }
  function buildMusicXml(){
    const DIV=480; // divisions par noire (multiple riche pour gerer les n-uplets)
    let xml='<?xml version="1.0" encoding="UTF-8" standalone="no"?>\n';
    xml+='<!DOCTYPE score-partwise PUBLIC "-//Recordare//DTD MusicXML 3.1 Partwise//EN" "http://www.musicxml.org/dtds/partwise.dtd">\n';
    xml+='<score-partwise version="3.1">\n';
    // Work / identification
    const title=(state.headers.T||'').split('\n')[0]||'Sans titre';
    const composer=(state.headers.C||'').split('\n')[0]||'';
    xml+='<work><work-title>'+escapeXml(title)+'</work-title></work>\n';
    // identification : compositeur + couplets supplémentaires (W:) stockés en miscellaneous-field
    // (emplacement standard préservé, contrairement aux cadres de texte MuseScore qui ne s'exportent pas)
    const extraWords=(state.headers.W||'');
    let ident='';
    if(composer)ident+='<creator type="composer">'+escapeXml(composer)+'</creator>';
    if(extraWords.trim())ident+='<miscellaneous><miscellaneous-field name="abc-words">'+escapeXml(extraWords)+'</miscellaneous-field></miscellaneous>';
    if(ident)xml+='<identification>'+ident+'</identification>\n';
    // part-list : une score-part par piste
    const tracks=(state.tracks&&state.tracks.length)?state.tracks:[null];
    xml+='<part-list>';
    tracks.forEach((tr,i)=>{
      const id='P'+(i+1);
      const name=(tr&&tr.name)?tr.name:'Voix';
      xml+='<score-part id="'+id+'"><part-name>'+escapeXml(name)+'</part-name></score-part>';
    });
    xml+='</part-list>\n';
    // Boucler sur les pistes en changeant temporairement activeTrack
    const savedActive=state.activeTrack;
    tracks.forEach((tr,i)=>{
      state.activeTrack=i;
      const id='P'+(i+1);
      xml+=buildOnePartXml(id,DIV,i===0);
    });
    state.activeTrack=savedActive;
    xml+='</score-partwise>\n';
    return xml;
  }
  // Génère <part id=...>...</part> pour la piste active courante. includeTempo=true
  // sur la 1ère piste seulement (tempo global).
  function buildOnePartXml(partId,DIV,includeTempo){
    let xml='<part id="'+partId+'">\n';
    let prevClef=null,prevKey=null,prevMeter=null;
    let prevNoteXm=null;   // dernière note émise (toutes mesures confondues) pour tie/slur inter-mesure
    state.measures.forEach((meas,mi)=>{
      xml+='<measure number="'+(mi+1)+'">\n';
      const lC=clefAt(mi),lK=keyAt(mi),lM=meterAt(mi);
      const isFirst=(mi===0);
      const hasClefChange=isFirst||lC!==prevClef;
      const hasKeyChange=isFirst||lK!==prevKey;
      const hasMeterChange=isFirst||lM!==prevMeter;
      if(isFirst||hasClefChange||hasKeyChange||hasMeterChange){
        xml+='<attributes>';
        if(isFirst)xml+='<divisions>'+DIV+'</divisions>';
        if(hasKeyChange)xml+=keyXml(lK);
        if(hasMeterChange)xml+=timeXml(lM);
        if(hasClefChange)xml+=clefXml(lC);
        xml+='</attributes>\n';
      }
      const tcMap=state.tempoChanges||{};
      const tempoHere=(isFirst)?state.tempo:tcMap[mi];
      if(includeTempo && tempoHere!==undefined){
        const dotted=(isFirst?state.tempoDotted:false);
        const bpmTempo=dotted?Math.round(tempoHere*2/3):Math.round(tempoHere);
        const beatUnit=dotted?'eighth':'quarter';
        const dot=dotted?'<beat-unit-dot/>':'';
        xml+='<direction placement="above"><direction-type><metronome><beat-unit>'+beatUnit+'</beat-unit>'+dot+'<per-minute>'+bpmTempo+'</per-minute></metronome></direction-type><sound tempo="'+Math.round(tempoHere)+'"/></direction>\n';
      }
      const r=state.repeats[mi];
      if(r){
        if(r.start)xml+='<barline location="left"><bar-style>heavy-light</bar-style><repeat direction="forward"/></barline>\n';
        if(r.volta)xml+='<barline location="left"><ending number="'+r.volta+'" type="start"/></barline>\n';
      }
      meas.forEach((slot,si)=>{
        const dur=Math.max(1,Math.round(effDur(slot)*DIV));
        // Symbole d'accord : <harmony> est un élément FRÈRE placé AVANT la note/silence
        if(slot.chord){
          xml+=harmonyXml(slot.chord);
        }
        // Texte libre au-dessus : <direction><words> (placé AVANT la note/silence)
        if(slot.text){
          xml+='<direction placement="above"><direction-type><words>'+escapeXml(slot.text)+'</words></direction-type></direction>\n';
        }
        // Note de tête (on passe prevNoteXm pour détecter tie/slur stop inter-mesure)
        xml+=oneNoteXml(slot,si,meas,lK,lC,dur,false,prevNoteXm);
        // Notes empilées (accord) : chaque note du stack avec <chord/>
        if(slot.type==='note'&&slot.stack&&slot.stack.length){
          slot.stack.forEach(sn=>{
            const stackSlot={type:'note',note:sn.note,octave:sn.octave,dur:slot.dur,dot:slot.dot,acc:sn.acc,tuplet:slot.tuplet,tupletId:slot.tupletId,tupletNormal:slot.tupletNormal};
            xml+=oneNoteXml(stackSlot,si,meas,lK,lC,dur,true,null);
          });
        }
        // Mémoriser la note de tête pour la suivante (cross-mesure)
        if(slot.type==='note')prevNoteXm=slot;
      });
      if(r){
        if(r.volta)xml+='<barline location="right"><ending number="'+r.volta+'" type="stop"/></barline>\n';
        if(r.end)xml+='<barline location="right"><bar-style>light-heavy</bar-style><repeat direction="backward"/></barline>\n';
      }
      xml+='</measure>\n';
      prevClef=lC;prevKey=lK;prevMeter=lM;
    });
    xml+='</part>\n';
    return xml;
  }
  // ============ Encodeur ZIP minimal (stored, sans compression) ============
  // Format ZIP : pour chaque fichier => Local File Header + data + ... + Central Directory + End Of CD
  function crc32(bytes){
    // Table CRC32 calculee a la volee
    let c;
    const table=crc32._t;
    if(!table){
      const t=new Uint32Array(256);
      for(let n=0;n<256;n++){
        c=n;
        for(let k=0;k<8;k++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);
        t[n]=c>>>0;
      }
      crc32._t=t;
    }
    let crc=0xFFFFFFFF;
    for(let i=0;i<bytes.length;i++)crc=(crc>>>8)^crc32._t[(crc^bytes[i])&0xFF];
    return (crc^0xFFFFFFFF)>>>0;
  }
  function strToUint8(s){
    // UTF-8 encoding
    return new TextEncoder().encode(s);
  }
  function makeZip(files){
    // files: [{name, data: Uint8Array}]
    const parts=[];
    const central=[];
    let offset=0;
    const dosTime=0,dosDate=0; // ignore date
    files.forEach(f=>{
      const nameBytes=strToUint8(f.name);
      const crc=crc32(f.data);
      const size=f.data.length;
      // Local File Header
      const lfh=new Uint8Array(30+nameBytes.length);
      const dv=new DataView(lfh.buffer);
      dv.setUint32(0,0x04034b50,true);  // signature
      dv.setUint16(4,20,true);          // version needed
      dv.setUint16(6,0,true);           // flags
      dv.setUint16(8,0,true);           // method 0 = stored
      dv.setUint16(10,dosTime,true);
      dv.setUint16(12,dosDate,true);
      dv.setUint32(14,crc,true);
      dv.setUint32(18,size,true);       // compressed size
      dv.setUint32(22,size,true);       // uncompressed size
      dv.setUint16(26,nameBytes.length,true);
      dv.setUint16(28,0,true);          // extra
      lfh.set(nameBytes,30);
      parts.push(lfh);
      parts.push(f.data);
      // Central Directory record
      const cdr=new Uint8Array(46+nameBytes.length);
      const dv2=new DataView(cdr.buffer);
      dv2.setUint32(0,0x02014b50,true);
      dv2.setUint16(4,20,true);          // version made
      dv2.setUint16(6,20,true);          // version needed
      dv2.setUint16(8,0,true);
      dv2.setUint16(10,0,true);          // method
      dv2.setUint16(12,dosTime,true);
      dv2.setUint16(14,dosDate,true);
      dv2.setUint32(16,crc,true);
      dv2.setUint32(20,size,true);
      dv2.setUint32(24,size,true);
      dv2.setUint16(28,nameBytes.length,true);
      dv2.setUint16(30,0,true);          // extra
      dv2.setUint16(32,0,true);          // comment
      dv2.setUint16(34,0,true);          // disk
      dv2.setUint16(36,0,true);          // internal attrs
      dv2.setUint32(38,0,true);          // external attrs
      dv2.setUint32(42,offset,true);
      cdr.set(nameBytes,46);
      central.push(cdr);
      offset+=lfh.length+size;
    });
    const cdStart=offset;
    let cdSize=0;
    central.forEach(c=>{parts.push(c);cdSize+=c.length;offset+=c.length});
    // End Of Central Directory
    const eocd=new Uint8Array(22);
    const dv3=new DataView(eocd.buffer);
    dv3.setUint32(0,0x06054b50,true);
    dv3.setUint16(4,0,true);
    dv3.setUint16(6,0,true);
    dv3.setUint16(8,files.length,true);
    dv3.setUint16(10,files.length,true);
    dv3.setUint32(12,cdSize,true);
    dv3.setUint32(16,cdStart,true);
    dv3.setUint16(20,0,true);
    parts.push(eocd);
    // Concatener
    let total=0;parts.forEach(p=>total+=p.length);
    const out=new Uint8Array(total);
    let pos=0;parts.forEach(p=>{out.set(p,pos);pos+=p.length});
    return out;
  }
  document.getElementById('btn-export-mxl').addEventListener('click',()=>{

      // Note : pour un .mxl strict, "mimetype" doit etre stocke en premier et non compresse.
      // Comme on n'utilise que stored partout, c'est OK.
      const files=[
        {name:'mimetype',data:strToUint8('application/vnd.recordare.musicxml')},
        {name:'META-INF/container.xml',data:strToUint8(containerXml)},
        {name:'score.xml',data:strToUint8(xml)}
      ];
      const zipBytes=makeZip(files);
      const blob=new Blob([zipBytes],{type:'application/vnd.recordare.musicxml'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      const fn=proposedBaseName()+'.mxl';
      a.href=url;a.download=fn;
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      URL.revokeObjectURL(url);

      alert('Erreur export MusicXML : '+e.message);
    }
  });

  const panel=document.getElementById('panel');

  let cOnOk=null,cOnExtra=null,cOnMeasureChange=null,cShowMes=false;

  // === Sélecteur de plage de mesures partagé (de la mesure X → à la mesure Y) ===
  // Chaque ligne (« de la » / « à la ») a ses propres boutons −10 −1 +1 +10.
  // Un bouton ne modifie QUE la valeur de SA ligne (jamais les deux), allume SA ligne en bleu,
  // et positionne la vue sur la mesure de cette ligne. Le libellé est un simple texte.
  // opts: {from, to, min, max, focus, onChange(from,to,focus)}. Renvoie {html, bind, getFrom, getTo}.
  function makeRangeSelector(opts){
    let from=opts.from, to=opts.to, active=opts.focus||'to'; // champ sélectionné ('from' ou 'to')
    const min=opts.min!=null?opts.min:1, max=opts.max;
    function clamp(driver){
      from=Math.max(min,Math.min(max,from));
      to=Math.max(min,Math.min(max,to));
      if(driver==='from'){ if(from>to)to=from; }
      else if(driver==='to'){ if(to<from)from=to; }
      else { if(to<from)to=from; }
    }
    function html(){
      clamp();
      function fieldRow(which,label,val){
        // Ligne sélectionnable : libellé + valeur. Un clic la rend « active ».
        return '<button class="k rg-field" data-rg="'+which+'" style="display:grid;grid-template-columns:1fr auto;align-items:center;width:100%;height:30px;font-size:28px;font-weight:700;text-align:left;padding:0 10px;margin-top:3px;">'
          +'<span>'+label+'</span><span class="rg-val" data-rg="'+which+'" style="font-size:32px;">'+val+'</span></button>';
      }
      // Une SEULE ligne de boutons partagée : −10 −1 déb fin +1 +10, agissant sur le champ sélectionné.
      const stepRow='<div class="rg-steps" style="display:grid;grid-template-columns:repeat(6,1fr);gap:3px;margin-top:4px;">'
        +'<button class="k rg-step" data-d="-10" style="font-size:26px;padding:0;">−10</button>'
        +'<button class="k rg-step" data-d="-1" style="font-size:28px;padding:0;">−1</button>'
        +'<button class="k rg-step" data-set="min" style="font-size:26px;padding:0;">déb</button>'
        +'<button class="k rg-step" data-set="max" style="font-size:26px;padding:0;">fin</button>'
        +'<button class="k rg-step" data-d="1" style="font-size:28px;padding:0;">+1</button>'
        +'<button class="k rg-step" data-d="10" style="font-size:26px;padding:0;">+10</button>'
        +'</div>';
      return '<div class="rg-wrap">'+fieldRow('from','De la mesure',from)+fieldRow('to','à la mesure',to)+stepRow+'</div>';
    }
    function refresh(root){
      clamp();
      root.querySelectorAll('.rg-val').forEach(el=>{el.textContent=(el.dataset.rg==='from')?from:to;});
      // Le champ actif (de/à) est surligné en bleu
      root.querySelectorAll('.rg-field').forEach(b=>{
        const on=(b.dataset.rg===active);
        b.style.background=on?'#cfe5fa':'';b.style.borderColor=on?'#185fa5':'';b.style.color=on?'#0c447c':'';
      });
    }
    function applyDelta(d){ if(active==='from')from+=d; else to+=d; clamp(active); }
    function applySet(kind){ const v=(kind==='min')?min:max; if(active==='from')from=v; else to=v; clamp(active); }
    function bind(root){
      // Sélection du champ (de / à)
      root.querySelectorAll('.rg-field').forEach(b=>b.addEventListener('click',()=>{
        active=b.dataset.rg;
        if(opts.onChange)opts.onChange(from,to,active);
        refresh(root);
      }));
      // Ligne de boutons partagée : modifie le champ actif
      root.querySelectorAll('.rg-step').forEach(b=>b.addEventListener('click',()=>{
        if(b.dataset.set){ applySet(b.dataset.set); }
        else { applyDelta(parseInt(b.dataset.d,10)); }
        if(opts.onChange)opts.onChange(from,to,active);
        refresh(root);
      }));
      refresh(root);
      // Clic sur une mesure de la partition → met à jour le champ actif
      state._rangePick=(measureIdx1based)=>{
        if(active==='from')from=measureIdx1based; else to=measureIdx1based;
        clamp(active);
        if(opts.onChange)opts.onChange(from,to,active);
        refresh(root);
      };
    }
    return {html,bind,refresh,getFrom:()=>from,getTo:()=>to,getActive:()=>active,setFrom:v=>{from=v;clamp();},setTo:v=>{to=v;clamp();}};
  }

  function openPanel({title,body,onMount,onOk,hideActions,extraButtons,onExtra,actionsClass,showMes,onMeasureChange,fullHeight,compact,closeTop}){
    panelTitle.textContent=title;
    {const ct=document.getElementById('panel-close-top');if(ct)ct.style.display=closeTop?'':'none';}
    cShowMes=!!showMes;
    panelMes.textContent=cShowMes?('Mes '+(state.sel.m+1)):'';
    document.getElementById('panel-nav').style.display='none';
    let eH='';
    if(extraButtons&&extraButtons.length){
      let cls='actions';
      if(actionsClass)cls+=' '+actionsClass;
      else if(extraButtons.length===3)cls+=' three';
      else if(extraButtons.length===4)cls+=' four';
      eH='<div class="'+cls+'" style="margin-top:10px;">'+extraButtons.map((b,i)=>'<button class="k '+(i===extraButtons.length-1?'primary':'')+'" data-extra="'+b.replace(/"/g,'&quot;')+'">'+b+'</button>').join('')+'</div>';
    }
    panelBody.innerHTML=body+eH;
    cOnOk=onOk||null;cOnExtra=onExtra||null;cOnMeasureChange=onMeasureChange||null;
    panelOk.style.display=(hideActions||extraButtons)?'none':'';
    panelCancel.style.display=(hideActions||extraButtons)?'none':'';
    panel.classList.add('open');document.getElementById('app').classList.add('panel-open');
    // Positionnement PC : la popup recouvre la colonne de menu, son haut au niveau des onglets
    // (la barre de navigation ← ⟪ Deb Fin ⟫ → reste accessible au-dessus). Son bas s'arrête
    // juste au-dessus de la rangée Annuler/Refaire (↶ ↷) de l'onglet actif, pour la garder
    // accessible elle aussi.
    try{
      const left=document.querySelector('.pc-left');
      const tabs=document.querySelector('.pc-left .tabs');
      if(left&&tabs){
        const lr=left.getBoundingClientRect();
        const tr=tabs.getBoundingClientRect();
        panel.style.left=lr.left+'px';
        panel.style.width=lr.width+'px';
        panel.style.top=tr.top+'px';
        if(compact){
          // Hauteur naturelle : le popup s'ajuste a son contenu (pas d'etirement vertical),
          // ancre sous les onglets, avec un plafond pour ne pas deborder l'ecran.
          panel.style.bottom='auto';
          panel.style.maxHeight=(window.innerHeight - tr.top - 12)+'px';
        } else {
        // Bas du popup : par defaut juste au-dessus de la rangee Annuler/Refaire (↶ ↷) de
        // l'onglet actif, pour la garder accessible. Mais si fullHeight est demande, ou si
        // l'onglet actif n'a pas de rangee undo/redo, le popup descend jusqu'a la marge basse.
        let undoRow=null;
        if(!fullHeight){
          const activePanel=document.querySelector('.tab-panel[data-panel="'+state.activeTab+'"]')||document.querySelector('.tab-panel');
          if(activePanel){
            const rows=activePanel.querySelectorAll('.row-grid');
            rows.forEach(r=>{if(r.querySelector('[id^="btn-undo"]'))undoRow=r;});
          }
        }
        if(undoRow){
          const ur=undoRow.getBoundingClientRect();
          const bottomPx=Math.max(12, window.innerHeight - ur.top + 8);
          panel.style.bottom=bottomPx+'px';
        } else {
          panel.style.bottom='12px';
        }
        panel.style.maxHeight='none';
        }
      }
    }catch(_){ }
    if(onMount)setTimeout(onMount,50);
    if(extraButtons)setTimeout(()=>{panelBody.querySelectorAll('[data-extra]').forEach(b=>{b.addEventListener('click',()=>{if(cOnExtra)cOnExtra(b.dataset.extra)})})},50);
  }
  function closePanel(){panel.classList.remove('open');document.getElementById('app').classList.remove('panel-open');panel.style.top='';panel.style.bottom='';panel.style.left='';panel.style.width='';panel.style.maxHeight='';{const ct=document.getElementById('panel-close-top');if(ct)ct.style.display='none';}cOnOk=null;cOnExtra=null;cOnMeasureChange=null;cShowMes=false;state._rangePick=null;state._notePick=null;const wasChord=state._chordEditMode;if(wasChord){const sl=selectedSlot();if(sl&&sl.type==='note')dedupeChord(sl);}state._chordEditMode=false;state._chordAddPending=false;if(wasChord)renderScore()}
  function notifyPanelMeasureChanged(){
    if(!panel.classList.contains('open'))return;
    if(cShowMes)panelMes.textContent='Mes '+(state.sel.m+1);
    if(cOnMeasureChange)cOnMeasureChange();
  }
  panelOk.addEventListener('click',()=>{if(cOnOk)cOnOk();closePanel();render()});
  panelCancel.addEventListener('click',closePanel);
  {const ct=document.getElementById('panel-close-top');if(ct)ct.addEventListener('click',closePanel);}

  // ⭐ Headers : Titre/X simple input, ST/C/N multilignes avec bouton ↵
  function headerPromptSimple(key,title){return ()=>openPanel({title:title,body:'<div class="row"><input id="hi" type="text" value="'+((state.headers[key]||'')+'').replace(/"/g,'&quot;')+'"/></div>',onMount:()=>document.getElementById('hi').focus(),onOk:()=>{let v=document.getElementById('hi').value.trim();if(key==='X'&&!v)v='0';state.headers[key]=v;pushHistory()}})}
  function headerPromptMulti(key,title,opts){opts=opts||{};return ()=>{

  // ⭐ Rythme : applique sur une PLAGE de mesures (X→Y), sur toutes les voix
  document.querySelector('[data-hdr="M"]').addEventListener('click',()=>{
    function getCurrent(){const cur=meterAt(state.sel.m);const{num,den}=parseMeter(cur);return{n:num,d:den,uD:parseInt(state.pieceUnit.split('/')[1],10)}}
    let st=getCurrent();
    const dV=[1,2,4,8,16];
    const uDs=[1,2,4,8,16,32];
    const rg=makeRangeSelector({from:state.sel.m+1,to:state.sel.m+1,min:1,max:state.measures.length,focus:'to',
      onChange:(f,t,focus)=>{const m=(focus==='from'?f:t)-1;if(m>=0&&m<state.measures.length){state.sel={m,s:0};st=getCurrent();const nv=document.getElementById('num-v');if(nv)nv.textContent=st.n;const dv=document.getElementById('den-v');if(dv)dv.textContent=st.d;const lv=document.getElementById('L-v');if(lv)lv.textContent=st.uD;renderScore();renderState();ensureSelectionVisible();}}});
    function controls(){
      function inlineStep(label,idD,idV,val,idU){
        return '<div class="stepper-inline">'
          +'<span class="si-label">'+label+'</span>'
          +'<button class="k" id="'+idD+'">−</button>'

          +'<button class="k" id="'+idU+'">+</button></div>';

        '<div class="rythme-compact">'+
          inlineStep('Numérateur','num-d','num-v',st.n,'num-u')+
          inlineStep('Dénominateur','den-d','den-v',st.d,'den-u')+
          inlineStep('Unité L:1/x','L-d','L-v',st.uD,'L-u')+
        '</div>';
    }
    function rebind(){
      rg.bind(document.getElementById('panel-body'));
      document.getElementById('num-u').addEventListener('click',()=>{st.n=Math.min(16,st.n+1);document.getElementById('num-v').textContent=st.n});
      document.getElementById('num-d').addEventListener('click',()=>{st.n=Math.max(1,st.n-1);document.getElementById('num-v').textContent=st.n});
      document.getElementById('den-u').addEventListener('click',()=>{const i=dV.indexOf(st.d);if(i<dV.length-1){st.d=dV[i+1];document.getElementById('den-v').textContent=st.d}});
      document.getElementById('den-d').addEventListener('click',()=>{const i=dV.indexOf(st.d);if(i>0){st.d=dV[i-1];document.getElementById('den-v').textContent=st.d}});
      document.getElementById('L-u').addEventListener('click',()=>{const i=uDs.indexOf(st.uD);if(i<uDs.length-1){st.uD=uDs[i+1];document.getElementById('L-v').textContent=st.uD}});
      document.getElementById('L-d').addEventListener('click',()=>{const i=uDs.indexOf(st.uD);if(i>0){st.uD=uDs[i-1];document.getElementById('L-v').textContent=st.uD}});
    }
    openPanel({
      title:'Rythme',body:controls(),hideActions:true,extraButtons:['Annuler','Appliquer'],
      onMount:rebind,
      onExtra:(w)=>{
        if(w==='Annuler'){closePanel();return}
        const startMi=Math.min(rg.getFrom(),rg.getTo())-1;
        const endMi=Math.max(rg.getFrom(),rg.getTo())-1;
        state.sel={m:startMi,s:0};
        const endOverride=(endMi<state.measures.length-1)?endMi:undefined;
        applyToAllTracks(()=>meterChangeCore(st.n+'/'+st.d,'1/'+st.uD,endOverride));
        pushHistory();closePanel();render();
      }
    });
  });

  // ⭐ Armure : applique sur une PLAGE de mesures (X→Y), à son constant (réécriture d'affichage)
  document.querySelector('[data-hdr="K"]').addEventListener('click',()=>{
    let sig=keyAt(state.sel.m);
    const rg=makeRangeSelector({from:state.sel.m+1,to:state.sel.m+1,min:1,max:state.measures.length,focus:'to',
      onChange:(f,t,focus)=>{const m=(focus==='from'?f:t)-1;if(m>=0&&m<state.measures.length){state.sel={m,s:0};sig=keyAt(m);const sv=document.getElementById('sig-v');if(sv)sv.textContent=keyMajMinLabel(sig);renderScore();renderState();ensureSelectionVisible();}}});
    function controls(){
      return '<div class="mes-active" style="color:#8a5a00;">⊕ S\'applique à <b>toutes les voix</b></div>'+rg.html()+
        '<div class="stepper-label">Armure (Majeur / mineur)</div><div class="stepper"><button class="k" id="sig-d">♭</button><div class="val"><b id="sig-v" style="font-size:28px;">'+keyMajMinLabel(sig)+'</b></div><button class="k" id="sig-u">♯</button></div>';
    }
    function rebind(){
      rg.bind(document.getElementById('panel-body'));
      document.getElementById('sig-u').addEventListener('click',()=>{sig=Math.min(7,sig+1);document.getElementById('sig-v').textContent=keyMajMinLabel(sig)});
      document.getElementById('sig-d').addEventListener('click',()=>{sig=Math.max(-7,sig-1);document.getElementById('sig-v').textContent=keyMajMinLabel(sig)});
    }
    openPanel({
      title:'Armure',body:controls(),hideActions:true,extraButtons:['Annuler','Appliquer'],
      onMount:rebind,
      onExtra:(w)=>{
        if(w==='Annuler'){closePanel();return}
        const startMi=Math.min(rg.getFrom(),rg.getTo())-1;
        const endMi=Math.max(rg.getFrom(),rg.getTo())-1;
        applyToAllTracks(()=>{
          const sigAfter=keyAt(Math.min(endMi+1,state.measures.length-1));
          const hadExplicitAfter=state.keyChanges[endMi+1]!==undefined;
          respellRangeForKey(startMi,endMi,sig);
          if(startMi===0){state.pieceKeySig=sig;delete state.keyChanges[0];}
          else state.keyChanges[startMi]=sig;
          for(let mi=startMi+1;mi<=endMi;mi++)delete state.keyChanges[mi];
          if(endMi+1<state.measures.length&&!hadExplicitAfter&&sigAfter!==sig){
            state.keyChanges[endMi+1]=sigAfter;
          }
          cleanupAccidentals();
        });
        state.sel={m:startMi,s:0};
        pushHistory();closePanel();render();
      }
    });
  });

  // ⭐ Clé : applique sur une PLAGE de mesures (X→Y), voix active uniquement. Son conservé.
