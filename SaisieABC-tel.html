  /* =====================================================================

<script>
(function(){
  const NOTES=[{label:'Do',sub:'C',n:'C'},{label:'Ré',sub:'D',n:'D'},{label:'Mi',sub:'E',n:'E'},{label:'Fa',sub:'F',n:'F'},{label:'Sol',sub:'G',n:'G'},{label:'La',sub:'A',n:'A'},{label:'Si',sub:'B',n:'B'}];
  const DURATIONS=[{label:'𝅝',d:4},{label:'𝅗𝅥',d:2},{label:'♩',d:1},{label:'♪',d:0.5},{label:'♬',d:0.25},{label:'𝅘𝅥𝅰',d:0.125},{label:'𝅘𝅥𝅱',d:0.0625}];
  const SHARP_NOTES=['F','C','G','D','A','E','B'];
  const FLAT_NOTES=['B','E','A','D','G','C','F'];
  const ORNAMENTS=[{code:'T',label:'tr'},{code:'M',label:'∼ (gruppetto)'},{code:'P',label:'∿ pincé'},{code:'H',label:'𝄐 point d\'orgue'},{code:'L',label:'> accent'},{code:'.',label:'• staccato'},{code:'u',label:'⋁ levé'},{code:'v',label:'⊓ tiré'},{code:'O',label:'⊕ coda'}];
  // Boutons accord : ajoutent leur texte au champ
  const CHORD_BTNS=['#','b','m','Maj','2','4','5','6','7','9','11','13','sus','dim','aug','add','/'];
  const KEY_NAMES_MAJOR=['C','G','D','A','E','B','F♯','C♯'];
  const KEY_NAMES_MAJOR_FLAT=['C','F','B♭','E♭','A♭','D♭','G♭','C♭'];
  // Mineurs relatifs (même armure que le majeur correspondant)
  const KEY_NAMES_MINOR=['A','E','B','F♯','C♯','G♯','D♯','A♯'];          // dièses
  const KEY_NAMES_MINOR_FLAT=['A','D','G','C','F','B♭','E♭','A♭'];        // bémols

  // ===== Multi-pistes (étape 1) =====
  // Champs propres à une piste (chacun aliasé sur la piste active via defineProperty)
  const TRACK_FIELDS=['measures','pieceMeter','pieceUnit','pieceKeySig','pieceClef','timeChanges','keyChanges','clefChanges','repeats','parts'];
  const MAX_TRACKS=6;
  // Crée une piste vierge avec valeurs par défaut
  // Clone profond des mesures (chaque slot devient un objet indépendant) : empêche absolument
  // que deux pistes partagent les mêmes objets de notes (cause de paroles qui « bavent » d'une voix
  // à l'autre). On clone aussi les maps par-mesure pour la même raison.
  function cloneMeasures(meas){
    if(!Array.isArray(meas))return [];
    return meas.map(m=>Array.isArray(m)?m.map(s=>{
      const c=Object.assign({},s);
      if(Array.isArray(s.stack))c.stack=s.stack.map(x=>Object.assign({},x));
      if(Array.isArray(s.verses))c.verses=s.verses.slice();
      if(Array.isArray(s.orn))c.orn=s.orn.slice();
      return c;
    }):[]);
  }
  function cloneMap(o){return o?JSON.parse(JSON.stringify(o)):{};}
  function makeTrack(opts){opts=opts||{};return {
    name:opts.name||'',
    measures:cloneMeasures(opts.measures||[]),
    pieceMeter:opts.pieceMeter||'4/4',
    pieceUnit:opts.pieceUnit||'1/4',
    pieceKeySig:(opts.pieceKeySig!==undefined)?opts.pieceKeySig:0,
    pieceClef:opts.pieceClef||'treble',
    timeChanges:cloneMap(opts.timeChanges),
    keyChanges:cloneMap(opts.keyChanges),
    clefChanges:cloneMap(opts.clefChanges),
    repeats:cloneMap(opts.repeats),
    parts:cloneMap(opts.parts),
    vol:(opts.vol!==undefined)?opts.vol:100,
    mute:!!opts.mute,
    visible:(opts.visible!==undefined)?opts.visible:true,
    instrument:(opts.instrument!==undefined)?opts.instrument:0
  }}
  const state={headers:{X:'1',T:'',C:'',N:'',H:'',F:'',Z:'',P:'',W:''},tracks:[makeTrack()],activeTrack:0,sel:{m:0,s:0},octave:0,chordActive:0,tempo:80,tempoDotted:false,tempoBeatUnit:1,tempoBeatDotted:false,tempoChanges:{},breaks:{},volume:60,fullscreen:false,viewmode:true,activeTab:'notes',loop:false,scoreScale:80,lyricOffset:0,zoom:100,openedFileName:null,viewFlags:{chords:true,text:true,lyrics:true,parts:true,measureNums:true},transposeScope:'all'};
  // Aliasing : state.<champ> lit/écrit la piste active
  TRACK_FIELDS.forEach(f=>{Object.defineProperty(state,f,{
    get(){const tr=state.tracks[state.activeTrack]||state.tracks[0];return tr?tr[f]:undefined},
    set(v){const tr=state.tracks[state.activeTrack]||state.tracks[0];if(tr)tr[f]=v},
    enumerable:true,configurable:true
  })});
  function activeTrackObj(){return state.tracks[state.activeTrack]||state.tracks[0]}
  // Lot 2 : exécute une mutation sur CHAQUE piste (state.* est aliasé sur la piste active,
  // donc on bascule activeTrack temporairement). La mutation ne doit PAS appeler
  // pushHistory()/render() : l'appelant le fait une seule fois après la boucle.
  function applyToAllTracks(mutator){
    const saved=state.activeTrack;
    for(let i=0;i<state.tracks.length;i++){state.activeTrack=i;mutator(i);}
    state.activeTrack=saved;
  }
  // Nettoie un nom pour usage de nom de fichier : retire UNIQUEMENT les caractères vraiment
  // interdits par les systèmes de fichiers ; conserve accents, espaces, tirets, parenthèses.
  // Espaces remplacés par "_" pour des URL/téléchargements plus propres.
  function sanitizeFilename(name){
    let s=String(name||'').trim();
    // caractères interdits sur Windows (et sécurité générale) + caractères de contrôle
    s=s.replace(/[<>:"/\\|?*\x00-\x1f]/g,'');
    s=s.replace(/\s+/g,'_');
    s=s.replace(/_+/g,'_');
    s=s.replace(/^[_.]+|[_.]+$/g,'');   // pas de . ou _ en début/fin
    if(!s)s='morceau';
    return s.substring(0,120);
  }
  // Variante qui CONSERVE les espaces (retire seulement les caractères interdits).
  function sanitizeFilenameKeepSpaces(name){
    let s=String(name||'').trim();
    s=s.replace(/[<>:"/\\|?*\x00-\x1f]/g,'');
    s=s.replace(/\s+/g,' ').trim();
    s=s.replace(/^[. ]+|[. ]+$/g,'');
    if(!s)s='morceau';
    return s.substring(0,120);
  }
  // Nom de fichier proposé : le nom du fichier ouvert s'il existe, sinon le titre (espaces conservés).
  function proposedBaseName(){
    if(state.openedFileName)return sanitizeFilenameKeepSpaces(state.openedFileName);
    const title=(state.headers.T&&state.headers.T.trim().split('\n')[0])||'';
    return title?sanitizeFilenameKeepSpaces(title):'morceau';
  }

  const history={stack:[],pos:-1,max:100};
  // Mode d'affichage du tempo : 'q'(noire) 'qd'(noire pointée) 'e'(croche) 'ed'(croche pointée). state.tempo reste canonique en noires/min.
  // Battue du tempo généralisée. state.tempo reste canonique en NOIRES/min.
  // state.tempoBeatUnit = durée de la battue en noires (ronde=4, blanche=2, noire=1, croche=0.5, double=0.25)
  // state.tempoBeatDotted = battue pointée (×1.5)
  const TEMPO_UNITS=[{u:4,sym:'𝅝',name:'ronde'},{u:2,sym:'𝅗𝅥',name:'blanche'},{u:1,sym:'♩',name:'noire'},{u:0.5,sym:'♪',name:'croche'},{u:0.25,sym:'𝅘𝅥𝅯',name:'double-croche'}];
  function beatUnit(){let u=state.tempoBeatUnit;if(typeof u!=='number'||!(u>0)){// migration depuis ancien modèle
      if(state.tempoMode==='e'||state.tempoMode==='ed')u=0.5;else u=1;}

              svg+=dr.svg;

              if(iS&&!(state._chordEditMode&&state._chordAddPending))svg+='<circle cx="'+cx+'" cy="'+dr.headY+'" r="8" fill="none" stroke="'+sel+'" stroke-width="0.7" opacity="0.4"/>';
              if(iS&&state._chordEditMode&&!state._chordAddPending){const ac=activeChordNote(t);if(ac){const ay=noteY(staffTop,stepIndex(ac.note,ac.octave),lC);svg+='<circle cx="'+cx+'" cy="'+ay+'" r="5" fill="none" stroke="#d11" stroke-width="1.4"/>';}}
              if(pS&&pS.t.tieToNext){const _su=(pS.su!==undefined?pS.su:su);const _ys=sharedTieYs(pS.t,t,staffTop,lC);if(_ys.length){_ys.forEach(_y=>tP.push({fromCx:pS.cx,fromY:_y,toCx:cx,toY:_y,stemUp:_su}));}else{tP.push({fromCx:pS.cx,fromY:pS.y,toCx:cx,toY:dr.headY,stemUp:_su});}}
              if(pendingIncomingTie){tP.push({fromCx:LEFT_PAD-6,fromY:dr.headY,toCx:cx,toY:dr.headY,partial:'in',stemUp:su});pendingIncomingTie=false}
              handleSlur(!!(pS&&pS.t.slurToNext),cx,dr.headY,!!t.slurToNext,su);
              pS={t,cx,y:dr.headY,su};
            }
            // Liaison « en attente » : intention posée mais ni tie ni slur résolu (pas de note à droite)
            if(t.linkToNext&&!t.tieToNext&&!t.slurToNext&&pS){pendP.push({cx:pS.cx,y:pS.y});}
          } else {
            const dr=drawRest(t,cx,cl,staffTop);
            svg+=dr.svg;
            if(iS&&!(state._chordEditMode&&state._chordAddPending))svg+='<circle cx="'+cx+'" cy="'+dr.headY+'" r="8" fill="none" stroke="'+sel+'" stroke-width="0.7" opacity="0.4"/>';
            // Silences cassent les liaisons
            if(slurStart&&slurLast){sP.push({fromCx:slurStart.cx,fromY:slurStart.y,toCx:slurLast.cx,toY:slurLast.y,stemUp:slurStart.su})}
            slurStart=null;slurLast=null;
            pS=null;
          }
          if(t.tuplet&&(si===0||!m[si-1]||!m[si-1].tuplet||m[si-1].tupletId!==t.tupletId)){
            const gs=[];
            for(let j=si;j<m.length&&m[j].tupletId===t.tupletId&&gs.length<t.tuplet;j++)gs.push(j);
            if(gs.length>0){
              const cF=x0+gs[0]*sW+sW/2;
              const cL=x0+gs[gs.length-1]*sW+sW/2;
              const cM=(cF+cL)/2;
              // Crochet du n-uplet (au-dessus de la portee)
              const yT=staffTop-6;
              svg+='<line x1="'+cF+'" y1="'+yT+'" x2="'+cL+'" y2="'+yT+'" stroke="'+ink+'" stroke-width="0.7"/>';
              svg+='<line x1="'+cF+'" y1="'+yT+'" x2="'+cF+'" y2="'+(yT+3)+'" stroke="'+ink+'" stroke-width="0.7"/>';
              svg+='<line x1="'+cL+'" y1="'+yT+'" x2="'+cL+'" y2="'+(yT+3)+'" stroke="'+ink+'" stroke-width="0.7"/>';
              svg+='<text x="'+cM+'" y="'+(yT-1)+'" font-size="8" font-style="italic" fill="'+ink+'" text-anchor="middle" font-weight="bold">'+t.tuplet+'</text>';
            }
          }
          if(si===0){
            if(state.viewFlags.measureNums)svg+='<text x="'+(xL+2)+'" y="'+(staffTop-3)+'" font-size="8" fill="'+dim+'">'+String(mIdx+1)+'</text>';
            if(state.viewFlags.parts&&state.parts&&state.parts[mIdx])svg+='<text x="'+(xL+2)+'" y="'+(staffTop-14)+'" font-size="11" font-weight="bold" fill="'+ink+'">'+escXml(state.parts[mIdx])+'</text>';
            // Indication de tempo : mesure 0 (tempo initial) ou toute mesure avec changement.
            // Affichée sur la voix VISIBLE LA PLUS HAUTE (pas forcément la voix active).
            const tc=state.tempoChanges||{};
            const isTopVoice=(layout&&layout._topVisible!==undefined&&layout._renderTrack!==undefined)?(layout._renderTrack===layout._topVisible):isActiveVoice;
            if((mIdx===0||tc[mIdx]!==undefined)&&isTopVoice){
              const bpm=Math.round(tempoAt(mIdx)/beatQuarters());
              // y normalement au-dessus de la portée ; sur la 1re ligne l'espace est réduit (viewBox
              // commence à 0), donc on borne à une valeur VISIBLE. On décale aussi en x pour ne pas
              // chevaucher le numéro de mesure / la lettre de partie.
              const tyTempo=Math.max(8,staffTop-23);
              const hasPart=!!(state.viewFlags.parts&&state.parts&&state.parts[mIdx]);
              // si l'espace au-dessus est resserré (1re ligne) OU si une lettre de partie occupe déjà
              // la zone, on décale le tempo à droite pour éviter tout chevauchement.
              const cramped=(tyTempo>=staffTop-14);
              let txTempo=xL+2;
              if(cramped||hasPart)txTempo=xL+(hasPart?28:16);
              svg+='<text x="'+txTempo+'" y="'+tyTempo+'" font-size="10" font-weight="bold" font-family="serif" fill="'+ink+'">'+beatGlyph()+'='+bpm+'</text>';
            }
          }
          if(t.type==='note'&&state.viewFlags.lyrics){
            for(let v=1;v<=nVerses;v++){
              const raw=verseSyl(t,v);
              if(!raw)continue;
              const showDash=/-+$/.test(raw);
              // Le tiret FINAL de continuation est dessiné séparément à droite : on retire TOUS les
              // tirets finaux du texte (données héritées pouvant en contenir plusieurs → « li-- »).
              // Les tirets internes (bon-jour) restent.
              const core=raw.replace(/-+$/,'');
              const lyricDisplay=core.replace(/_/g,'').replace(/~/g,' ');
              const ly=staffTop+4*LINE_GAP+13+lyricOff+(v-1)*LYRIC_ROW;
              svg+='<text x="'+cx+'" y="'+ly+'" font-size="9" fill="'+ink+'" text-anchor="middle" font-family="sans-serif">'+escXml(lyricDisplay)+'</text>';
              if(showDash)svg+='<text x="'+(cx+5)+'" y="'+ly+'" font-size="9" fill="'+dim+'" text-anchor="start" font-family="sans-serif">-</text>';
            }
          }
          // Zone cliquable invisible pour selectionner ce slot
          svg+='<rect x="'+(cx-sW/2)+'" y="'+(staffTop-12)+'" width="'+sW+'" height="'+(LINE_GAP*4+24)+'" fill="transparent" style="cursor:pointer" data-m="'+mIdx+'" data-s="'+si+'"/>';
        });
        // Beams pour cette mesure : niveau 1 complet, niveaux 2/3 partiels selon notes
        bg.forEach((g,gi)=>{
          const d=gBD[gi];const su=d.stemUp;const bY=d.beamY;const sts=d.stems;
          const bT=2.5;
          const dyO=su?bT+0.8:-(bT+0.8);
          // Niveau de chaque note du groupe (1=croche, 2=double, 3=triple)
          // On utilise la duree de base (sans point ni n-uplet) pour decider le nombre de barres
          const lvls=g.map(idx=>{
            const bD=m[idx].dur;
            if(bD<=0.0625+1e-6)return 4;
            if(bD<=0.125+1e-6)return 3;
            if(bD<=0.25+1e-6)return 2;
            return 1;
          });
          // sX = position x de chaque hampe (ordre = ordre du groupe)
          const xPos=sts.map(s=>s.sx);
          const xS=xPos[0],xE=xPos[xPos.length-1];
          // Barre principale (niveau 1) : toute la largeur du groupe
          {
            const yy=bY;
            svg+='<rect x="'+xS+'" y="'+(yy-bT/2)+'" width="'+(xE-xS)+'" height="'+bT+'" fill="'+ink+'"/>';
          }
          // Niveaux 2, 3 et 4 : segments entre notes consecutives de meme niveau, demi-barres pour les isolees
          for(let lvl=2;lvl<=4;lvl++){
            const yy=bY+(lvl-1)*dyO;
            // 1) Segments connectes : entre i et i+1 si les deux ont niveau >= lvl
            const connected=new Array(xPos.length).fill(false);
            for(let i=0;i<xPos.length-1;i++){
              if(lvls[i]>=lvl&&lvls[i+1]>=lvl){
                svg+='<rect x="'+xPos[i]+'" y="'+(yy-bT/2)+'" width="'+(xPos[i+1]-xPos[i])+'" height="'+bT+'" fill="'+ink+'"/>';
                connected[i]=true;connected[i+1]=true;
              }
            }
            // 2) Demi-barres pour les notes de niveau >= lvl qui ne sont pas connectees
            for(let i=0;i<xPos.length;i++){
              if(lvls[i]>=lvl&&!connected[i]){
                // Longueur de demi-barre : ~40% de la distance au voisin du meme groupe
                let halfLen;
                if(i===0){
                  // Demi-barre vers la droite
                  halfLen=Math.max(3,(xPos[1]-xPos[0])*0.4);
                  svg+='<rect x="'+xPos[i]+'" y="'+(yy-bT/2)+'" width="'+halfLen+'" height="'+bT+'" fill="'+ink+'"/>';
                } else {
                  // Demi-barre vers la gauche
                  halfLen=Math.max(3,(xPos[i]-xPos[i-1])*0.4);
                  svg+='<rect x="'+(xPos[i]-halfLen)+'" y="'+(yy-bT/2)+'" width="'+halfLen+'" height="'+bT+'" fill="'+ink+'"/>';
                }
              }
            }
          }
        });
      }
      // Liaison sortante : si la derniere note de la ligne a tieToNext
      if(pS&&pS.t.tieToNext){
        tP.push({fromCx:pS.cx,fromY:pS.y,toCx:SCORE_W-RIGHT_PAD+4,toY:pS.y,partial:'out'});
      }
      // Fermer la chaîne de slur en cours en fin de ligne
      if(slurStart&&slurLast&&slurStart.cx!==slurLast.cx){sP.push({fromCx:slurStart.cx,fromY:slurStart.y,toCx:slurLast.cx,toY:slurLast.y,stemUp:slurStart.su})}
      slurStart=null;slurLast=null;
      // Dessiner toutes les liaisons de durée (tie) de la ligne.
      // Règle : la liaison s'incurve à l'OPPOSÉ des tiges (tiges en haut → liaison en dessous, ouvrant
      // vers le haut ; tiges en bas → liaison au-dessus). Écart suffisant des têtes pour ne pas coller.
      tP.forEach(tp=>{
        const cx=(tp.fromCx+tp.toCx)/2;
        const below=(tp.stemUp!==false); // par défaut tiges en haut → liaison en dessous
        const gap=5;          // écart vertical départ/arrivée par rapport à la tête
        const bow=7;          // hauteur de la courbure
        const y1=tp.fromY+(below?gap:-gap);
        const y2=tp.toY+(below?gap:-gap);
        // sommet de l'arc du bon côté ; sur grand écart de hauteur on suit la pente entre les deux têtes
        const cy=((y1+y2)/2)+(below?bow:-bow);
        const x1=tp.fromCx+3, x2=tp.toCx-3;
        svg+='<path d="M '+x1+' '+y1+' Q '+cx+' '+cy+' '+x2+' '+y2+'" stroke="'+ink+'" stroke-width="0.9" fill="none"/>';
      });
      // Slurs (phrasé) : un seul arc par chaîne, du côté opposé aux tiges, en épousant le grand écart.
      sP.forEach(sp=>{
        const cx=(sp.fromCx+sp.toCx)/2;
        const below=(sp.stemUp===false); // tiges en bas → slur au-dessus ; sinon au-dessus aussi par défaut
        // Convention lisible : slur au-DESSUS par défaut (tiges en haut), en dessous si tiges en bas.
        const above=!below;
        const gap=5, bow=10;
        const y1=sp.fromY+(above?-gap:gap);
        const y2=sp.toY+(above?-gap:gap);
        // Sur grand intervalle, le sommet se cale sur la tête la plus extrême du bon côté.
        const extreme=above?Math.min(y1,y2):Math.max(y1,y2);
        const cy=extreme+(above?-bow:bow);
        svg+='<path d="M '+(sp.fromCx+1)+' '+y1+' Q '+cx+' '+cy+' '+(sp.toCx-1)+' '+y2+'" stroke="'+ink+'" stroke-width="1.1" fill="none" stroke-linecap="round"/>';
      });
      // Liaisons « en attente » : petit arc pointillé bleu sortant de la note (aucune note à droite encore)
      pendP.forEach(pp=>{
        const x2=pp.cx+12;
        svg+='<path d="M '+(pp.cx+3)+' '+(pp.y+3)+' Q '+(pp.cx+8)+' '+(pp.y+8)+' '+x2+' '+(pp.y+3)+'" stroke="#185fa5" stroke-width="1" fill="none" stroke-dasharray="2 2" opacity="0.9"/>';
      });
    }
    svg+='</svg>';
    return svg;
  }
  // Wrapper multi-pistes : rend chaque piste visible et empile les SVG dans #score.
  // Calcule le layout horizontal partagé : largeur de chaque mesure = max sur les voix visibles
  function computeSharedLayout(visibleIdx){
    const saved=state.activeTrack;
    let N=0;
    visibleIdx.forEach(i=>{N=Math.max(N,(state.tracks[i].measures||[]).length)});
    if(N===0)N=1;
    const widthUnits=new Array(N).fill(0);
    let headerUnits=20;
    visibleIdx.forEach(i=>{
      state.activeTrack=i;
      headerUnits=Math.max(headerUnits,lineHeaderCost(0,true));
      const len=(state.measures||[]).length;
      for(let mi=0;mi<N&&mi<len;mi++){
        const c=measureCost(mi);
        if(c>widthUnits[mi])widthUnits[mi]=c;
      }
    });
    state.activeTrack=saved;
    // Étirement horizontal piloté par « Taille » (les barres restent alignées entre voix)
    const spread=(state.scoreScale||100)/100;
    for(let mi=0;mi<N;mi++)widthUnits[mi]=Math.max(24,widthUnits[mi])*spread;
    const firstX=LEFT_PAD+(headerUnits-20);
    let sum=0;for(let mi=0;mi<N;mi++)sum+=widthUnits[mi];
    const totalUnits=firstX+sum+RIGHT_PAD;
    return {single:true,N,widthUnits,firstX,totalUnits,headerUnits};
  }

  function renderScore(){
    const cont=document.getElementById('score');if(!cont)return;
    const tracks=state.tracks||[];
    // La piste active est TOUJOURS visible, plus les autres pistes marquées visibles.
    let visibleIdx=tracks.map((t,i)=>(i===state.activeTrack||t.visible!==false)?i:-1).filter(i=>i>=0);
    if(!visibleIdx.length)visibleIdx=[state.activeTrack];

    const layout=computeSharedLayout(visibleIdx);
    // Échelle uniforme : on dimensionne chaque voix pour que toutes tiennent en hauteur (scroll vertical en secours)
    // On agrandit la hauteur unitaire selon le nombre max de couplets parmi les voix visibles
    // (1 couplet supplémentaire ~ 10px), pour que les lignes de paroles empilées ne soient pas coupées.
    const maxVersesVisible=state.viewFlags.lyrics?Math.max(1,...visibleIdx.map(i=>countVersesTrack((tracks[i]||{}).measures))):1;
    const voiceUnitH=STAFF_TOP_Y+(STAFF_SPACING+Math.max(0,maxVersesVisible-1)*10)+10; // = hauteur du viewBox d'une voix (1 ligne)
    const availH=Math.max(120,cont.clientHeight||400);
    const numV=visibleIdx.length;
    const LABEL_PX=16,PAD_V=4,GAP=4;
    const MIN_VOICE_PX=86,MAX_VOICE_PX=230;
    let voicePxH=Math.floor((availH-numV*(LABEL_PX+PAD_V+GAP))/numV);
    voicePxH=Math.max(MIN_VOICE_PX,Math.min(MAX_VOICE_PX,voicePxH));
    // Vrai ZOOM : multiplie la taille d'affichage de TOUTE la partition (notes, portées, textes,
    // largeur — tout dans le viewBox en unités est mis à l'échelle uniformément). 100 % = ajustement auto.
    const zoomF=(state.zoom||100)/100;
    voicePxH=Math.max(40,Math.round(voicePxH*zoomF));
    const pxPerUnit=voicePxH/voiceUnitH;
    const contentPxW=Math.ceil(layout.totalUnits*pxPerUnit);

    const saved=state.activeTrack;
    // Décalage temporel du curseur dans SA mesure (voix réellement active), pour aligner le
    // surlignage des autres voix par le TEMPS et non par l'index de slot.
    layout._activeTrack=saved;
    {
      const tr=state.tracks[saved];
      const meas=tr&&tr.measures&&tr.measures[state.sel.m];
      let off=0;
      if(meas)for(let k=0;k<state.sel.s&&k<meas.length;k++)off+=effDur(meas[k]);
      state._selTimeOff=off;
    }
    const blocks=[];
    layout._topVisible=(visibleIdx&&visibleIdx.length)?visibleIdx[0]:saved; // voix visible la plus haute
    visibleIdx.forEach(i=>{
      state.activeTrack=i;
      layout._renderTrack=i;
      // isActiveVoice se compare à la vraie voix active (saved), pas à state.activeTrack (qui boucle)
      layout._realActive=saved;
      const svg=renderScoreOnce(layout);
      const tr=tracks[i];
      const isActive=(i===saved);
      const single=(numV===1);
      const label=(tr.name||('V'+(i+1)))+(tr.mute?' [muet]':'');
      const border=isActive&&!single?'border:2px solid #185fa5;':'border:1px solid #d8d6ce;';
      const bg=isActive&&!single?'background:#f4f8fd;':'background:#ffffff;';
      const labelHtml=single?'':'<div style="position:absolute;top:1px;left:8px;font-size:24px;font-weight:700;color:'+(isActive?'#0c447c':'#5f5e5a')+';z-index:2;">'+escXml(label)+'</div>';
      blocks.push(
        '<div class="track-block" data-track="'+i+'" style="position:relative;'+border+bg+'border-radius:6px;'
        +'margin-bottom:'+GAP+'px;padding-top:'+(single?2:LABEL_PX)+'px;'
        +'width:'+contentPxW+'px;height:'+voicePxH+'px;box-sizing:content-box;">'
        +labelHtml
        +'<div class="voice-svg" style="width:'+contentPxW+'px;height:'+voicePxH+'px;">'+svg+'</div>'
        +'</div>'
      );
    });
    state.activeTrack=saved;
    cont.style.overflowX='auto';
    cont.style.overflowY='auto';
    // Couplets supplémentaires (W:) affichés une seule fois sous toute la partition
    let wordsHtml='';
    if(state.viewFlags.lyrics){
      const w=(state.headers.W||'').trim();
      if(w){
        const lines=w.split('\n').map(l=>escXml(l)).join('<br>');
        wordsHtml='<div class="score-words" style="max-width:'+Math.max(contentPxW,320)+'px;margin:8px 2px 4px;padding:8px 12px;border-top:1px solid #e2e0d8;font-size:26px;line-height:1.5;color:#33312c;">'+lines+'</div>';
      }
    }
    cont.innerHTML=blocks.join('')+wordsHtml;
    // Clic sur un bloc → piste active (sauf mono-piste)
    if(numV>1){
      document.querySelectorAll('#score .track-block').forEach(el=>{
        el.addEventListener('click',(e)=>{
          const idx=parseInt(el.dataset.track,10);
          if(!isNaN(idx)&&idx!==state.activeTrack){state.activeTrack=idx;state.sel={m:0,s:0};render();}
        });
      });
    }
    // Mémoriser pour l'auto-scroll horizontal
    state._layoutCache={layout,pxPerUnit,contentPxW};
    ensureSelectionVisible();
  }

  // Fait défiler #score horizontalement pour que la mesure sélectionnée soit visible (play + navigation)
  function ensureSelectionVisible(){
    const cont=document.getElementById('score');
    const lc=state._layoutCache;
    if(!cont||!lc||!lc.layout)return;
    const mi=state.sel.m;
    const wu=lc.layout.widthUnits;
    if(mi<0||mi>=wu.length)return;
    function leftOf(idx){let x=lc.layout.firstX;for(let k=0;k<idx&&k<wu.length;k++)x+=wu[k];return x;}
    const xL=leftOf(mi), xR=xL+wu[mi];
    const pxL=xL*lc.pxPerUnit, pxR=xR*lc.pxPerUnit;
    const viewL=cont.scrollLeft, viewR=cont.scrollLeft+cont.clientWidth;
    const margin=24;
    // Anticipation : on garde ~2 mesures visibles DEVANT la sélection, de sorte que la mesure
    // courante se cale sur l'avant-avant-dernière mesure visible (saisie + play).
    const LOOKAHEAD=2;
    const aheadIdx=Math.min(mi+LOOKAHEAD, wu.length-1);
    const pxAheadR=(leftOf(aheadIdx)+wu[aheadIdx])*lc.pxPerUnit;
    if(pxL<viewL+margin){
      // recul : amener la sélection près du bord gauche
      cont.scrollLeft=Math.max(0,pxL-margin);
    } else if(pxAheadR>viewR-margin){
      // Si la fin du morceau est déjà visible, ne pas défiler davantage vers la droite
      // (évite de continuer à pousser alors qu'il n'y a plus rien à révéler en fin de partition).
      const totalPx=(lc.layout.totalUnits||0)*lc.pxPerUnit;
      if(totalPx<=viewR+1)return;
      // avance : amener la 2e mesure d'anticipation au bord droit, sans masquer le début de la sélection
      let target=pxAheadR-cont.clientWidth+margin;
      target=Math.min(target, pxL-margin); // ne jamais cacher le début de la mesure sélectionnée
      target=Math.max(0,Math.min(target, totalPx-cont.clientWidth)); // borne au défilement max réel
      cont.scrollLeft=target;
    }
  }

  function selectedSlot(){const m=state.measures[state.sel.m];return m?(m[state.sel.s]||null):null}
  // === Helpers accord ===
  // Liste des notes d'un slot accord, triées grave->aigu : [{note,octave,acc,_main:bool,_idx}]
  function chordList(sl){
    if(!sl||sl.type!=='note')return [];
    const arr=[{note:sl.note,octave:sl.octave,acc:sl.acc||'',_main:true}];
    if(sl.stack)sl.stack.forEach((x,i)=>arr.push({note:x.note,octave:x.octave,acc:x.acc||'',_main:false,_si:i}));
    const sig=keyAt(state.sel.m);
    arr.sort((a,b)=>midiOfNote(a.note,a.octave,a.acc,sig)-midiOfNote(b.note,b.octave,b.acc,sig));
    return arr;
  }
  // Réécrit le slot à partir d'une liste de notes (la plus grave devient la note principale)
  function chordWrite(sl,list){
    if(!list.length)return;
    const sig=keyAt(state.sel.m);
    const sorted=list.slice().sort((a,b)=>midiOfNote(a.note,a.octave,a.acc||'',sig)-midiOfNote(b.note,b.octave,b.acc||'',sig));
    const base=sorted[0];
    sl.note=base.note;sl.octave=base.octave;if(base.acc)sl.acc=base.acc;else delete sl.acc;
    const rest=sorted.slice(1);
    if(rest.length)sl.stack=rest.map(x=>({note:x.note,octave:x.octave,acc:x.acc||''}));
    else delete sl.stack;
  }
  // Supprime silencieusement les doublons exacts (note+octave+altération identiques)
  // d'un accord. Appelé à la SORTIE de la saisie (Fin, déplacement de slot), pas au clic.
  // Renvoie true si au moins un doublon a été retiré.
  function dedupeChord(sl){
    if(!sl||sl.type!=='note')return false;
    const list=chordList(sl);
    if(list.length<=1)return false;
    const seen=new Set();const kept=[];
    for(const x of list){
      const key=x.note+'|'+x.octave+'|'+(x.acc||'');
      if(seen.has(key))continue;
      seen.add(key);kept.push(x);
    }
    if(kept.length===list.length)return false; // rien à retirer
    chordWrite(sl,kept);
    // Réajuster l'index actif dans les nouvelles bornes
    state.chordActive=Math.max(0,Math.min(state.chordActive||0,kept.length-1));
    return true;

  function setNoteAtSelection(n){

      if(state._chordAddPending){
        // ajout d'une nouvelle note à l'accord.
        // On NE bloque PAS au clic : on autorise même une note identique.
        // Si une note de même nom+octave+altération existe déjà, on décale la
        // nouvelle d'une octave pour qu'elle soit distincte et tout de suite
        // éditable (l'utilisateur ajuste ensuite librement avec ▲/▼).
        // Le vrai dédoublonnage se fait silencieusement à la SORTIE (Fin / déplacement).
        const list=chordList(sl);

        const exists=(o)=>list.some(x=>x.note===n&&x.octave===o&&(x.acc||'')==='');

          // chercher une octave libre proche (d'abord +1, puis -1, +2, -2…)
          let placed=false;
          for(let d=1;d<=5&&!placed;d++){
            if(oct+d<=3&&!exists(oct+d)){oct=oct+d;placed=true;break;}
            if(oct-d>=-2&&!exists(oct-d)){oct=oct-d;placed=true;break;}
          }

        let bi=0,bd=Infinity;nl.forEach((x,i)=>{const d=Math.abs(midiOfNote(x.note,x.octave,x.acc,sig)-tm);if(d<bd){bd=d;bi=i}});state.chordActive=bi;
        pushHistory();const midi=midiOfNote(n,oct,'',sig);previewNote(midi);render();return;
      }
      // modifier la note active
      const list=chordList(sl);const ai=chordActiveIdx(sl);
      list[ai]={note:n,octave:state.octave,acc:(list[ai].note===n?list[ai].acc:'')};
      chordWrite(sl,list);
      // recalculer l'index actif (le tri peut avoir changé)

      let bi=0,bd=Infinity;nl.forEach((x,i)=>{const d=Math.abs(midiOfNote(x.note,x.octave,x.acc,sig)-tm);if(d<bd){bd=d;bi=i}});state.chordActive=bi;

    const prev=findPreviousNote(state.sel.m,state.sel.s);

      const baseSemi={C:0,D:2,E:4,F:5,G:7,A:9,B:11};

  function findPreviousNote(mi,si){
    // Cherche en arrière dans la mesure courante puis dans les mesures précédentes
    for(let i=si-1;i>=0;i--){
      const s=state.measures[mi][i];
      if(s.type==='note')return s;
    }
    for(let m=mi-1;m>=0;m--){
      const meas=state.measures[m];
      for(let i=meas.length-1;i>=0;i--){
        const s=meas[i];
        if(s.type==='note')return s;

    }
    return null;
  }
  function propagateTieReplacement(mi,si,note,octave,acc){
    let curM=mi,curS=si;
    while(true){
      const meas=state.measures[curM];
      if(!meas)break;
      const cur=meas[curS];
      if(!cur||!cur.tieToNext)break;
      let nextM=curM,nextS=curS+1;
      if(nextS>=meas.length){
        nextM=curM+1;nextS=0;
        if(nextM>=state.measures.length)break;
      }
      const next=state.measures[nextM][nextS];
      if(!next||next.type!=='note')break;
      next.note=note;next.octave=octave;next.acc=acc;
      curM=nextM;curS=nextS;
    }
  }

  // ⭐ Panneau Saisie Paroles : textarea par voix, parsing tirets/espaces → slots notes
  (function(){
    const btn=document.getElementById('btn-edit-lyrics');
    if(!btn)return;
    btn.addEventListener('click',()=>{
      // Voix courante dans le panneau (indice dans state.tracks)
      let lyrTrack=state.activeTrack;

      // Construit le texte des paroles de la piste `ti` : UNE ligne par couplet.
      function lyricsToText(ti){
        const saved=state.activeTrack;
        state.activeTrack=ti;
        const tr=state.tracks[ti];
        const notes=[];
        (tr.measures||[]).forEach(m=>m.forEach(s=>{if(s.type==='note')notes.push(s)}));
        const nv=countVersesInNotes(notes);
        const lines=[];
        for(let v=1;v<=nv;v++){
          const parts=notes.map(s=>verseSyl(s,v).replace(/_/g,'').replace(/~/g,' ').replace(/-+$/,m=>'-'));
          // Retirer les notes vides en fin de ligne (sinon espaces parasites),
          // mais conserver les vides en tête / au milieu qui matérialisent les décalages.
          while(parts.length && parts[parts.length-1]==='') parts.pop();
          lines.push(parts.join(' '));
        }
        // Retirer les couplets entièrement vides en fin
        while(lines.length>1 && lines[lines.length-1].trim()==='') lines.pop();
        state.activeTrack=saved;
        return lines.join('\n');
      }

      // Parse le texte et assigne les syllabes aux notes de la piste `ti`.
      // CHAQUE LIGNE (touche Entrée) = UN COUPLET. Au sein d'une ligne :
      //   séparateur espace ou tiret ;
      //   mot-mot  → 'mot-' sur note 1, 'mot' sur note 2 (tiret de liaison ABC) ;
      //   mot      → syllabe autonome ;
      //   espace en trop / en début de ligne → note sautée (DÉCALAGE).
      function textToLyrics(ti, text){
        const saved=state.activeTrack;
        state.activeTrack=ti;
        const tr=state.tracks[ti];

        // Collecter les notes
        const notes=[];
        (tr.measures||[]).forEach(m=>m.forEach(s=>{if(s.type==='note')notes.push(s)}));
        // Effacer toutes les paroles existantes (tous couplets)
        notes.forEach(n=>{delete n.lyric;delete n.verses});

        // Normaliser : CR retirés ; tab→espace. Les sauts de ligne séparent les COUPLETS.
        const norm=text.replace(/\r/g,'').replace(/\t/g,' ');
        const lines=norm.split('\n');
        // Retirer les couplets vides en fin
        while(lines.length>1 && lines[lines.length-1].trim()==='') lines.pop();
        if(lines.length===1 && !lines[0].trim()){state.activeTrack=saved;return}

        lines.forEach((line,vi)=>{
          const verse=vi+1;
          const syls=parseLyricLineToSyls(line);
          for(let i=0;i<syls.length&&i<notes.length;i++){
            // Syllabe vide ('') → note laissée sans parole pour ce couplet : décalage assuré
            if(syls[i]!=='') setVerseSyl(notes[i],verse,syls[i]);
          }
        });
        notes.forEach(cleanupVerses);
        state.activeTrack=saved;
      }

      // Compte les notes d'une piste
      function countNotes(ti){
        const tr=state.tracks[ti];
        let n=0;
        (tr.measures||[]).forEach(m=>m.forEach(s=>{if(s.type==='note')n++}));
        return n;
      }

      function buildVoiceTabsHtml(){
        let h='<div class="lyr-voice-tabs" id="lyr-voice-tabs">';
        state.tracks.forEach((tr,i)=>{
          const name=tr.name||('V'+(i+1));
          h+='<button class="k" data-lyrtrack="'+i+'">'+escXml(name)+'</button>';
        });
        h+='</div>';
        return h;
      }

      function buildBody(){
        const ti=lyrTrack;
        const n=countNotes(ti);
        const txt=lyricsToText(ti);
        return buildVoiceTabsHtml()+
          '<div class="lyr-note-count" id="lyr-note-count">Notes sur cette piste : <b>'+n+'</b></div>'+
          '<textarea class="lyr-textarea" id="lyr-textarea" spellcheck="false">'+escXml(txt)+'</textarea>';
      }
      const LYR_HINT='<p class="lyr-hint" id="lyr-hint">Tapez les paroles : l\'application est instantanée. Espace = syllabe suivante ; un espace EN TROP (ou EN DÉBUT de ligne) saute une note et DÉCALE la suite. Tiret (bon-jour) = syllabes liées. <b>Entrée = nouveau couplet</b> (chaque ligne s\'aligne sur les mêmes notes ; affichés empilés sous la portée et exportés en w:/MusicXML). Videz le champ pour effacer.</p>';

      function refreshTabHighlight(){
        document.querySelectorAll('#lyr-voice-tabs .k').forEach(b=>{
          b.classList.toggle('active',parseInt(b.dataset.lyrtrack,10)===lyrTrack);
        });
      }

      // Application instantanée du texte aux paroles de la voix courante
      function applyNow(){
        const ta=document.getElementById('lyr-textarea');
        if(!ta)return;
        textToLyrics(lyrTrack, ta.value);
        state.viewFlags.lyrics=true;
        render();
      }
      // Suivre en affichage la MESURE correspondant à la position du curseur dans le texte.
      // On compte les syllabes de la LIGNE courante (un couplet) jusqu'au curseur → index de note,
      // puis on sélectionne cette note dans la voix des paroles et on fait défiler la partition.
      function followCaret(){
        const ta=document.getElementById('lyr-textarea');
        if(!ta)return;
        const pos=ta.selectionStart;
        const upto=ta.value.substring(0,pos);
        // Ligne courante = couplet courant ; on ne compte que sur cette ligne.
        const nl=upto.lastIndexOf('\n');
        const lineStart=nl+1;
        const lineText=upto.substring(lineStart);
        // nombre de syllabes (séparées par espaces ; chaque espace fait avancer d'une note)
        const syls=lineText.split(' ');
        let noteIdx=Math.max(0,syls.length-1);
        // Localiser la note d'index noteIdx dans la voix des paroles, repérer sa mesure/slot.
        const tr=state.tracks[lyrTrack];
        if(!tr)return;
        let count=0,found=null;
        (tr.measures||[]).forEach((meas,mi)=>{meas.forEach((s,si)=>{if(s.type==='note'){if(count===noteIdx)found={m:mi,s:si};count++;}})});
        if(found){
          state.sel={m:found.m,s:found.s};
          ensureSelectionVisible();
        }
      }

      openPanel({
        title:'Saisie Paroles',
        body:buildBody(),
        hideActions:true,
        extraButtons:['Fermer'],
        onMount:()=>{
          // Placer le texte explicatif SOUS le bouton Fermer
          const actions=document.querySelector('#panel-body .actions');
          if(actions&&!document.getElementById('lyr-hint')){actions.insertAdjacentHTML('afterend',LYR_HINT);}
          refreshTabHighlight();
          const ta=document.getElementById('lyr-textarea');
          if(ta){
            // Application instantanée à chaque frappe + suivi de la mesure courante
            ta.addEventListener('input',()=>{ applyNow(); followCaret(); });
            ta.addEventListener('keyup',()=>{ followCaret(); });
            ta.addEventListener('click',()=>{ followCaret(); });
            // À la fermeture/perte de focus, on fige dans l'historique
            ta.addEventListener('blur',()=>{ pushHistory(); });
          }
          document.querySelectorAll('#lyr-voice-tabs .k').forEach(b=>{
            b.addEventListener('click',()=>{
              // Figer le texte courant dans l'historique avant de changer de voix
              pushHistory();
              lyrTrack=parseInt(b.dataset.lyrtrack,10);
              const newTa=document.getElementById('lyr-textarea');
              if(newTa)newTa.value=lyricsToText(lyrTrack);
              const nc=document.getElementById('lyr-note-count');
              if(nc)nc.innerHTML='Notes sur cette piste : <b>'+countNotes(lyrTrack)+'</b>';
              refreshTabHighlight();
              render();
            });
          });
        },
        onExtra:(w)=>{
          if(w==='Fermer'){ pushHistory(); closePanel(); return; }
        }
      });
    });
  })();

  let nextTupletId=1;
  function applyTuplet(n,unitDur){
    // n-uplet de unitDur occupe l'espace de (n-1) notes de unitDur (règle 3:2 → 3 notes dans l'espace de 2)
    // Plus généralement : selon ratio implicite ABC (n:2 pour n impair, n:3 pour 6, etc.) — on garde 3:2 simple
    const ratio=2; // 3:2 → l'espace est de 2 unitDur
    const totalSpace=ratio*unitDur;
    const m=state.measures[state.sel.m];
    const idx=state.sel.s;
    const meter=meterAt(state.sel.m);
    const{den}=parseMeter(meter);
    const beat=4/den;
    const cap=measureCapacity(meter);
    // Calculer la position courante (offset)
    let offset=0;for(let i=0;i<idx;i++)offset+=effDur(m[i]);
    // Si l'espace disponible jusqu'à fin de mesure < totalSpace, on tronque (on garde le bouton désactivé sinon)
    const available=cap-offset;
    if(available<totalSpace-1e-6){alert('Pas assez de place dans la mesure pour ce n-uplet');return}
    // Identifiant unique pour ce groupe de n-uplet
    const tid=nextTupletId++;
    const activeSlot=m[idx];
    const isRest=(activeSlot.type==='rest');
    const newSlots=[];
    for(let i=0;i<n;i++){
      if(i===0){
        if(isRest){newSlots.push({type:'rest',dur:unitDur,dot:false,tuplet:n,tupletId:tid})}
        else{
          newSlots.push({type:'note',note:activeSlot.note,octave:activeSlot.octave,dur:unitDur,dot:false,acc:activeSlot.acc||'',tuplet:n,tupletId:tid});
        }
      } else {
        newSlots.push({type:'rest',dur:unitDur,dot:false,tuplet:n,tupletId:tid});
      }
    }
    // Consommer totalSpace à partir de idx (effacer/raccourcir les slots existants)
    let consumed=0;
    let cursor=idx;
    const eps=1e-6;
    while(consumed<totalSpace-eps&&cursor<m.length){
      const s=m[cursor];
      const d=effDur(s);
      if(consumed+d<=totalSpace+eps){
        consumed+=d;
        m.splice(cursor,1);
      } else {
        // découper le slot en deux : ce qu'on consomme + ce qui reste
        const remaining=d-(totalSpace-consumed);
        // remplacer ce slot par un silence (ou la note tronquée) à la durée restante
        const offsetAfter=offset+totalSpace;
        const pieces=splitDurationByBeat(offsetAfter,remaining,beat);
        const tail=pieces.map(p=>Object.assign({},s,{dur:p.dur,dot:p.dot}));
        m.splice(cursor,1,...tail);
        consumed=totalSpace;
        break;
      }
    }
    // Insérer les nouveaux slots à idx
    m.splice(idx,0,...newSlots);
    // Truncate/compléter la mesure
    truncateMeasureToCapacity(state.sel.m,cap);
    pushHistory();render();
  }

  document.getElementById('meas-del').addEventListener('click',()=>{

      onExtra:(w)=>{
        if(w==='Annuler'){closePanel();return}
        const from=rg.getFrom()-1, to=rg.getTo()-1;
        const m=Math.min(from,to);
        let count=Math.abs(to-from)+1;
        if(count>=state.measures.length){count=state.measures.length-1}
        if(count<=0){closePanel();return}
        applyToAllTracks(()=>{
          if(m>=state.measures.length)return;
          const c=Math.min(count,state.measures.length-m);
          if(c<=0)return;
          state.measures.splice(m,c);
          function sk(map,fromI,toI){const out={};for(const k of Object.keys(map)){const i=parseInt(k,10);if(i<fromI)out[i]=map[k];else if(i>=toI)out[i-c]=map[k]}return out}
          state.timeChanges=sk(state.timeChanges,m,m+c);
          state.keyChanges=sk(state.keyChanges,m,m+c);
          state.clefChanges=sk(state.clefChanges,m,m+c);
          state.repeats=sk(state.repeats,m,m+c);
          if(state.parts)state.parts=sk(state.parts,m,m+c);
        });
        // breaks / tempoChanges sont au niveau du morceau (non par-voix) : décaler UNE seule fois.
        {const c2=c;function sk1(map){const out={};for(const k of Object.keys(map||{})){const i=parseInt(k,10);if(i<m)out[i]=map[k];else if(i>=m+c2)out[i-c2]=map[k]}return out}
          if(state.tempoChanges)state.tempoChanges=sk1(state.tempoChanges);
          if(state.breaks)state.breaks=sk1(state.breaks);}
        if(state.sel.m>=state.measures.length)state.sel.m=state.measures.length-1;
        state.sel.s=0;
        pushHistory();closePanel();render();
      }
    });

  // === Transformations rythmiques globales (toute la partition) ===
  function slotOffsets(meas){
    const offs=[];let cur=0;

  function onBeat(o,beat){const eps=1e-6;const r=o%beat;return r<eps||Math.abs(r-beat)<eps}
  // === Reorganisation rythmique : fusionne notes/silences contigus en valeurs plus simples ===
  // Ex : deux croches identiques liees -> une noire ; deux silences contigus -> un silence plus long.
  function isCleanValue(d){const e=1e-6;const bases=[4,2,1,0.5,0.25,0.125,0.0625];for(const b of bases){if(Math.abs(d-b)<e)return{dur:b,dot:false};if(Math.abs(d-b*1.5)<e)return{dur:b,dot:true}}return null}
  function consolidateRhythm(silent){
    let count=0;
    state.measures.forEach((meas,mi)=>{
      const meter=meterAt(mi);
      // Bloc rythmique de regroupement : noire en 3/4-4/4, noire pointee (grille croches) en 6/8.
      const beat=4/parseMeter(meter).den;
      // ---- Passe 1 : NOTES liees identiques -> valeurs plus longues (ex. 2 noires liees -> blanche)
      // On autorise les valeurs longues meme a travers les temps (blanche, ronde, pointees).
      let changed=true;
      while(changed){
        changed=false;
        for(let i=0;i<meas.length-1;i++){
          const a=meas[i],b=meas[i+1];
          if(a.tuplet||b.tuplet)continue;
          if(a.type!=='note'||b.type!=='note')continue;
          if(!a.tieToNext)continue;
          if(a.note!==b.note||a.octave!==b.octave||(a.acc||'')!==(b.acc||''))continue;
          if((a.orn&&a.orn.length)||(b.orn&&b.orn.length))continue;
          if(b.chord||b.text)continue;
          const cv=isCleanValue(effDur(a)+effDur(b));
          if(!cv)continue;
          const merged=Object.assign({},a,{dur:cv.dur,dot:cv.dot});
          if(b.tieToNext)merged.tieToNext=true;else delete merged.tieToNext;

          if(b.verses&&!merged.verses)merged.verses=b.verses.slice();
          if(a._selMark||b._selMark)merged._selMark=true;

        }
      }
      // ---- Passe 2 : SILENCES -> recanonisation par plage, exactement comme une mesure neuve.
      // On detecte chaque plage continue de silences "simples" (sans ornement/accord/texte)
      // et on la remplace par la decomposition canonique splitDurationByBeat(offset,duree,beat).
      let i=0;
      while(i<meas.length){
        const s=meas[i];
        const simpleRest=(x)=>x&&x.type==='rest'&&!x.tuplet&&!(x.orn&&x.orn.length)&&!x.chord&&!x.text;
        if(!simpleRest(s)){i++;continue}
        // offset de debut de la plage
        const offs=slotOffsets(meas);
        const startOff=offs[i];

        while(j<meas.length&&simpleRest(meas[j])){total+=effDur(meas[j]);if(meas[j]._selMark)hadMark=true;j++}
        // recanoniser [i, j) si plus d'un silence OU si le decoupage canonique differe
        const pieces=splitDurationByBeat(startOff,total,beat).map(p=>({type:'rest',dur:p.dur,dot:!!p.dot}));
        // ne remplacer que si ca change vraiment (evite boucle/inutile)
        const sameLen=(j-i)===pieces.length;
        let identical=sameLen;
        if(sameLen){for(let k=0;k<pieces.length;k++){const o=meas[i+k];if(o.dur!==pieces[k].dur||!!o.dot!==pieces[k].dot){identical=false;break}}}
        if(!identical&&pieces.length){

        }

  function applySwingCore(matchFn,transformFn){
    let count=0;
    state.measures.forEach((meas,mi)=>{
      const beat=4/parseMeter(meterAt(mi)).den;
      let i=0;
      while(i<meas.length-1){
        const offs=slotOffsets(meas);
        if(onBeat(offs[i],beat)&&matchFn(meas,i,beat)){

          count++;

        }
        i++;
      }

  }

  function matchEqualPair(meas,i,beat){

    if(a.dot||b.dot)return false;
    if(Math.abs(a.dur-b.dur)>1e-6)return false;

    return true;

  function matchTripletPair(meas,i,beat){

  // === Materialisation des alterations implicites avant un decalage ===
  function materializeAccidentals(){
    state.measures.forEach((meas,mi)=>{
      const sig=keyAt(mi);
      meas.forEach((slot,si)=>{
        if(slot.type!=='note')return;
        if(slot.acc)return;
        let priorAcc=null;
        for(let k=si-1;k>=0;k--){
          const p=meas[k];
          if(p.type==='note'&&p.note===slot.note&&p.octave===slot.octave&&p.acc){priorAcc=p.acc;break}
        }
        if(priorAcc!==null){slot.acc=priorAcc;return}
        if(sig>0&&SHARP_NOTES.slice(0,sig).includes(slot.note))slot.acc='^';
        else if(sig<0&&FLAT_NOTES.slice(0,-sig).includes(slot.note))slot.acc='_';
      });
    });
  }

  // === Decalage global du morceau a partir de la note selectionnee ===
  function flattenSlots(){
    const out=[]; let absSel=-1; let markSel=-1;
    state.measures.forEach((m,mi)=>{
      m.forEach((sl,si)=>{
        if(sl._selMark)markSel=out.length;            // position réellement ciblée (multi-voix sûr)
        if(mi===state.sel.m&&si===state.sel.s)absSel=out.length;
        out.push({slot:sl,mIdx:mi,sIdx:si});
      });
    });
    const caps=state.measures.map((_,mi)=>measureCapacity(meterAt(mi)));
    // Si un slot est explicitement marqué (décalage à position donnée), il prime sur state.sel.
    return{slots:out,absSel:(markSel>=0?markSel:absSel),caps};

  function rebuildMeasuresFromSlots(slots,caps){
    const result=[];
    let mi=0,used=0,curM=[];
    const eps=1e-6;
    function splitSlot(sl,want){
      const e=effDur(sl);
      if(want>=e-eps)return[sl,null];
      if(!sl.tuplet&&!sl.dot){
        const head={...sl,dur:want};
        const tail={...sl,dur:e-want,dot:false};
        if(sl.stack)tail.stack=sl.stack.map(x=>Object.assign({},x));
        if(sl.type==='note'){
          head.tieToNext=true;
          if(!sl.tieToNext)delete tail.tieToNext;
        }
        return[head,tail];
      }
      if(sl.dot&&!sl.tuplet){
        const head={...sl,dur:want,dot:false};
        const tail={...sl,dur:e-want,dot:false};
        if(sl.stack)tail.stack=sl.stack.map(x=>Object.assign({},x));
        if(sl.type==='note'){
          head.tieToNext=true;
          if(!sl.tieToNext)delete tail.tieToNext;
        }

      }
      return[sl,null];
    }
    // Découpe une note/accord NON aligné sur les temps en figures liées par temps (notation lisible).
    // Les silences ne sont pas re-découpés ici (splitDurationByBeat s'en charge au remplissage).
    function beatAlignPieces(sl,startOffset,beat){
      if(sl.type!=='note'||sl.tuplet)return [sl];
      const pieces=splitDurationByBeat(startOffset,effDur(sl),beat);
      if(pieces.length<=1)return [sl];
      return pieces.map((p,i)=>{
        const c=Object.assign({},sl,{dur:p.dur,dot:p.dot});
        if(sl.stack)c.stack=sl.stack.map(x=>Object.assign({},x));
        // chaîner par des tie : toutes liées sauf, pour la dernière, on garde le tie d'origine
        if(i<pieces.length-1)c.tieToNext=true;
        else { if(sl.tieToNext)c.tieToNext=true; else delete c.tieToNext; }

        if(i>0){delete c.chord;delete c.text;}

      });

        if(mi>=caps.length){sl=null;break;}
        const cap=caps[mi];
        const remain=cap-used;
        const e=effDur(sl);
        if(e<=remain+eps){
          // Le slot tient dans la mesure : on l'aligne sur les temps s'il est à cheval.
          const beat=4/parseMeter(meterAt(mi)).den;
          const aligned=beatAlignPieces(sl,used,beat);
          aligned.forEach(a=>curM.push(a));
          used+=e;sl=null;
          if(used>=cap-eps){result.push(curM);curM=[];used=0;mi++}
        } else {
          const[head,tail]=splitSlot(sl,remain);
          const beat=4/parseMeter(meterAt(mi)).den;
          const aligned=beatAlignPieces(head,used,beat);
          aligned.forEach(a=>curM.push(a));
          used+=effDur(head);
          if(used>=cap-eps){result.push(curM);curM=[];used=0;mi++}
          sl=tail;
        }
      }
    }
    while(mi<caps.length){
      const cap=caps[mi];
      const remain=cap-used;
      if(remain>eps){
        const beat=4/parseMeter(meterAt(mi)).den;
        const pieces=splitDurationByBeat(used,remain,beat);
        pieces.forEach(p=>curM.push({type:'rest',dur:p.dur,dot:p.dot}));
      }
      result.push(curM);curM=[];used=0;mi++;
    }
    return result;
  }
  // Re-barre une plage de mesures avec une nouvelle capacite, en preservant toutes les notes.
  // Genere autant de mesures que necessaire (debordement) ou aspire les notes suivantes (remplissage).
  function rebuildRangeWithCap(slots,newCap){

  let newMeterGlobalTmp='4/4'; // utilise par rebuildRangeWithCap pour le beat des silences

    if(state.breaks)state.breaks=shiftMapDropInside(state.breaks);
    if(state.tempoChanges)state.tempoChanges=shiftMapDropInside(state.tempoChanges);
    // Reposer armure/cle sur la 1ere mesure de la plage (si elles existaient)
    if(keyAtStart!==undefined&&startM>0)state.keyChanges[startM]=keyAtStart;
    if(clefAtStart!==undefined&&startM>0)state.clefChanges[startM]=clefAtStart;
    if(startM===0){
      state.pieceMeter=newMeter;
      delete state.timeChanges[0];
    } else {
      state.timeChanges[startM]=newMeter;
    }
    // Plage bornée : restaurer le rythme d'origine juste après la plage re-barrée.
    if(bounded&&restoreMeter){
      const afterIdx=startM+newCount; // 1re mesure après la plage re-barrée
      if(afterIdx<state.measures.length&&state.timeChanges[afterIdx]===undefined){
        state.timeChanges[afterIdx]=restoreMeter;
      }
    }
    state.pieceUnit=newUnit;
    state.sel={m:startM,s:0};
    cleanupAccidentals();
  }
  function tupletGroupDur(mi,si){
    const meas=state.measures[mi];const t=meas[si];if(!t||!t.tuplet)return 0;
    let sum=0;
    for(let j=0;j<meas.length;j++){if(meas[j].tuplet&&meas[j].tupletId===t.tupletId)sum+=effDur(meas[j])}
    return sum;
  }
  // Renvoie true si un decalage a droite de duree d decouperait un n-uplet situe a la
  // selection ou apres : soit la selection est au milieu d'un n-uplet, soit un groupe
  // rencontre a une duree totale > d (il ne peut alors pas etre repositionne proprement).
  function tupletBlockingShift(d){
    const eps=1e-6;
    // 1) La selection est-elle au milieu d'un n-uplet (pas sur sa 1re note) ?
    const m0=state.measures[state.sel.m],s0=state.sel.s,t0=m0[s0];
    if(t0&&t0.tuplet){
      const prev=m0[s0-1];
      const atFirst=(s0===0)||!prev||!prev.tuplet||prev.tupletId!==t0.tupletId;
      if(!atFirst)return true;
    }
    // 2) Parcourir les n-uplets a partir de la selection ; bloquer si l'un a une duree > d
    const seen={};
    for(let mi=state.sel.m;mi<state.measures.length;mi++){
      const meas=state.measures[mi];
      const startS=(mi===state.sel.m)?state.sel.s:0;
      for(let si=startS;si<meas.length;si++){
        const t=meas[si];
        if(t&&t.tuplet&&!seen[t.tupletId]){
          seen[t.tupletId]=true;
          const gd=tupletGroupDur(mi,si);
          if(gd>d+eps)return true;
        }
      }
    }
    return false;
  }
  // Variante position-explicite (utilisée par le décalage multi-voix).
  function tupletBlockingShiftAt(posM,posS,d){
    const eps=1e-6;
    const m0=state.measures[posM],t0=m0&&m0[posS];
    if(t0&&t0.tuplet){
      const prev=m0[posS-1];
      const atFirst=(posS===0)||!prev||!prev.tuplet||prev.tupletId!==t0.tupletId;
      if(!atFirst)return true;
    }
    const seen={};
    for(let mi=posM;mi<state.measures.length;mi++){
      const meas=state.measures[mi];
      const startS=(mi===posM)?posS:0;
      for(let si=startS;si<meas.length;si++){
        const t=meas[si];
        if(t&&t.tuplet&&!seen[t.tupletId]){seen[t.tupletId]=true;const gd=tupletGroupDur(mi,si);if(gd>d+eps)return true;}
      }
    }
    return false;
  }
  function shiftPiece(direction,shiftDur,shiftDot,scope){
    if(scope==='all'){
      // Décalage sur TOUTES les voix, au même INSTANT que la sélection courante (pas au même index).
      const selM=state.sel.m, selS=state.sel.s;
      const saved0=state.activeTrack;
      // Décalage temporel cible (en noires) du curseur dans sa mesure, sur la voix active.
      let targetOff=0;
      {const tr=state.tracks[saved0];const meas=tr&&tr.measures&&tr.measures[selM];if(meas)for(let k=0;k<selS&&k<meas.length;k++)targetOff+=effDur(meas[k]);}
      // Pour chaque voix, l'index du slot où insérer le décalage : celui qui COMMENCE à l'instant,
      // ou à défaut celui qui CONTIENT l'instant (le silence s'insère alors avant cette note, ce qui
      // pousse cette note et la suite vers la droite). -1 seulement si l'instant est hors mesure.
      function slotForShiftAt(meas,off){if(!meas)return -1;const eps=1e-6;let o=0;for(let i=0;i<meas.length;i++){const d=effDur(meas[i]);if(off>=o-eps&&off<o+d-eps)return i;o+=d;}
        // instant exactement en fin de mesure → après le dernier slot : on vise le dernier
        if(Math.abs(o-off)<eps&&meas.length)return meas.length;return -1;}
      // Vérif n-uplet préalable sur chaque voix (à sa propre position temporelle).
      if(direction>0){
        let blocked=false;
        for(let i=0;i<state.tracks.length;i++){state.activeTrack=i;
          const meas=state.measures[selM];
          const ps=slotForShiftAt(meas,targetOff);
          if(ps>=0&&ps<(meas?meas.length:0)){const eshift=shiftDot?shiftDur*1.5:shiftDur;if(tupletBlockingShiftAt(selM,ps,eshift)){blocked=true;break}}
        }
        state.activeTrack=saved0;
        if(blocked){alert('Décalage impossible sur au moins une voix : la durée choisie est inférieure à celle d\u2019un n-uplet, qui ne peut pas être découpé.');return}
      }
      applyToAllTracks((i)=>{
        const meas=state.measures[selM];
        const ps=slotForShiftAt(meas,targetOff);
        if(ps>=0&&ps<(meas?meas.length:0)){
          // Pour la voix réellement active, on laisse shiftCore mettre à jour la sélection
          // (elle SUIT ainsi la note décalée). Les autres voix : pas de mise à jour de sélection.
          const isActive=(i===saved0);
          shiftCore(direction,shiftDur,shiftDot,selM,ps,/*silent*/true,/*noSelUpdate*/!isActive);
        }
      });
      // Sécurité : si la voix active n'avait pas de note à cet instant, garder une sélection valide.
      if(state.sel.m>=state.measures.length)state.sel.m=state.measures.length-1;
      if(state.measures[state.sel.m]&&state.sel.s>=state.measures[state.sel.m].length)state.sel.s=state.measures[state.sel.m].length-1;
      pushHistory();render();
      return;
    }
    // Voix active uniquement
    const sl=selectedSlot();if(!sl)return;
    shiftCore(direction,shiftDur,shiftDot,state.sel.m,state.sel.s,false);
    pushHistory();render();
  }
  // Cœur du décalage sur la voix active, à la position (posM,posS). silent=true évite les alertes.
  // noSelUpdate=true : ne touche PAS à state.sel (indispensable en mode toutes-voix, sinon la sélection
  // est ré-clampée contre chaque voix successivement et corrompt l'itération).
  function shiftCore(direction,shiftDur,shiftDot,posM,posS,silent,noSelUpdate){
    const target=state.measures[posM]&&state.measures[posM][posS];
    if(!target)return false;
    const eshift=shiftDot?shiftDur*1.5:shiftDur;
    if(direction>0){
      if(tupletBlockingShiftAt(posM,posS,eshift)){if(!silent)alert('Décalage impossible : la durée choisie est inférieure à celle d\u2019un n-uplet,\nqui ne peut pas être découpé. Choisissez une durée au moins égale au n-uplet.');return false}
    }
    materializeAccidentals();
    const dur=eshift;
    target._selMark=true;
    const{slots,absSel,caps}=flattenSlots();
    if(absSel<0){delete target._selMark;return false}
    let newFlat;
    if(direction>0){
      const silence={type:'rest',dur:shiftDur,dot:!!shiftDot};
      newFlat=[...slots.slice(0,absSel).map(x=>x.slot),silence,...slots.slice(absSel).map(x=>x.slot)];
      let totalDur=0;for(const s of newFlat)totalDur+=effDur(s);
      let capSum=caps.reduce((a,b)=>a+b,0);
      const lastMeter=meterAt(caps.length-1);
      while(capSum<totalDur-1e-6){
        caps.push(measureCapacity(lastMeter));
        capSum+=caps[caps.length-1];
      }
    } else {
      if(absSel===0){if(!silent)alert('Rien a supprimer avant');delete target._selMark;return false}
      const before=slots.slice(0,absSel).map(x=>x.slot);
      const after=slots.slice(absSel).map(x=>x.slot);
      let toRemove=dur;
      const newBefore=[...before];
      const eps=1e-6;
      while(toRemove>eps&&newBefore.length>0){
        const last=newBefore[newBefore.length-1];
        if(last.tuplet){if(!silent)alert('Decalage gauche bloque par un n-uplet');delete target._selMark;return false}
        const e=effDur(last);
        if(e<=toRemove+eps){newBefore.pop();toRemove-=e}
        else {
          const remain=e-toRemove;
          newBefore[newBefore.length-1]={...last,dur:remain,dot:false};
          toRemove=0;
        }
      }
      newFlat=[...newBefore,...after];
    }
    const rebuilt=rebuildMeasuresFromSlots(newFlat.map(s=>({slot:s})),caps);
    state.measures=rebuilt;
    cleanupAccidentals();
    consolidateRhythm(true);
    let found=null;
    for(let mi=0;mi<state.measures.length&&!found;mi++){
      for(let si=0;si<state.measures[mi].length;si++){
        if(state.measures[mi][si]._selMark){found={m:mi,s:si};break}
      }
    }
    state.measures.forEach(m=>m.forEach(x=>{delete x._selMark}));
    if(!noSelUpdate){
      if(found){state.sel.m=found.m;state.sel.s=found.s}
      if(state.sel.m>=state.measures.length)state.sel.m=state.measures.length-1;
      if(state.measures[state.sel.m]&&state.sel.s>=state.measures[state.sel.m].length)state.sel.s=state.measures[state.sel.m].length-1;
    }
    return true;
  }

  // Point 6+11 : annuler/refaire + copier/coller dans Mesure
  document.getElementById('btn-undo-mes').addEventListener('click',undo);
  document.getElementById('btn-redo-mes').addEventListener('click',redo);
  let clipboardMes=null; // {measures:[...], repeats:{0:..},  timeChanges:{}, keyChanges:{}, clefChanges:{}}

  // ===== Portion de notes (de la note X à la note Y) : transposer / copier / coller =====
  // Sélection par deux clics sur la partition. Travaille sur la VOIX ACTIVE.
  let noteClip=null;                 // tableau de slots clonés (portion copiée)
  // Index global (à plat) d'une position {m,s} dans la voix active.
  function flatIndexOf(m,s){let idx=0;for(let mi=0;mi<m;mi++)idx+=state.measures[mi].length;return idx+s;}
  // Liste à plat [{m,s,slot}] de la voix active.
  function flatSlots(){const out=[];state.measures.forEach((meas,mi)=>meas.forEach((slot,si)=>out.push({m:mi,s:si,slot})));return out;}
  // Clone profond d'un slot (note/silence/accord).
  function cloneSlot(s){const c=Object.assign({},s);if(Array.isArray(s.stack))c.stack=s.stack.map(x=>Object.assign({},x));if(Array.isArray(s.verses))c.verses=s.verses.slice();if(Array.isArray(s.orn))c.orn=s.orn.slice();return c;}
  // Transpose une note (tête ou note d'accord) de n demi-tons, en figistant l'altération absolue.
  function transposeNoteObj(o,semitones,preferFlats){
    const baseSemi={C:0,D:2,E:4,F:5,G:7,A:9,B:11};
    let midi=60+baseSemi[o.note]+o.octave*12;
    if(o.acc==='^')midi+=1;else if(o.acc==='_')midi-=1;
    const out=midiToNote(midi+semitones,preferFlats);
    o.note=out.note;o.octave=out.octave;o.acc=out.acc;
  }
  // Transpose une PLAGE de slots (de from..to inclus, indices globaux) de la voix active.
  function transposeRange(fromIdx,toIdx,semitones){
    const preferFlats=(semitones<0);
    const flat=flatSlots();
    if(fromIdx>toIdx){const t=fromIdx;fromIdx=toIdx;toIdx=t;}
    for(let i=fromIdx;i<=toIdx&&i<flat.length;i++){
      const slot=flat[i].slot;
      if(slot.type!=='note')continue;
      transposeNoteObj(slot,semitones,preferFlats);
      if(slot.stack&&slot.stack.length)slot.stack.forEach(o=>transposeNoteObj(o,semitones,preferFlats));
    }
    // Re-résoudre proprement les altérations affichées de tout le morceau (simple et sûr).
    cleanupAccidentals();
  }
  // Copie une plage (clones) dans noteClip.
  function copyRange(fromIdx,toIdx){
    const flat=flatSlots();
    if(fromIdx>toIdx){const t=fromIdx;fromIdx=toIdx;toIdx=t;}
    noteClip=[];
    for(let i=fromIdx;i<=toIdx&&i<flat.length;i++)noteClip.push(cloneSlot(flat[i].slot));
  }
  // Colle (ÉCRASE) la portion à partir de l'index global startIdx, sans changer la grille de mesures :
  // on remplace les slots un à un. La durée des slots collés peut différer ; on remplit tant que des
  // slots existent et qu'on n'a pas dépassé la capacité — sinon on s'arrête (pas d'insertion).
  function pasteOverwriteAt(startIdx){
    if(!noteClip||!noteClip.length)return false;
    const flat=flatSlots();
    let i=startIdx;
    for(let k=0;k<noteClip.length&&i<flat.length;k++,i++){
      const pos=flat[i];
      state.measures[pos.m][pos.s]=cloneSlot(noteClip[k]);
    }
    // Re-découper proprement chaque mesure touchée pour respecter les temps (notes liées),
    // puis nettoyer les altérations.
    const caps=state.measures.map((_,mi)=>measureCapacity(meterAt(mi)));
    const {slots}=flattenSlots();
    state.measures=rebuildMeasuresFromSlots(slots,caps);
    cleanupAccidentals();
    return true;
  }
