<style>

    cursor: pointer; text-align: center; line-height: 1;

  .row-grid { display: grid; gap: 6px; margin-bottom: 6px; }
  .row-2 { grid-template-columns: 1fr 1fr; }
  .row-3 { grid-template-columns: 1fr 1fr 1fr; }

  /* Navigation : 6 boutons */

    background: #fdf1d8; border: 2px solid #e2b840; padding: 5px;

    gap: 3px; margin-bottom: 8px;
    border-bottom: 2px solid #b4b2a9; }

<script>
(function(){
  const NOTES=[{label:'Do',sub:'C',n:'C'},{label:'Ré',sub:'D',n:'D'},{label:'Mi',sub:'E',n:'E'},{label:'Fa',sub:'F',n:'F'},{label:'Sol',sub:'G',n:'G'},{label:'La',sub:'A',n:'A'},{label:'Si',sub:'B',n:'B'}];
  const DURATIONS=[{label:'𝅝',d:4},{label:'𝅗𝅥',d:2},{label:'♩',d:1},{label:'♪',d:0.5},{label:'♬',d:0.25},{label:'𝅘𝅥𝅰',d:0.125}];
  const SHARP_NOTES=['F','C','G','D','A','E','B'];
  const FLAT_NOTES=['B','E','A','D','G','C','F'];
  const ORNAMENTS=[{code:'T',label:'tr'},{code:'M',label:'~M'},{code:'P',label:'pralle'},{code:'H',label:'fermata'},{code:'L',label:'accent'},{code:'.',label:'staccato'},{code:'u',label:'up'},{code:'v',label:'down'},{code:'O',label:'coda'}];
  // Boutons accord : ajoutent leur texte au champ
  const CHORD_BTNS=['#','b','m','Maj','2','4','5','6','7','9','11','13','sus','dim','aug','add','/'];
  const KEY_NAMES_MAJOR=['C','G','D','A','E','B','F♯','C♯'];
  const KEY_NAMES_MAJOR_FLAT=['C','F','B♭','E♭','A♭','D♭','G♭','C♭'];

  const state={headers:{X:'1',T:'',C:'',N:''},pieceMeter:'4/4',pieceUnit:'1/4',pieceKeySig:0,pieceClef:'treble',measures:[],sel:{m:0,s:0},octave:0,timeChanges:{},keyChanges:{},clefChanges:{},repeats:{},tempo:60,tempoDotted:false,volume:60,fullscreen:false,viewmode:false,activeTab:'notes'};

  const history={stack:[],pos:-1,max:100};
  function snapshot(){return JSON.stringify(state)}
  function pushHistory(){if(history.pos<history.stack.length-1)history.stack=history.stack.slice(0,history.pos+1);history.stack.push(snapshot());if(history.stack.length>history.max)history.stack.shift();history.pos=history.stack.length-1}
  function loadFrom(snap){const o=JSON.parse(snap);Object.assign(state,o)}
  function undo(){if(history.pos>0){history.pos--;loadFrom(history.stack[history.pos]);render()}}
  function redo(){if(history.pos<history.stack.length-1){history.pos++;loadFrom(history.stack[history.pos]);render()}}

  function parseMeter(meter){if(!meter)return{num:4,den:4};if(meter==='C')return{num:4,den:4};if(meter==='C|')return{num:2,den:2};const m=meter.match(/^\s*(\d+)\s*\/\s*(\d+)\s*$/);if(m)return{num:parseInt(m[1],10),den:parseInt(m[2],10)};return{num:4,den:4}}
  function meterAt(idx){let cur=state.pieceMeter;for(let i=0;i<=idx;i++)if(state.timeChanges[i])cur=state.timeChanges[i];return cur}
  function keyAt(idx){let cur=state.pieceKeySig;for(let i=0;i<=idx;i++)if(state.keyChanges[i]!==undefined)cur=state.keyChanges[i];return cur}
  function clefAt(idx){let cur=state.pieceClef;for(let i=0;i<=idx;i++)if(state.clefChanges[i])cur=state.clefChanges[i];return cur}
  function measureCapacity(meter){const{num,den}=parseMeter(meter);return num*(4/den)}
  function effDur(t){
    let d=t.dot?t.dur*1.5:t.dur;
    if(t.tuplet){
      // Pour un n-uplet en 3:2 (n=3,5,6,7) : n notes occupent l'espace de 2 — facteur 2/n
      // Variante : pour 3-uplet → 2/3, 5-uplet → 2/5, 6-uplet → 2/6, 7-uplet → 2/7
      const ratio=2; // 3:2
      d=d*ratio/t.tuplet;
    }
    return d;
  }
  function beamGroupUnit(meter){const{num,den}=parseMeter(meter);if(den===8&&num%3===0&&num>=6)return 1.5;return 4/den}

  function buildEmptyMeasure(meter){const{num,den}=parseMeter(meter);const beatDur=4/den;const slots=[];for(let i=0;i<num;i++)slots.push({type:'rest',dur:beatDur,dot:false});return slots}

              svg+='<text x="'+cx+'" y="'+(staffTop+3.6*LINE_GAP+1)+'" font-size="12" font-family="serif" font-weight="bold" fill="'+ink+'" text-anchor="middle">'+den+'</text>';
              cx+=8;
            }
            // Espace consomme depuis xL
            changeOffset=cx-xL;
          }
        }
        const x0=LEFT_PAD+i*measureW+10+changeOffset;
        const sW=(measureW-14-changeOffset)/Math.max(m.length,1);
        const bg=computeBeamGroups(m,lM);
        const sTG={};
        bg.forEach((g,gi)=>{g.forEach(si=>sTG[si]={gIdx:gi,group:g})});
        const mS=clefRefStep(lC)+4;
        const gSD=bg.map(g=>{
          let s=0;
          for(const idx of g){const t=m[idx];s+=stepIndex(t.note,t.octave)}
          return(s/g.length)<mS?'up':'down';
        });
        const gBD=bg.map((g,gi)=>{
          const su=gSD[gi]==='up';
          let eY=su?Infinity:-Infinity;
          const sX=[];
          g.forEach(si=>{
            const t=m[si];
            const cx=x0+si*sW+sW/2;
            const sx=su?cx+3.3:cx-3.3;
            const hY=noteY(staffTop,stepIndex(t.note,t.octave),lC);
            const nT=su?hY-19:hY+19;
            if(su)eY=Math.min(eY,nT);else eY=Math.max(eY,nT);
            sX.push({slotIdx:si,sx,headY:hY});
          });
          return{stemUp:su,beamY:eY,stems:sX};
        });
        m.forEach((t,si)=>{
          const cx=x0+si*sW+sW/2;
          const iS=(mIdx===selM&&si===state.sel.s);
          const cl=iS?sel:ink;
          if(t.chord)svg+='<text x="'+cx+'" y="'+(staffTop-3)+'" font-size="9" font-weight="bold" fill="'+ink+'" text-anchor="middle">'+t.chord+'</text>';
          if(t.orn&&t.orn.length){
            const ot=t.orn.map(o=>{if(o==='T')return'tr';if(o==='M')return'∼';if(o==='H')return'𝄐';if(o==='.')return'·';if(o==='L')return'>';return o}).join(' ');
            svg+='<text x="'+cx+'" y="'+(staffTop-12)+'" font-size="8" font-style="italic" fill="'+ink+'" text-anchor="middle">'+ot+'</text>';
          }
          if(t.type==='note'){
            const gp=sTG[si];
            if(gp){
              const gi=gp.gIdx;
              const su=gSD[gi]==='up';
              const bY=gBD[gi].beamY;
              const dr=drawNoteHead(t,cx,cl,lC,false,su,staffTop,accToDrawFor(m,si,keyAt(mIdx)));
              const sx=dr.stemX,hY=dr.headY;
              svg+=dr.svg;
              svg+='<line x1="'+sx+'" y1="'+hY+'" x2="'+sx+'" y2="'+bY+'" stroke="'+cl+'" stroke-width="0.8"/>';
              if(iS)svg+='<circle cx="'+cx+'" cy="'+dr.headY+'" r="8" fill="none" stroke="'+sel+'" stroke-width="0.7" opacity="0.4"/>';
              if(pS&&pS.t.tieToNext)tP.push({fromCx:pS.cx,fromY:pS.y,toCx:cx,toY:dr.headY});
              if(pendingIncomingTie){tP.push({fromCx:LEFT_PAD-6,fromY:dr.headY,toCx:cx,toY:dr.headY,partial:'in'});pendingIncomingTie=false}
              pS={t,cx,y:dr.headY};
            } else {
              const st=stepIndex(t.note,t.octave);
              const su=st<mS;
              const dr=drawNoteHead(t,cx,cl,lC,true,su,staffTop,accToDrawFor(m,si,keyAt(mIdx)));
              svg+=dr.svg;
              if(iS)svg+='<circle cx="'+cx+'" cy="'+dr.headY+'" r="8" fill="none" stroke="'+sel+'" stroke-width="0.7" opacity="0.4"/>';
              if(pS&&pS.t.tieToNext)tP.push({fromCx:pS.cx,fromY:pS.y,toCx:cx,toY:dr.headY});
              if(pendingIncomingTie){tP.push({fromCx:LEFT_PAD-6,fromY:dr.headY,toCx:cx,toY:dr.headY,partial:'in'});pendingIncomingTie=false}
              pS={t,cx,y:dr.headY};
            }
          } else {
            const dr=drawRest(t,cx,cl,staffTop);
            svg+=dr.svg;
            if(iS)svg+='<circle cx="'+cx+'" cy="'+dr.headY+'" r="8" fill="none" stroke="'+sel+'" stroke-width="0.7" opacity="0.4"/>';
            // Silences cassent les liaisons
            pS=null;
          }
          if(t.tuplet&&(si===0||!m[si-1]||!m[si-1].tuplet||m[si-1].tupletId!==t.tupletId)){
            const gs=[];
            for(let j=si;j<m.length&&m[j].tupletId===t.tupletId&&gs.length<t.tuplet;j++)gs.push(j);
            if(gs.length>0){
              const cF=x0+gs[0]*sW+sW/2;
              const cL=x0+gs[gs.length-1]*sW+sW/2;
              const cM=(cF+cL)/2;
              // Crochet du n-uplet (au-dessus de la portee)
              const yT=staffTop-6;
              svg+='<line x1="'+cF+'" y1="'+yT+'" x2="'+cL+'" y2="'+yT+'" stroke="'+ink+'" stroke-width="0.7"/>';
              svg+='<line x1="'+cF+'" y1="'+yT+'" x2="'+cF+'" y2="'+(yT+3)+'" stroke="'+ink+'" stroke-width="0.7"/>';
              svg+='<line x1="'+cL+'" y1="'+yT+'" x2="'+cL+'" y2="'+(yT+3)+'" stroke="'+ink+'" stroke-width="0.7"/>';
              svg+='<text x="'+cM+'" y="'+(yT-1)+'" font-size="8" font-style="italic" fill="'+ink+'" text-anchor="middle" font-weight="bold">'+t.tuplet+'</text>';
            }
          }
          if(si===0){
            svg+='<text x="'+(LEFT_PAD+i*measureW+2)+'" y="'+(staffTop-3)+'" font-size="8" fill="'+dim+'">'+String(mIdx+1)+'</text>';
          }
        });
        // Beams pour cette mesure : niveau 1 complet, niveaux 2/3 partiels selon notes
        bg.forEach((g,gi)=>{
          const d=gBD[gi];const su=d.stemUp;const bY=d.beamY;const sts=d.stems;
          const bT=2.5;
          const dyO=su?bT+0.8:-(bT+0.8);
          // Niveau de chaque note du groupe (1=croche, 2=double, 3=triple)
          // On utilise la duree de base (sans point ni n-uplet) pour decider le nombre de barres
          const lvls=g.map(idx=>{
            const bD=m[idx].dur;
            if(bD<=0.125+1e-6)return 3;
            if(bD<=0.25+1e-6)return 2;
            return 1;
          });
          // sX = position x de chaque hampe (ordre = ordre du groupe)
          const xPos=sts.map(s=>s.sx);
          const xS=xPos[0],xE=xPos[xPos.length-1];
          // Barre principale (niveau 1) : toute la largeur du groupe
          {
            const yy=bY;
            svg+='<rect x="'+xS+'" y="'+(yy-bT/2)+'" width="'+(xE-xS)+'" height="'+bT+'" fill="'+ink+'"/>';
          }
          // Niveaux 2 et 3 : segments entre notes consecutives de meme niveau, demi-barres pour les isolees
          for(let lvl=2;lvl<=3;lvl++){
            const yy=bY+(lvl-1)*dyO;
            // 1) Segments connectes : entre i et i+1 si les deux ont niveau >= lvl
            const connected=new Array(xPos.length).fill(false);
            for(let i=0;i<xPos.length-1;i++){
              if(lvls[i]>=lvl&&lvls[i+1]>=lvl){
                svg+='<rect x="'+xPos[i]+'" y="'+(yy-bT/2)+'" width="'+(xPos[i+1]-xPos[i])+'" height="'+bT+'" fill="'+ink+'"/>';
                connected[i]=true;connected[i+1]=true;
              }
            }
            // 2) Demi-barres pour les notes de niveau >= lvl qui ne sont pas connectees
            for(let i=0;i<xPos.length;i++){
              if(lvls[i]>=lvl&&!connected[i]){
                // Longueur de demi-barre : ~40% de la distance au voisin du meme groupe
                let halfLen;
                if(i===0){
                  // Demi-barre vers la droite
                  halfLen=Math.max(3,(xPos[1]-xPos[0])*0.4);
                  svg+='<rect x="'+xPos[i]+'" y="'+(yy-bT/2)+'" width="'+halfLen+'" height="'+bT+'" fill="'+ink+'"/>';
                } else {
                  // Demi-barre vers la gauche
                  halfLen=Math.max(3,(xPos[i]-xPos[i-1])*0.4);
                  svg+='<rect x="'+(xPos[i]-halfLen)+'" y="'+(yy-bT/2)+'" width="'+halfLen+'" height="'+bT+'" fill="'+ink+'"/>';
                }
              }
            }
          }
        });
      }
      // Liaison sortante : si la derniere note de la ligne a tieToNext
      if(pS&&pS.t.tieToNext){
        tP.push({fromCx:pS.cx,fromY:pS.y,toCx:SCORE_W-RIGHT_PAD+4,toY:pS.y,partial:'out'});
      }
      // Dessiner toutes les liaisons de la ligne (apres avoir parcouru toutes les mesures)
      tP.forEach(tp=>{
        const cx=(tp.fromCx+tp.toCx)/2;
        const cy=((tp.fromY+tp.toY)/2)+6;
        svg+='<path d="M '+(tp.fromCx+3)+' '+(tp.fromY+3)+' Q '+cx+' '+cy+' '+(tp.toCx-3)+' '+(tp.toY+3)+'" stroke="'+ink+'" stroke-width="0.9" fill="none"/>';
      });
    }
    svg+='</svg>';
    document.getElementById('score').innerHTML=svg;
  }

  function render(){renderScore();renderState();notifyPanelMeasureChanged()}

  function playSelectedSlot(){const sl=selectedSlot();if(sl&&sl.type==='note'){const meas=state.measures[state.sel.m];const sig=keyAt(state.sel.m);const midi=midiOfNote(sl.note,sl.octave,effectiveAcc(meas,state.sel.s,sig),sig);previewNote(midi,Math.min(0.4,effDur(sl)*60/state.tempo))}}
  function selectNext(){
    let{m,s}=state.sel;
    if(s+1<state.measures[m].length){state.sel={m,s:s+1};render();playSelectedSlot();return}
    if(m+1<state.measures.length){state.sel={m:m+1,s:0};render();playSelectedSlot();return}
    // À la toute fin : ajouter UNE seule mesure vide
    state.measures.push(buildEmptyMeasure(meterAt(m)));

  }
  function selectPrev(){let{m,s}=state.sel;if(s>0){state.sel={m,s:s-1};render();playSelectedSlot();return}if(m>0){state.sel={m:m-1,s:state.measures[m-1].length-1};render();playSelectedSlot();return}}
  function jumpMeasure(delta){const cur=state.sel.m;if(delta>0&&cur===state.measures.length-1){state.measures.push(buildEmptyMeasure(meterAt(cur)));state.sel={m:state.measures.length-1,s:0};pushHistory();render();return}const t=cur+delta;if(t<0||t>=state.measures.length)return;state.sel={m:t,s:0};render()}

  const audio={ctx:null,master:null,playing:false,scheduled:[],stopAt:0,raf:null};
  function ensureAudio(){if(!audio.ctx){audio.ctx=new(window.AudioContext||window.webkitAudioContext)();audio.master=audio.ctx.createGain();audio.master.connect(audio.ctx.destination)}audio.master.gain.value=state.volume/200;if(audio.ctx.state==='suspended')audio.ctx.resume()}
  function midiOfNote(note,oct,acc,keySig){const bs={C:0,D:2,E:4,F:5,G:7,A:9,B:11}[note];let midi=60+bs+oct*12;let alt=0;if(acc==='^')alt=1;else if(acc==='_')alt=-1;else if(acc==='=')alt=0;else{if(keySig>0&&SHARP_NOTES.slice(0,keySig).includes(note))alt=1;else if(keySig<0&&FLAT_NOTES.slice(0,-keySig).includes(note))alt=-1}return midi+alt}
  function freqOfMidi(m){return 440*Math.pow(2,(m-69)/12)}
  function previewNote(midi,durSec=0.25){ensureAudio();const t=audio.ctx.currentTime+0.005;const f=freqOfMidi(midi);const o=audio.ctx.createOscillator();const g=audio.ctx.createGain();o.type='triangle';o.frequency.value=f;const p=0.5,a=0.005;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(p,t+a);g.gain.setValueAtTime(p,t+Math.max(durSec-0.06,a));g.gain.linearRampToValueAtTime(0,t+durSec);o.connect(g);g.connect(audio.master);o.start(t);o.stop(t+durSec+0.03)}
  function playSchedule(){
    ensureAudio();stopPlayback(false);audio.playing=true;
    document.getElementById('btn-play').textContent='⏸';
    const st=audio.ctx.currentTime+0.05;
    const qD=60/state.tempo;
    const order=expandForPlayback();
    if(order.length===0){stopPlayback(true);return}
    const startMeasure=state.sel.m,startSlot=state.sel.s;
    let startIdxInOrder=order.indexOf(startMeasure);
    if(startIdxInOrder<0)startIdxInOrder=0;
    const events=[];
    for(let oi=startIdxInOrder;oi<order.length;oi++){
      const mi=order[oi];
      const m=state.measures[mi];if(!m)continue;
      const sig=keyAt(mi);
      const firstSlot=(oi===startIdxInOrder&&mi===startMeasure)?startSlot:0;
      for(let si=firstSlot;si<m.length;si++){
        const slot=m[si];
        const dur=effDur(slot)*qD;
        if(slot.type==='note'){
          const midi=midiOfNote(slot.note,slot.octave,effectiveAcc(m,si,sig),sig);
          events.push({midi,dur,measureIdx:mi,slotIdx:si,tieToNext:!!slot.tieToNext});
        } else {
          events.push({midi:null,dur,measureIdx:mi,slotIdx:si,tieToNext:false});
        }
      }
    }
    let i=0;
    while(i<events.length){
      const ev=events[i];
      if(ev.midi!==null&&ev.tieToNext){
        let j=i+1;
        while(j<events.length&&events[j].midi===ev.midi){
          ev.dur+=events[j].dur;
          events[j].silent=true;
          events[j].dur=0;
          if(!events[j].tieToNext)break;
          j++;
        }
      }
      i++;
    }
    // Pre-calculer le temps absolu de chaque event
    let acc=st;
    events.forEach(ev=>{ev.startAt=acc;acc+=ev.dur});
    audio.stopAt=acc;
    audio.events=events;
    audio.eventIdx=0;
    const SCHEDULE_AHEAD=3.0;
    function scheduleAhead(){
      const now=audio.ctx.currentTime;
      const horizon=now+SCHEDULE_AHEAD;
      while(audio.eventIdx<audio.events.length){
        const ev=audio.events[audio.eventIdx];
        if(ev.startAt>horizon)break;
        if(ev.midi!==null&&!ev.silent&&ev.dur>0){
          const o=audio.ctx.createOscillator();
          const g=audio.ctx.createGain();
          o.type='triangle';o.frequency.value=freqOfMidi(ev.midi);
          const a=0.005,r=Math.min(0.05,ev.dur*0.3);
          g.gain.setValueAtTime(0,ev.startAt);
          g.gain.linearRampToValueAtTime(0.5,ev.startAt+a);
          g.gain.setValueAtTime(0.5,ev.startAt+ev.dur-r);
          g.gain.linearRampToValueAtTime(0,ev.startAt+ev.dur);
          o.connect(g);g.connect(audio.master);
          o.start(ev.startAt);o.stop(ev.startAt+ev.dur+0.02);
          audio.scheduled.push(o);
        }
        audio.scheduled.push({updateAt:ev.startAt,measureIdx:ev.measureIdx,slotIdx:ev.slotIdx});
        audio.eventIdx++;
      }
    }
    scheduleAhead();
    function tick(){
      if(!audio.playing)return;
      const now=audio.ctx.currentTime;
      scheduleAhead();
      // Nettoyage des marqueurs anciens
      audio.scheduled=audio.scheduled.filter(ev=>ev.stop||(ev.updateAt!==undefined&&ev.updateAt>now-1));
      let last=null;
      for(const ev of audio.scheduled){
        if(ev.updateAt!==undefined&&ev.updateAt<=now)last=ev;
        if(ev.updateAt!==undefined&&ev.updateAt>now)break;
      }
      if(last&&(state.sel.m!==last.measureIdx||state.sel.s!==last.slotIdx)){
        state.sel={m:last.measureIdx,s:last.slotIdx};renderScore();renderState();
      }
      if(now>=audio.stopAt){stopPlayback(true);return}
      audio.raf=requestAnimationFrame(tick);
    }
    audio.raf=requestAnimationFrame(tick);
  }
  function stopPlayback(refresh){if(audio.raf){cancelAnimationFrame(audio.raf);audio.raf=null}audio.scheduled.forEach(ev=>{if(ev.stop)try{ev.stop()}catch(_){}});audio.scheduled=[];audio.playing=false;document.getElementById('btn-play').textContent='▶';if(refresh)render()}

  function setNoteAtSelection(n){
    const sl=selectedSlot();if(!sl)return;const dur=sl.dur,dot=sl.dot;
    // Conserver l'alteration seulement si on garde la meme note (nom)
    let acc='';
    if(sl.type==='note'&&sl.note===n)acc=sl.acc||'';
    // Point 7 : trouver la note précédente (toute mesure) et choisir l'octave la plus proche
    const prev=findPreviousNote(state.sel.m,state.sel.s);
    if(prev){
      const baseSemi={C:0,D:2,E:4,F:5,G:7,A:9,B:11};
      const prevMidi=60+baseSemi[prev.note]+prev.octave*12+(prev.acc==='^'?1:prev.acc==='_'?-1:0);
      let best=state.octave,bestDist=Infinity;
      for(let o=-2;o<=3;o++){
        const m=60+baseSemi[n]+o*12;
        const d=Math.abs(m-prevMidi);
        if(d<bestDist){bestDist=d;best=o}
      }
      state.octave=best;
    }
    const hadTie=!!sl.tieToNext;
    const newSlot={type:'note',note:n,octave:state.octave,dur,dot,acc};
    if(hadTie)newSlot.tieToNext=true;
    // Conserver l'appartenance au triolet (sinon la note sort du groupe et perd son rythme)
    if(sl.tuplet){newSlot.tuplet=sl.tuplet;newSlot.tupletId=sl.tupletId}
    state.measures[state.sel.m][state.sel.s]=newSlot;
    propagateTieReplacement(state.sel.m,state.sel.s,n,state.octave,acc);
    pushHistory();
    const midi=midiOfNote(n,state.octave,acc,keyAt(state.sel.m));previewNote(midi);
    render();
  }
  function findPreviousNote(mi,si){
    // Cherche en arrière dans la mesure courante puis dans les mesures précédentes
    for(let i=si-1;i>=0;i--){
      const s=state.measures[mi][i];
      if(s.type==='note')return s;
    }
    for(let m=mi-1;m>=0;m--){
      const meas=state.measures[m];
      for(let i=meas.length-1;i>=0;i--){
        const s=meas[i];
        if(s.type==='note')return s;
      }
    }
    return null;

  function propagateTieReplacement(mi,si,note,octave,acc){
    let curM=mi,curS=si;
    while(true){
      const meas=state.measures[curM];
      if(!meas)break;
      const cur=meas[curS];
      if(!cur||!cur.tieToNext)break;
      let nextM=curM,nextS=curS+1;
      if(nextS>=meas.length){
        nextM=curM+1;nextS=0;
        if(nextM>=state.measures.length)break;
      }
      const next=state.measures[nextM][nextS];
      if(!next||next.type!=='note')break;
      next.note=note;next.octave=octave;next.acc=acc;
      curM=nextM;curS=nextS;
    }
  }

  let nextTupletId=1;
  function applyTuplet(n,unitDur){
    // n-uplet de unitDur occupe l'espace de (n-1) notes de unitDur (règle 3:2 → 3 notes dans l'espace de 2)
    // Plus généralement : selon ratio implicite ABC (n:2 pour n impair, n:3 pour 6, etc.) — on garde 3:2 simple
    const ratio=2; // 3:2 → l'espace est de 2 unitDur
    const totalSpace=ratio*unitDur;
    const m=state.measures[state.sel.m];
    const idx=state.sel.s;
    const meter=meterAt(state.sel.m);
    const{den}=parseMeter(meter);
    const beat=4/den;
    const cap=measureCapacity(meter);
    // Calculer la position courante (offset)
    let offset=0;for(let i=0;i<idx;i++)offset+=effDur(m[i]);
    // Si l'espace disponible jusqu'à fin de mesure < totalSpace, on tronque (on garde le bouton désactivé sinon)
    const available=cap-offset;
    if(available<totalSpace-1e-6){alert('Pas assez de place dans la mesure pour ce n-uplet');return}
    // Identifiant unique pour ce groupe de n-uplet
    const tid=nextTupletId++;
    const activeSlot=m[idx];
    const isRest=(activeSlot.type==='rest');
    const newSlots=[];
    for(let i=0;i<n;i++){
      if(i===0){
        if(isRest){newSlots.push({type:'rest',dur:unitDur,dot:false,tuplet:n,tupletId:tid})}
        else{
          newSlots.push({type:'note',note:activeSlot.note,octave:activeSlot.octave,dur:unitDur,dot:false,acc:activeSlot.acc||'',tuplet:n,tupletId:tid});
        }
      } else {
        newSlots.push({type:'rest',dur:unitDur,dot:false,tuplet:n,tupletId:tid});
      }
    }
    // Consommer totalSpace à partir de idx (effacer/raccourcir les slots existants)
    let consumed=0;
    let cursor=idx;
    const eps=1e-6;
    while(consumed<totalSpace-eps&&cursor<m.length){
      const s=m[cursor];
      const d=effDur(s);
      if(consumed+d<=totalSpace+eps){
        consumed+=d;
        m.splice(cursor,1);
      } else {
        // découper le slot en deux : ce qu'on consomme + ce qui reste
        const remaining=d-(totalSpace-consumed);
        // remplacer ce slot par un silence (ou la note tronquée) à la durée restante
        const offsetAfter=offset+totalSpace;
        const pieces=splitDurationByBeat(offsetAfter,remaining,beat);
        const tail=pieces.map(p=>Object.assign({},s,{dur:p.dur,dot:p.dot}));
        m.splice(cursor,1,...tail);
        consumed=totalSpace;
        break;
      }
    }
    // Insérer les nouveaux slots à idx
    m.splice(idx,0,...newSlots);
    // Truncate/compléter la mesure
    truncateMeasureToCapacity(state.sel.m,cap);
    pushHistory();render();
  }

  // ============ Export MusicXML compresse (.mxl) ============
  function escapeXml(s){return (s+'').replace(/[<>&"']/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&apos;'}[c]))}
  function clefXml(clefName){
    if(clefName==='bass')return '<clef><sign>F</sign><line>4</line></clef>';
    if(clefName==='treble8')return '<clef><sign>G</sign><line>2</line><clef-octave-change>-1</clef-octave-change></clef>';
    return '<clef><sign>G</sign><line>2</line></clef>';
  }
  function keyXml(sig){return '<key><fifths>'+sig+'</fifths><mode>major</mode></key>'}
  function timeXml(meter){const{num,den}=parseMeter(meter);return '<time><beats>'+num+'</beats><beat-type>'+den+'</beat-type></time>'}
  function pitchXml(slot){
    const step=slot.note;
    // MusicXML octave: middle C = 4 (notre octave=0 -> 4 ; +1 -> 5 ; -1 -> 3 ; ...)
    // mais notre octave indique aussi le passage majuscule/minuscule en ABC
    // En interne notre Do octave 0 = C4 en MusicXML
    const oct=4+slot.octave;
    let alter=0;
    if(slot.acc==='^')alter=1;
    else if(slot.acc==='_')alter=-1;
    else if(slot.acc==='=')alter=0;
    let s='<pitch><step>'+step+'</step>';
    if(slot.acc==='^'||slot.acc==='_')s+='<alter>'+alter+'</alter>';
    s+='<octave>'+oct+'</octave></pitch>';
    return s;
  }
  function noteTypeXml(slot){
    // duree visuelle (sans n-uplet)
    const d=nominalDur(slot);
    if(d>=4)return 'whole';
    if(d>=2)return 'half';
    if(d>=1)return 'quarter';
    if(d>=0.5)return 'eighth';
    if(d>=0.25)return '16th';
    return '32nd';
  }
  function buildMusicXml(){
    const DIV=480; // divisions par noire (multiple riche pour gerer les n-uplets)
    let xml='<?xml version="1.0" encoding="UTF-8" standalone="no"?>\n';
    xml+='<!DOCTYPE score-partwise PUBLIC "-//Recordare//DTD MusicXML 3.1 Partwise//EN" "http://www.musicxml.org/dtds/partwise.dtd">\n';
    xml+='<score-partwise version="3.1">\n';
    // Work / identification
    const title=(state.headers.T||'').split('\n')[0]||'Sans titre';
    const composer=(state.headers.C||'').split('\n')[0]||'';
    xml+='<work><work-title>'+escapeXml(title)+'</work-title></work>\n';
    if(composer){
      xml+='<identification><creator type="composer">'+escapeXml(composer)+'</creator></identification>\n';
    }
    xml+='<part-list><score-part id="P1"><part-name>Voix</part-name></score-part></part-list>\n';
    xml+='<part id="P1">\n';
    let prevClef=null,prevKey=null,prevMeter=null;
    state.measures.forEach((meas,mi)=>{
      xml+='<measure number="'+(mi+1)+'">\n';
      const lC=clefAt(mi),lK=keyAt(mi),lM=meterAt(mi);
      // Attributs : divisions au debut, puis clef/key/time si changement ou si mesure 0
      const isFirst=(mi===0);
      const hasClefChange=isFirst||lC!==prevClef;
      const hasKeyChange=isFirst||lK!==prevKey;
      const hasMeterChange=isFirst||lM!==prevMeter;
      if(isFirst||hasClefChange||hasKeyChange||hasMeterChange){
        xml+='<attributes>';
        if(isFirst)xml+='<divisions>'+DIV+'</divisions>';
        if(hasKeyChange)xml+=keyXml(lK);
        if(hasMeterChange)xml+=timeXml(lM);
        if(hasClefChange)xml+=clefXml(lC);
        xml+='</attributes>\n';
      }
      // Reprises
      const r=state.repeats[mi];
      if(r){
        if(r.start)xml+='<barline location="left"><bar-style>heavy-light</bar-style><repeat direction="forward"/></barline>\n';
        if(r.volta)xml+='<barline location="left"><ending number="'+r.volta+'" type="start"/></barline>\n';
      }
      // Notes
      meas.forEach((slot,si)=>{
        // Duree MusicXML = effDur (avec tuplet) * DIV
        const dur=Math.max(1,Math.round(effDur(slot)*DIV));
        xml+='<note>';
        if(slot.type==='rest'){
          xml+='<rest/>';
        } else {
          xml+=pitchXml(slot);
        }
        xml+='<duration>'+dur+'</duration>';
        xml+='<type>'+noteTypeXml(slot)+'</type>';
        if(slot.dot)xml+='<dot/>';
        if(slot.acc==='^'||slot.acc==='_'||slot.acc==='='){
          let accName='';
          if(slot.acc==='^')accName='sharp';
          else if(slot.acc==='_')accName='flat';
          else accName='natural';
          xml+='<accidental>'+accName+'</accidental>';
        }
        // n-uplet
        if(slot.tuplet){
          xml+='<time-modification><actual-notes>'+slot.tuplet+'</actual-notes><normal-notes>2</normal-notes></time-modification>';
        }
        // liaison (tie)
        if(slot.tieToNext){
          xml+='<tie type="start"/>';
        }
        // notations (tie + tuplet + ornaments)
        let nota='';
        if(slot.tieToNext)nota+='<tied type="start"/>';
        if(slot.tuplet){
          // start sur premier slot du groupe, stop sur dernier
          const isFirst=(si===0||!meas[si-1]||meas[si-1].tupletId!==slot.tupletId);
          const isLast=(si===meas.length-1||!meas[si+1]||meas[si+1].tupletId!==slot.tupletId);
          if(isFirst)nota+='<tuplet type="start" bracket="yes"/>';
          if(isLast)nota+='<tuplet type="stop"/>';
        }
        if(slot.orn&&slot.orn.length){
          let orns='';
          slot.orn.forEach(o=>{
            if(o==='T')orns+='<trill-mark/>';
            else if(o==='M')orns+='<turn/>';
            else if(o==='H')nota+='<fermata/>';
            else if(o==='.')nota+='<articulations><staccato/></articulations>';
            else if(o==='L')nota+='<articulations><accent/></articulations>';
          });
          if(orns)nota+='<ornaments>'+orns+'</ornaments>';
        }
        if(slot.chord){
          nota+='<harmony>'+escapeXml(slot.chord)+'</harmony>'; // pas un vrai harmony, juste un texte simple
        }
        if(nota)xml+='<notations>'+nota+'</notations>';
        xml+='</note>\n';
      });
      // Fin de mesure : volta stop / reprise fin
      if(r){
        if(r.volta)xml+='<barline location="right"><ending number="'+r.volta+'" type="stop"/></barline>\n';
        if(r.end)xml+='<barline location="right"><bar-style>light-heavy</bar-style><repeat direction="backward"/></barline>\n';
      }
      xml+='</measure>\n';
      prevClef=lC;prevKey=lK;prevMeter=lM;
    });
    xml+='</part>\n</score-partwise>\n';
    return xml;
  }
  // ============ Encodeur ZIP minimal (stored, sans compression) ============
  // Format ZIP : pour chaque fichier => Local File Header + data + ... + Central Directory + End Of CD
  function crc32(bytes){
    // Table CRC32 calculee a la volee
    let c;
    const table=crc32._t;
    if(!table){
      const t=new Uint32Array(256);
      for(let n=0;n<256;n++){
        c=n;
        for(let k=0;k<8;k++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);
        t[n]=c>>>0;
      }
      crc32._t=t;
    }
    let crc=0xFFFFFFFF;
    for(let i=0;i<bytes.length;i++)crc=(crc>>>8)^crc32._t[(crc^bytes[i])&0xFF];
    return (crc^0xFFFFFFFF)>>>0;
  }
  function strToUint8(s){
    // UTF-8 encoding
    return new TextEncoder().encode(s);
  }
  function makeZip(files){
    // files: [{name, data: Uint8Array}]
    const parts=[];
    const central=[];
    let offset=0;
    const dosTime=0,dosDate=0; // ignore date
    files.forEach(f=>{
      const nameBytes=strToUint8(f.name);
      const crc=crc32(f.data);
      const size=f.data.length;
      // Local File Header
      const lfh=new Uint8Array(30+nameBytes.length);
      const dv=new DataView(lfh.buffer);
      dv.setUint32(0,0x04034b50,true);  // signature
      dv.setUint16(4,20,true);          // version needed
      dv.setUint16(6,0,true);           // flags
      dv.setUint16(8,0,true);           // method 0 = stored
      dv.setUint16(10,dosTime,true);
      dv.setUint16(12,dosDate,true);
      dv.setUint32(14,crc,true);
      dv.setUint32(18,size,true);       // compressed size
      dv.setUint32(22,size,true);       // uncompressed size
      dv.setUint16(26,nameBytes.length,true);
      dv.setUint16(28,0,true);          // extra
      lfh.set(nameBytes,30);
      parts.push(lfh);
      parts.push(f.data);
      // Central Directory record
      const cdr=new Uint8Array(46+nameBytes.length);
      const dv2=new DataView(cdr.buffer);
      dv2.setUint32(0,0x02014b50,true);
      dv2.setUint16(4,20,true);          // version made
      dv2.setUint16(6,20,true);          // version needed
      dv2.setUint16(8,0,true);
      dv2.setUint16(10,0,true);          // method
      dv2.setUint16(12,dosTime,true);
      dv2.setUint16(14,dosDate,true);
      dv2.setUint32(16,crc,true);
      dv2.setUint32(20,size,true);
      dv2.setUint32(24,size,true);
      dv2.setUint16(28,nameBytes.length,true);
      dv2.setUint16(30,0,true);          // extra
      dv2.setUint16(32,0,true);          // comment
      dv2.setUint16(34,0,true);          // disk
      dv2.setUint16(36,0,true);          // internal attrs
      dv2.setUint32(38,0,true);          // external attrs
      dv2.setUint32(42,offset,true);
      cdr.set(nameBytes,46);
      central.push(cdr);
      offset+=lfh.length+size;
    });
    const cdStart=offset;
    let cdSize=0;
    central.forEach(c=>{parts.push(c);cdSize+=c.length;offset+=c.length});
    // End Of Central Directory
    const eocd=new Uint8Array(22);
    const dv3=new DataView(eocd.buffer);
    dv3.setUint32(0,0x06054b50,true);
    dv3.setUint16(4,0,true);
    dv3.setUint16(6,0,true);
    dv3.setUint16(8,files.length,true);
    dv3.setUint16(10,files.length,true);
    dv3.setUint32(12,cdSize,true);
    dv3.setUint32(16,cdStart,true);
    dv3.setUint16(20,0,true);
    parts.push(eocd);
    // Concatener
    let total=0;parts.forEach(p=>total+=p.length);
    const out=new Uint8Array(total);
    let pos=0;parts.forEach(p=>{out.set(p,pos);pos+=p.length});
    return out;
  }
  document.getElementById('btn-export-mxl').addEventListener('click',()=>{
    try{
      const xml=buildMusicXml();
      const containerXml='<?xml version="1.0" encoding="UTF-8"?>\n<container><rootfiles><rootfile full-path="score.xml" media-type="application/vnd.recordare.musicxml"/></rootfiles></container>\n';
      // Note : pour un .mxl strict, "mimetype" doit etre stocke en premier et non compresse.
      // Comme on n'utilise que stored partout, c'est OK.
      const files=[
        {name:'mimetype',data:strToUint8('application/vnd.recordare.musicxml')},
        {name:'META-INF/container.xml',data:strToUint8(containerXml)},
        {name:'score.xml',data:strToUint8(xml)}
      ];
      const zipBytes=makeZip(files);
      const blob=new Blob([zipBytes],{type:'application/vnd.recordare.musicxml'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      const fn=(state.headers.T||'morceau').replace(/[^a-zA-Z0-9_\-]/g,'_')+'.mxl';
      a.href=url;a.download=fn;
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }catch(e){
      alert('Erreur export MusicXML : '+e.message);
    }
  });

  const panelOk=document.getElementById('panel-ok');
  const panelCancel=document.getElementById('panel-cancel');
  let cOnOk=null,cOnExtra=null,cOnMeasureChange=null,cShowMes=false;

  function openPanel({title,body,onMount,onOk,hideActions,extraButtons,onExtra,actionsClass,showMes,onMeasureChange}){
    panelTitle.textContent=title;
    cShowMes=!!showMes;
    panelMes.textContent=cShowMes?('Mes '+(state.sel.m+1)):'';
    let eH='';
    if(extraButtons&&extraButtons.length){
      let cls='actions';
      if(actionsClass)cls+=' '+actionsClass;
      else if(extraButtons.length===3)cls+=' three';
      else if(extraButtons.length===4)cls+=' four';
      eH='<div class="'+cls+'" style="margin-top:10px;">'+extraButtons.map((b,i)=>'<button class="k '+(i===extraButtons.length-1?'primary':'')+'" data-extra="'+b.replace(/"/g,'&quot;')+'">'+b+'</button>').join('')+'</div>';
    }
    panelBody.innerHTML=body+eH;
    cOnOk=onOk||null;cOnExtra=onExtra||null;cOnMeasureChange=onMeasureChange||null;
    panelOk.style.display=(hideActions||extraButtons)?'none':'';
    panelCancel.style.display=(hideActions||extraButtons)?'none':'';
    panel.classList.add('open');
    if(onMount)setTimeout(onMount,50);
    if(extraButtons)setTimeout(()=>{panelBody.querySelectorAll('[data-extra]').forEach(b=>{b.addEventListener('click',()=>{if(cOnExtra)cOnExtra(b.dataset.extra)})})},50);
  }
  function closePanel(){panel.classList.remove('open');cOnOk=null;cOnExtra=null;cOnMeasureChange=null;cShowMes=false}
  function notifyPanelMeasureChanged(){
    if(!panel.classList.contains('open'))return;
    if(cShowMes)panelMes.textContent='Mes '+(state.sel.m+1);
    if(cOnMeasureChange)cOnMeasureChange();
  }
  panelOk.addEventListener('click',()=>{if(cOnOk)cOnOk();closePanel();render()});
  panelCancel.addEventListener('click',closePanel);

  // ⭐ Headers : Titre/X simple input, ST/C/N multilignes avec bouton ↵
  function headerPromptSimple(key,title){return ()=>openPanel({title:title,body:'<div class="row"><input id="hi" type="text" value="'+((state.headers[key]||'')+'').replace(/"/g,'&quot;')+'"/></div>',onMount:()=>document.getElementById('hi').focus(),onOk:()=>{let v=document.getElementById('hi').value.trim();if(key==='X'&&!v)v='0';state.headers[key]=v;pushHistory()}})}
  function headerPromptMulti(key,title){return ()=>{
    openPanel({
      title:title,
      body:'<textarea id="hi">'+((state.headers[key]||'')+'').replace(/</g,'&lt;')+'</textarea>'+
        '<div class="row-grid" style="margin-top:8px;"><button class="k" id="newline-btn" style="font-size:36px;">↵ Nouvelle ligne</button></div>',
      onMount:()=>{
        const ta=document.getElementById('hi');
        ta.focus();
        document.getElementById('newline-btn').addEventListener('click',()=>{
          const pos=ta.selectionStart;
          const v=ta.value;
          ta.value=v.substring(0,pos)+'\n'+v.substring(pos);
          ta.selectionStart=ta.selectionEnd=pos+1;
          ta.focus();
        });
      },
      onOk:()=>{state.headers[key]=document.getElementById('hi').value.trim();pushHistory()}
    });
  }}
  document.querySelector('[data-hdr="X"]').addEventListener('click',headerPromptSimple('X','X: Numéro'));
  document.querySelector('[data-hdr="T"]').addEventListener('click',headerPromptMulti('T','Titre'));
  document.querySelector('[data-hdr="C"]').addEventListener('click',headerPromptMulti('C','Compositeur'));
  document.querySelector('[data-hdr="N"]').addEventListener('click',headerPromptMulti('N','Commentaire'));

  // ⭐ Rythme : applique à partir de la mesure active uniquement
  document.querySelector('[data-hdr="M"]').addEventListener('click',()=>{
    function getCurrent(){const cur=meterAt(state.sel.m);const{num,den}=parseMeter(cur);return{n:num,d:den,uD:parseInt(state.pieceUnit.split('/')[1],10)}}
    let st=getCurrent();
    const dV=[1,2,4,8,16];
    const uDs=[1,2,4,8,16,32];
    function controls(){
      return '<div class="mes-active">Mesure active : <b>'+(state.sel.m+1)+'</b></div>'+
        '<div class="stepper-label">Numérateur</div><div class="stepper"><button class="k" id="num-d">−</button><div class="val"><b id="num-v">'+st.n+'</b></div><button class="k" id="num-u">+</button></div>'+
        '<div class="stepper-label">Dénominateur</div><div class="stepper"><button class="k" id="den-d">−</button><div class="val"><b id="den-v">'+st.d+'</b></div><button class="k" id="den-u">+</button></div>'+
        '<div class="stepper-label">Unité L:1/x</div><div class="stepper"><button class="k" id="L-d">−</button><div class="val"><b id="L-v">'+st.uD+'</b></div><button class="k" id="L-u">+</button></div>';
    }
    function rebind(){
      document.getElementById('num-u').addEventListener('click',()=>{st.n=Math.min(16,st.n+1);document.getElementById('num-v').textContent=st.n});
      document.getElementById('num-d').addEventListener('click',()=>{st.n=Math.max(1,st.n-1);document.getElementById('num-v').textContent=st.n});
      document.getElementById('den-u').addEventListener('click',()=>{const i=dV.indexOf(st.d);if(i<dV.length-1){st.d=dV[i+1];document.getElementById('den-v').textContent=st.d}});
      document.getElementById('den-d').addEventListener('click',()=>{const i=dV.indexOf(st.d);if(i>0){st.d=dV[i-1];document.getElementById('den-v').textContent=st.d}});
      document.getElementById('L-u').addEventListener('click',()=>{const i=uDs.indexOf(st.uD);if(i<uDs.length-1){st.uD=uDs[i+1];document.getElementById('L-v').textContent=st.uD}});
      document.getElementById('L-d').addEventListener('click',()=>{const i=uDs.indexOf(st.uD);if(i>0){st.uD=uDs[i-1];document.getElementById('L-v').textContent=st.uD}});
    }
    openPanel({
      title:'Rythme',body:controls(),hideActions:true,extraButtons:['Annuler','Appliquer'],
      onMount:rebind,
      onMeasureChange:()=>{
        st=getCurrent();
        document.getElementById('panel-body').innerHTML=controls()+document.getElementById('panel-body').querySelector('.actions').outerHTML;
        rebind();
        document.getElementById('panel-body').querySelectorAll('[data-extra]').forEach(b=>{
          b.addEventListener('click',()=>{if(cOnExtra)cOnExtra(b.dataset.extra)});
        });
      },
      onExtra:(w)=>{
        if(w==='Annuler'){closePanel();return}
        if(state.sel.m===0){
          state.pieceMeter=st.n+'/'+st.d;
          state.pieceUnit='1/'+st.uD;
          delete state.timeChanges[0];
          rebuildMeasures();
        } else {
          state.pieceUnit='1/'+st.uD;
          state.timeChanges[state.sel.m]=st.n+'/'+st.d;
          for(let i=state.sel.m;i<state.measures.length;i++){
            if(i>state.sel.m&&state.timeChanges[i])break;
            state.measures[i]=buildEmptyMeasure(meterAt(i));
          }
          state.sel={m:state.sel.m,s:0};
        }
        cleanupAccidentals();pushHistory();closePanel();render();
      }
    });
  });

  // ⭐ Armure : applique à partir de la mesure active
  document.querySelector('[data-hdr="K"]').addEventListener('click',()=>{
    let sig=keyAt(state.sel.m);
    function controls(){return '<div class="mes-active">Mesure active : <b>'+(state.sel.m+1)+'</b></div>'+
      '<div class="stepper-label">Armure</div><div class="stepper"><button class="k" id="sig-d">♭</button><div class="val"><b id="sig-v">'+keyHumanLabel(sig)+'</b></div><button class="k" id="sig-u">♯</button></div>'}
    function rebind(){
      document.getElementById('sig-u').addEventListener('click',()=>{sig=Math.min(7,sig+1);document.getElementById('sig-v').textContent=keyHumanLabel(sig)});
      document.getElementById('sig-d').addEventListener('click',()=>{sig=Math.max(-7,sig-1);document.getElementById('sig-v').textContent=keyHumanLabel(sig)});
    }
    openPanel({
      title:'Armure',body:controls(),hideActions:true,extraButtons:['Annuler','Appliquer'],
      onMount:rebind,
      onMeasureChange:()=>{
        sig=keyAt(state.sel.m);
        document.getElementById('panel-body').innerHTML=controls()+document.getElementById('panel-body').querySelector('.actions').outerHTML;
        rebind();
        document.getElementById('panel-body').querySelectorAll('[data-extra]').forEach(b=>{
          b.addEventListener('click',()=>{if(cOnExtra)cOnExtra(b.dataset.extra)});
        });
      },
      onExtra:(w)=>{
        if(w==='Annuler'){closePanel();return}
        const startMi=state.sel.m;
        freezeAccidentalsFrom(startMi,sig);
        if(state.sel.m===0){state.pieceKeySig=sig;delete state.keyChanges[0]}
        else state.keyChanges[state.sel.m]=sig;
        cleanupAccidentals();pushHistory();closePanel();render();
      }
    });
  });

  // ⭐ Clé : applique à partir de la mesure active
  document.querySelector('[data-hdr="CLEF"]').addEventListener('click',()=>{
    let pick=clefAt(state.sel.m);
    function controls(){return '<div class="mes-active">Mesure active : <b>'+(state.sel.m+1)+'</b></div>'+
      '<div class="row-grid row-3" id="clef-pick"><button class="k clef-small" data-clef="treble">𝄞</button><button class="k" data-clef="treble8" style="font-size:28px;">Sol-8</button><button class="k clef-small" data-clef="bass">𝄢</button></div>'}
    function rebind(){
      const rf=()=>document.querySelectorAll('#clef-pick .k').forEach(b=>b.classList.toggle('active',b.dataset.clef===pick));
      rf();
      document.querySelectorAll('#clef-pick .k').forEach(b=>b.addEventListener('click',()=>{pick=b.dataset.clef;rf()}));
    }
    openPanel({
      title:'Clé',body:controls(),hideActions:true,extraButtons:['Annuler','Appliquer'],
      onMount:rebind,
      onMeasureChange:()=>{
        pick=clefAt(state.sel.m);
        document.getElementById('panel-body').innerHTML=controls()+document.getElementById('panel-body').querySelector('.actions').outerHTML;
        rebind();
        document.getElementById('panel-body').querySelectorAll('[data-extra]').forEach(b=>{
          b.addEventListener('click',()=>{if(cOnExtra)cOnExtra(b.dataset.extra)});
        });
      },
      onExtra:(w)=>{
        if(w==='Annuler'){closePanel();return}
        if(state.sel.m===0){state.pieceClef=pick;delete state.clefChanges[0]}
        else state.clefChanges[state.sel.m]=pick;
        cleanupAccidentals();pushHistory();closePanel();render();
      }
    });
  });

  function updateBadge(){document.getElementById('ww-tag').textContent=window.innerWidth||0;document.getElementById('wh-tag').textContent=window.innerHeight||0}
  window.addEventListener('resize',updateBadge);updateBadge();

  rebuildMeasures();pushHistory();render();
})();
</script>
