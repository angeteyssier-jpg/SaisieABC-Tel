<style>
  .abc-app, .abc-app * { box-sizing: border-box; min-width: 0; }
  /* Empeche le zoom au double-tap sur tous les elements interactifs */
  .abc-app button, .abc-app .tab, .abc-app .k { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
  .abc-app { width: 100%; max-width: 100%;
    padding: 4px;
    padding-bottom: max(4px, env(safe-area-inset-bottom));
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: #1a1a1a; background: #f5f4ef; border-radius: 8px;
    position: relative; overflow: hidden;
    height: 100vh; height: 100dvh;
    display: flex; flex-direction: column; }
  /* Quand un panel popup est ouvert, on autorise le scroll pour acceder a tout */
  .abc-app.panel-open { overflow-y: auto; height: auto; min-height: 100vh; min-height: 100dvh; display: block; }
  .abc-app.fullscreen { position: fixed; inset: 0; width: 100vw; height: 100vh; height: 100dvh; max-width: none; border-radius: 0; z-index: 9999; overflow-y: auto; }

  /* Tous les blocs gardent leur taille naturelle (boutons cales en bas) */
  .abc-app > .ver-badge, .abc-app > .ctx-card, .abc-app > .nav-bar,
  .abc-app > .tabs, .abc-app > .tab-panel-stack, .abc-app > .panel,
  .abc-app > input { flex: 0 0 auto; }
  /* Seule la carte portee s'etire pour combler l'espace au-dessus des boutons */
  .abc-app > .abc-card { flex: 1 1 0; min-height: 100px;
    display: flex; align-items: stretch; overflow: hidden; }

  /* Stack des tab-panels : tous occupent la meme cellule grid, taille = celle du plus grand */
  .tab-panel-stack { display: grid; }
  .tab-panel-stack > .tab-panel { grid-column: 1; grid-row: 1; }

  .ver-badge { display: flex; justify-content: space-between; align-items: center;
    font-size: 14px; color: #5f5e5a;
    background: #ebe9e0; padding: 5px 10px; border-radius: 6px; margin-bottom: 5px; }
  .ver-badge b { color: #1a1a1a; font-weight: 700; }

  .abc-card { background: #ffffff; border: 1px solid #d8d6ce; border-radius: 6px; padding: 4px; margin-bottom: 6px; }
  /* La portee remplit dynamiquement la zone disponible au-dessus des boutons */
  .score-wrap { width: 100%; height: 100%; min-height: 0; }
  .score-wrap svg { width: 100%; height: 100%; display: block; }

  .ctx-card { background: #ebe9e0; border: 1px solid #d8d6ce; border-radius: 8px;
    padding: 5px 8px; margin-bottom: 4px;
    font-size: 28px; color: #1a1a1a; line-height: 1.15; font-weight: 700; }
  .ctx-card .line-small { font-size: 18px; font-weight: 700; margin-top: 3px; }
  .ctx-card b { color: #185fa5; font-weight: 700; }

  .abc-app button.k { display: flex; align-items: center; justify-content: center; gap: 6px;
    width: 100%; height: 72px; padding: 0 4px;
    background: #ffffff; border: 2px solid #b4b2a9; border-radius: 12px;
    font-family: inherit; font-size: 50px; font-weight: 700; color: #1a1a1a;
    cursor: pointer; text-align: center; line-height: 1;
    -webkit-tap-highlight-color: transparent; -webkit-appearance: none; appearance: none;
    min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .abc-app button.k:active { background: #e8e6df; }
  .abc-app button.k:disabled { color: #bbb8a8; background: #f3f1ea; cursor: not-allowed; }
  .abc-app button.k.active { background: #cfe5fa; border-color: #185fa5; color: #0c447c; }
  .abc-app button.k.symbol { font-size: 50px; font-family: "Times New Roman", serif; }
  .abc-app button.k.primary { background: #185fa5; border-color: #185fa5; color: #ffffff; }
  .abc-app button.k.clef-small { font-size: 36px; }

  .note-btn { flex-direction: column !important; gap: 0 !important; height: 98px !important; }
  .note-btn .lbl { font-size: 40px; font-weight: 700; line-height: 1; }
  .note-btn .sub { font-size: 40px; font-weight: 400; color: #5f5e5a; line-height: 1; }

  .row-grid { display: grid; gap: 4px; margin-bottom: 4px; }
  .row-2 { grid-template-columns: 1fr 1fr; }
  .row-3 { grid-template-columns: 1fr 1fr 1fr; }
  .row-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
  .row-5 { grid-template-columns: repeat(5, 1fr); }
  .row-6 { grid-template-columns: repeat(6, 1fr); }
  .row-7 { grid-template-columns: repeat(7, 1fr); }

  /* Navigation : 6 boutons */
  .nav-bar { display: grid; grid-template-columns: repeat(6, 1fr);
    gap: 4px; margin-bottom: 4px;
    background: #fdf1d8; border: 2px solid #e2b840; padding: 4px;
    border-radius: 10px; }
  .nav-bar .k { background: #fffaee; border-color: #e2b840;
    font-size: 40px; height: 58px; padding: 0; }
  .nav-bar .k.dbtxt { font-size: 40px; font-weight: 700; }
  .nav-bar .k:active { background: #f5e2a8; }

  .tabs { display: grid; grid-template-columns: repeat(5, 1fr) 0.55fr;
    gap: 3px; margin-bottom: 4px;
    border-bottom: 2px solid #b4b2a9; }
  .tab { height: 72px;
    background: #ebe9e0; border: 2px solid #b4b2a9; border-bottom: none;
    border-radius: 10px 10px 0 0;
    font-family: inherit; font-size: 32px; font-weight: 700; color: #5f5e5a;
    cursor: pointer; padding: 0 2px;
    -webkit-tap-highlight-color: transparent;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; }
  .tab.active { background: #ffffff; color: #0c447c; border-color: #185fa5;
    margin-bottom: -2px; padding-bottom: 2px; }
  .tab:active { background: #d6d4cb; }
  /* Tous les tab-panels sont dans la grille, l'inactif est invisible mais conserve sa place */
  .tab-panel { visibility: hidden; pointer-events: none; }
  .tab-panel.active { visibility: visible; pointer-events: auto; }
  /* En onglet Play, la portee s'etend deja naturellement grace au flex */

  .oct-row, .control-row { display: grid; grid-template-columns: 1fr 1.4fr 1fr;
    gap: 6px; margin-bottom: 4px;
    background: #ebe9e0; padding: 4px; border-radius: 10px;

  .oct-row .label, .control-row .label { font-size: 50px; color: #1a1a1a; text-align: center; font-weight: 700; }

  /* Ligne transposer */
  .transpose-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 4px;
    background: #ebe9e0; padding: 4px; border-radius: 10px; align-items: center; }
  .transpose-row .label { font-size: 38px; color: #1a1a1a; text-align: center; font-weight: 700; }

  .panel { background: #e6f1fb; border: 2px solid #378add; border-radius: 12px;
    padding: 8px; margin-bottom: 8px; display: none; }
  .panel.open { display: block; }
  .panel .title-row { display: flex; align-items: center; justify-content: space-between;

  .panel .title { font-size: 50px; color: #0c447c; font-weight: 700; }
  .panel .title-mes { font-size: 50px; color: #185fa5; font-weight: 700; }
  .panel .row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .panel input, .panel textarea { flex: 1; min-height: 72px; font-family: inherit;

  .panel textarea { width: 100%; min-height: 240px; line-height: 1.2; }

  .panel .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }

  .panel .actions.four { grid-template-columns: 1fr 1fr 1fr 1fr; }
  .panel .actions .k { width: 100% !important; padding: 0 8px !important;

  .panel small { display: block; color: #5f5e5a; font-size: 24px;

  .panel .save-list { max-height: 320px; overflow-y: auto;

  .panel .save-list .item { padding: 16px 14px; border-bottom: 1px solid #ebe9e0;

  .panel .mes-active { font-size: 32px; color: #0c447c; font-weight: 700;

  .chord-input { width: 100%; min-height: 72px; font-family: inherit;

</style>

  // Boutons accord : ajoutent leur texte au champ
  const CHORD_BTNS=['#','b','m','Maj','2','4','5','6','7','9','11','13','sus','dim','aug','add','/'];

      let slurLast=null;
      // Liaison "entrante" : si la derniere note avant lsm avait tieToNext, on retiendra la premiere note pour dessiner un demi-arc
      let pendingIncomingTie=false;
      function handleSlur(prevHadSlur,cx,y,thisHasSlur){
        if(prevHadSlur){ if(!slurStart)slurStart=slurLast||{cx,y}; slurLast={cx,y}; }
        else { if(slurStart&&slurLast){sP.push({fromCx:slurStart.cx,fromY:slurStart.y,toCx:slurLast.cx,toY:slurLast.y})} slurStart=null;slurLast={cx,y}; }
        if(thisHasSlur&&!slurStart)slurStart={cx,y};
      }
      if(lsm>0){
        // Chercher la derniere note de la mesure precedente
        const prevM=state.measures[lsm-1];
        if(prevM){
          for(let k=prevM.length-1;k>=0;k--){
            const s=prevM[k];
            if(s.type==='note'){if(s.tieToNext)pendingIncomingTie=true;break}
          }
        }
      }
      for(let _ii=0;_ii<measOfLine.length;_ii++){
        const mIdx=measOfLine[_ii];
        const i=_ii;
        if(state.measures[mIdx]===undefined)continue;
        const xL=LEFT_PAD+xLofM[mIdx];
        const measureW=wOfM[mIdx];
        const xR=xL+measureW;
        // Reprises et voltas
        const r=state.repeats[mIdx];
        if(r){
          if(r.start){
            svg+='<line x1="'+(xL+2)+'" y1="'+staffTop+'" x2="'+(xL+2)+'" y2="'+(staffTop+4*LINE_GAP)+'" stroke="'+ink+'" stroke-width="2"/>';
            svg+='<circle cx="'+(xL+6)+'" cy="'+(staffTop+1.5*LINE_GAP)+'" r="1.1" fill="'+ink+'"/>';
            svg+='<circle cx="'+(xL+6)+'" cy="'+(staffTop+2.5*LINE_GAP)+'" r="1.1" fill="'+ink+'"/>';
          }
          if(r.end){
            svg+='<circle cx="'+(xR-6)+'" cy="'+(staffTop+1.5*LINE_GAP)+'" r="1.1" fill="'+ink+'"/>';
            svg+='<circle cx="'+(xR-6)+'" cy="'+(staffTop+2.5*LINE_GAP)+'" r="1.1" fill="'+ink+'"/>';
            svg+='<line x1="'+(xR-2)+'" y1="'+staffTop+'" x2="'+(xR-2)+'" y2="'+(staffTop+4*LINE_GAP)+'" stroke="'+ink+'" stroke-width="2"/>';
          }
          if(r.volta){
            const yV=staffTop-11;
            svg+='<line x1="'+(xL+2)+'" y1="'+yV+'" x2="'+(xR-2)+'" y2="'+yV+'" stroke="'+ink+'" stroke-width="0.8"/>';
            svg+='<line x1="'+(xL+2)+'" y1="'+yV+'" x2="'+(xL+2)+'" y2="'+(yV+4)+'" stroke="'+ink+'" stroke-width="0.8"/>';
            svg+='<text x="'+(xL+5)+'" y="'+(yV+6)+'" font-size="8" fill="'+ink+'" font-weight="bold">'+r.volta+'.</text>';
          }
        }
        const m=state.measures[mIdx];
        const lC=clefAt(mIdx),lM=meterAt(mIdx);
        // Point 1 : afficher changements (cle/armure/rythme) AU DEBUT de la mesure qui change
        // (pour les mesures qui ne sont pas en debut de ligne — la 1ere de ligne montre deja l'etat dans l'en-tete)
        let changeOffset=0;
        if(i>0){
          const prevClef=clefAt(mIdx-1);
          const prevKey=keyAt(mIdx-1);
          const prevMeter=meterAt(mIdx-1);
          const hasClefChange=lC!==prevClef;
          const hasKeyChange=keyAt(mIdx)!==prevKey;
          const hasMeterChange=lM!==prevMeter;
          if(hasClefChange||hasKeyChange||hasMeterChange){
            let cx=xL+3;
            // Cle (en premier, juste apres la barre)
            if(hasClefChange){
              cx+=4;
              if(lC==='bass'){
                svg+='<text x="'+cx+'" y="'+(staffTop+2.6*LINE_GAP+5)+'" font-size="22" font-family="serif" fill="'+ink+'" opacity="0.85" text-anchor="middle">𝄢</text>';
              } else {
                svg+='<text x="'+cx+'" y="'+(staffTop+2.4*LINE_GAP+5)+'" font-size="26" font-family="serif" fill="'+ink+'" opacity="0.85" text-anchor="middle">𝄞</text>';
                if(lC==='treble8')svg+='<text x="'+(cx+3)+'" y="'+(staffTop+4.6*LINE_GAP+5)+'" font-size="7" fill="'+ink+'" opacity="0.85" text-anchor="middle">8</text>';
              }
              cx+=8;
            }
            // Armure
            if(hasKeyChange){
              const accs=keySigAccidentals(keyAt(mIdx),lC);
              accs.forEach(a=>{
                const ky=noteY(staffTop,a.step,lC)+4;
                svg+='<text x="'+cx+'" y="'+ky+'" font-size="12" font-family="serif" fill="'+ink+'">'+a.sym+'</text>';
                cx+=6;
              });
              cx+=2;
            }
            // Rythme
            if(hasMeterChange){
              const{num,den}=parseMeter(lM);
              cx+=4;
              svg+='<text x="'+cx+'" y="'+(staffTop+1.7*LINE_GAP+1)+'" font-size="12" font-family="serif" font-weight="bold" fill="'+ink+'" text-anchor="middle">'+num+'</text>';
              svg+='<text x="'+cx+'" y="'+(staffTop+3.6*LINE_GAP+1)+'" font-size="12" font-family="serif" font-weight="bold" fill="'+ink+'" text-anchor="middle">'+den+'</text>';
              cx+=8;
            }
            // Espace consomme depuis xL
            changeOffset=cx-xL;
          }
        }
        const x0=xL+10+changeOffset;
        const sW=(measureW-14-changeOffset)/Math.max(m.length,1);
        const bg=computeBeamGroups(m,lM);
        const sTG={};
        bg.forEach((g,gi)=>{g.forEach(si=>sTG[si]={gIdx:gi,group:g})});
        const mS=clefRefStep(lC)+4;
        const gSD=bg.map(g=>{
          let s=0;
          for(const idx of g){const t=m[idx];s+=stepIndex(t.note,t.octave)}
          return(s/g.length)<mS?'up':'down';
        });
        const gBD=bg.map((g,gi)=>{
          const su=gSD[gi]==='up';
          let eY=su?Infinity:-Infinity;
          const sX=[];
          g.forEach(si=>{
            const t=m[si];
            const cx=x0+si*sW+sW/2;
            const sx=su?cx+3.3:cx-3.3;
            const hY=noteY(staffTop,stepIndex(t.note,t.octave),lC);
            const nT=su?hY-19:hY+19;
            if(su)eY=Math.min(eY,nT);else eY=Math.max(eY,nT);
            sX.push({slotIdx:si,sx,headY:hY});
          });
          return{stemUp:su,beamY:eY,stems:sX};
        });
        m.forEach((t,si)=>{
          const cx=x0+si*sW+sW/2;
          // Rectangle cliquable invisible sur toute la zone du slot (selection par clic)
          svg+='<rect x="'+(cx-sW/2)+'" y="'+staffTop+'" width="'+sW+'" height="'+(4*LINE_GAP+20)+'" fill="transparent" pointer-events="all" data-m="'+mIdx+'" data-s="'+si+'" style="cursor:pointer"/>';
          const iS=(mIdx===selM&&si===state.sel.s);
          const cl=iS?sel:ink;
          if(t.chord&&state.viewFlags.chords)svg+='<text x="'+cx+'" y="'+(staffTop-3)+'" font-size="9" font-weight="bold" fill="'+ink+'" text-anchor="middle">'+escXml(t.chord)+'</text>';
          if(t.text&&state.viewFlags.text)svg+='<text x="'+cx+'" y="'+(staffTop-(t.chord&&state.viewFlags.chords?13:3))+'" font-size="8" font-style="italic" fill="'+ink+'" text-anchor="middle">'+escXml(t.text)+'</text>';
          if(t.orn&&t.orn.length){
            const ot=t.orn.filter(o=>o!=='.').map(o=>{if(o==='~')return'tr';if(o==='T')return'tr';if(o==='M')return'∼';if(o==='P')return'∿';if(o==='H')return'𝄐';if(o==='L')return'>';if(o==='u')return'⋁';if(o==='v')return'⊓';if(o==='O')return'⊕';return o}).join(' ');
            if(ot)svg+='<text x="'+cx+'" y="'+(staffTop-12)+'" font-size="8" font-style="italic" fill="'+ink+'" text-anchor="middle">'+ot+'</text>';
          }
          if(t.type==='note'){
            const gp=sTG[si];
            if(gp){
              const gi=gp.gIdx;
              const su=gSD[gi]==='up';
              const bY=gBD[gi].beamY;
              const dr=drawNoteHead(t,cx,cl,lC,false,su,staffTop,accToDrawFor(m,si,keyAt(mIdx)));
              const sx=dr.stemX,hY=dr.headY;
              svg+=dr.svg;
              svg+=staccatoDot(t,cx,dr.headY,su,cl);
              svg+='<line x1="'+sx+'" y1="'+hY+'" x2="'+sx+'" y2="'+bY+'" stroke="'+cl+'" stroke-width="0.8"/>';
              if(iS)svg+='<circle cx="'+cx+'" cy="'+dr.headY+'" r="8" fill="none" stroke="'+sel+'" stroke-width="0.7" opacity="0.4"/>';
              if(iS&&state._chordEditMode&&!state._chordAddPending){const ac=activeChordNote(t);if(ac){const ay=noteY(staffTop,stepIndex(ac.note,ac.octave),lC);svg+='<circle cx="'+cx+'" cy="'+ay+'" r="5" fill="none" stroke="#d11" stroke-width="1.4"/>';}}
              if(pS&&pS.t.tieToNext)tP.push({fromCx:pS.cx,fromY:pS.y,toCx:cx,toY:dr.headY});
              if(pendingIncomingTie){tP.push({fromCx:LEFT_PAD-6,fromY:dr.headY,toCx:cx,toY:dr.headY,partial:'in'});pendingIncomingTie=false}
              handleSlur(!!(pS&&pS.t.slurToNext),cx,dr.headY,!!t.slurToNext);
              pS={t,cx,y:dr.headY};
            } else {
              const st=stepIndex(t.note,t.octave);
              const su=st<mS;
              const dr=drawNoteHead(t,cx,cl,lC,true,su,staffTop,accToDrawFor(m,si,keyAt(mIdx)));
              svg+=dr.svg;
              svg+=staccatoDot(t,cx,dr.headY,su,cl);
              if(iS)svg+='<circle cx="'+cx+'" cy="'+dr.headY+'" r="8" fill="none" stroke="'+sel+'" stroke-width="0.7" opacity="0.4"/>';
              if(iS&&state._chordEditMode&&!state._chordAddPending){const ac=activeChordNote(t);if(ac){const ay=noteY(staffTop,stepIndex(ac.note,ac.octave),lC);svg+='<circle cx="'+cx+'" cy="'+ay+'" r="5" fill="none" stroke="#d11" stroke-width="1.4"/>';}}
              if(pS&&pS.t.tieToNext)tP.push({fromCx:pS.cx,fromY:pS.y,toCx:cx,toY:dr.headY});
              if(pendingIncomingTie){tP.push({fromCx:LEFT_PAD-6,fromY:dr.headY,toCx:cx,toY:dr.headY,partial:'in'});pendingIncomingTie=false}
              handleSlur(!!(pS&&pS.t.slurToNext),cx,dr.headY,!!t.slurToNext);
              pS={t,cx,y:dr.headY};
            }
          } else {
            const dr=drawRest(t,cx,cl,staffTop);
            svg+=dr.svg;
            if(iS)svg+='<circle cx="'+cx+'" cy="'+dr.headY+'" r="8" fill="none" stroke="'+sel+'" stroke-width="0.7" opacity="0.4"/>';
            // Silences cassent les liaisons
            if(slurStart&&slurLast){sP.push({fromCx:slurStart.cx,fromY:slurStart.y,toCx:slurLast.cx,toY:slurLast.y})}
            slurStart=null;slurLast=null;
            pS=null;
          }
          if(t.tuplet&&(si===0||!m[si-1]||!m[si-1].tuplet||m[si-1].tupletId!==t.tupletId)){
            const gs=[];
            for(let j=si;j<m.length&&m[j].tupletId===t.tupletId&&gs.length<t.tuplet;j++)gs.push(j);
            if(gs.length>0){
              const cF=x0+gs[0]*sW+sW/2;
              const cL=x0+gs[gs.length-1]*sW+sW/2;
              const cM=(cF+cL)/2;
              // Crochet du n-uplet (au-dessus de la portee)
              const yT=staffTop-6;
              svg+='<line x1="'+cF+'" y1="'+yT+'" x2="'+cL+'" y2="'+yT+'" stroke="'+ink+'" stroke-width="0.7"/>';
              svg+='<line x1="'+cF+'" y1="'+yT+'" x2="'+cF+'" y2="'+(yT+3)+'" stroke="'+ink+'" stroke-width="0.7"/>';
              svg+='<line x1="'+cL+'" y1="'+yT+'" x2="'+cL+'" y2="'+(yT+3)+'" stroke="'+ink+'" stroke-width="0.7"/>';
              svg+='<text x="'+cM+'" y="'+(yT-1)+'" font-size="8" font-style="italic" fill="'+ink+'" text-anchor="middle" font-weight="bold">'+t.tuplet+'</text>';
            }
          }
          if(si===0){
            if(state.viewFlags.measureNums)svg+='<text x="'+(xL+2)+'" y="'+(staffTop-3)+'" font-size="8" fill="'+dim+'">'+String(mIdx+1)+'</text>';
            if(state.viewFlags.parts&&state.parts&&state.parts[mIdx])svg+='<text x="'+(xL+2)+'" y="'+(staffTop-14)+'" font-size="11" font-weight="bold" fill="'+ink+'">'+escXml(state.parts[mIdx])+'</text>';
          }
          if(t.type==='note'&&t.lyric&&state.viewFlags.lyrics){svg+='<text x="'+cx+'" y="'+(staffTop+4*LINE_GAP+12)+'" font-size="8" fill="'+ink+'" text-anchor="middle">'+escXml(t.lyric.replace(/_/g,''))+'</text>';}
        });
        // Beams pour cette mesure : niveau 1 complet, niveaux 2/3 partiels selon notes
        bg.forEach((g,gi)=>{
          const d=gBD[gi];const su=d.stemUp;const bY=d.beamY;const sts=d.stems;
          const bT=2.5;
          const dyO=su?bT+0.8:-(bT+0.8);
          // Niveau de chaque note du groupe (1=croche, 2=double, 3=triple)
          // On utilise la duree de base (sans point ni n-uplet) pour decider le nombre de barres
          const lvls=g.map(idx=>{
            const bD=m[idx].dur;
            if(bD<=0.125+1e-6)return 3;
            if(bD<=0.25+1e-6)return 2;
            return 1;
          });
          // sX = position x de chaque hampe (ordre = ordre du groupe)
          const xPos=sts.map(s=>s.sx);
          const xS=xPos[0],xE=xPos[xPos.length-1];
          // Barre principale (niveau 1) : toute la largeur du groupe
          {
            const yy=bY;
            svg+='<rect x="'+xS+'" y="'+(yy-bT/2)+'" width="'+(xE-xS)+'" height="'+bT+'" fill="'+ink+'"/>';
          }
          // Niveaux 2 et 3 : segments entre notes consecutives de meme niveau, demi-barres pour les isolees
          for(let lvl=2;lvl<=3;lvl++){
            const yy=bY+(lvl-1)*dyO;
            // 1) Segments connectes : entre i et i+1 si les deux ont niveau >= lvl
            const connected=new Array(xPos.length).fill(false);
            for(let i=0;i<xPos.length-1;i++){
              if(lvls[i]>=lvl&&lvls[i+1]>=lvl){
                svg+='<rect x="'+xPos[i]+'" y="'+(yy-bT/2)+'" width="'+(xPos[i+1]-xPos[i])+'" height="'+bT+'" fill="'+ink+'"/>';
                connected[i]=true;connected[i+1]=true;
              }
            }
            // 2) Demi-barres pour les notes de niveau >= lvl qui ne sont pas connectees
            for(let i=0;i<xPos.length;i++){
              if(lvls[i]>=lvl&&!connected[i]){
                // Longueur de demi-barre : ~40% de la distance au voisin du meme groupe
                let halfLen;
                if(i===0){
                  // Demi-barre vers la droite
                  halfLen=Math.max(3,(xPos[1]-xPos[0])*0.4);
                  svg+='<rect x="'+xPos[i]+'" y="'+(yy-bT/2)+'" width="'+halfLen+'" height="'+bT+'" fill="'+ink+'"/>';
                } else {
                  // Demi-barre vers la gauche
                  halfLen=Math.max(3,(xPos[i]-xPos[i-1])*0.4);
                  svg+='<rect x="'+(xPos[i]-halfLen)+'" y="'+(yy-bT/2)+'" width="'+halfLen+'" height="'+bT+'" fill="'+ink+'"/>';
                }
              }
            }
          }
        });
      }
      // Liaison sortante : si la derniere note de la ligne a tieToNext
      if(pS&&pS.t.tieToNext){
        tP.push({fromCx:pS.cx,fromY:pS.y,toCx:SCORE_W-RIGHT_PAD+4,toY:pS.y,partial:'out'});
      }
      if(slurStart&&slurLast&&slurStart.cx!==slurLast.cx){sP.push({fromCx:slurStart.cx,fromY:slurStart.y,toCx:slurLast.cx,toY:slurLast.y})}
      slurStart=null;slurLast=null;
      // Dessiner toutes les liaisons de durée (tie)
      tP.forEach(tp=>{
        const cx=(tp.fromCx+tp.toCx)/2;
        const cy=((tp.fromY+tp.toY)/2)+6;
        svg+='<path d="M '+(tp.fromCx+3)+' '+(tp.fromY+3)+' Q '+cx+' '+cy+' '+(tp.toCx-3)+' '+(tp.toY+3)+'" stroke="'+ink+'" stroke-width="0.9" fill="none"/>';
      });
      // Dessiner les slurs (phrasé) : un seul arc par chaîne, au-dessus des têtes
      sP.forEach(sp=>{
        const cx=(sp.fromCx+sp.toCx)/2;
        const topY=Math.min(sp.fromY,sp.toY);
        const cy=topY-9;
        svg+='<path d="M '+(sp.fromCx+1)+' '+(sp.fromY-4)+' Q '+cx+' '+cy+' '+(sp.toCx-1)+' '+(sp.toY-4)+'" stroke="'+ink+'" stroke-width="1.1" fill="none" stroke-linecap="round"/>';
      });
    }
    svg+='</svg>';
    document.getElementById('score').innerHTML=svg;
  }

  function selectedSlot(){const m=state.measures[state.sel.m];return m?(m[state.sel.s]||null):null}

    const tieBtn=document.getElementById('btn-tie');

    const rA=state.repeats[state.sel.m];

    const partV=state.parts&&state.parts[state.sel.m];const pvEl=document.getElementById('part-val');if(pvEl)pvEl.textContent=partV||'—';const pBtn=document.getElementById('btn-part');if(pBtn)pBtn.classList.toggle('active',!!partV);

  // ===== Mode édition d'accord (notes empilées) — porté de la version PC =====
  // Liste triée (grave->aigu) des notes de l'accord du slot
  function chordList(sl){
    if(!sl||sl.type!=='note')return [];
    const arr=[{note:sl.note,octave:sl.octave,acc:sl.acc||'',_main:true}];
    if(sl.stack)sl.stack.forEach((x,i)=>arr.push({note:x.note,octave:x.octave,acc:x.acc||'',_main:false,_si:i}));

  }
  // Réécrit le slot à partir d'une liste de notes (la plus grave devient la note principale)
  function chordWrite(sl,list){
    if(!list.length)return;
    const sig=keyAt(state.sel.m);
    const sorted=list.slice().sort((a,b)=>midiOfNote(a.note,a.octave,a.acc||'',sig)-midiOfNote(b.note,b.octave,b.acc||'',sig));
    const base=sorted[0];
    sl.note=base.note;sl.octave=base.octave;if(base.acc)sl.acc=base.acc;else delete sl.acc;
    const rest=sorted.slice(1);

    else delete sl.stack;
  }

    }

  function findPreviousNote(mi,si){

  let nextTupletId=1;
  function applyTuplet(n,unitDur){
    // n-uplet de unitDur occupe l'espace de (n-1) notes de unitDur (règle 3:2 → 3 notes dans l'espace de 2)
    // Plus généralement : selon ratio implicite ABC (n:2 pour n impair, n:3 pour 6, etc.) — on garde 3:2 simple
    const ratio=2; // 3:2 → l'espace est de 2 unitDur
    const totalSpace=ratio*unitDur;
    const m=state.measures[state.sel.m];
    const idx=state.sel.s;
    const meter=meterAt(state.sel.m);
    const{den}=parseMeter(meter);
    const beat=4/den;
    const cap=measureCapacity(meter);
    // Calculer la position courante (offset)
    let offset=0;for(let i=0;i<idx;i++)offset+=effDur(m[i]);
    // Si l'espace disponible jusqu'à fin de mesure < totalSpace, on tronque (on garde le bouton désactivé sinon)
    const available=cap-offset;
    if(available<totalSpace-1e-6){alert('Pas assez de place dans la mesure pour ce n-uplet');return}
    // Identifiant unique pour ce groupe de n-uplet
    const tid=nextTupletId++;
    const activeSlot=m[idx];
    const isRest=(activeSlot.type==='rest');
    const newSlots=[];
    for(let i=0;i<n;i++){
      if(i===0){
        if(isRest){newSlots.push({type:'rest',dur:unitDur,dot:false,tuplet:n,tupletId:tid})}
        else{
          newSlots.push({type:'note',note:activeSlot.note,octave:activeSlot.octave,dur:unitDur,dot:false,acc:activeSlot.acc||'',tuplet:n,tupletId:tid});
        }
      } else {
        newSlots.push({type:'rest',dur:unitDur,dot:false,tuplet:n,tupletId:tid});
      }
    }
    // Consommer totalSpace à partir de idx (effacer/raccourcir les slots existants)
    let consumed=0;
    let cursor=idx;
    const eps=1e-6;
    while(consumed<totalSpace-eps&&cursor<m.length){
      const s=m[cursor];
      const d=effDur(s);
      if(consumed+d<=totalSpace+eps){
        consumed+=d;
        m.splice(cursor,1);
      } else {
        // découper le slot en deux : ce qu'on consomme + ce qui reste
        const remaining=d-(totalSpace-consumed);
        // remplacer ce slot par un silence (ou la note tronquée) à la durée restante
        const offsetAfter=offset+totalSpace;
        const pieces=splitDurationByBeat(offsetAfter,remaining,beat);
        const tail=pieces.map(p=>Object.assign({},s,{dur:p.dur,dot:p.dot}));
        m.splice(cursor,1,...tail);
        consumed=totalSpace;
        break;
      }
    }
    // Insérer les nouveaux slots à idx
    m.splice(idx,0,...newSlots);
    // Truncate/compléter la mesure
    truncateMeasureToCapacity(state.sel.m,cap);
    pushHistory();render();
  }

  // === Transformations rythmiques globales (toute la partition) ===
  // Helper : trouve la position de temps de chaque slot dans sa mesure (offset cumule en effDur)
  function slotOffsets(meas){
    const offs=[];let cur=0;
    for(let i=0;i<meas.length;i++){offs.push(cur);cur+=effDur(meas[i])}
    return offs;
  }
  // Helper : est-ce que offset 'o' tombe sur un temps (multiple entier de beat) ?
  function onBeat(o,beat){const eps=1e-6;const r=o%beat;return r<eps||Math.abs(r-beat)<eps}

  // Applique une transformation sur toutes les paires (a,b) consecutives qui satisfont matchFn
  // transformFn(meas, idx, beat) modifie meas en place et retourne 'nbReplacedSlots' (combien de slots la nouvelle paire occupe, normalement 2)
  // === Reorganisation rythmique : fusionne notes/silences contigus en valeurs plus simples ===
  // Ex : deux croches identiques liees -> une noire ; deux silences contigus -> un silence plus long.
  function isCleanValue(d){const e=1e-6;const bases=[4,2,1,0.5,0.25,0.125];for(const b of bases){if(Math.abs(d-b)<e)return{dur:b,dot:false};if(Math.abs(d-b*1.5)<e)return{dur:b,dot:true}}return null}
  function consolidateRhythm(silent){
    let count=0;
    state.measures.forEach((meas,mi)=>{
      const meter=meterAt(mi);
      // Bloc rythmique de regroupement : noire en 3/4-4/4, noire pointee (grille croches) en 6/8.
      const beat=4/parseMeter(meter).den;
      // ---- Passe 1 : NOTES liees identiques -> valeurs plus longues (ex. 2 noires liees -> blanche)
      // On autorise les valeurs longues meme a travers les temps (blanche, ronde, pointees).
      let changed=true;
      while(changed){
        changed=false;
        for(let i=0;i<meas.length-1;i++){
          const a=meas[i],b=meas[i+1];
          if(a.tuplet||b.tuplet)continue;
          if(a.type!=='note'||b.type!=='note')continue;
          if(!a.tieToNext)continue;
          if(a.note!==b.note||a.octave!==b.octave||(a.acc||'')!==(b.acc||''))continue;
          if((a.orn&&a.orn.length)||(b.orn&&b.orn.length))continue;
          if(b.chord||b.text)continue;
          const cv=isCleanValue(effDur(a)+effDur(b));
          if(!cv)continue;
          const merged=Object.assign({},a,{dur:cv.dur,dot:cv.dot});
          if(b.tieToNext)merged.tieToNext=true;else delete merged.tieToNext;
          if(b.lyric&&!merged.lyric)merged.lyric=b.lyric;
          if(a._selMark||b._selMark)merged._selMark=true;
          meas.splice(i,2,merged);
          count++;changed=true;break;
        }
      }
      // ---- Passe 2 : SILENCES -> recanonisation par plage, exactement comme une mesure neuve.
      // On detecte chaque plage continue de silences "simples" (sans ornement/accord/texte)
      // et on la remplace par la decomposition canonique splitDurationByBeat(offset,duree,beat).
      let i=0;
      while(i<meas.length){
        const s=meas[i];
        const simpleRest=(x)=>x&&x.type==='rest'&&!x.tuplet&&!(x.orn&&x.orn.length)&&!x.chord&&!x.text;
        if(!simpleRest(s)){i++;continue}
        // offset de debut de la plage
        const offs=slotOffsets(meas);
        const startOff=offs[i];
        let j=i,total=0,hadMark=false;
        while(j<meas.length&&simpleRest(meas[j])){total+=effDur(meas[j]);if(meas[j]._selMark)hadMark=true;j++}
        // recanoniser [i, j) si plus d'un silence OU si le decoupage canonique differe
        const pieces=splitDurationByBeat(startOff,total,beat).map(p=>({type:'rest',dur:p.dur,dot:!!p.dot}));
        // ne remplacer que si ca change vraiment (evite boucle/inutile)
        const sameLen=(j-i)===pieces.length;
        let identical=sameLen;
        if(sameLen){for(let k=0;k<pieces.length;k++){const o=meas[i+k];if(o.dur!==pieces[k].dur||!!o.dot!==pieces[k].dot){identical=false;break}}}
        if(!identical&&pieces.length){
          if(hadMark)pieces[0]._selMark=true;
          meas.splice(i,j-i,...pieces);
          count++;
          i+=pieces.length;
        } else {
          i=j;
        }
      }
    });
    if(!silent){
      if(count===0){alert('Reorganisation : rien a simplifier');return false}
      pushHistory();render();
    }
    return count>0;
  }
  function applySwingGlobal(matchFn,transformFn,labelForAlert){
    let count=0;
    state.measures.forEach((meas,mi)=>{
      const beat=4/parseMeter(meterAt(mi)).den;
      // Iterer avec un index modifiable (les transformations preservent le nombre de slots)
      let i=0;
      while(i<meas.length-1){
        const offs=slotOffsets(meas);
        if(onBeat(offs[i],beat)&&matchFn(meas,i,beat)){
          transformFn(meas,i,beat);
          count++;
          i+=2;continue;
        }
        i++;
      }
    });
    if(count===0){alert(labelForAlert+' : aucune occurrence trouvee');return false}
    pushHistory();render();return true;
  }

  // 2♪→♪.𝅘𝅥𝅯 : deux notes egales sur un temps → croche pointee + double
  function matchEqualPair(meas,i,beat){
    if(i>=meas.length-1)return false;
    const a=meas[i],b=meas[i+1];
    if(a.tuplet||b.tuplet)return false;
    if(a.dot||b.dot)return false;
    if(Math.abs(a.dur-b.dur)>1e-6)return false;
    // Les deux notes doivent occuper exactement 1 temps (a+b = beat)
    if(Math.abs(2*a.dur-beat)>1e-6)return false;
    return true;
  }
  function grooveDot(){
    applySwingGlobal(matchEqualPair,(meas,i)=>{
      const a=meas[i],b=meas[i+1];
      meas[i]={...a,dur:a.dur,dot:true};
      meas[i+1]={...b,dur:b.dur/2,dot:false};
    },'2♪→♪.𝅘𝅥𝅯');
  }
  function grooveTriplet(){
    applySwingGlobal(matchEqualPair,(meas,i)=>{
      const a=meas[i],b=meas[i+1];
      const tid=nextTupletId++;
      meas[i]={...a,dur:2*a.dur,dot:false,tuplet:3,tupletId:tid};
      meas[i+1]={...b,dur:b.dur,dot:false,tuplet:3,tupletId:tid};
    },'2♪→♩♪³');
  }
  function matchDotPair(meas,i,beat){
    if(i>=meas.length-1)return false;
    const a=meas[i],b=meas[i+1];
    if(a.tuplet||b.tuplet)return false;
    if(!a.dot||b.dot)return false;
    // b = a.dur/2 et total = a.dur*1.5 + a.dur/2 = 2*a.dur = beat
    if(Math.abs(b.dur-a.dur/2)>1e-6)return false;
    if(Math.abs(2*a.dur-beat)>1e-6)return false;
    return true;
  }
  function grooveUndot(){
    applySwingGlobal(matchDotPair,(meas,i)=>{
      const a=meas[i],b=meas[i+1];
      meas[i]={...a,dur:a.dur,dot:false};
      meas[i+1]={...b,dur:a.dur,dot:false};
    },'♪.𝅘𝅥𝅯→2♪');
  }

  // ♩♪³→2♪ : triolet noire+croche sur un temps → 2 croches egales
  function matchTripletPair(meas,i,beat){
    if(i>=meas.length-1)return false;
    const a=meas[i],b=meas[i+1];
    if(a.tuplet!==3||b.tuplet!==3||a.tupletId!==b.tupletId)return false;
    if(Math.abs(a.dur-2*b.dur)>1e-6)return false;
    // effDur total = 2*b (= beat normalement)
    if(Math.abs(2*b.dur-beat)>1e-6)return false;
    return true;
  }
  function grooveUntriplet(){
    applySwingGlobal(matchTripletPair,(meas,i)=>{
      const a=meas[i],b=meas[i+1];
      const na={...a,dur:b.dur,dot:false};delete na.tuplet;delete na.tupletId;
      const nb={...b,dur:b.dur,dot:false};delete nb.tuplet;delete nb.tupletId;
      meas[i]=na;meas[i+1]=nb;
    },'♩♪³→2♪');
  }
  document.getElementById('btn-groove').addEventListener('click',()=>{
    const body='<small>Conversions appliquées à tout le morceau :</small>'+
      '<div class="row-grid" style="margin-top:8px;"><button class="k" id="gv-dot" style="font-size:24px;">2 ♪ égales → ♪. 𝅘𝅥𝅯 (pointé)</button></div>'+
      '<div class="row-grid"><button class="k" id="gv-triplet" style="font-size:24px;">2 ♪ égales → ♩ ♪ en triolet</button></div>'+
      '<div style="height:8px;"></div>'+

  // === Materialisation des alterations implicites avant un decalage ===
  // Pour chaque note dont l'alteration est implicite (heritee de la mesure ou de l'armure),
  // ajoute l'attribut acc explicite. Apres le decalage, cleanupAccidentals retire les redondances.
  function materializeAccidentals(){
    state.measures.forEach((meas,mi)=>{
      const sig=keyAt(mi);
      meas.forEach((slot,si)=>{
        if(slot.type!=='note')return;
        if(slot.acc)return; // deja explicite
        // Chercher s'il y a une alteration anterieure dans la mesure sur meme note+octave
        let priorAcc=null;
        for(let k=si-1;k>=0;k--){
          const p=meas[k];
          if(p.type==='note'&&p.note===slot.note&&p.octave===slot.octave&&p.acc){priorAcc=p.acc;break}
        }
        if(priorAcc!==null){slot.acc=priorAcc;return}
        // Sinon, si l'armure altere cette note, materialiser
        if(sig>0&&SHARP_NOTES.slice(0,sig).includes(slot.note))slot.acc='^';
        else if(sig<0&&FLAT_NOTES.slice(0,-sig).includes(slot.note))slot.acc='_';
      });
    });
  }

  // === Decalage global du morceau a partir de la note selectionnee ===
  function flattenSlots(){
    const out=[]; let absSel=-1;
    state.measures.forEach((m,mi)=>{
      m.forEach((sl,si)=>{
        if(mi===state.sel.m&&si===state.sel.s)absSel=out.length;
        out.push({slot:sl,mIdx:mi,sIdx:si});
      });
    });
    const caps=state.measures.map((_,mi)=>measureCapacity(meterAt(mi)));
    return{slots:out,absSel,caps};
  }
  function rebuildMeasuresFromSlots(slots,caps){
    const result=[];
    let mi=0,used=0,curM=[];
    const eps=1e-6;
    function splitSlot(sl,want){
      const e=effDur(sl);
      if(want>=e-eps)return[sl,null];
      if(!sl.tuplet&&!sl.dot){
        const head={...sl,dur:want};
        const tail={...sl,dur:e-want,dot:false};
        if(sl.type==='note'){
          head.tieToNext=true;
          if(!sl.tieToNext)delete tail.tieToNext;
        }
        return[head,tail];
      }
      if(sl.dot&&!sl.tuplet){
        const head={...sl,dur:want,dot:false};
        const tail={...sl,dur:e-want,dot:false};
        if(sl.type==='note'){
          head.tieToNext=true;
          if(!sl.tieToNext)delete tail.tieToNext;
        }
        return[head,tail];
      }
      return[sl,null];
    }
    for(const item of slots){
      let sl=item.slot;
      while(sl){
        if(mi>=caps.length){sl=null;break;}
        const cap=caps[mi];
        const remain=cap-used;
        const e=effDur(sl);
        if(e<=remain+eps){
          curM.push(sl);used+=e;sl=null;
          if(used>=cap-eps){result.push(curM);curM=[];used=0;mi++}
        } else {
          const[head,tail]=splitSlot(sl,remain);
          curM.push(head);used+=effDur(head);
          if(used>=cap-eps){result.push(curM);curM=[];used=0;mi++}
          sl=tail;
        }
      }
    }
    while(mi<caps.length){
      const cap=caps[mi];
      const remain=cap-used;
      if(remain>eps){
        const beat=4/parseMeter(meterAt(mi)).den;
        const pieces=splitDurationByBeat(used,remain,beat);
        pieces.forEach(p=>curM.push({type:'rest',dur:p.dur,dot:p.dot}));
      }
      result.push(curM);curM=[];used=0;mi++;
    }
    return result;
  }
  // Re-barre une plage de mesures avec une nouvelle capacite, en preservant toutes les notes.
  function rebuildRangeWithCap(slots,newCap){
    const result=[];
    let used=0,curM=[];
    const eps=1e-6;
    function splitSlot(sl,want){
      const e=effDur(sl);
      if(want>=e-eps)return[sl,null];
      if(!sl.tuplet){
        const head={...sl,dur:want,dot:false};
        const tail={...sl,dur:e-want,dot:false};
        if(sl.type==='note'){head.tieToNext=true;if(!sl.tieToNext)delete tail.tieToNext}
        return[head,tail];
      }
      return[sl,null];
    }
    for(const sl0 of slots){
      let sl=sl0;
      while(sl){
        const remain=newCap-used;
        const e=effDur(sl);
        if(e<=remain+eps){
          curM.push(sl);used+=e;sl=null;
          if(used>=newCap-eps){result.push(curM);curM=[];used=0}
        } else {
          const[head,tail]=splitSlot(sl,remain);
          curM.push(head);used+=effDur(head);
          if(used>=newCap-eps){result.push(curM);curM=[];used=0}
          sl=tail;
        }
      }
    }
    if(curM.length>0||used>eps){
      const remain=newCap-used;
      if(remain>eps){
        const{den}=parseMeter(newMeterGlobalTmp);
        const beat=4/den;
        const pieces=splitDurationByBeat(used,remain,beat);
        pieces.forEach(p=>curM.push({type:'rest',dur:p.dur,dot:p.dot}));
      }
      result.push(curM);
    }
    if(result.length===0)result.push([]);
    return result;
  }
  let newMeterGlobalTmp='4/4';
  function applyMeterChangeFromSel(newMeter,newUnit){
    const startM=state.sel.m;
    // Materialiser les alterations implicites avant re-barrage (sinon une note qui change de mesure perd son alteration)
    materializeAccidentals();
    // Frontiere de fin : seulement le prochain CHANGEMENT DE RYTHMIQUE (signature)
    let endM=state.measures.length-1;
    for(let i=startM+1;i<state.measures.length;i++){
      if(state.timeChanges[i]!==undefined){endM=i-1;break}
    }
    // Memoriser l'armure/cle de la 1ere mesure de la plage (a conserver)
    const keyAtStart=state.keyChanges[startM];
    const clefAtStart=state.clefChanges[startM];
    // Aplatir les slots de la plage [startM..endM]
    const flat=[];
    for(let i=startM;i<=endM;i++){for(const s of state.measures[i])flat.push(s)}
    newMeterGlobalTmp=newMeter;
    const newCap=measureCapacity(newMeter);
    const rebuilt=rebuildRangeWithCap(flat,newCap);
    const before=state.measures.slice(0,startM);
    const after=state.measures.slice(endM+1);
    const oldCount=endM-startM+1;
    const newCount=rebuilt.length;
    const delta=newCount-oldCount;
    state.measures=[...before,...rebuilt,...after];
    // Re-barrage : supprimer reprises/voltas de la plage. Pour armure/cle : garder seulement
    // celles de la 1ere mesure (startM), supprimer celles a l'interieur. Decaler ce qui est apres.
    const shiftMapDropInside=(obj,keepStart)=>{
      const out={};
      Object.keys(obj).forEach(k=>{
        const idx=parseInt(k,10);
        if(idx<startM)out[idx]=obj[k];
        else if(idx>endM)out[idx+delta]=obj[k];
        // dans [startM..endM] : supprime (la valeur de startM sera reposee si keepStart)
      });
      return out;
    };
    state.keyChanges=shiftMapDropInside(state.keyChanges);
    state.clefChanges=shiftMapDropInside(state.clefChanges);
    state.repeats=shiftMapDropInside(state.repeats);
    state.timeChanges=shiftMapDropInside(state.timeChanges);
    // Reposer armure/cle sur la 1ere mesure de la plage (si elles existaient)
    if(keyAtStart!==undefined&&startM>0)state.keyChanges[startM]=keyAtStart;
    if(clefAtStart!==undefined&&startM>0)state.clefChanges[startM]=clefAtStart;
    if(startM===0){
      state.pieceMeter=newMeter;
      delete state.timeChanges[0];
    } else {
      state.timeChanges[startM]=newMeter;
    }
    state.pieceUnit=newUnit;
    state.sel={m:startM,s:0};
    cleanupAccidentals();
    pushHistory();render();
  }
  function tupletGroupDur(mi,si){
    const meas=state.measures[mi];const t=meas[si];if(!t||!t.tuplet)return 0;
    let sum=0;
    for(let j=0;j<meas.length;j++){if(meas[j].tuplet&&meas[j].tupletId===t.tupletId)sum+=effDur(meas[j])}
    return sum;
  }
  function tupletBlockingShift(d){
    const eps=1e-6;
    const m0=state.measures[state.sel.m],s0=state.sel.s,t0=m0[s0];
    if(t0&&t0.tuplet){
      const prev=m0[s0-1];
      const atFirst=(s0===0)||!prev||!prev.tuplet||prev.tupletId!==t0.tupletId;
      if(!atFirst)return true;
    }
    const seen={};
    for(let mi=state.sel.m;mi<state.measures.length;mi++){
      const meas=state.measures[mi];
      const startS=(mi===state.sel.m)?state.sel.s:0;
      for(let si=startS;si<meas.length;si++){
        const t=meas[si];
        if(t&&t.tuplet&&!seen[t.tupletId]){
          seen[t.tupletId]=true;
          const gd=tupletGroupDur(mi,si);
          if(gd>d+eps)return true;
        }
      }
    }
    return false;
  }
  function shiftPiece(direction,shiftDur,shiftDot){
    const sl=selectedSlot();if(!sl)return;
    const eshift=shiftDot?shiftDur*1.5:shiftDur;
    if(direction>0){
      if(tupletBlockingShift(eshift)){alert('Décalage impossible : la durée choisie est inférieure à celle d\u2019un n-uplet,\nqui ne peut pas être découpé. Choisissez une durée au moins égale au n-uplet.');return}
    }
    materializeAccidentals();
    const dur=eshift;
    sl._selMark=true;
    const{slots,absSel,caps}=flattenSlots();
    if(absSel<0){delete sl._selMark;return}
    let newFlat;
    if(direction>0){
      const silence={type:'rest',dur:shiftDur,dot:!!shiftDot};
      newFlat=[...slots.slice(0,absSel).map(x=>x.slot),silence,...slots.slice(absSel).map(x=>x.slot)];
      let totalDur=0;for(const s of newFlat)totalDur+=effDur(s);
      let capSum=caps.reduce((a,b)=>a+b,0);
      const lastMeter=meterAt(caps.length-1);
      while(capSum<totalDur-1e-6){
        caps.push(measureCapacity(lastMeter));
        capSum+=caps[caps.length-1];
      }
    } else {
      if(absSel===0){alert('Rien a supprimer avant');delete sl._selMark;return}
      const before=slots.slice(0,absSel).map(x=>x.slot);
      const after=slots.slice(absSel).map(x=>x.slot);
      let toRemove=dur;
      const newBefore=[...before];
      const eps=1e-6;
      while(toRemove>eps&&newBefore.length>0){
        const last=newBefore[newBefore.length-1];
        if(last.tuplet){alert('Decalage gauche bloque par un n-uplet');delete sl._selMark;return}
        const e=effDur(last);
        if(e<=toRemove+eps){newBefore.pop();toRemove-=e}
        else {
          const remain=e-toRemove;
          newBefore[newBefore.length-1]={...last,dur:remain,dot:false};
          toRemove=0;
        }
      }
      newFlat=[...newBefore,...after];
    }
    const rebuilt=rebuildMeasuresFromSlots(newFlat.map(s=>({slot:s})),caps);
    state.measures=rebuilt;
    cleanupAccidentals();
    consolidateRhythm(true);
    let found=null;
    for(let mi=0;mi<state.measures.length&&!found;mi++){
      for(let si=0;si<state.measures[mi].length;si++){
        if(state.measures[mi][si]._selMark){found={m:mi,s:si};break}
      }
    }
    state.measures.forEach(m=>m.forEach(x=>{delete x._selMark}));
    if(found){state.sel.m=found.m;state.sel.s=found.s}
    if(state.sel.m>=state.measures.length)state.sel.m=state.measures.length-1;
    if(state.sel.s>=state.measures[state.sel.m].length)state.sel.s=state.measures[state.sel.m].length-1;
    pushHistory();render();
  }

  // ============ Export MusicXML compresse (.mxl) ============
  function escapeXml(s){return (s+'').replace(/[<>&"']/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&apos;'}[c]))}
  function clefXml(clefName){
    if(clefName==='bass')return '<clef><sign>F</sign><line>4</line></clef>';
    if(clefName==='treble8')return '<clef><sign>G</sign><line>2</line><clef-octave-change>-1</clef-octave-change></clef>';
    return '<clef><sign>G</sign><line>2</line></clef>';
  }
  function keyXml(sig){return '<key><fifths>'+sig+'</fifths><mode>major</mode></key>'}
  function timeXml(meter){const{num,den}=parseMeter(meter);return '<time><beats>'+num+'</beats><beat-type>'+den+'</beat-type></time>'}
  function pitchXml(slot){
    const step=slot.note;
    // MusicXML octave: middle C = 4 (notre octave=0 -> 4 ; +1 -> 5 ; -1 -> 3 ; ...)
    // mais notre octave indique aussi le passage majuscule/minuscule en ABC
    // En interne notre Do octave 0 = C4 en MusicXML
    const oct=4+slot.octave;
    let alter=0;
    if(slot.acc==='^')alter=1;
    else if(slot.acc==='_')alter=-1;
    else if(slot.acc==='=')alter=0;
    let s='<pitch><step>'+step+'</step>';
    if(slot.acc==='^'||slot.acc==='_')s+='<alter>'+alter+'</alter>';
    s+='<octave>'+oct+'</octave></pitch>';
    return s;
  }
  function noteTypeXml(slot){
    // duree visuelle (sans n-uplet)
    const d=nominalDur(slot);
    if(d>=4)return 'whole';
    if(d>=2)return 'half';
    if(d>=1)return 'quarter';
    if(d>=0.5)return 'eighth';
    if(d>=0.25)return '16th';
    return '32nd';
  }
  function buildMusicXml(){
    const DIV=480; // divisions par noire (multiple riche pour gerer les n-uplets)
    let xml='<?xml version="1.0" encoding="UTF-8" standalone="no"?>\n';
    xml+='<!DOCTYPE score-partwise PUBLIC "-//Recordare//DTD MusicXML 3.1 Partwise//EN" "http://www.musicxml.org/dtds/partwise.dtd">\n';
    xml+='<score-partwise version="3.1">\n';
    // Work / identification
    const title=(state.headers.T||'').split('\n')[0]||'Sans titre';
    const composer=(state.headers.C||'').split('\n')[0]||'';
    xml+='<work><work-title>'+escapeXml(title)+'</work-title></work>\n';
    if(composer){
      xml+='<identification><creator type="composer">'+escapeXml(composer)+'</creator></identification>\n';
    }
    xml+='<part-list><score-part id="P1"><part-name>Voix</part-name></score-part></part-list>\n';
    xml+='<part id="P1">\n';
    let prevClef=null,prevKey=null,prevMeter=null;
    state.measures.forEach((meas,mi)=>{
      xml+='<measure number="'+(mi+1)+'">\n';
      const lC=clefAt(mi),lK=keyAt(mi),lM=meterAt(mi);
      // Attributs : divisions au debut, puis clef/key/time si changement ou si mesure 0
      const isFirst=(mi===0);
      const hasClefChange=isFirst||lC!==prevClef;
      const hasKeyChange=isFirst||lK!==prevKey;
      const hasMeterChange=isFirst||lM!==prevMeter;
      if(isFirst||hasClefChange||hasKeyChange||hasMeterChange){
        xml+='<attributes>';
        if(isFirst)xml+='<divisions>'+DIV+'</divisions>';
        if(hasKeyChange)xml+=keyXml(lK);
        if(hasMeterChange)xml+=timeXml(lM);
        if(hasClefChange)xml+=clefXml(lC);
        xml+='</attributes>\n';
      }
      // Reprises
      const r=state.repeats[mi];
      if(r){
        if(r.start)xml+='<barline location="left"><bar-style>heavy-light</bar-style><repeat direction="forward"/></barline>\n';
        if(r.volta)xml+='<barline location="left"><ending number="'+r.volta+'" type="start"/></barline>\n';
      }
      // Notes
      meas.forEach((slot,si)=>{
        // Duree MusicXML = effDur (avec tuplet) * DIV
        const dur=Math.max(1,Math.round(effDur(slot)*DIV));
        xml+='<note>';
        if(slot.type==='rest'){
          xml+='<rest/>';
        } else {
          xml+=pitchXml(slot);
        }
        xml+='<duration>'+dur+'</duration>';
        xml+='<type>'+noteTypeXml(slot)+'</type>';
        if(slot.dot)xml+='<dot/>';
        if(slot.acc==='^'||slot.acc==='_'||slot.acc==='='){
          let accName='';
          if(slot.acc==='^')accName='sharp';
          else if(slot.acc==='_')accName='flat';
          else accName='natural';
          xml+='<accidental>'+accName+'</accidental>';
        }
        // n-uplet
        if(slot.tuplet){
          xml+='<time-modification><actual-notes>'+slot.tuplet+'</actual-notes><normal-notes>2</normal-notes></time-modification>';
        }
        // liaison (tie)
        if(slot.tieToNext){
          xml+='<tie type="start"/>';
        }
        // notations (tie + tuplet + ornaments)
        let nota='';
        if(slot.tieToNext)nota+='<tied type="start"/>';
        if(slot.tuplet){
          // start sur premier slot du groupe, stop sur dernier
          const isFirst=(si===0||!meas[si-1]||meas[si-1].tupletId!==slot.tupletId);
          const isLast=(si===meas.length-1||!meas[si+1]||meas[si+1].tupletId!==slot.tupletId);
          if(isFirst)nota+='<tuplet type="start" bracket="yes"/>';
          if(isLast)nota+='<tuplet type="stop"/>';
        }
        if(slot.orn&&slot.orn.length){
          let orns='';
          slot.orn.forEach(o=>{
            if(o==='~')orns+='<trill-mark/>';else if(o==='T')orns+='<trill-mark/>';
            else if(o==='M')orns+='<turn/>';
            else if(o==='H')nota+='<fermata/>';
            else if(o==='.')nota+='<articulations><staccato/></articulations>';
            else if(o==='L')nota+='<articulations><accent/></articulations>';
          });
          if(orns)nota+='<ornaments>'+orns+'</ornaments>';
        }
        if(slot.chord){
          nota+='<harmony>'+escapeXml(slot.chord)+'</harmony>'; // pas un vrai harmony, juste un texte simple
        }
        if(nota)xml+='<notations>'+nota+'</notations>';
        xml+='</note>\n';
      });
      // Fin de mesure : volta stop / reprise fin
      if(r){
        if(r.volta)xml+='<barline location="right"><ending number="'+r.volta+'" type="stop"/></barline>\n';
        if(r.end)xml+='<barline location="right"><bar-style>light-heavy</bar-style><repeat direction="backward"/></barline>\n';
      }
      xml+='</measure>\n';
      prevClef=lC;prevKey=lK;prevMeter=lM;
    });
    xml+='</part>\n</score-partwise>\n';
    return xml;
  }
  // ============ Encodeur ZIP minimal (stored, sans compression) ============
  // Format ZIP : pour chaque fichier => Local File Header + data + ... + Central Directory + End Of CD
  function crc32(bytes){
    // Table CRC32 calculee a la volee
    let c;
    const table=crc32._t;
    if(!table){
      const t=new Uint32Array(256);
      for(let n=0;n<256;n++){
        c=n;
        for(let k=0;k<8;k++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);
        t[n]=c>>>0;
      }
      crc32._t=t;
    }
    let crc=0xFFFFFFFF;
    for(let i=0;i<bytes.length;i++)crc=(crc>>>8)^crc32._t[(crc^bytes[i])&0xFF];
    return (crc^0xFFFFFFFF)>>>0;
  }
  function strToUint8(s){
    // UTF-8 encoding
    return new TextEncoder().encode(s);
  }
  function makeZip(files){
    // files: [{name, data: Uint8Array}]
    const parts=[];
    const central=[];
    let offset=0;
    const dosTime=0,dosDate=0; // ignore date
    files.forEach(f=>{
      const nameBytes=strToUint8(f.name);
      const crc=crc32(f.data);
      const size=f.data.length;
      // Local File Header
      const lfh=new Uint8Array(30+nameBytes.length);
      const dv=new DataView(lfh.buffer);
      dv.setUint32(0,0x04034b50,true);  // signature
      dv.setUint16(4,20,true);          // version needed
      dv.setUint16(6,0,true);           // flags
      dv.setUint16(8,0,true);           // method 0 = stored
      dv.setUint16(10,dosTime,true);
      dv.setUint16(12,dosDate,true);
      dv.setUint32(14,crc,true);
      dv.setUint32(18,size,true);       // compressed size
      dv.setUint32(22,size,true);       // uncompressed size
      dv.setUint16(26,nameBytes.length,true);
      dv.setUint16(28,0,true);          // extra
      lfh.set(nameBytes,30);
      parts.push(lfh);
      parts.push(f.data);
      // Central Directory record
      const cdr=new Uint8Array(46+nameBytes.length);
      const dv2=new DataView(cdr.buffer);
      dv2.setUint32(0,0x02014b50,true);
      dv2.setUint16(4,20,true);          // version made
      dv2.setUint16(6,20,true);          // version needed
      dv2.setUint16(8,0,true);
      dv2.setUint16(10,0,true);          // method
      dv2.setUint16(12,dosTime,true);
      dv2.setUint16(14,dosDate,true);
      dv2.setUint32(16,crc,true);
      dv2.setUint32(20,size,true);
      dv2.setUint32(24,size,true);
      dv2.setUint16(28,nameBytes.length,true);
      dv2.setUint16(30,0,true);          // extra
      dv2.setUint16(32,0,true);          // comment
      dv2.setUint16(34,0,true);          // disk
      dv2.setUint16(36,0,true);          // internal attrs
      dv2.setUint32(38,0,true);          // external attrs
      dv2.setUint32(42,offset,true);
      cdr.set(nameBytes,46);
      central.push(cdr);
      offset+=lfh.length+size;
    });
    const cdStart=offset;
    let cdSize=0;
    central.forEach(c=>{parts.push(c);cdSize+=c.length;offset+=c.length});
    // End Of Central Directory
    const eocd=new Uint8Array(22);
    const dv3=new DataView(eocd.buffer);
    dv3.setUint32(0,0x06054b50,true);
    dv3.setUint16(4,0,true);
    dv3.setUint16(6,0,true);
    dv3.setUint16(8,files.length,true);
    dv3.setUint16(10,files.length,true);
    dv3.setUint32(12,cdSize,true);
    dv3.setUint32(16,cdStart,true);
    dv3.setUint16(20,0,true);
    parts.push(eocd);
    // Concatener
    let total=0;parts.forEach(p=>total+=p.length);
    const out=new Uint8Array(total);
    let pos=0;parts.forEach(p=>{out.set(p,pos);pos+=p.length});
    return out;
  }
  document.getElementById('btn-export-mxl').addEventListener('click',()=>{
    try{
      const xml=buildMusicXml();
      const containerXml='<?xml version="1.0" encoding="UTF-8"?>\n<container><rootfiles><rootfile full-path="score.xml" media-type="application/vnd.recordare.musicxml"/></rootfiles></container>\n';
      // Note : pour un .mxl strict, "mimetype" doit etre stocke en premier et non compresse.
      // Comme on n'utilise que stored partout, c'est OK.
      const files=[
        {name:'mimetype',data:strToUint8('application/vnd.recordare.musicxml')},
        {name:'META-INF/container.xml',data:strToUint8(containerXml)},
        {name:'score.xml',data:strToUint8(xml)}
      ];
      const zipBytes=makeZip(files);
      const blob=new Blob([zipBytes],{type:'application/vnd.recordare.musicxml'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      const baseName=(state.headers.T&&state.headers.T.trim())||state.openedFileName||'morceau';
      const fn=baseName.replace(/[^a-zA-Z0-9_\-]/g,'_')+'.mxl';
      a.href=url;a.download=fn;
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }catch(e){
      alert('Erreur export MusicXML : '+e.message);
    }
  });

  const panel=document.getElementById('panel');

  const panelCancel=document.getElementById('panel-cancel');
  let cOnOk=null,cOnExtra=null,cOnMeasureChange=null,cShowMes=false;

  function openPanel({title,body,onMount,onOk,hideActions,extraButtons,onExtra,actionsClass,showMes,onMeasureChange}){
    panelTitle.textContent=title;
    cShowMes=!!showMes;
    panelMes.textContent=cShowMes?('Mes '+(state.sel.m+1)):'';
    let eH='';
    if(extraButtons&&extraButtons.length){
      let cls='actions';
      if(actionsClass)cls+=' '+actionsClass;
      else if(extraButtons.length===3)cls+=' three';
      else if(extraButtons.length===4)cls+=' four';
      eH='<div class="'+cls+'" style="margin-top:10px;">'+extraButtons.map((b,i)=>'<button class="k '+(i===extraButtons.length-1?'primary':'')+'" data-extra="'+b.replace(/"/g,'&quot;')+'">'+b+'</button>').join('')+'</div>';
    }
    panelBody.innerHTML=body+eH;
    cOnOk=onOk||null;cOnExtra=onExtra||null;cOnMeasureChange=onMeasureChange||null;
    panelOk.style.display=(hideActions||extraButtons)?'none':'';
    panelCancel.style.display=(hideActions||extraButtons)?'none':'';
    panel.classList.add('open');
    document.getElementById('app').classList.add('panel-open');
    if(onMount)setTimeout(onMount,50);
    if(extraButtons)setTimeout(()=>{panelBody.querySelectorAll('[data-extra]').forEach(b=>{b.addEventListener('click',()=>{if(cOnExtra)cOnExtra(b.dataset.extra)})})},50);
  }
  function closePanel(){panel.classList.remove('open');document.getElementById('app').classList.remove('panel-open');cOnOk=null;cOnExtra=null;cOnMeasureChange=null;cShowMes=false;chordPanelRefresh=null;{const bsb=document.getElementById('btn-stack');if(bsb)bsb.classList.remove('primary');}const wasChord=state._chordEditMode;if(wasChord){const sl=selectedSlot();if(sl&&sl.type==='note')dedupeChord(sl);}state._chordEditMode=false;state._chordAddPending=false;if(wasChord){pushHistory();render()}}
  function notifyPanelMeasureChanged(){
    if(!panel.classList.contains('open'))return;
    if(cShowMes)panelMes.textContent='Mes '+(state.sel.m+1);
    if(cOnMeasureChange)cOnMeasureChange();
  }
  panelOk.addEventListener('click',()=>{if(cOnOk)cOnOk();closePanel();render()});

    openPanel({
      title:title,

      onMount:()=>{

  // Sélection d'une note/silence par clic sur la portée
  document.getElementById('score').addEventListener('click',(e)=>{
    const t=e.target;
    if(!t||t.tagName!=='rect')return;
    const m=t.getAttribute('data-m');
    const s=t.getAttribute('data-s');
    if(m===null||s===null)return;
    const mi=parseInt(m,10),si=parseInt(s,10);
    if(isNaN(mi)||isNaN(si))return;
    if(mi<0||mi>=state.measures.length)return;
    if(si<0||si>=state.measures[mi].length)return;
    state.sel={m:mi,s:si};
    render();
  });
