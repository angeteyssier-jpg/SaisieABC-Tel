<style>

    background: #ebe9e0; border: 1px solid #d8d6ce; border-radius: 10px;

  .ctx-card b { color: #185fa5; font-weight: 700; }

  .abc-app button.k {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    width: 100%; height: 96px; padding: 0 4px;
    background: #ffffff; border: 2px solid #b4b2a9; border-radius: 12px;
    font-family: inherit; font-size: 50px; font-weight: 700; color: #1a1a1a;
    cursor: pointer; text-align: center; line-height: 1;
    -webkit-tap-highlight-color: transparent; -webkit-appearance: none; appearance: none;
    min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .abc-app button.k:active { background: #e8e6df; }
  .abc-app button.k:disabled { color: #bbb8a8; background: #f3f1ea; cursor: not-allowed; }
  .abc-app button.k.active { background: #cfe5fa; border-color: #185fa5; color: #0c447c; }
  .abc-app button.k.symbol { font-size: 50px; font-family: "Times New Roman", serif; }
  .abc-app button.k.primary { background: #185fa5; border-color: #185fa5; color: #ffffff; }

  .row-grid { display: grid; gap: 6px; margin-bottom: 6px; }
  .row-2 { grid-template-columns: 1fr 1fr; }
  .row-3 { grid-template-columns: 1fr 1fr 1fr; }
  .row-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
  .row-6 { grid-template-columns: repeat(6, 1fr); }
  .row-7 { grid-template-columns: repeat(7, 1fr); }

  .nav-bar {
    display: grid; grid-template-columns: repeat(6, 1fr);

  /* Onglets en taille 50 */

</style>

<script>
(function(){
  const NOTES=[{label:'Do',sub:'C',n:'C'},{label:'Ré',sub:'D',n:'D'},{label:'Mi',sub:'E',n:'E'},{label:'Fa',sub:'F',n:'F'},{label:'Sol',sub:'G',n:'G'},{label:'La',sub:'A',n:'A'},{label:'Si',sub:'B',n:'B'}];
  const DURATIONS=[{label:'𝅝',d:4},{label:'𝅗𝅥',d:2},{label:'♩',d:1},{label:'♪',d:0.5},{label:'♬',d:0.25},{label:'𝅘𝅥𝅰',d:0.125}];
  const SHARP_NOTES=['F','C','G','D','A','E','B'];
  const FLAT_NOTES=['B','E','A','D','G','C','F'];
  const ORNAMENTS=[{code:'T',label:'tr'},{code:'M',label:'~M'},{code:'P',label:'pralle'},{code:'H',label:'fermata'},{code:'L',label:'accent'},{code:'.',label:'staccato'},{code:'u',label:'up'},{code:'v',label:'down'},{code:'O',label:'coda'}];
  const CHORD_QUALITIES=['','m','7','m7','M7','6','m6','9','11','13','sus2','sus4','dim','dim7','aug','add9'];
  const KEY_NAMES_MAJOR=['C','G','D','A','E','B','F♯','C♯'];
  const KEY_NAMES_MAJOR_FLAT=['C','F','B♭','E♭','A♭','D♭','G♭','C♭'];

  const state={headers:{X:'1',T:'',ST:'',C:'',N:''},pieceMeter:'4/4',pieceUnit:'1/4',pieceKeySig:0,pieceClef:'treble',measures:[],sel:{m:0,s:0},octave:0,timeChanges:{},keyChanges:{},clefChanges:{},repeats:{},tempo:100,volume:60,fullscreen:false,viewmode:false,activeTab:'notes'};

  const history={stack:[],pos:-1,max:100};
  function snapshot(){return JSON.stringify(state)}
  function pushHistory(){if(history.pos<history.stack.length-1)history.stack=history.stack.slice(0,history.pos+1);history.stack.push(snapshot());if(history.stack.length>history.max)history.stack.shift();history.pos=history.stack.length-1}
  function loadFrom(snap){const o=JSON.parse(snap);Object.assign(state,o)}
  function undo(){if(history.pos>0){history.pos--;loadFrom(history.stack[history.pos]);render()}}
  function redo(){if(history.pos<history.stack.length-1){history.pos++;loadFrom(history.stack[history.pos]);render()}}

  function parseMeter(meter){if(!meter)return{num:4,den:4};if(meter==='C')return{num:4,den:4};if(meter==='C|')return{num:2,den:2};const m=meter.match(/^\s*(\d+)\s*\/\s*(\d+)\s*$/);if(m)return{num:parseInt(m[1],10),den:parseInt(m[2],10)};return{num:4,den:4}}
  function meterAt(idx){let cur=state.pieceMeter;for(let i=0;i<=idx;i++)if(state.timeChanges[i])cur=state.timeChanges[i];return cur}
  function keyAt(idx){let cur=state.pieceKeySig;for(let i=0;i<=idx;i++)if(state.keyChanges[i]!==undefined)cur=state.keyChanges[i];return cur}
  function clefAt(idx){let cur=state.pieceClef;for(let i=0;i<=idx;i++)if(state.clefChanges[i])cur=state.clefChanges[i];return cur}
  function measureCapacity(meter){const{num,den}=parseMeter(meter);return num*(4/den)}
  function effDur(t){return t.dot?t.dur*1.5:t.dur}
  function beamGroupUnit(meter){const{num,den}=parseMeter(meter);if(den===8&&num%3===0&&num>=6)return 1.5;return 4/den}

  function buildEmptyMeasure(meter){const{num,den}=parseMeter(meter);const beatDur=4/den;const slots=[];for(let i=0;i<num;i++)slots.push({type:'rest',dur:beatDur,dot:false});return slots}
  function rebuildMeasures(){const count=Math.max(state.measures.length,9);state.measures=[];state.timeChanges={};state.keyChanges={};state.clefChanges={};state.repeats={};for(let i=0;i<count;i++)state.measures.push(buildEmptyMeasure(state.pieceMeter));state.sel={m:0,s:0}}

  function splitDurationByBeat(offset,amount,beat){const eps=1e-6;const out=[];let cur=+offset.toFixed(6);let rem=+amount.toFixed(6);const distToBeat=((cur%beat)===0)?0:(beat-(cur%beat));if(distToBeat>eps&&rem>eps){const toFill=Math.min(distToBeat,rem);const subs=[4,2,1,0.5,0.25,0.125].filter(u=>u<=beat/2+eps);let used=0;for(const u of subs)while(toFill-used>=u-eps){out.push({dur:u,dot:false});used=+(used+u).toFixed(6)}cur=+(cur+used).toFixed(6);rem=+(rem-used).toFixed(6)}while(rem>=beat-eps){out.push({dur:(beat===1.5)?1:beat,dot:(beat===1.5)});rem=+(rem-beat).toFixed(6);cur=+(cur+beat).toFixed(6)}if(rem>eps){const subs=[4,2,1,0.5,0.25,0.125].filter(u=>u<=beat/2+eps);let leftover=rem;for(const u of subs)while(leftover>=u-eps){out.push({dur:u,dot:false});leftover=+(leftover-u).toFixed(6)}}return out}
  function rebalanceMeasure(m,anchorIdx,oldEffDur){const meter=meterAt(m);const{den}=parseMeter(meter);const beat=4/den;const cap=measureCapacity(meter);const meas=state.measures[m];const anchor=meas[anchorIdx];let newDur=effDur(anchor);let beforeUsed=0;for(let i=0;i<anchorIdx;i++)beforeUsed+=effDur(meas[i]);if(beforeUsed+newDur>cap+1e-6){const fits=cap-beforeUsed;const overflow=newDur-fits;anchor.tieToNext=true;const fitsPieces=splitDurationByBeat(beforeUsed,fits,beat);if(fitsPieces.length>0){anchor.dur=fitsPieces[0].dur;anchor.dot=fitsPieces[0].dot;const extras=fitsPieces.slice(1).map(p=>{const c=Object.assign({},anchor,{dur:p.dur,dot:p.dot});c.tieToNext=true;return c});state.measures[m]=meas.slice(0,anchorIdx+1).concat(extras)}const nextM=m+1;if(nextM>=state.measures.length)state.measures.push(buildEmptyMeasure(meterAt(m)));const contPieces=splitDurationByBeat(0,overflow,4/parseMeter(meterAt(nextM)).den);const contSlots=contPieces.map((p,i)=>{const c=Object.assign({},anchor,{dur:p.dur,dot:p.dot});delete c.tieToNext;if(i<contPieces.length-1)c.tieToNext=true;return c});_consumeFromHead(nextM,overflow,contSlots);return}const delta=+(newDur-oldEffDur).toFixed(6);const eps=1e-6;if(Math.abs(delta)<eps)return;if(delta<0){const freeAmount=-delta;const offsetAfterAnchor=beforeUsed+newDur;const pieces=splitDurationByBeat(offsetAfterAnchor,freeAmount,beat);const newSlots=pieces.map(p=>{const copy=Object.assign({},anchor,{dur:p.dur,dot:p.dot});delete copy.tieToNext;return copy});const tail=meas.slice(anchorIdx+1);state.measures[m]=meas.slice(0,anchorIdx+1).concat(newSlots,tail);truncateMeasureToCapacity(m,cap);return}let need=delta;let cursor=anchorIdx+1;while(need>eps&&cursor<meas.length){const slot=meas[cursor];const dur=effDur(slot);if(dur<=need+eps){need=+(need-dur).toFixed(6);meas.splice(cursor,1)}else{const remaining=+(dur-need).toFixed(6);let off=0;for(let i=0;i<cursor;i++)off+=effDur(meas[i]);const pieces=splitDurationByBeat(off+need,remaining,beat);const newCopies=pieces.map(p=>Object.assign({},slot,{dur:p.dur,dot:p.dot}));meas.splice(cursor,1,...newCopies);need=0}}truncateMeasureToCapacity(m,cap)}
  function _consumeFromHead(m,amount,replacementSlots){const meter=meterAt(m);const beat=4/parseMeter(meter).den;const meas=state.measures[m];const eps=1e-6;let need=amount;let cursor=0;while(need>eps&&cursor<meas.length){const slot=meas[cursor];const dur=effDur(slot);if(dur<=need+eps){need=+(need-dur).toFixed(6);meas.splice(cursor,1)}else{const remaining=+(dur-need).toFixed(6);const off=need;const pieces=splitDurationByBeat(off,remaining,beat);const newCopies=pieces.map(p=>Object.assign({},slot,{dur:p.dur,dot:p.dot}));meas.splice(cursor,1,...newCopies);need=0}}state.measures[m]=replacementSlots.concat(state.measures[m]);truncateMeasureToCapacity(m,measureCapacity(meter))}

  function selectedSlot(){const m=state.measures[state.sel.m];return m?(m[state.sel.s]||null):null}

  function render(){renderScore();renderState()}

  function selectNext(){let{m,s}=state.sel;if(s+1<state.measures[m].length){state.sel={m,s:s+1};render();return}if(m+1<state.measures.length){state.sel={m:m+1,s:0};render();return}state.measures.push(buildEmptyMeasure(meterAt(m)));state.sel={m:state.measures.length-1,s:0};pushHistory();render()}

  const audio={ctx:null,master:null,playing:false,scheduled:[],stopAt:0,raf:null};

  function midiOfNote(note,oct,acc,keySig){const bs={C:0,D:2,E:4,F:5,G:7,A:9,B:11}[note];let midi=60+bs+oct*12;let alt=0;if(acc==='^')alt=1;else if(acc==='_')alt=-1;else if(acc==='=')alt=0;else{if(keySig>0&&SHARP_NOTES.slice(0,keySig).includes(note))alt=1;else if(keySig<0&&FLAT_NOTES.slice(0,-keySig).includes(note))alt=-1}return midi+alt}

  function playSchedule(){ensureAudio();stopPlayback(false);audio.playing=true;document.getElementById('btn-play').textContent='⏸';const st=audio.ctx.currentTime+0.05;let t=st;const qD=60/state.tempo;const order=expandForPlayback();order.forEach(mi=>{const m=state.measures[mi];const sig=keyAt(mi);m.forEach((slot,si)=>{let dur=effDur(slot)*qD;if(slot.tuplet===3)dur=dur*2/3;if(slot.type==='note'){const midi=midiOfNote(slot.note,slot.octave,slot.acc,sig);const o=audio.ctx.createOscillator();const g=audio.ctx.createGain();o.type='triangle';o.frequency.value=freqOfMidi(midi);const a=0.005,r=Math.min(0.05,dur*0.3);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.5,t+a);g.gain.setValueAtTime(0.5,t+dur-r);g.gain.linearRampToValueAtTime(0,t+dur);o.connect(g);g.connect(audio.master);o.start(t);o.stop(t+dur+0.02);audio.scheduled.push(o)}audio.scheduled.push({updateAt:t,measureIdx:mi,slotIdx:si});t+=dur})});audio.stopAt=t;function tick(){if(!audio.playing)return;const now=audio.ctx.currentTime;let last=null;for(const ev of audio.scheduled){if(ev.updateAt!==undefined&&ev.updateAt<=now)last=ev;if(ev.updateAt!==undefined&&ev.updateAt>now)break}if(last&&(state.sel.m!==last.measureIdx||state.sel.s!==last.slotIdx)){state.sel={m:last.measureIdx,s:last.slotIdx};renderScore();renderState()}if(now>=audio.stopAt){stopPlayback(true);return}audio.raf=requestAnimationFrame(tick)}audio.raf=requestAnimationFrame(tick)}

  function setNoteAtSelection(n){const sl=selectedSlot();if(!sl)return;const dur=sl.dur,dot=sl.dot;const acc=(sl.type==='note')?sl.acc:'';state.measures[state.sel.m][state.sel.s]={type:'note',note:n,octave:state.octave,dur,dot,acc};pushHistory();const midi=midiOfNote(n,state.octave,acc,keyAt(state.sel.m));previewNote(midi);render()}

  document.getElementById('meas-prev').addEventListener('click',()=>jumpMeasure(-1));
  document.getElementById('meas-next').addEventListener('click',()=>jumpMeasure(+1));
  document.getElementById('btn-del').addEventListener('click',()=>{const sl=selectedSlot();if(sl){state.measures[state.sel.m][state.sel.s]={type:'rest',dur:sl.dur,dot:sl.dot};pushHistory();render()}});
  document.getElementById('btn-undo').addEventListener('click',undo);
  document.getElementById('btn-redo').addEventListener('click',redo);
  document.getElementById('btn-trans-up').addEventListener('click',()=>{transposePiece(+1);pushHistory();render()});
  document.getElementById('btn-trans-down').addEventListener('click',()=>{transposePiece(-1);pushHistory();render()});
  document.getElementById('btn-tie').addEventListener('click',()=>{const sl=selectedSlot();if(sl){sl.tieToNext=!sl.tieToNext;pushHistory();render()}});
  document.getElementById('btn-disarm').addEventListener('click',()=>{disarmKey();pushHistory();render()});

  document.getElementById('btn-tuplet').addEventListener('click',()=>{const sl=selectedSlot();if(!sl)return;const meas=state.measures[state.sel.m];const idx=state.sel.s;if(sl.tuplet){const n=sl.tuplet;for(let i=idx;i<meas.length&&meas[i].tuplet===n;i++)delete meas[i].tuplet;pushHistory();render();return}openPanel({title:'N-uplet',body:'<small>Choisir le N-uplet</small>',hideActions:true,extraButtons:['Annuler','3','5','6','7'],onExtra:(w)=>{if(w==='Annuler'){closePanel();return}const n=parseInt(w,10);for(let i=idx;i<Math.min(meas.length,idx+n);i++)meas[i].tuplet=n;pushHistory();closePanel();render()}})});

  document.getElementById('meas-del').addEventListener('click',()=>{if(state.measures.length<=1)return;const m=state.sel.m;state.measures.splice(m,1);function sk(map,th){const out={};for(const k of Object.keys(map)){const i=parseInt(k,10);if(i<th)out[i]=map[k];else if(i>th)out[i-1]=map[k]}return out}state.timeChanges=sk(state.timeChanges,m);state.keyChanges=sk(state.keyChanges,m);state.clefChanges=sk(state.clefChanges,m);state.repeats=sk(state.repeats,m);if(state.sel.m>=state.measures.length)state.sel.m=state.measures.length-1;state.sel.s=0;pushHistory();render()});

  document.getElementById('meas-add').addEventListener('click',()=>{let count=1,side='right';function controls(){return('<small>Insérer par rapport à la mesure '+(state.sel.m+1)+'</small><div class="row-grid row-2" id="side-pick"><button class="k" data-side="left">←</button><button class="k" data-side="right">→</button></div><small>Nombre</small><div class="stepper"><button class="k" id="cnt-d">−</button><div class="val"><b id="cnt-v">'+count+'</b></div><button class="k" id="cnt-u">+</button></div>')}function rs(){document.querySelectorAll('#side-pick .k').forEach(b=>b.classList.toggle('active',b.dataset.side===side))}openPanel({title:'Ajouter mesure(s)',body:controls(),hideActions:true,extraButtons:['Annuler','Ajouter'],onMount:()=>{document.querySelectorAll('#side-pick .k').forEach(b=>b.addEventListener('click',()=>{side=b.dataset.side;rs()}));rs();document.getElementById('cnt-u').addEventListener('click',()=>{if(count<16){count++;document.getElementById('cnt-v').textContent=count}});document.getElementById('cnt-d').addEventListener('click',()=>{if(count>1){count--;document.getElementById('cnt-v').textContent=count}})},onExtra:(w)=>{if(w==='Annuler'){closePanel();return}function sk(map,th,inc){const out={};for(const k of Object.keys(map)){const i=parseInt(k,10);const sh=inc?(i>=th):(i>th);out[sh?i+count:i]=map[k]}return out}const ia=(side==='left')?state.sel.m:state.sel.m+1;const meter=meterAt(state.sel.m);for(let k=0;k<count;k++)state.measures.splice(ia,0,buildEmptyMeasure(meter));const inc=(side==='left');const th=state.sel.m;state.timeChanges=sk(state.timeChanges,th,inc);state.keyChanges=sk(state.keyChanges,th,inc);state.clefChanges=sk(state.clefChanges,th,inc);state.repeats=sk(state.repeats,th,inc);state.sel={m:(side==='right'?state.sel.m+1:state.sel.m),s:0};pushHistory();closePanel();render()}})});

  function ensureRepeat(m){if(!state.repeats[m])state.repeats[m]={};return state.repeats[m]}
  document.getElementById('btn-rep-start').addEventListener('click',()=>{const r=ensureRepeat(state.sel.m);r.start=!r.start;pushHistory();render()});
  document.getElementById('btn-rep-end').addEventListener('click',()=>{const r=ensureRepeat(state.sel.m);r.end=!r.end;pushHistory();render()});
  document.getElementById('btn-volta1').addEventListener('click',()=>{const r=ensureRepeat(state.sel.m);r.volta=(r.volta===1)?0:1;pushHistory();render()});
  document.getElementById('btn-volta2').addEventListener('click',()=>{const r=ensureRepeat(state.sel.m);r.volta=(r.volta===2)?0:2;pushHistory();render()});

  document.getElementById('vol-u').addEventListener('click',()=>{state.volume=Math.min(100,state.volume+10);ensureAudio();render()});
  document.getElementById('vol-d').addEventListener('click',()=>{state.volume=Math.max(0,state.volume-10);ensureAudio();render()});
  document.getElementById('tempo-u').addEventListener('click',()=>{state.tempo=Math.min(240,state.tempo+5);render()});
  document.getElementById('tempo-d').addEventListener('click',()=>{state.tempo=Math.max(30,state.tempo-5);render()});
  document.getElementById('btn-play').addEventListener('click',()=>{if(audio.playing)stopPlayback(true);else playSchedule()});
  document.getElementById('btn-stop').addEventListener('click',()=>stopPlayback(true));
  document.getElementById('btn-viewmode').addEventListener('click',()=>{state.viewmode=!state.viewmode;document.getElementById('app').classList.toggle('viewmode',state.viewmode);render()});
  document.getElementById('btn-fs').addEventListener('click',()=>{state.fullscreen=!state.fullscreen;document.getElementById('app').classList.toggle('fullscreen',state.fullscreen)});

  document.getElementById('btn-chord').addEventListener('click',()=>{const sl=selectedSlot();if(!sl||sl.type!=='note'){alert('Sélectionnez une note');return}const roots=['C','D','E','F','G','A','B'];let root=sl.note,acc='',qual='';if(sl.chord){const m=sl.chord.match(/^([A-G])([#b]?)(.*)$/);if(m){root=m[1];acc=m[2];qual=m[3]}}function controls(){let h='<small>Fondamentale</small><div class="root-grid">';roots.forEach(r=>h+='<button class="k" data-root="'+r+'">'+r+'</button>');h+='</div><small>Altération</small><div class="row-grid row-3"><button class="k" data-acc="">♮</button><button class="k" data-acc="#">♯</button><button class="k" data-acc="b">♭</button></div>';h+='<small>Qualité</small><div class="chord-grid">';CHORD_QUALITIES.forEach(q=>h+='<button class="k" data-qual="'+q+'">'+(q||'maj')+'</button>');h+='</div><small>Aperçu : <b id="chord-preview">'+root+acc+qual+'</b></small>';return h}function refresh(){document.querySelectorAll('[data-root]').forEach(b=>b.classList.toggle('active',b.dataset.root===root));document.querySelectorAll('[data-acc]').forEach(b=>b.classList.toggle('active',b.dataset.acc===acc));document.querySelectorAll('[data-qual]').forEach(b=>b.classList.toggle('active',b.dataset.qual===qual));document.getElementById('chord-preview').textContent=root+acc+qual}openPanel({title:'Accord',body:controls(),hideActions:true,extraButtons:['Annuler','Suppr','Appliquer'],actionsClass:'three',onMount:()=>{document.querySelectorAll('[data-root]').forEach(b=>b.addEventListener('click',()=>{root=b.dataset.root;refresh()}));document.querySelectorAll('[data-acc]').forEach(b=>b.addEventListener('click',()=>{acc=b.dataset.acc;refresh()}));document.querySelectorAll('[data-qual]').forEach(b=>b.addEventListener('click',()=>{qual=b.dataset.qual;refresh()}));refresh()},onExtra:(w)=>{if(w==='Annuler'){closePanel();return}if(w==='Suppr'){delete sl.chord;pushHistory();closePanel();render();return}sl.chord=root+acc+qual;pushHistory();closePanel();render()}})});

  document.getElementById('btn-orn').addEventListener('click',()=>{const sl=selectedSlot();if(!sl||sl.type!=='note'){alert('Sélectionnez une note');return}sl.orn=sl.orn||[];function controls(){let h='<small>Cliquez pour activer/désactiver</small><div class="row-grid row-3">';ORNAMENTS.forEach(o=>h+='<button class="k" data-orn="'+o.code+'">'+o.label+'</button>');h+='</div><small>Actifs : <b id="orn-preview">'+(sl.orn.length?sl.orn.join(' '):'(aucun)')+'</b></small>';return h}function refresh(){document.querySelectorAll('[data-orn]').forEach(b=>b.classList.toggle('active',sl.orn.includes(b.dataset.orn)));document.getElementById('orn-preview').textContent=sl.orn.length?sl.orn.join(' '):'(aucun)'}openPanel({title:'Ornement',body:controls(),hideActions:true,extraButtons:['Tout enlever','Fermer'],onMount:()=>{document.querySelectorAll('[data-orn]').forEach(b=>b.addEventListener('click',()=>{const code=b.dataset.orn;const i=sl.orn.indexOf(code);if(i>=0)sl.orn.splice(i,1);else sl.orn.push(code);render();refresh()}));refresh()},onExtra:(w)=>{if(w==='Tout enlever'){sl.orn=[];pushHistory();render();refresh();return}pushHistory();closePanel()}})});

  document.getElementById('btn-save-file').addEventListener('click',()=>{const abc=buildAbcText();const blob=new Blob([abc],{type:'text/plain;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');const fn=(state.headers.T||'morceau').replace(/[^a-zA-Z0-9_\-]/g,'_')+'.abc';a.href=url;a.download=fn;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url)});
  const fileInput=document.getElementById('file-input');
  document.getElementById('btn-open-file').addEventListener('click',()=>fileInput.click());
  fileInput.addEventListener('change',(e)=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=(ev)=>{const text=ev.target.result;const ns=parseAbcText(text);if(!ns){alert('Impossible de lire ce fichier ABC');fileInput.value='';return}Object.assign(state,ns);cleanupAccidentals();state.sel={m:0,s:0};pushHistory();render();fileInput.value=''};r.readAsText(f)});

  const STORAGE_KEY='abc-editor-saves';
  function getSaves(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]')}catch(_){return[]}}
  function setSaves(list){localStorage.setItem(STORAGE_KEY,JSON.stringify(list))}
  function exportState(){return JSON.stringify({headers:state.headers,pieceMeter:state.pieceMeter,pieceUnit:state.pieceUnit,pieceKeySig:state.pieceKeySig,pieceClef:state.pieceClef,measures:state.measures,timeChanges:state.timeChanges,keyChanges:state.keyChanges,clefChanges:state.clefChanges,repeats:state.repeats,tempo:state.tempo})}
  function importStateJson(json){try{const o=JSON.parse(json);Object.assign(state,o);state.sel={m:0,s:0};state.octave=0;pushHistory();render();return true}catch(e){return false}}

  document.getElementById('btn-saves').addEventListener('click',()=>{const saves=getSaves();let lh='<div class="save-list">';if(saves.length===0)lh+='<div class="item" style="color:#888780;cursor:default;">Aucune sauvegarde</div>';else saves.forEach((s,i)=>lh+='<div class="item" data-idx="'+i+'"><span>'+s.name+'</span><span class="del" data-del="'+i+'">×</span></div>');lh+='</div>';lh+='<div class="row"><span class="field-label">Nom:</span><input id="sn" type="text" value="'+(state.headers.T||'Morceau').replace(/"/g,'&quot;')+'"/></div>';openPanel({title:'Mémoires',body:lh,hideActions:true,extraButtons:['Annuler','Enregistrer'],onMount:()=>{document.querySelectorAll('.save-list .item[data-idx]').forEach(el=>{el.addEventListener('click',(ev)=>{if(ev.target.dataset.del!==undefined){const idx=parseInt(ev.target.dataset.del,10);const saves=getSaves();saves.splice(idx,1);setSaves(saves);closePanel();return}const idx=parseInt(el.dataset.idx,10);const saves=getSaves();if(saves[idx]&&importStateJson(saves[idx].data))closePanel()})})},onExtra:(w)=>{if(w==='Annuler'){closePanel();return}const name=document.getElementById('sn').value.trim()||'Morceau';const saves=getSaves();const ex=saves.findIndex(s=>s.name===name);const e={name,data:exportState(),date:new Date().toISOString()};if(ex>=0)saves[ex]=e;else saves.push(e);setSaves(saves);closePanel()}})});

  document.getElementById('btn-export').addEventListener('click',()=>{const abc=buildAbcText();openPanel({title:'Code ABC',body:'<textarea id="exp" readonly>'+abc.replace(/</g,'&lt;')+'</textarea>',hideActions:true,extraButtons:['Fermer','Copier'],onMount:()=>{document.getElementById('exp').select()},onExtra:(w)=>{if(w==='Copier'){const ta=document.getElementById('exp');ta.select();try{document.execCommand('copy')}catch(_){}}closePanel()}})});

  document.getElementById('btn-new').addEventListener('click',()=>{openPanel({title:'Nouveau',body:'<small>Effacer le morceau ?</small>',hideActions:true,extraButtons:['Annuler','Effacer'],onExtra:(w)=>{if(w==='Effacer'){state.headers={X:'1',T:'',ST:'',C:'',N:''};state.pieceMeter='4/4';state.pieceUnit='1/4';state.pieceKeySig=0;state.pieceClef='treble';rebuildMeasures();pushHistory();render()}closePanel()}})});

  const panel=document.getElementById('panel');
  const panelTitle=document.getElementById('panel-title');
  const panelBody=document.getElementById('panel-body');
  const panelOk=document.getElementById('panel-ok');
  const panelCancel=document.getElementById('panel-cancel');
  let cOnOk=null,cOnExtra=null;
  function openPanel({title,body,onMount,onOk,hideActions,extraButtons,onExtra,actionsClass}){panelTitle.textContent=title;let eH='';if(extraButtons&&extraButtons.length){const cls='actions'+(actionsClass?' '+actionsClass:(extraButtons.length===3?' three':''));eH='<div class="'+cls+'" style="margin-top:10px;">'+extraButtons.map((b,i)=>'<button class="k '+(i===extraButtons.length-1?'primary':'')+'" data-extra="'+b.replace(/"/g,'&quot;')+'">'+b+'</button>').join('')+'</div>'}panelBody.innerHTML=body+eH;cOnOk=onOk||null;cOnExtra=onExtra||null;panelOk.style.display=(hideActions||extraButtons)?'none':'';panelCancel.style.display=(hideActions||extraButtons)?'none':'';panel.classList.add('open');if(onMount)setTimeout(onMount,50);if(extraButtons)setTimeout(()=>{panelBody.querySelectorAll('[data-extra]').forEach(b=>{b.addEventListener('click',()=>{if(cOnExtra)cOnExtra(b.dataset.extra)})})},50)}
  function closePanel(){panel.classList.remove('open');cOnOk=null;cOnExtra=null}
  panelOk.addEventListener('click',()=>{if(cOnOk)cOnOk();closePanel();render()});
  panelCancel.addEventListener('click',closePanel);

  // Headers : X, T, ST, C, N
  function headerPrompt(key,title){return ()=>openPanel({title:title,body:'<div class="row"><input id="hi" type="text" value="'+((state.headers[key]||'')+'').replace(/"/g,'&quot;')+'"/></div>',onMount:()=>document.getElementById('hi').focus(),onOk:()=>{state.headers[key]=document.getElementById('hi').value.trim();pushHistory()}})}
  document.querySelector('[data-hdr="X"]').addEventListener('click',headerPrompt('X','X: Numéro'));
  document.querySelector('[data-hdr="T"]').addEventListener('click',headerPrompt('T','Titre'));
  document.querySelector('[data-hdr="ST"]').addEventListener('click',headerPrompt('ST','Sous-titre'));
  document.querySelector('[data-hdr="C"]').addEventListener('click',headerPrompt('C','Compositeur'));
  document.querySelector('[data-hdr="N"]').addEventListener('click',headerPrompt('N','Commentaire'));

  function scopePanel({title,renderControls,applyPiece,applyHere}){const onFM=(state.sel.m===0);const buttons=['Annuler','Tout',onFM?null:'Mes '+(state.sel.m+1)+'+'].filter(Boolean);openPanel({title,body:renderControls(),hideActions:true,extraButtons:buttons,onMount:()=>{if(typeof renderControls.mount==='function')renderControls.mount()},onExtra:(w)=>{if(w==='Annuler'){closePanel();return}if(w==='Tout'){applyPiece();cleanupAccidentals();pushHistory();closePanel();render();return}applyHere();cleanupAccidentals();pushHistory();closePanel();render()}})}

  document.querySelector('[data-hdr="M"]').addEventListener('click',()=>{const cur=meterAt(state.sel.m);const{num,den}=parseMeter(cur);let n=num,d=den;const dV=[1,2,4,8,16];let uD=parseInt(state.pieceUnit.split('/')[1],10);const uDs=[1,2,4,8,16,32];function controls(){return('<div class="stepper"><button class="k" id="num-d">−</button><div class="val">N: <b id="num-v">'+n+'</b></div><button class="k" id="num-u">+</button></div><div class="stepper"><button class="k" id="den-d">−</button><div class="val">D: <b id="den-v">'+d+'</b></div><button class="k" id="den-u">+</button></div><small>Unité L:</small><div class="stepper"><button class="k" id="L-d">−</button><div class="val">L:1/<b id="L-v">'+uD+'</b></div><button class="k" id="L-u">+</button></div>')}controls.mount=function(){const upd=()=>{document.getElementById('num-v').textContent=n;document.getElementById('den-v').textContent=d;document.getElementById('L-v').textContent=uD};document.getElementById('num-u').addEventListener('click',()=>{n=Math.min(16,n+1);upd()});document.getElementById('num-d').addEventListener('click',()=>{n=Math.max(1,n-1);upd()});document.getElementById('den-u').addEventListener('click',()=>{const i=dV.indexOf(d);if(i<dV.length-1){d=dV[i+1];upd()}});document.getElementById('den-d').addEventListener('click',()=>{const i=dV.indexOf(d);if(i>0){d=dV[i-1];upd()}});document.getElementById('L-u').addEventListener('click',()=>{const i=uDs.indexOf(uD);if(i<uDs.length-1){uD=uDs[i+1];upd()}});document.getElementById('L-d').addEventListener('click',()=>{const i=uDs.indexOf(uD);if(i>0){uD=uDs[i-1];upd()}})};scopePanel({title:'Rythme',renderControls:controls,applyPiece:()=>{state.pieceMeter=n+'/'+d;state.pieceUnit='1/'+uD;if(state.sel.m===0)delete state.timeChanges[0];else state.timeChanges={};rebuildMeasures()},applyHere:()=>{if(state.sel.m===0){state.pieceMeter=n+'/'+d;state.pieceUnit='1/'+uD;delete state.timeChanges[0];rebuildMeasures();return}state.pieceUnit='1/'+uD;state.timeChanges[state.sel.m]=n+'/'+d;for(let i=state.sel.m;i<state.measures.length;i++){if(i>state.sel.m&&state.timeChanges[i])break;state.measures[i]=buildEmptyMeasure(meterAt(i))}state.sel={m:state.sel.m,s:0}}})});

  document.querySelector('[data-hdr="K"]').addEventListener('click',()=>{let sig=keyAt(state.sel.m);const lO=(s)=>keyHumanLabel(s);function controls(){return('<div class="stepper"><button class="k" id="sig-d">♭</button><div class="val"><b id="sig-v">'+lO(sig)+'</b></div><button class="k" id="sig-u">♯</button></div>')}controls.mount=function(){const upd=()=>{document.getElementById('sig-v').textContent=lO(sig)};document.getElementById('sig-u').addEventListener('click',()=>{sig=Math.min(7,sig+1);upd()});document.getElementById('sig-d').addEventListener('click',()=>{sig=Math.max(-7,sig-1);upd()})};scopePanel({title:'Armure',renderControls:controls,applyPiece:()=>{state.pieceKeySig=sig;if(state.sel.m===0)delete state.keyChanges[0];else state.keyChanges={}},applyHere:()=>{if(state.sel.m===0){state.pieceKeySig=sig;delete state.keyChanges[0]}else state.keyChanges[state.sel.m]=sig}})});

  document.querySelector('[data-hdr="CLEF"]').addEventListener('click',()=>{let pick=clefAt(state.sel.m);function controls(){return('<div class="row-grid row-3" id="clef-pick"><button class="k clef-small" data-clef="treble">𝄞</button><button class="k" data-clef="treble8" style="font-size:28px;">Sol-8</button><button class="k clef-small" data-clef="bass">𝄢</button></div>')}controls.mount=function(){const refresh=()=>{document.querySelectorAll('#clef-pick .k').forEach(b=>b.classList.toggle('active',b.dataset.clef===pick))};refresh();document.querySelectorAll('#clef-pick .k').forEach(b=>b.addEventListener('click',()=>{pick=b.dataset.clef;refresh()}))};scopePanel({title:'Clé',renderControls:controls,applyPiece:()=>{state.pieceClef=pick;if(state.sel.m===0)delete state.clefChanges[0];else state.clefChanges={}},applyHere:()=>{if(state.sel.m===0){state.pieceClef=pick;delete state.clefChanges[0]}else state.clefChanges[state.sel.m]=pick}})});

  function updateBadge(){document.getElementById('ww-tag').textContent=window.innerWidth||0;document.getElementById('wh-tag').textContent=window.innerHeight||0}
  window.addEventListener('resize',updateBadge);updateBadge();

  rebuildMeasures();pushHistory();render();
})();
</script>
