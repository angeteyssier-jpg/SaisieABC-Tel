<style>
  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

  .abc-app * { box-sizing: border-box; }
  .abc-app {
    max-width: 380px;
    margin: 0 auto;
    padding: 8px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: #1a1a1a;
    background: #f5f4ef;
    border-radius: 10px;
  }
  .abc-card {
    background: #ffffff;
    border: 1px solid #d8d6ce;
    border-radius: 8px;
    padding: 8px;
    margin-bottom: 8px;
  }
  .abc-label {
    font-size: 10px;
    color: #888780;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .score-wrap { height: 110px; }
  .score-wrap svg { width: 100%; height: 100%; display: block; }

  .abc-text {
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 12px;
    background: #f1efe8;
    border: 1px solid #d8d6ce;
    border-radius: 8px;
    padding: 6px 8px;
    min-height: 44px;
    max-height: 80px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
    color: #1a1a1a;
    line-height: 1.5;
  }
  .abc-text .cursor {
    display: inline-block;
    width: 1px;
    background: #185fa5;
    animation: blink 1s steps(2) infinite;
    height: 13px;
    vertical-align: middle;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .abc-app button.k {
    display: block;
    width: 100%;
    height: 36px;
    padding: 0 2px;
    background: #ffffff;
    border: 1px solid #b4b2a9;
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    color: #1a1a1a;
    cursor: pointer;
    text-align: center;
    line-height: 34px;
    -webkit-tap-highlight-color: transparent;
    -webkit-appearance: none;
    appearance: none;
  }
  .abc-app button.k:active { background: #e8e6df; }
  .abc-app button.k.active {
    background: #e6f1fb;
    border-color: #378add;
    color: #0c447c;
  }
  .abc-app button.k.symbol {
    font-size: 18px;
    font-family: "Times New Roman", serif;
  }
  .abc-app button.k.tiny {
    height: 30px;
    line-height: 28px;
    font-size: 12px;
  }
  .abc-app button.k .sub {
    font-size: 9px;
    color: #888780;
    font-weight: 400;
    margin-left: 2px;
  }
  .abc-app button.k.primary {
    background: #185fa5;
    border-color: #185fa5;
    color: #ffffff;
  }
  .abc-app button.k.danger {
    background: #fcebeb;
    border-color: #e24b4a;
    color: #791f1f;
  }

  .header-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-bottom: 6px; }
  .toolbar    { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-bottom: 8px; }

  .keypad { display: grid; grid-template-columns: 56px 1fr 96px; gap: 6px; align-items: start; }
  .col > .k { margin-bottom: 4px; }
  .col > .k:last-child { margin-bottom: 0; }

  .center-pad > * { margin-bottom: 4px; }
  .meas-ctrl {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 4px;
    align-items: center;
    background: #ebe9e0;
    padding: 4px;
    border-radius: 6px;
  }
  .meas-ctrl .label { font-size: 10px; color: #5f5e5a; text-align: center; line-height: 1.2; }
  .meas-ctrl b { font-weight: 500; color: #1a1a1a; }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-bottom: 4px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; margin-bottom: 4px; }

  .mode-pill {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 8px;
    font-size: 9px;
    font-weight: 500;
    background: #e6f1fb;
    color: #0c447c;
  }
  .mode-pill.replace { background: #faece7; color: #993c1d; }

  .header-edit {
    background: #e6f1fb;
    border: 1px solid #378add;
    border-radius: 8px;
    padding: 8px;
    margin-bottom: 8px;
    display: none;
  }
  .header-edit.open { display: block; }
  .header-edit .row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .header-edit input {
    flex: 1;
    height: 36px;
    font-family: ui-monospace, monospace;
    font-size: 13px;
    padding: 0 8px;
    border: 1px solid #b4b2a9;
    border-radius: 6px;
    background: #ffffff;
    color: #1a1a1a;
  }
  .header-edit .field-label {
    font-family: ui-monospace, monospace;
    font-size: 13px;
    color: #0c447c;
    font-weight: 500;
    min-width: 24px;
  }
  .header-edit .actions { display: flex; gap: 6px; justify-content: flex-end; }
  .header-edit .actions .k { width: auto; padding: 0 12px; height: 30px; line-height: 28px; font-size: 12px; }
</style>

<div class="abc-app">
  <h2 class="sr-only">Éditeur ABC mobile</h2>

  <div class="header-edit" id="header-edit">
    <div class="row">
      <span class="field-label" id="he-label">X:</span>
      <input type="text" id="he-input" autocomplete="off" />
    </div>
    <div class="actions">
      <button class="k" id="he-cancel">Annuler</button>
      <button class="k primary" id="he-ok">OK</button>
    </div>
  </div>

  <div class="abc-card">
    <div class="abc-label">Partition · mesure <span id="meas-num">1</span></div>
    <div class="score-wrap" id="score"></div>
  </div>

  <div class="abc-card">
    <div class="abc-label">Code ABC</div>
    <div class="abc-text" id="abc-out"></div>
  </div>

  <div class="header-row">
    <button class="k tiny" data-hdr="X">X:</button>
    <button class="k tiny" data-hdr="T">T:</button>
    <button class="k tiny" data-hdr="M">M:</button>
    <button class="k tiny" data-hdr="K">K:</button>
  </div>

  <div class="toolbar">
    <button class="k tiny" id="btn-bar">|</button>
    <button class="k tiny" id="btn-rest">z</button>
    <button class="k tiny" id="btn-ins">Ins</button>
    <button class="k tiny" id="btn-del">Suppr</button>
    <button class="k tiny" id="btn-clear">⌫</button>
  </div>

  <div class="keypad">
    <div class="col" id="notes-col">
      <button class="k" id="btn-undo" title="annuler">↶</button>
      <button class="k" id="cur-prev" title="curseur ←">◀</button>
    </div>

    <div class="col center-pad">
      <div class="meas-ctrl">
        <button class="k tiny" id="meas-prev">◀</button>
        <div class="label">Mesure<br><b id="meas-pos">1</b></div>
        <button class="k tiny" id="meas-next">▶</button>
      </div>
      <div class="meas-ctrl">
        <button class="k tiny" id="oct-down">▽</button>
        <div class="label">Octave<br><b id="oct-val">0</b></div>
        <button class="k tiny" id="oct-up">△</button>
      </div>
      <div class="label" style="text-align:center; padding-top: 4px; font-size:10px; color:#5f5e5a;">
        <span id="mode-pill" class="mode-pill">Insertion</span>
      </div>
    </div>

    <div class="col">
      <button class="k" id="cur-next" title="curseur →">▶</button>
      <div class="grid2" id="dur-pad"></div>
      <div class="grid3" id="alt-pad"></div>
      <button class="k symbol" id="dot-btn" title="point sur la dernière note">♩·</button>
    </div>
  </div>
</div>

<script>
(function(){
  const NOTES = [
    {label:'Do',  sub:'C', n:'C'},
    {label:'Ré',  sub:'D', n:'D'},
    {label:'Mi',  sub:'E', n:'E'},
    {label:'Fa',  sub:'F', n:'F'},
    {label:'Sol', sub:'G', n:'G'},
    {label:'La',  sub:'A', n:'A'},
    {label:'Si',  sub:'B', n:'B'},
  ];
  const DURATIONS = [
    {label:'𝅗𝅥', d:2},
    {label:'♩', d:1},
    {label:'♪', d:0.5},
    {label:'♬', d:0.25},
  ];

  const state = {
    headers: { X:'1', T:'', M:'4/4', K:'C' },
    tokens: [],
    currentDur: 1,
    currentAcc: '',
    octave: 0,
    cursorBefore: null,    // index where next insertion goes; null = at end
    replaceMode: false,    // false = insertion, true = remplacement
  };

  function effDToAbc(d){
    if(d===1) return '';
    if(d===2) return '2';
    if(d===3) return '3';
    if(d===0.5) return '/2';
    if(d===0.25) return '/4';
    if(d===0.75) return '3/4';
    if(d===1.5) return '3/2';
    if(d===0.375) return '3/8';
    return '';
  }

  function tokenStr(t){
    if(t.type==='bar') return '|';
    let s = '';
    if(t.type==='note'){
      s += t.acc || '';
      let n = t.note;
      if(t.octave>=1) n = n.toLowerCase();
      s += n;
      if(t.octave>=2) s += "'".repeat(t.octave-1);
      else if(t.octave<=-1) s += ",".repeat(-t.octave);
    } else if(t.type==='rest'){ s += 'z'; }
    let effD = t.dot ? t.dur*1.5 : t.dur;
    s += effDToAbc(effD);
    return s;
  }

  function getCb(){ return state.cursorBefore == null ? state.tokens.length : state.cursorBefore; }

  function getMeasures(){
    const cb = getCb();
    const measures = [[]];
    let curM = 0, cursorMeasure = 0;
    state.tokens.forEach((tok, i)=>{
      if(i === cb) cursorMeasure = curM;
      if(tok.type==='bar'){ measures.push([]); curM++; }
      else { measures[curM].push({tok, idx:i}); }
    });
    if(cb === state.tokens.length) cursorMeasure = curM;
    return {measures, cursorMeasure, cb};
  }

  function stepIndex(note, octave){
    const map = {C:0,D:1,E:2,F:3,G:4,A:5,B:6};
    return map[note] + 7*octave;
  }
  function noteY(staffTopY, lineGap, step){
    return staffTopY + 4*lineGap - (step - 2) * (lineGap/2);
  }

  function renderScore(){
    const {measures, cursorMeasure, cb} = getMeasures();
    document.getElementById('meas-num').textContent = cursorMeasure + 1;
    document.getElementById('meas-pos').textContent = cursorMeasure + 1;

    let startM, cursorPos;
    if(cursorMeasure === 0){ startM = 0; cursorPos = 0; }
    else { startM = cursorMeasure - 1; cursorPos = 1; }
    const displayed = [0,1,2].map(i=> measures[startM+i] || null);

    const W = 360, H = 110;
    const staffTopY = 35, lineGap = 8;
    const leftPad = 28, rightPad = 8;
    const usable = W - leftPad - rightPad;
    const measureW = usable / 3;
    const ink = '#1a1a1a';
    const cursorColor = state.replaceMode ? '#993c1d' : '#185fa5';
    const dim = '#888780';

    let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">`;

    for(let i=0;i<5;i++){
      const y = staffTopY + i*lineGap;
      svg += `<line x1="${leftPad-4}" y1="${y}" x2="${W-rightPad}" y2="${y}" stroke="${ink}" stroke-width="0.6" opacity="0.55"/>`;
    }
    svg += `<text x="${leftPad-22}" y="${staffTopY + 4*lineGap + 6}" font-size="44" font-family="serif" fill="${ink}" opacity="0.85">𝄞</text>`;

    for(let i=0;i<=3;i++){
      const x = leftPad + i*measureW;
      svg += `<line x1="${x}" y1="${staffTopY}" x2="${x}" y2="${staffTopY+4*lineGap}" stroke="${ink}" stroke-width="${i===0?1.2:0.8}" opacity="0.7"/>`;
    }

    for(let i=0;i<3;i++){
      const mIdx = startM + i;
      if(measures[mIdx] !== undefined){
        svg += `<text x="${leftPad + i*measureW + 2}" y="${staffTopY-4}" font-size="9" fill="${dim}">${mIdx+1}</text>`;
      }
    }

    displayed.forEach((m, mi)=>{
      if(!m) return;
      const x0 = leftPad + mi*measureW + 12;
      const slotW = (measureW - 18) / Math.max(m.length, 1);
      m.forEach((entry, ni)=>{
        const cx = x0 + ni*slotW + slotW/2;
        const t = entry.tok;
        if(t.type==='note'){
          const step = stepIndex(t.note, t.octave);
          const y = noteY(staffTopY, lineGap, step);
          if(step >= 12){
            for(let s=12; s<=step; s+=2){
              const ly = noteY(staffTopY, lineGap, s);
              svg += `<line x1="${cx-6}" y1="${ly}" x2="${cx+6}" y2="${ly}" stroke="${ink}" stroke-width="0.7"/>`;
            }
          }
          if(step <= 0){
            for(let s=0; s>=step; s-=2){
              const ly = noteY(staffTopY, lineGap, s);
              svg += `<line x1="${cx-6}" y1="${ly}" x2="${cx+6}" y2="${ly}" stroke="${ink}" stroke-width="0.7"/>`;
            }
          }
          if(t.acc==='^') svg += `<text x="${cx-10}" y="${y+3}" font-size="13" fill="${ink}" font-family="serif">♯</text>`;
          else if(t.acc==='_') svg += `<text x="${cx-10}" y="${y+3}" font-size="13" fill="${ink}" font-family="serif">♭</text>`;
          else if(t.acc==='=') svg += `<text x="${cx-10}" y="${y+3}" font-size="11" fill="${ink}" font-family="serif">♮</text>`;

          const effD = t.dot ? t.dur*1.5 : t.dur;
          const filled = effD < 2;
          const hasStem = effD < 4;
          const flagCount = effD <= 0.25 ? 2 : (effD <= 0.5 ? 1 : 0);

          svg += `<ellipse cx="${cx}" cy="${y}" rx="4.2" ry="3.2" transform="rotate(-20 ${cx} ${y})" fill="${filled?ink:'none'}" stroke="${ink}" stroke-width="1"/>`;
          if(hasStem){
            const stemUp = step < 7;
            const sx = stemUp ? cx+3.8 : cx-3.8;
            const sy2 = stemUp ? y - 22 : y + 22;
            svg += `<line x1="${sx}" y1="${y}" x2="${sx}" y2="${sy2}" stroke="${ink}" stroke-width="0.9"/>`;
            for(let f=0; f<flagCount; f++){
              const fy = sy2 + (stemUp ? f*4 : -f*4);
              svg += `<path d="M ${sx} ${fy} q 6 3 5 9" stroke="${ink}" stroke-width="0.9" fill="none"/>`;
            }
          }
          if(t.dot){
            svg += `<circle cx="${cx+8}" cy="${y}" r="1.4" fill="${ink}"/>`;
          }
        } else if(t.type==='rest'){
          const y = staffTopY + 2*lineGap;
          svg += `<rect x="${cx-4}" y="${y-2}" width="8" height="4" fill="${ink}"/>`;
          if(t.dot) svg += `<circle cx="${cx+8}" cy="${y}" r="1.4" fill="${ink}"/>`;
        }
      });
    });

    const cursorM = measures[cursorMeasure] || [];
    let localIdx = 0;
    for(const e of cursorM){ if(e.idx < cb) localIdx++; else break; }
    const mx = leftPad + cursorPos*measureW;
    const slotW2 = (measureW - 18) / Math.max(cursorM.length, 1) || (measureW-18);
    const cursorX = cursorM.length === 0 ? mx + measureW/2 : mx + 12 + localIdx*slotW2;
    const cursorWidth = state.replaceMode ? 3 : 1.3;
    svg += `<line x1="${cursorX}" y1="${staffTopY-6}" x2="${cursorX}" y2="${staffTopY+4*lineGap+6}" stroke="${cursorColor}" stroke-width="${cursorWidth}" opacity="0.85"><animate attributeName="opacity" values="0.85;0.25;0.85" dur="1s" repeatCount="indefinite"/></line>`;

    svg += `</svg>`;
    document.getElementById('score').innerHTML = svg;
  }

  function renderAbc(){
    const cb = getCb();
    let header = '';
    if(state.headers.X) header += 'X:' + state.headers.X + '\n';
    if(state.headers.T) header += 'T:' + state.headers.T + '\n';
    if(state.headers.M) header += 'M:' + state.headers.M + '\n';
    if(state.headers.K) header += 'K:' + state.headers.K + '\n';

    let before = '', after = '';
    state.tokens.forEach((t,i)=>{
      const s = tokenStr(t);
      if(i < cb) before += s; else after += s;
    });
    document.getElementById('abc-out').innerHTML = header + before + '<span class="cursor">|</span>' + after;
  }

  function renderState(){
    document.getElementById('oct-val').textContent = state.octave > 0 ? '+'+state.octave : state.octave;

    const pill = document.getElementById('mode-pill');
    pill.textContent = state.replaceMode ? 'Remplacement' : 'Insertion';
    pill.classList.toggle('replace', state.replaceMode);

    const insBtn = document.getElementById('btn-ins');
    insBtn.classList.toggle('active', state.replaceMode);

    document.querySelectorAll('#dur-pad .k').forEach(b=>{
      b.classList.toggle('active', parseFloat(b.dataset.dur) === state.currentDur);
    });
    document.querySelectorAll('#alt-pad .k').forEach(b=>{
      if(b.dataset.acc !== undefined) b.classList.toggle('active', state.currentAcc === b.dataset.acc);
    });
  }

  function render(){ renderScore(); renderAbc(); renderState(); }

  // --- helpers for navigation skipping bars ---
  function isPlayable(t){ return t && (t.type === 'note' || t.type === 'rest'); }

  function moveCursorRight(){
    let cb = getCb();
    // skip past current pos: find next playable token boundary
    let i = cb;
    // advance at least one token, then keep skipping bars
    if(i < state.tokens.length){
      i++;
      while(i < state.tokens.length && state.tokens[i].type === 'bar') i++;
    }
    state.cursorBefore = (i >= state.tokens.length) ? null : i;
    render();
  }
  function moveCursorLeft(){
    let cb = getCb();
    let i = cb - 1;
    // skip backward over bars
    while(i > 0 && state.tokens[i-1] && state.tokens[i-1].type === 'bar' && state.tokens[i] && state.tokens[i].type === 'bar') i--;
    // we want to land BEFORE the previous playable token: cb' = index of that token
    // simplest: find the previous playable token index, then set cb' = that index
    let prevPlayable = -1;
    for(let j = cb - 1; j >= 0; j--){
      if(isPlayable(state.tokens[j])){ prevPlayable = j; break; }
    }
    if(prevPlayable >= 0){
      state.cursorBefore = prevPlayable;
    } else {
      state.cursorBefore = 0;
    }
    render();
  }

  function insertOrReplace(tok){
    let cb = getCb();
    if(state.replaceMode){
      // find next playable token at/after cb and replace it
      let target = -1;
      for(let i = cb; i < state.tokens.length; i++){
        if(isPlayable(state.tokens[i])){ target = i; break; }
      }
      if(target >= 0){
        state.tokens[target] = tok;
        // advance cursor past replaced token, skipping bars
        let i = target + 1;
        while(i < state.tokens.length && state.tokens[i].type === 'bar') i++;
        state.cursorBefore = (i >= state.tokens.length) ? null : i;
      } else {
        // nothing to replace, append
        state.tokens.push(tok);
        state.cursorBefore = null;
      }
    } else {
      state.tokens.splice(cb, 0, tok);
      let next = cb + 1;
      while(next < state.tokens.length && state.tokens[next].type === 'bar') next++;
      state.cursorBefore = (next >= state.tokens.length) ? null : next;
    }
    render();
  }

  // notes
  const notesCol = document.getElementById('notes-col');
  NOTES.forEach(n=>{
    const b = document.createElement('button');
    b.className = 'k';
    b.innerHTML = n.label + '<span class="sub">' + n.sub + '</span>';
    b.addEventListener('click', ()=>{
      insertOrReplace({type:'note', note:n.n, octave:state.octave, dur:state.currentDur, acc:state.currentAcc, dot:false});
      state.currentAcc = ''; render();
    });
    notesCol.appendChild(b);
  });

  // durations
  const durPad = document.getElementById('dur-pad');
  DURATIONS.forEach(d=>{
    const b = document.createElement('button');
    b.className = 'k symbol';
    b.dataset.dur = d.d;
    b.textContent = d.label;
    b.addEventListener('click', ()=>{ state.currentDur = d.d; render(); });
    durPad.appendChild(b);
  });

  // accidentals
  const altPad = document.getElementById('alt-pad');
  [{label:'♯',acc:'^'},{label:'♭',acc:'_'},{label:'♮',acc:'='}].forEach(a=>{
    const b = document.createElement('button');
    b.className = 'k symbol';
    b.dataset.acc = a.acc;
    b.textContent = a.label;
    b.addEventListener('click', ()=>{
      state.currentAcc = (state.currentAcc === a.acc) ? '' : a.acc;
      render();
    });
    altPad.appendChild(b);
  });

  // dot on last note
  document.getElementById('dot-btn').addEventListener('click', ()=>{
    const cb = getCb();
    for(let i = cb - 1; i >= 0; i--){
      const t = state.tokens[i];
      if(t.type === 'note' || t.type === 'rest'){
        t.dot = !t.dot; render(); return;
      }
    }
  });

  // octave
  document.getElementById('oct-up').addEventListener('click', ()=>{ state.octave = Math.min(3, state.octave+1); render(); });
  document.getElementById('oct-down').addEventListener('click', ()=>{ state.octave = Math.max(-2, state.octave-1); render(); });

  // cursor (skip bars)
  document.getElementById('cur-prev').addEventListener('click', moveCursorLeft);
  document.getElementById('cur-next').addEventListener('click', moveCursorRight);

  function jumpMeasure(delta){
    const {cursorMeasure} = getMeasures();
    const target = Math.max(0, cursorMeasure + delta);
    if(target === 0){ state.cursorBefore = 0; render(); return; }
    let count = 0;
    for(let i=0; i<state.tokens.length; i++){
      if(state.tokens[i].type==='bar'){
        count++;
        if(count === target){
          state.cursorBefore = i+1;
          if(state.cursorBefore === state.tokens.length) state.cursorBefore = null;
          render(); return;
        }
      }
    }
    state.cursorBefore = null; render();
  }
  document.getElementById('meas-prev').addEventListener('click', ()=> jumpMeasure(-1));
  document.getElementById('meas-next').addEventListener('click', ()=> jumpMeasure(+1));

  // toolbar
  document.getElementById('btn-bar').addEventListener('click', ()=>{
    // bars always insert (replace mode does not eat bars)
    const cb = getCb();
    state.tokens.splice(cb, 0, {type:'bar'});
    state.cursorBefore = (cb + 1 >= state.tokens.length) ? null : cb + 1;
    render();
  });
  document.getElementById('btn-rest').addEventListener('click', ()=>{
    insertOrReplace({type:'rest', dur:state.currentDur, dot:false});
  });

  // INS: toggle insertion / remplacement
  document.getElementById('btn-ins').addEventListener('click', ()=>{
    state.replaceMode = !state.replaceMode;
    render();
  });

  // SUPPR: delete next playable token (or bar) at/after cursor
  document.getElementById('btn-del').addEventListener('click', ()=>{
    const cb = getCb();
    if(cb < state.tokens.length){
      state.tokens.splice(cb, 1);
      if(state.cursorBefore !== null && state.cursorBefore >= state.tokens.length){
        state.cursorBefore = null;
      }
      render();
    } else if(state.tokens.length > 0){
      // at end: delete last
      state.tokens.pop();
      state.cursorBefore = null;
      render();
    }
  });

  document.getElementById('btn-undo').addEventListener('click', ()=>{
    const cb = getCb();
    if(cb > 0){
      state.tokens.splice(cb-1, 1);
      state.cursorBefore = cb-1;
      if(state.cursorBefore === state.tokens.length) state.cursorBefore = null;
      render();
    }
  });
  document.getElementById('btn-clear').addEventListener('click', ()=>{
    state.tokens = []; state.cursorBefore = null; render();
  });

  // headers
  const HEADER_NAMES = { X:'Numéro X:', T:'Titre T:', M:'Métrique M:', K:'Tonalité K:' };
  let editingHeader = null;
  const headerEdit = document.getElementById('header-edit');
  const heInput = document.getElementById('he-input');
  const heLabel = document.getElementById('he-label');

  document.querySelectorAll('[data-hdr]').forEach(b=>{
    b.addEventListener('click', ()=>{
      editingHeader = b.dataset.hdr;
      heLabel.textContent = HEADER_NAMES[editingHeader];
      heInput.value = state.headers[editingHeader] || '';
      headerEdit.classList.add('open');
      setTimeout(()=> heInput.focus(), 50);
    });
  });
  document.getElementById('he-ok').addEventListener('click', ()=>{
    if(editingHeader){ state.headers[editingHeader] = heInput.value.trim(); }
    headerEdit.classList.remove('open');
    editingHeader = null;
    render();
  });
  document.getElementById('he-cancel').addEventListener('click', ()=>{
    headerEdit.classList.remove('open');
    editingHeader = null;
  });
  heInput.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter'){ document.getElementById('he-ok').click(); }
    else if(e.key === 'Escape'){ document.getElementById('he-cancel').click(); }
  });

  render();
})();
</script>
