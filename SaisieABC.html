<script>
(function(){
  const NOTES = [
    {label:'Do',sub:'C',n:'C'},{label:'Ré',sub:'D',n:'D'},{label:'Mi',sub:'E',n:'E'},
    {label:'Fa',sub:'F',n:'F'},{label:'Sol',sub:'G',n:'G'},{label:'La',sub:'A',n:'A'},{label:'Si',sub:'B',n:'B'},
  ];
  const DURATIONS = [{label:'𝅗𝅥',d:2},{label:'♩',d:1},{label:'♪',d:0.5},{label:'♬',d:0.25}];
  const SHARP_NOTES = ['F','C','G','D','A','E','B'];
  const FLAT_NOTES  = ['B','E','A','D','G','C','F'];
  // ABC ornament codes mapped to display labels
  const ORNAMENTS = [
    {code:'T', label:'tr'}, {code:'M', label:'~M'}, {code:'P', label:'pralle'},
    {code:'H', label:'fermata'}, {code:'L', label:'accent'}, {code:'.', label:'staccato'},
    {code:'u', label:'up bow'}, {code:'v', label:'down bow'}, {code:'O', label:'coda'},
  ];
  const CHORD_QUALITIES = ['','m','7','m7','M7','6','m6','9','11','13','sus2','sus4','dim','dim7','aug','add9'];

  const state = {
    headers: { X:'1', T:'' },
    pieceMeter: '4/4', pieceUnit: '1/4', pieceKeySig: 0, pieceClef: 'treble',
    measures: [], sel: {m:0, s:0}, octave: 0,
    timeChanges: {}, keyChanges: {}, clefChanges: {}, repeats: {},
    tempo: 100, volume: 60,
    abcCollapsed: false, fullscreen: false, viewmode: false,
  };

  const history = { stack: [], pos: -1, max: 100 };
  function snapshot(){ return JSON.stringify(state); }
  function pushHistory(){
    if(history.pos < history.stack.length - 1) history.stack = history.stack.slice(0, history.pos + 1);
    history.stack.push(snapshot());
    if(history.stack.length > history.max) history.stack.shift();
    history.pos = history.stack.length - 1;
  }
  function loadFrom(snap){ const o = JSON.parse(snap); Object.assign(state, o); }
  function undo(){ if(history.pos > 0){ history.pos--; loadFrom(history.stack[history.pos]); render(); } }
  function redo(){ if(history.pos < history.stack.length - 1){ history.pos++; loadFrom(history.stack[history.pos]); render(); } }

  function parseMeter(meter){
    if(!meter) return {num:4, den:4};
    if(meter === 'C') return {num:4, den:4};
    if(meter === 'C|') return {num:2, den:2};
    const m = meter.match(/^\s*(\d+)\s*\/\s*(\d+)\s*$/);
    if(m) return {num:parseInt(m[1],10), den:parseInt(m[2],10)};
    return {num:4, den:4};
  }
  function meterAt(idx){ let cur = state.pieceMeter; for(let i=0; i<=idx; i++){ if(state.timeChanges[i]) cur = state.timeChanges[i]; } return cur; }
  function keyAt(idx){ let cur = state.pieceKeySig; for(let i=0; i<=idx; i++){ if(state.keyChanges[i] !== undefined) cur = state.keyChanges[i]; } return cur; }
  function clefAt(idx){ let cur = state.pieceClef; for(let i=0; i<=idx; i++){ if(state.clefChanges[i]) cur = state.clefChanges[i]; } return cur; }
  function measureCapacity(meter){ const {num, den} = parseMeter(meter); return num * (4/den); }
  function effDur(t){ return t.dot ? t.dur*1.5 : t.dur; }
  function beamGroupUnit(meter){ const {num, den} = parseMeter(meter); if(den === 8 && num % 3 === 0 && num >= 6) return 1.5; return 4/den; }

  function buildEmptyMeasure(meter){
    const {num, den} = parseMeter(meter);
    const beatDur = 4 / den;
    const slots = [];
    for(let i=0; i<num; i++) slots.push({type:'rest', dur:beatDur, dot:false});
    return slots;
  }
  function rebuildMeasures(){
    const count = Math.max(state.measures.length, 6);
    state.measures = [];
    state.timeChanges = {}; state.keyChanges = {}; state.clefChanges = {}; state.repeats = {};
    for(let i=0; i<count; i++) state.measures.push(buildEmptyMeasure(state.pieceMeter));
    state.sel = {m:0, s:0};
  }

  function splitDurationByBeat(offset, amount, beat){
    const eps = 1e-6;
    const out = [];
    let cur = +offset.toFixed(6); let rem = +amount.toFixed(6);
    const distToBeat = ((cur % beat) === 0) ? 0 : (beat - (cur % beat));
    if(distToBeat > eps && rem > eps){
      const toFill = Math.min(distToBeat, rem);
      const subs = [4,2,1,0.5,0.25,0.125].filter(u => u <= beat/2 + eps);
      let used = 0;
      for(const u of subs){ while(toFill - used >= u - eps){ out.push({dur:u, dot:false}); used = +(used + u).toFixed(6); } }
      cur = +(cur + used).toFixed(6); rem = +(rem - used).toFixed(6);
    }
    while(rem >= beat - eps){
      out.push({dur: (beat === 1.5) ? 1 : beat, dot: (beat === 1.5)});
      rem = +(rem - beat).toFixed(6); cur = +(cur + beat).toFixed(6);
    }
    if(rem > eps){
      const subs = [4,2,1,0.5,0.25,0.125].filter(u => u <= beat/2 + eps);
      let leftover = rem;
      for(const u of subs){ while(leftover >= u - eps){ out.push({dur:u, dot:false}); leftover = +(leftover - u).toFixed(6); } }
    }
    return out;
  }

  function rebalanceMeasure(m, anchorIdx, oldEffDur){
    const meter = meterAt(m);
    const {den} = parseMeter(meter);
    const beat = 4/den;
    const cap = measureCapacity(meter);
    const meas = state.measures[m];
    const anchor = meas[anchorIdx];
    let newDur = effDur(anchor);
    let beforeUsed = 0;
    for(let i=0; i<anchorIdx; i++) beforeUsed += effDur(meas[i]);
    if(beforeUsed + newDur > cap + 1e-6){
      const fits = cap - beforeUsed;
      const overflow = newDur - fits;
      anchor.tieToNext = true;
      const fitsPieces = splitDurationByBeat(beforeUsed, fits, beat);
      if(fitsPieces.length > 0){
        anchor.dur = fitsPieces[0].dur; anchor.dot = fitsPieces[0].dot;
        const extras = fitsPieces.slice(1).map((p) => { const c = Object.assign({}, anchor, {dur: p.dur, dot: p.dot}); c.tieToNext = true; return c; });
        state.measures[m] = meas.slice(0, anchorIdx + 1).concat(extras);
      }
      const nextM = m + 1;
      if(nextM >= state.measures.length){ state.measures.push(buildEmptyMeasure(meterAt(m))); }
      const contPieces = splitDurationByBeat(0, overflow, 4/parseMeter(meterAt(nextM)).den);
      const contSlots = contPieces.map((p, i) => { const c = Object.assign({}, anchor, {dur: p.dur, dot: p.dot}); delete c.tieToNext; if(i < contPieces.length - 1) c.tieToNext = true; return c; });
      _consumeFromHead(nextM, overflow, contSlots);
      return;
    }
    const delta = +(newDur - oldEffDur).toFixed(6);
    const eps = 1e-6;
    if(Math.abs(delta) < eps) return;
    if(delta < 0){
      const freeAmount = -delta;
      const offsetAfterAnchor = beforeUsed + newDur;
      const pieces = splitDurationByBeat(offsetAfterAnchor, freeAmount, beat);
      const newSlots = pieces.map(p => { const copy = Object.assign({}, anchor, {dur: p.dur, dot: p.dot}); delete copy.tieToNext; return copy; });
      const tail = meas.slice(anchorIdx + 1);
      state.measures[m] = meas.slice(0, anchorIdx + 1).concat(newSlots, tail);
      truncateMeasureToCapacity(m, cap);
      return;
    }
    let need = delta; let cursor = anchorIdx + 1;
    while(need > eps && cursor < meas.length){
      const slot = meas[cursor]; const dur = effDur(slot);
      if(dur <= need + eps){ need = +(need - dur).toFixed(6); meas.splice(cursor, 1); }
      else {
        const remaining = +(dur - need).toFixed(6);
        let off = 0; for(let i=0; i<cursor; i++) off += effDur(meas[i]);
        const pieces = splitDurationByBeat(off + need, remaining, beat);
        const newCopies = pieces.map(p => Object.assign({}, slot, {dur: p.dur, dot: p.dot}));
        meas.splice(cursor, 1, ...newCopies);
        need = 0;
      }
    }
    truncateMeasureToCapacity(m, cap);
  }
  function _consumeFromHead(m, amount, replacementSlots){
    const meter = meterAt(m); const beat = 4/parseMeter(meter).den;
    const meas = state.measures[m]; const eps = 1e-6;
    let need = amount; let cursor = 0;
    while(need > eps && cursor < meas.length){
      const slot = meas[cursor]; const dur = effDur(slot);
      if(dur <= need + eps){ need = +(need - dur).toFixed(6); meas.splice(cursor, 1); }
      else {
        const remaining = +(dur - need).toFixed(6);
        const off = need;
        const pieces = splitDurationByBeat(off, remaining, beat);
        const newCopies = pieces.map(p => Object.assign({}, slot, {dur: p.dur, dot: p.dot}));
        meas.splice(cursor, 1, ...newCopies);
        need = 0;
      }
    }
    state.measures[m] = replacementSlots.concat(state.measures[m]);
    truncateMeasureToCapacity(m, measureCapacity(meter));
  }
  function truncateMeasureToCapacity(m, cap){
    const eps = 1e-6;
    const meas = state.measures[m];
    let used = 0;
    for(let i=0; i<meas.length; i++){
      const d = effDur(meas[i]);
      if(used + d > cap + eps){
        state.measures[m] = meas.slice(0, i);
        const meter = meterAt(m); const {den} = parseMeter(meter); const beat = 4/den;
        const tail = splitDurationByBeat(used, cap - used, beat).map(p=> ({type:'rest', dur:p.dur, dot:p.dot}));
        state.measures[m] = state.measures[m].concat(tail);
        return;
      }
      used += d;
    }
    if(used < cap - eps){
      const meter = meterAt(m); const {den} = parseMeter(meter); const beat = 4/den;
      const tail = splitDurationByBeat(used, cap - used, beat).map(p=> ({type:'rest', dur:p.dur, dot:p.dot}));
      state.measures[m] = meas.concat(tail);
    }

              svg += '<line x1="'+sx+'" y1="'+headY+'" x2="'+sx+'" y2="'+beamY+'" stroke="'+color+'" stroke-width="0.8"/>';
              if(isSel) svg += '<circle cx="'+cx+'" cy="'+drawn.headY+'" r="8" fill="none" stroke="'+sel+'" stroke-width="0.7" opacity="0.4"/>';
              if(prevSlot && prevSlot.t.tieToNext) tiePoints.push({fromCx: prevSlot.cx, fromY: prevSlot.y, toCx: cx, toY: drawn.headY});
              prevSlot = {t, cx, y: drawn.headY};
            } else {
              const step = stepIndex(t.note, t.octave); const stemUp = step < middleStep;
              const drawn = drawNoteHead(t, cx, color, localClef, true, stemUp, staffTop);
              svg += drawn.svg;
              if(isSel) svg += '<circle cx="'+cx+'" cy="'+drawn.headY+'" r="8" fill="none" stroke="'+sel+'" stroke-width="0.7" opacity="0.4"/>';
              if(prevSlot && prevSlot.t.tieToNext) tiePoints.push({fromCx: prevSlot.cx, fromY: prevSlot.y, toCx: cx, toY: drawn.headY});
              prevSlot = {t, cx, y: drawn.headY};
            }
          } else {
            const drawn = drawRest(t, cx, color, staffTop);
            svg += drawn.svg;
            if(isSel) svg += '<circle cx="'+cx+'" cy="'+drawn.headY+'" r="8" fill="none" stroke="'+sel+'" stroke-width="0.7" opacity="0.4"/>';
            prevSlot = null;
          }
          // tuplet indicator below: a small "3" centered under the start
          if(t.tuplet && (si === 0 || !m[si-1].tuplet)){
            const groupSlots = [];
            for(let j=si; j<m.length && m[j].tuplet === t.tuplet && groupSlots.length < t.tuplet; j++) groupSlots.push(j);
            if(groupSlots.length > 0){
              const cxFirst = x0 + groupSlots[0]*slotW + slotW/2;
              const cxLast = x0 + groupSlots[groupSlots.length-1]*slotW + slotW/2;
              const cxMid = (cxFirst + cxLast)/2;
              svg += '<text x="'+cxMid+'" y="'+(staffTop + 5*LINE_GAP + 6)+'" font-size="8" font-style="italic" fill="'+ink+'" text-anchor="middle">'+t.tuplet+'</text>';
            }
          }
        });
        tiePoints.forEach(tp=>{ const cx = (tp.fromCx + tp.toCx) / 2; const cy = ((tp.fromY + tp.toY) / 2) + 6; svg += '<path d="M '+(tp.fromCx+3)+' '+(tp.fromY+3)+' Q '+cx+' '+cy+' '+(tp.toCx-3)+' '+(tp.toY+3)+'" stroke="'+ink+'" stroke-width="0.9" fill="none"/>'; });
        beamGroups.forEach((g, gIdx)=>{
          const data = groupBeamData[gIdx]; const stemUp = data.stemUp; const beamY = data.beamY; const stems = data.stems;
          const xStart = stems[0].sx; const xEnd = stems[stems.length-1].sx;
          const beamThickness = 2.5;
          const beamCount = Math.max(...g.map(idx=>{ const t = m[idx]; const eD = effDur(t); if(eD <= 0.125 + 1e-6) return 3; if(eD <= 0.25 + 1e-6) return 2; return 1; }));
          const dyOffset = stemUp ? beamThickness + 0.8 : -(beamThickness + 0.8);
          for(let bi = 0; bi < beamCount; bi++){ const yy = beamY + bi * dyOffset; svg += '<rect x="'+xStart+'" y="'+(yy - beamThickness/2)+'" width="'+(xEnd - xStart)+'" height="'+beamThickness+'" fill="'+ink+'"/>'; }
        });
      }
    }
    svg += '</svg>';
    document.getElementById('score').innerHTML = svg;
  }

  function selectPrev(){ let {m, s} = state.sel; if(s > 0){ state.sel = {m, s:s-1}; render(); return; } if(m > 0){ state.sel = {m:m-1, s: state.measures[m-1].length - 1}; render(); return; } }
  function jumpMeasure(delta){
    const cur = state.sel.m;
    if(delta > 0 && cur === state.measures.length - 1){ state.measures.push(buildEmptyMeasure(meterAt(cur))); state.sel = {m: state.measures.length - 1, s: 0}; pushHistory(); render(); return; }
    const target = cur + delta;

  const audio = { ctx: null, master: null, playing: false, scheduled: [], stopAt: 0, raf: null };
  function ensureAudio(){
    if(!audio.ctx){ audio.ctx = new (window.AudioContext || window.webkitAudioContext)(); audio.master = audio.ctx.createGain(); audio.master.connect(audio.ctx.destination); }
    audio.master.gain.value = state.volume / 200;
    if(audio.ctx.state === 'suspended') audio.ctx.resume();
  }
  function midiOfNote(note, octave, acc, keySig){
    const baseSemi = {C:0, D:2, E:4, F:5, G:7, A:9, B:11}[note];
    let midi = 60 + baseSemi + octave * 12; let alteration = 0;
    if(acc === '^') alteration = 1; else if(acc === '_') alteration = -1;
    else if(acc === '=') alteration = 0;
    else { if(keySig > 0 && SHARP_NOTES.slice(0, keySig).includes(note)) alteration = 1; else if(keySig < 0 && FLAT_NOTES.slice(0, -keySig).includes(note)) alteration = -1; }
    return midi + alteration;
  }
  function freqOfMidi(m){ return 440 * Math.pow(2, (m - 69)/12); }
  function previewNote(midi, durSec = 0.25){
    ensureAudio();
    const t = audio.ctx.currentTime + 0.005;
    const freq = freqOfMidi(midi);
    const osc = audio.ctx.createOscillator(); const gain = audio.ctx.createGain();
    osc.type = 'triangle'; osc.frequency.value = freq;
    const peak = 0.5; const a = 0.005;
    gain.gain.setValueAtTime(0, t); gain.gain.linearRampToValueAtTime(peak, t + a);
    gain.gain.setValueAtTime(peak, t + Math.max(durSec - 0.06, a));
    gain.gain.linearRampToValueAtTime(0, t + durSec);
    osc.connect(gain); gain.connect(audio.master);
    osc.start(t); osc.stop(t + durSec + 0.03);
  }
  function playSchedule(){
    ensureAudio(); stopPlayback(false);
    audio.playing = true;
    document.getElementById('btn-play').textContent = '⏸';
    const startTime = audio.ctx.currentTime + 0.05;
    let t = startTime; const qDur = 60 / state.tempo;
    state.measures.forEach((m, mi)=>{
      const sig = keyAt(mi);
      m.forEach((slot, si)=>{
        let dur = effDur(slot) * qDur;
        if(slot.tuplet === 3) dur = dur * 2/3; // triolet plays at 2/3 of normal
        if(slot.type === 'note'){
          const midi = midiOfNote(slot.note, slot.octave, slot.acc, sig);
          const osc = audio.ctx.createOscillator(); const gain = audio.ctx.createGain();
          osc.type = 'triangle'; osc.frequency.value = freqOfMidi(midi);
          const a = 0.005, r = Math.min(0.05, dur * 0.3);
          gain.gain.setValueAtTime(0, t); gain.gain.linearRampToValueAtTime(0.5, t + a);
          gain.gain.setValueAtTime(0.5, t + dur - r); gain.gain.linearRampToValueAtTime(0, t + dur);
          osc.connect(gain); gain.connect(audio.master);
          osc.start(t); osc.stop(t + dur + 0.02);
          audio.scheduled.push(osc);
        }
        audio.scheduled.push({ updateAt: t, measureIdx: mi, slotIdx: si });
        t += dur;
      });
    });
    audio.stopAt = t;
    function tick(){
      if(!audio.playing) return;
      const now = audio.ctx.currentTime;
      let last = null;
      for(const ev of audio.scheduled){ if(ev.updateAt !== undefined && ev.updateAt <= now) last = ev; if(ev.updateAt !== undefined && ev.updateAt > now) break; }
      if(last && (state.sel.m !== last.measureIdx || state.sel.s !== last.slotIdx)){ state.sel = { m: last.measureIdx, s: last.slotIdx }; renderScore(); renderState(); }
      if(now >= audio.stopAt){ stopPlayback(true); return; }
      audio.raf = requestAnimationFrame(tick);
    }
    audio.raf = requestAnimationFrame(tick);
  }
  function stopPlayback(refresh){ if(audio.raf){ cancelAnimationFrame(audio.raf); audio.raf = null; } audio.scheduled.forEach(ev=>{ if(ev.stop) try{ev.stop();}catch(_){} }); audio.scheduled = []; audio.playing = false; document.getElementById('btn-play').textContent = '▶'; if(refresh) render(); }

  });
  const fileInput = document.getElementById('file-input');
  document.getElementById('btn-open-file').addEventListener('click', ()=>{ fileInput.click(); });
  fileInput.addEventListener('change', (e)=>{
    const f = e.target.files[0]; if(!f) return;
    const reader = new FileReader();
    reader.onload = (ev)=>{
      const text = ev.target.result;
      const ok = importAbcText(text);
      if(!ok) alert('Impossible de lire ce fichier ABC');
      fileInput.value = '';
    };
    reader.readAsText(f);
  });

  // Very basic ABC importer — extracts headers and shows raw ABC under the score.
  // For now we DON'T re-parse the body into our slot model (that's a substantial parser).
  // Instead we replace headers and show the raw text in the code area as a fallback.
  function importAbcText(text){
    try {
      // Extract simple headers
      const lines = text.split(/\r?\n/);
      const headers = {};
      let body = '';
      let inBody = false;
      for(const line of lines){
        const m = line.match(/^([A-Z]):\s*(.*)$/);
        if(!inBody && m){
          const k = m[1]; const v = m[2].trim();
          headers[k] = v;
          if(k === 'K') inBody = true;
          continue;
        }
        if(inBody) body += line + '\n';
      }
      if(headers.X) state.headers.X = headers.X;
      if(headers.T) state.headers.T = headers.T;
      if(headers.M) state.pieceMeter = headers.M;
      if(headers.L) state.pieceUnit = headers.L;
      if(headers.Q){
        const qm = headers.Q.match(/=(\d+)/);
        if(qm) state.tempo = parseInt(qm[1],10);
      }
      if(headers.K){
        // Try to parse the key
        const km = headers.K.match(/^([A-G][#b]?)(m?)(\s+clef=(\S+))?/);
        if(km){
          const root = km[1];
          const minor = km[2] === 'm';
          // Map to keySig (major)
          const sigMap = {'C':0,'G':1,'D':2,'A':3,'E':4,'B':5,'F#':6,'C#':7,'F':-1,'Bb':-2,'Eb':-3,'Ab':-4,'Db':-5,'Gb':-6,'Cb':-7};
          let sig = sigMap[root] !== undefined ? sigMap[root] : 0;
          if(minor) sig -= 3; // minor relatives
          state.pieceKeySig = sig;
          if(km[4] === 'bass') state.pieceClef = 'bass';
          else if(km[4] === 'treble-8') state.pieceClef = 'treble8';
          else state.pieceClef = 'treble';
        }
      }
      // We rebuild empty measures (the user will see the imported headers but the body is shown raw).
      rebuildMeasures();
      pushHistory();
      render();
      // Show import message
      alert('En-têtes importés. Le corps du morceau n\'est pas encore reconstruit (à venir). Voici l\'en-tête appliqué.');
      return true;
    } catch(e){
      console.error(e);
      return false;
    }
  }

  // Local saves (memo)
  const STORAGE_KEY = 'abc-editor-saves';
  function getSaves(){ try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(_){ return []; } }
  function setSaves(list){ localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); }
  function exportState(){ return JSON.stringify({ headers: state.headers, pieceMeter: state.pieceMeter, pieceUnit: state.pieceUnit, pieceKeySig: state.pieceKeySig, pieceClef: state.pieceClef, measures: state.measures, timeChanges: state.timeChanges, keyChanges: state.keyChanges, clefChanges: state.clefChanges, repeats: state.repeats, tempo: state.tempo }); }
  function importState(json){ try { const o = JSON.parse(json); Object.assign(state, o); state.sel = {m:0, s:0}; state.octave = 0; pushHistory(); render(); return true; } catch(e){ return false; } }

  document.getElementById('btn-saves').addEventListener('click', ()=>{
    const saves = getSaves();
    let listHtml = '<div class="save-list">';
    if(saves.length === 0) listHtml += '<div class="item" style="color:#888780; cursor:default;">Aucune sauvegarde</div>';
    else saves.forEach((s, i)=> listHtml += '<div class="item" data-idx="'+i+'"><span>'+s.name+'</span><span class="del" data-del="'+i+'">×</span></div>');
    listHtml += '</div>';
    listHtml += '<div class="row"><span class="field-label">Nom:</span><input id="sn" type="text" value="'+(state.headers.T||'Morceau').replace(/"/g,'&quot;')+'"/></div>';
    openPanel({
      title:'Mémoires locales',
      body: listHtml,
      hideActions:true,
      extraButtons:['Annuler','Enregistrer ici'],
      onMount:()=>{
        document.querySelectorAll('.save-list .item[data-idx]').forEach(el=>{
          el.addEventListener('click', (ev)=>{
            if(ev.target.dataset.del !== undefined){
              const idx = parseInt(ev.target.dataset.del, 10); const saves = getSaves(); saves.splice(idx,1); setSaves(saves);
              closePanel(); return;
            }
            const idx = parseInt(el.dataset.idx, 10); const saves = getSaves();
            if(saves[idx] && importState(saves[idx].data)) closePanel();
          });
        });
      },
      onExtra:(which)=>{
        if(which === 'Annuler'){ closePanel(); return; }
        const name = document.getElementById('sn').value.trim() || 'Morceau';
        const saves = getSaves();
        const existing = saves.findIndex(s=> s.name === name);
        const entry = { name, data: exportState(), date: new Date().toISOString() };
        if(existing >= 0) saves[existing] = entry; else saves.push(entry);
        setSaves(saves); closePanel();
      },
    });
  });

  document.getElementById('btn-new').addEventListener('click', ()=>{
    openPanel({
      title:'Nouveau morceau',
      body:'<small>Effacer le morceau actuel ?</small>',
      hideActions:true,
      extraButtons:['Annuler','Effacer'],
      onExtra:(which)=>{
        if(which === 'Effacer'){ state.headers = {X:'1', T:''}; state.pieceMeter='4/4'; state.pieceUnit='1/4'; state.pieceKeySig=0; state.pieceClef='treble'; rebuildMeasures(); pushHistory(); render(); }
        closePanel();
      },
    });
  });
  document.getElementById('btn-export').addEventListener('click', ()=>{
    const abc = document.getElementById('abc-out').textContent;
    openPanel({
      title:'Exporter ABC',
      body:'<small>Copier le code ci-dessous :</small><textarea id="exp" readonly>'+abc.replace(/</g,'&lt;')+'</textarea>',
      hideActions:true, extraButtons:['Fermer','Copier'],
      onMount:()=>{ document.getElementById('exp').select(); },
      onExtra:(which)=>{ if(which === 'Copier'){ const ta = document.getElementById('exp'); ta.select(); try { document.execCommand('copy'); } catch(_){} } closePanel(); },
    });
  });

  // Generic panel
  const panel = document.getElementById('panel');
  const panelTitle = document.getElementById('panel-title');
  const panelBody = document.getElementById('panel-body');
  const panelOk = document.getElementById('panel-ok');
  const panelCancel = document.getElementById('panel-cancel');
  let currentOnOk = null; let currentOnExtra = null;
  function openPanel({title, body, onMount, onOk, hideActions, extraButtons, onExtra}){
    panelTitle.textContent = title;
    let extraHtml = '';
    if(extraButtons && extraButtons.length){
      extraHtml = '<div class="actions" style="margin-top:6px;">' + extraButtons.map((b,i)=> '<button class="k '+(i===extraButtons.length-1?'primary':'')+'" data-extra="'+b.replace(/"/g,'&quot;')+'">'+b+'</button>').join('') + '</div>';
    }
    panelBody.innerHTML = body + extraHtml;
    currentOnOk = onOk || null; currentOnExtra = onExtra || null;
    panelOk.style.display = (hideActions || extraButtons) ? 'none' : '';
    panelCancel.style.display = (hideActions || extraButtons) ? 'none' : '';
    panel.classList.add('open');
    if(onMount) setTimeout(onMount, 50);
    if(extraButtons) setTimeout(()=>{ panelBody.querySelectorAll('[data-extra]').forEach(b=>{ b.addEventListener('click', ()=>{ if(currentOnExtra) currentOnExtra(b.dataset.extra); }); }); }, 50);
  }
  function closePanel(){ panel.classList.remove('open'); currentOnOk = null; currentOnExtra = null; }
  panelOk.addEventListener('click', ()=>{ if(currentOnOk) currentOnOk(); closePanel(); render(); });
  panelCancel.addEventListener('click', closePanel);

  document.querySelector('[data-hdr="X"]').addEventListener('click', ()=>{ openPanel({ title: 'Numéro X:', body: '<div class="row"><span class="field-label">X:</span><input id="hi" type="text" value="' + (state.headers.X||'') + '"/></div>', onMount: ()=> document.getElementById('hi').focus(), onOk: ()=>{ state.headers.X = document.getElementById('hi').value.trim(); pushHistory(); } }); });
  document.querySelector('[data-hdr="T"]').addEventListener('click', ()=>{ openPanel({ title: 'Titre', body: '<div class="row"><span class="field-label">T:</span><input id="hi" type="text" value="' + (state.headers.T||'') + '"/></div>', onMount: ()=> document.getElementById('hi').focus(), onOk: ()=>{ state.headers.T = document.getElementById('hi').value.trim(); pushHistory(); } }); });

  function scopePanel({title, renderControls, applyPiece, applyHere, isMeter}){
    // ⭐ Si on est sur la mesure 0 et c'est le rythme, l'option "À partir d'ici" est équivalente à "Tout"
    const onFirstMeasure = (state.sel.m === 0);
    const buttons = ['Annuler', onFirstMeasure ? 'Tout (1ère mesure)' : 'Tout', onFirstMeasure ? null : 'Mesure ' + (state.sel.m+1) + '+'].filter(Boolean);
    openPanel({
      title,
      body: renderControls(),
      hideActions:true,
      extraButtons: buttons,
      onMount: ()=>{ if(typeof renderControls.mount === 'function') renderControls.mount(); },
      onExtra:(which)=>{
        if(which === 'Annuler'){ closePanel(); return; }
        if(which.startsWith('Tout')){ applyPiece(); cleanupAccidentals(); pushHistory(); closePanel(); render(); return; }
        applyHere(); cleanupAccidentals(); pushHistory(); closePanel(); render();
      },
    });
  }

  document.querySelector('[data-hdr="M"]').addEventListener('click', ()=>{
    const cur = meterAt(state.sel.m); const {num, den} = parseMeter(cur);
    let n = num, d = den; const denValues = [1,2,4,8,16];
    let unitDenom = parseInt(state.pieceUnit.split('/')[1], 10);
    const unitDenoms = [1,2,4,8,16,32];
    function controls(){
      return ('<div class="stepper"><button class="k" id="num-d">−</button><div class="val">Num: <b id="num-v">'+n+'</b></div><button class="k" id="num-u">+</button></div>'+
              '<div class="stepper"><button class="k" id="den-d">−</button><div class="val">Dén: <b id="den-v">'+d+'</b></div><button class="k" id="den-u">+</button></div>'+
              '<small>Unité par défaut L: (tout le morceau)</small>'+
              '<div class="stepper"><button class="k" id="L-d">−</button><div class="val">L: 1/<b id="L-v">'+unitDenom+'</b></div><button class="k" id="L-u">+</button></div>');
    }
    controls.mount = function(){
      const upd = ()=>{ document.getElementById('num-v').textContent = n; document.getElementById('den-v').textContent = d; document.getElementById('L-v').textContent = unitDenom; };
      document.getElementById('num-u').addEventListener('click', ()=>{ n = Math.min(16, n+1); upd(); });
      document.getElementById('num-d').addEventListener('click', ()=>{ n = Math.max(1, n-1); upd(); });
      document.getElementById('den-u').addEventListener('click', ()=>{ const i = denValues.indexOf(d); if(i<denValues.length-1){ d = denValues[i+1]; upd(); } });
      document.getElementById('den-d').addEventListener('click', ()=>{ const i = denValues.indexOf(d); if(i>0){ d = denValues[i-1]; upd(); } });
      document.getElementById('L-u').addEventListener('click', ()=>{ const i = unitDenoms.indexOf(unitDenom); if(i<unitDenoms.length-1){ unitDenom = unitDenoms[i+1]; upd(); } });
      document.getElementById('L-d').addEventListener('click', ()=>{ const i = unitDenoms.indexOf(unitDenom); if(i>0){ unitDenom = unitDenoms[i-1]; upd(); } });
    };
    scopePanel({
      title:'Rythme',
      renderControls: controls,
      applyPiece: ()=>{
        // ⭐ Si on est sur la mesure 0, supprimer aussi tous les changements inline
        state.pieceMeter = n + '/' + d; state.pieceUnit = '1/' + unitDenom;
        if(state.sel.m === 0){
          // efface aussi un éventuel changement à l'index 0
          delete state.timeChanges[0];
        } else {
          state.timeChanges = {};
        }
        rebuildMeasures();
      },
      applyHere: ()=>{
        if(state.sel.m === 0){
          // C'est équivalent à "Tout"
          state.pieceMeter = n + '/' + d; state.pieceUnit = '1/' + unitDenom;
          delete state.timeChanges[0];
          rebuildMeasures();
          return;
        }
        state.pieceUnit = '1/' + unitDenom;
        const newMeter = n + '/' + d;
        state.timeChanges[state.sel.m] = newMeter;
        for(let i = state.sel.m; i < state.measures.length; i++){ if(i > state.sel.m && state.timeChanges[i]) break; state.measures[i] = buildEmptyMeasure(meterAt(i)); }
        state.sel = {m: state.sel.m, s: 0};
      },
    });
  });

  document.querySelector('[data-hdr="K"]').addEventListener('click', ()=>{
    let sig = keyAt(state.sel.m);
    const labelOf = (s)=>{ if(s === 0) return '0 (Do/La m)'; if(s > 0) return s + (s === 1 ? ' dièse' : ' dièses'); return Math.abs(s) + (Math.abs(s) === 1 ? ' bémol' : ' bémols'); };
    function controls(){ return ('<div class="stepper"><button class="k" id="sig-d">♭ −</button><div class="val"><b id="sig-v">'+labelOf(sig)+'</b></div><button class="k" id="sig-u">♯ +</button></div>'); }
    controls.mount = function(){ const upd = ()=>{ document.getElementById('sig-v').textContent = labelOf(sig); }; document.getElementById('sig-u').addEventListener('click', ()=>{ sig = Math.min(7, sig+1); upd(); }); document.getElementById('sig-d').addEventListener('click', ()=>{ sig = Math.max(-7, sig-1); upd(); }); };
    scopePanel({ title:'Armure', renderControls: controls,
      applyPiece: ()=>{ state.pieceKeySig = sig; if(state.sel.m === 0) delete state.keyChanges[0]; else state.keyChanges = {}; },
      applyHere: ()=>{ if(state.sel.m === 0){ state.pieceKeySig = sig; delete state.keyChanges[0]; } else state.keyChanges[state.sel.m] = sig; }, });
  });

  document.querySelector('[data-hdr="CLEF"]').addEventListener('click', ()=>{
    let pick = clefAt(state.sel.m);
    function controls(){ return ('<div class="grid3" id="clef-pick"><button class="k symbol" data-clef="treble">𝄞</button><button class="k" data-clef="treble8" style="font-size:11px;">Sol-8</button><button class="k symbol" data-clef="bass">𝄢</button></div>'); }
    controls.mount = function(){ const refresh = ()=>{ document.querySelectorAll('#clef-pick .k').forEach(b=>{ b.classList.toggle('active', b.dataset.clef === pick); }); }; refresh(); document.querySelectorAll('#clef-pick .k').forEach(b=>{ b.addEventListener('click', ()=>{ pick = b.dataset.clef; refresh(); }); }); };
    scopePanel({ title:'Clé', renderControls: controls,
      applyPiece: ()=>{ state.pieceClef = pick; if(state.sel.m === 0) delete state.clefChanges[0]; else state.clefChanges = {}; },
      applyHere: ()=>{ if(state.sel.m === 0){ state.pieceClef = pick; delete state.clefChanges[0]; } else state.clefChanges[state.sel.m] = pick; }, });
  });

  rebuildMeasures();
  pushHistory();
  render();
})();
</script>
