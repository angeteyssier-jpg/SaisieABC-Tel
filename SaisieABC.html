<style>
  .abc-app, .abc-app * { box-sizing: border-box; min-width: 0; }
  .abc-app {
    width: 100%; max-width: 900px; margin: 0 auto;
    padding: 4px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: #1a1a1a; background: #f5f4ef; border-radius: 8px;
    position: relative; overflow-x: hidden;
  }
  .abc-app.fullscreen { position: fixed; inset: 0; width: 100vw; height: 100vh; max-width: none; border-radius: 0; z-index: 9999; overflow-y: auto; }
  .abc-app.viewmode .edit-only { display: none !important; }
  .abc-app.viewmode .score-wrap { aspect-ratio: 360 / 320; max-height: none; }

  .abc-card { background: #ffffff; border: 1px solid #d8d6ce; border-radius: 6px; padding: 4px; margin-bottom: 4px; }
  .abc-label { font-size: 9px; color: #888780; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 3px; }
  .score-wrap { width: 100%; aspect-ratio: 360 / 200; max-height: 240px; }
  .score-wrap svg { width: 100%; height: 100%; display: block; }

  .abc-text-card { background: #f1efe8; border: 1px solid #d8d6ce; border-radius: 6px; padding: 0; margin-bottom: 4px; overflow: hidden; }
  .abc-text-head { padding: 3px 6px; font-size: 9px; color: #888780; text-transform: uppercase; letter-spacing: 0.4px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
  .abc-text { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 11px; padding: 4px 6px; max-height: 110px; overflow: auto; white-space: pre; color: #1a1a1a; line-height: 1.4; border-top: 1px solid #d8d6ce; }
  .abc-text.collapsed { display: none; }
  .abc-text .sel { background: #fcebeb; color: #791f1f; padding: 0 1px; border-radius: 2px; }

  /* Default buttons (medium/wide) */
  .abc-app button.k {
    display: block; width: 100%; height: 36px; padding: 0 4px;
    background: #ffffff; border: 1px solid #b4b2a9; border-radius: 6px;
    font-family: inherit; font-size: 13px; font-weight: 500; color: #1a1a1a;
    cursor: pointer; text-align: center; line-height: 34px;
    -webkit-tap-highlight-color: transparent; -webkit-appearance: none; appearance: none;
    min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .abc-app button.k:active { background: #e8e6df; }
  .abc-app button.k:disabled { color: #bbb8a8; background: #f3f1ea; cursor: not-allowed; }
  .abc-app button.k.active { background: #e6f1fb; border-color: #378add; color: #0c447c; }
  .abc-app button.k.symbol { font-size: 18px; font-family: "Times New Roman", serif; }
  .abc-app button.k.tiny { height: 32px; line-height: 30px; font-size: 12px; }
  .abc-app button.k .sub { font-size: 9px; color: #888780; font-weight: 400; margin-left: 2px; }
  .abc-app button.k.primary { background: #185fa5; border-color: #185fa5; color: #ffffff; }

  /* ⭐ NARROW = grands boutons et grosse police pour mobile */
  .abc-app[data-mode="narrow"] button.k { height: 54px; line-height: 50px; font-size: 18px; padding: 0 4px; border-radius: 8px; border-width: 1.5px; }
  .abc-app[data-mode="narrow"] button.k.tiny { height: 48px; line-height: 46px; font-size: 15px; }
  .abc-app[data-mode="narrow"] button.k.symbol { font-size: 26px; }
  .abc-app[data-mode="narrow"] button.k .sub { font-size: 12px; margin-left: 4px; }
  .abc-app[data-mode="narrow"] .row-grid { gap: 5px; margin-bottom: 5px; }
  .abc-app[data-mode="narrow"] .keypad { gap: 5px; margin-bottom: 5px; }

  /* compact pour écrans plats (téléphone paysage) - ne s'applique qu'en mode narrow ou medium */
  .abc-app.compact:not([data-mode="wide"]) button.k { height: 36px; line-height: 32px; font-size: 13px; }
  .abc-app.compact:not([data-mode="wide"]) button.k.tiny { height: 32px; line-height: 28px; font-size: 12px; }
  .abc-app.compact:not([data-mode="wide"]) button.k.symbol { font-size: 18px; }

  .row-grid { display: grid; gap: 4px; margin-bottom: 4px; }

  /* narrow (téléphone portrait) — disposition compacte sur plusieurs lignes */
  .abc-app[data-mode="narrow"] .header-row { grid-template-columns: repeat(4, 1fr); }
  .abc-app[data-mode="narrow"] .header-row-2 { grid-template-columns: repeat(3, 1fr); display: grid; gap: 5px; margin-bottom: 5px; }
  .abc-app[data-mode="narrow"] .file-row { grid-template-columns: repeat(3, 1fr); }
  .abc-app[data-mode="narrow"] .file-row-2 { grid-template-columns: repeat(2, 1fr); display: grid; gap: 5px; margin-bottom: 5px; }
  .abc-app[data-mode="narrow"] .undo-row { grid-template-columns: repeat(3, 1fr); }
  .abc-app[data-mode="narrow"] .undo-row-2 { grid-template-columns: repeat(3, 1fr); display: grid; gap: 5px; margin-bottom: 5px; }
  .abc-app[data-mode="narrow"] .extra-row { grid-template-columns: repeat(2, 1fr); }
  .abc-app[data-mode="narrow"] .extra-row-2 { grid-template-columns: repeat(2, 1fr); display: grid; gap: 5px; margin-bottom: 5px; }
  .abc-app[data-mode="narrow"] .repeat-row { grid-template-columns: repeat(4, 1fr); }

  .abc-app[data-mode="medium"] .header-row,
  .abc-app[data-mode="wide"] .header-row { grid-template-columns: 38px repeat(6, 1fr); }
  .abc-app[data-mode="medium"] .file-row,
  .abc-app[data-mode="wide"] .file-row { grid-template-columns: repeat(5, 1fr); }
  .abc-app[data-mode="medium"] .undo-row,
  .abc-app[data-mode="wide"] .undo-row { grid-template-columns: repeat(6, 1fr); }
  .abc-app[data-mode="medium"] .extra-row,
  .abc-app[data-mode="wide"] .extra-row { grid-template-columns: repeat(4, 1fr); }
  .abc-app[data-mode="medium"] .repeat-row,
  .abc-app[data-mode="wide"] .repeat-row { grid-template-columns: repeat(4, 1fr); }
  .abc-app[data-mode="medium"] .header-row-2,
  .abc-app[data-mode="medium"] .file-row-2,
  .abc-app[data-mode="medium"] .undo-row-2,
  .abc-app[data-mode="medium"] .extra-row-2,
  .abc-app[data-mode="wide"] .header-row-2,
  .abc-app[data-mode="wide"] .file-row-2,
  .abc-app[data-mode="wide"] .undo-row-2,
  .abc-app[data-mode="wide"] .extra-row-2 { display: none; }

  /* Bottom bar */
  .bottom-bar {
    position: sticky; bottom: 0; background: #f5f4ef;
    border-top: 1px solid #d8d6ce; padding: 5px 0 0 0;
    display: grid; gap: 4px; align-items: center; z-index: 10; margin-top: 6px;
  }
  .abc-app[data-mode="narrow"] .bottom-bar { grid-template-columns: 1fr 1fr 1fr; }
  .abc-app[data-mode="medium"] .bottom-bar,
  .abc-app[data-mode="wide"] .bottom-bar { grid-template-columns: 1fr 1fr 1fr auto 1fr 1fr auto 1fr 1fr; }
  .bottom-bar-2 {
    display: none;
    grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr;
    gap: 4px; margin-top: 4px;
  }
  .abc-app[data-mode="narrow"] .bottom-bar-2 { display: grid; }
  .bottom-bar .center-cell, .bottom-bar-2 .center-cell {
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: #5f5e5a; background: #ebe9e0;
    border-radius: 5px; padding: 0 4px; height: 36px; min-width: 48px;
  }
  .bottom-bar .center-cell b, .bottom-bar-2 .center-cell b { color: #1a1a1a; margin-left: 4px; font-size: 13px; }
  .abc-app[data-mode="narrow"] .bottom-bar .center-cell,
  .abc-app[data-mode="narrow"] .bottom-bar-2 .center-cell { height: 54px; font-size: 16px; }
  .abc-app[data-mode="narrow"] .bottom-bar .center-cell b,
  .abc-app[data-mode="narrow"] .bottom-bar-2 .center-cell b { font-size: 18px; }

  /* Keypad */
  .keypad { display: grid; gap: 4px; align-items: start; margin-bottom: 4px; }
  .abc-app[data-mode="narrow"] .keypad { grid-template-columns: 1fr; }
  .abc-app[data-mode="medium"] .keypad { grid-template-columns: 56px 1fr 96px; }
  .abc-app[data-mode="wide"]   .keypad { grid-template-columns: 70px 1fr 110px; }

  .col > .k { margin-bottom: 4px; }
  .col > .k:last-child { margin-bottom: 0; }
  .center-pad > * { margin-bottom: 4px; }
  .abc-app[data-mode="narrow"] .col > .k { margin-bottom: 5px; }
  .abc-app[data-mode="narrow"] .center-pad > * { margin-bottom: 5px; }

  /* narrow: notes en grille horizontale, durées+altérations idem */
  .abc-app[data-mode="narrow"] #notes-col {
    display: grid; grid-template-columns: repeat(8, 1fr);
    gap: 5px; align-items: center;
  }
  .abc-app[data-mode="narrow"] #notes-col > .k { margin-bottom: 0; }
  .abc-app[data-mode="narrow"] .col-right {
    display: grid; grid-template-columns: repeat(8, 1fr);
    gap: 5px; align-items: center;
  }
  .abc-app[data-mode="narrow"] .col-right > * { margin-bottom: 0 !important; }
  .abc-app[data-mode="narrow"] .col-right .grid2,
  .abc-app[data-mode="narrow"] .col-right .grid3 { display: contents; }

  /* ⭐ Mes-ctrl revu : numéro en haut, boutons grands */
  .meas-ctrl {
    display: grid; grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 4px; align-items: center; background: #ebe9e0;
    padding: 4px; border-radius: 6px;
    position: relative;
  }
  .meas-ctrl .label {
    grid-column: 1 / -1; font-size: 11px; color: #5f5e5a;
    text-align: center; line-height: 1; padding: 0; margin-bottom: 2px;
  }
  .meas-ctrl b { font-weight: 500; color: #1a1a1a; }
  .meas-ctrl .k.tiny { padding: 0; }
  .abc-app[data-mode="narrow"] .meas-ctrl { padding: 6px; gap: 6px; }
  .abc-app[data-mode="narrow"] .meas-ctrl .label { font-size: 14px; margin-bottom: 4px; }

  .oct-ctrl {
    display: grid; grid-template-columns: 1fr auto 1fr;
    gap: 4px; align-items: center; background: #ebe9e0;
    padding: 4px; border-radius: 6px;
  }
  .oct-ctrl .label { font-size: 11px; color: #5f5e5a; text-align: center; line-height: 1.1; min-width: 40px; }
  .oct-ctrl b { font-weight: 500; color: #1a1a1a; }
  .abc-app[data-mode="narrow"] .oct-ctrl { padding: 6px; gap: 8px; }
  .abc-app[data-mode="narrow"] .oct-ctrl .label { font-size: 14px; min-width: 50px; }
  .abc-app[data-mode="narrow"] .oct-ctrl .label b { font-size: 18px; }

  .ctx-info { background: #f3f1ea; border: 1px solid #d8d6ce; border-radius: 5px; padding: 3px 4px; font-size: 10px; color: #5f5e5a; line-height: 1.3; text-align: center; }
  .ctx-info b { color: #1a1a1a; font-weight: 500; }
  .abc-app[data-mode="narrow"] .ctx-info { font-size: 13px; padding: 5px; }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-bottom: 4px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; margin-bottom: 4px; }

  .panel { background: #e6f1fb; border: 1px solid #378add; border-radius: 6px; padding: 8px; margin-bottom: 6px; display: none; max-height: 70vh; overflow-y: auto; }
  .panel.open { display: block; }
  .panel .title { font-size: 13px; color: #0c447c; font-weight: 500; margin-bottom: 6px; }
  .abc-app[data-mode="narrow"] .panel .title { font-size: 16px; }
  .panel .row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .panel input, .panel textarea { flex: 1; min-height: 36px; font-family: ui-monospace, monospace; font-size: 14px; padding: 5px 8px; border: 1px solid #b4b2a9; border-radius: 5px; background: #ffffff; color: #1a1a1a; }
  .panel textarea { width: 100%; min-height: 100px; }
  .panel .field-label { font-family: ui-monospace, monospace; font-size: 13px; color: #0c447c; font-weight: 500; min-width: 28px; }
  .panel .actions { display: flex; gap: 6px; justify-content: flex-end; flex-wrap: wrap; margin-top: 6px; }
  .panel .actions .k { width: auto !important; padding: 0 14px !important; height: 36px !important; line-height: 34px !important; font-size: 13px !important; }
  .abc-app[data-mode="narrow"] .panel .actions .k { height: 44px !important; line-height: 42px !important; font-size: 15px !important; }
  .panel .stepper { display: grid; grid-template-columns: 44px 1fr 44px; gap: 6px; align-items: center; margin-bottom: 6px; }
  .panel .stepper .val { text-align: center; font-family: ui-monospace, monospace; font-size: 14px; color: #0c447c; font-weight: 500; }
  .panel small { display: block; color: #5f5e5a; font-size: 11px; margin-bottom: 6px; }
  .abc-app[data-mode="narrow"] .panel small { font-size: 13px; }
  .panel .save-list { max-height: 160px; overflow-y: auto; border: 1px solid #b4b2a9; border-radius: 5px; background: #ffffff; margin-bottom: 6px; }
  .panel .save-list .item { padding: 6px 8px; border-bottom: 1px solid #ebe9e0; display: flex; justify-content: space-between; align-items: center; font-size: 12px; cursor: pointer; }
  .abc-app[data-mode="narrow"] .panel .save-list .item { font-size: 15px; padding: 10px 10px; }
  .panel .save-list .item:hover { background: #f1efe8; }
  .panel .save-list .item .del { color: #c34536; font-size: 16px; padding: 0 6px; cursor: pointer; }
  .chord-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-bottom: 6px; }
  .chord-grid .k { font-size: 12px; height: 32px; line-height: 30px; }
  .abc-app[data-mode="narrow"] .chord-grid .k { height: 44px !important; line-height: 42px !important; font-size: 14px !important; }
  .root-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 6px; }
  .root-grid .k { font-size: 12px; height: 32px; line-height: 30px; }
  .abc-app[data-mode="narrow"] .root-grid .k { height: 44px !important; line-height: 42px !important; font-size: 14px !important; }
</style>

<div class="abc-app" id="app" data-mode="medium">
  <div class="panel" id="panel">
    <div class="title" id="panel-title">Édition</div>
    <div id="panel-body"></div>
    <div class="actions">
      <button class="k" id="panel-cancel">Annuler</button>
      <button class="k primary" id="panel-ok">OK</button>
    </div>
  </div>
  <input type="file" id="file-input" accept=".abc,text/plain" style="display:none;"/>

  <div class="abc-card">
    <div class="abc-label edit-only"><span>Mes <span id="meas-num">1</span> · slot <span id="slot-num">1</span></span></div>
    <div class="score-wrap" id="score"></div>
  </div>

  <div class="row-grid header-row edit-only">
    <button class="k tiny" id="btn-fs">⛶</button>
    <button class="k tiny" data-hdr="X">X:</button>
    <button class="k tiny" data-hdr="T">Titre</button>
    <button class="k tiny" data-hdr="M">Rythme</button>
    <button class="k tiny narrow-skip" data-hdr="K">Armure</button>
    <button class="k tiny narrow-skip" data-hdr="CLEF">Clé</button>
    <button class="k tiny narrow-skip" id="btn-disarm">K→♯</button>
  </div>
  <div class="header-row-2 edit-only">
    <button class="k tiny" data-hdr="K">Armure</button>
    <button class="k tiny" data-hdr="CLEF">Clé</button>
    <button class="k tiny" id="btn-disarm-2">K→♯</button>
  </div>

  <div class="row-grid file-row edit-only">
    <button class="k tiny" id="btn-new">📄 Nouv</button>
    <button class="k tiny" id="btn-open-file">📂 Ouv</button>
    <button class="k tiny" id="btn-save-file">💾 Sauv</button>
    <button class="k tiny narrow-skip" id="btn-saves">⭐ Mémo</button>
    <button class="k tiny narrow-skip" id="btn-export">⇣ ABC</button>
  </div>
  <div class="file-row-2 edit-only">
    <button class="k tiny" id="btn-saves-2">⭐ Mémo</button>
    <button class="k tiny" id="btn-export-2">⇣ ABC</button>
  </div>

  <div class="row-grid undo-row edit-only">
    <button class="k tiny" id="btn-del">⌫</button>
    <button class="k tiny" id="btn-undo">↶</button>
    <button class="k tiny" id="btn-redo">↷</button>
    <button class="k tiny narrow-skip" id="btn-trans-down">−½</button>
    <button class="k tiny narrow-skip" id="btn-trans-up">+½</button>
    <button class="k tiny narrow-skip" id="btn-tuplet">3:2</button>
  </div>
  <div class="undo-row-2 edit-only">
    <button class="k tiny" id="btn-trans-down-2">−½</button>
    <button class="k tiny" id="btn-trans-up-2">+½</button>
    <button class="k tiny" id="btn-tuplet-2">3:2</button>
  </div>

  <div class="row-grid extra-row edit-only">
    <button class="k tiny" id="btn-chord">"Cm"</button>
    <button class="k tiny" id="btn-orn">~T.</button>
    <button class="k tiny narrow-skip" id="btn-tie">⌒</button>
    <button class="k tiny narrow-skip" id="btn-rest">→ Sil.</button>
  </div>
  <div class="extra-row-2 edit-only">
    <button class="k tiny" id="btn-tie-2">⌒</button>

  <div class="keypad edit-only">
    <div class="col" id="notes-col">
      <button class="k" id="cur-prev">◀</button>
    </div>
    <div class="col center-pad">
      <div class="oct-ctrl">
        <button class="k tiny" id="oct-down">▽</button>
        <div class="label">Oct <b id="oct-val">0</b></div>
        <button class="k tiny" id="oct-up">△</button>

      <div class="meas-ctrl">
        <div class="label">Mes <b id="meas-pos">1</b></div>
        <button class="k tiny" id="meas-del">⊟</button>

        <button class="k tiny" id="meas-next">▶</button>

      <div class="row-grid repeat-row" style="margin-bottom:0;">

        <button class="k tiny" id="btn-rep-end">𝄇</button>

    <button class="k narrow-skip" id="vol-u">🔊+</button>

    <div class="center-cell narrow-skip">♩<b id="tempo-v">100</b></div>
    <button class="k narrow-skip" id="tempo-u">+</button>
    <button class="k" id="btn-viewmode">👁</button>
  </div>
  <div class="bottom-bar-2">
    <button class="k" id="vol-d-2">🔉−</button>
    <div class="center-cell">Vol<b id="vol-v-2">60</b></div>
    <button class="k" id="vol-u-2">🔊+</button>
    <button class="k" id="tempo-d-2">−</button>
    <div class="center-cell">♩<b id="tempo-v-2">100</b></div>
    <button class="k" id="tempo-u-2">+</button>
  </div>
</div>

<script>
(function(){
  const NOTES = [
    {label:'Do',sub:'C',n:'C'},{label:'Ré',sub:'D',n:'D'},{label:'Mi',sub:'E',n:'E'},
    {label:'Fa',sub:'F',n:'F'},{label:'Sol',sub:'G',n:'G'},{label:'La',sub:'A',n:'A'},{label:'Si',sub:'B',n:'B'},
  ];
  const DURATIONS = [{label:'𝅗𝅥',d:2},{label:'♩',d:1},{label:'♪',d:0.5},{label:'♬',d:0.25}];
  const SHARP_NOTES = ['F','C','G','D','A','E','B'];
  const FLAT_NOTES  = ['B','E','A','D','G','C','F'];
  const ORNAMENTS = [
    {code:'T', label:'tr'}, {code:'M', label:'~M'}, {code:'P', label:'pralle'},
    {code:'H', label:'fermata'}, {code:'L', label:'accent'}, {code:'.', label:'staccato'},
    {code:'u', label:'up'}, {code:'v', label:'down'}, {code:'O', label:'coda'},
  ];
  const CHORD_QUALITIES = ['','m','7','m7','M7','6','m6','9','11','13','sus2','sus4','dim','dim7','aug','add9'];

  const state = {
    headers: { X:'1', T:'' },
    pieceMeter: '4/4', pieceUnit: '1/4', pieceKeySig: 0, pieceClef: 'treble',
    measures: [], sel: {m:0, s:0}, octave: 0,
    timeChanges: {}, keyChanges: {}, clefChanges: {}, repeats: {},
    tempo: 100, volume: 60,
    abcCollapsed: false, fullscreen: false, viewmode: false,
  };

  const history = { stack: [], pos: -1, max: 100 };
  function snapshot(){ return JSON.stringify(state); }
  function pushHistory(){
    if(history.pos < history.stack.length - 1) history.stack = history.stack.slice(0, history.pos + 1);
    history.stack.push(snapshot());
    if(history.stack.length > history.max) history.stack.shift();
    history.pos = history.stack.length - 1;
  }

  function jumpMeasure(delta){
    const cur = state.sel.m;
    if(delta > 0 && cur === state.measures.length - 1){ state.measures.push(buildEmptyMeasure(meterAt(cur))); state.sel = {m: state.measures.length - 1, s: 0}; pushHistory(); render(); return; }
    const target = cur + delta;

  const audio = { ctx: null, master: null, playing: false, scheduled: [], stopAt: 0, raf: null };
  function ensureAudio(){
    if(!audio.ctx){ audio.ctx = new (window.AudioContext || window.webkitAudioContext)(); audio.master = audio.ctx.createGain(); audio.master.connect(audio.ctx.destination); }
    audio.master.gain.value = state.volume / 200;
    if(audio.ctx.state === 'suspended') audio.ctx.resume();
  }
  function midiOfNote(note, octave, acc, keySig){
    const baseSemi = {C:0, D:2, E:4, F:5, G:7, A:9, B:11}[note];
    let midi = 60 + baseSemi + octave * 12; let alteration = 0;
    if(acc === '^') alteration = 1; else if(acc === '_') alteration = -1;
    else if(acc === '=') alteration = 0;
    else { if(keySig > 0 && SHARP_NOTES.slice(0, keySig).includes(note)) alteration = 1; else if(keySig < 0 && FLAT_NOTES.slice(0, -keySig).includes(note)) alteration = -1; }
    return midi + alteration;
  }
  function freqOfMidi(m){ return 440 * Math.pow(2, (m - 69)/12); }
  function previewNote(midi, durSec = 0.25){
    ensureAudio();
    const t = audio.ctx.currentTime + 0.005;
    const freq = freqOfMidi(midi);
    const osc = audio.ctx.createOscillator(); const gain = audio.ctx.createGain();
    osc.type = 'triangle'; osc.frequency.value = freq;
    const peak = 0.5; const a = 0.005;
    gain.gain.setValueAtTime(0, t); gain.gain.linearRampToValueAtTime(peak, t + a);
    gain.gain.setValueAtTime(peak, t + Math.max(durSec - 0.06, a));
    gain.gain.linearRampToValueAtTime(0, t + durSec);
    osc.connect(gain); gain.connect(audio.master);
    osc.start(t); osc.stop(t + durSec + 0.03);
  }
  function playSchedule(){
    ensureAudio(); stopPlayback(false);
    audio.playing = true;
    document.getElementById('btn-play').textContent = '⏸';
    const startTime = audio.ctx.currentTime + 0.05;
    let t = startTime; const qDur = 60 / state.tempo;
    const order = expandForPlayback();
    order.forEach(mi => {
      const m = state.measures[mi];
      const sig = keyAt(mi);
      m.forEach((slot, si)=>{
        let dur = effDur(slot) * qDur;
        if(slot.tuplet === 3) dur = dur * 2/3;
        if(slot.type === 'note'){
          const midi = midiOfNote(slot.note, slot.octave, slot.acc, sig);
          const osc = audio.ctx.createOscillator(); const gain = audio.ctx.createGain();
          osc.type = 'triangle'; osc.frequency.value = freqOfMidi(midi);
          const a = 0.005, r = Math.min(0.05, dur * 0.3);
          gain.gain.setValueAtTime(0, t); gain.gain.linearRampToValueAtTime(0.5, t + a);
          gain.gain.setValueAtTime(0.5, t + dur - r); gain.gain.linearRampToValueAtTime(0, t + dur);
          osc.connect(gain); gain.connect(audio.master);
          osc.start(t); osc.stop(t + dur + 0.02);
          audio.scheduled.push(osc);
        }
        audio.scheduled.push({ updateAt: t, measureIdx: mi, slotIdx: si });
        t += dur;
      });
    });
    audio.stopAt = t;
    function tick(){
      if(!audio.playing) return;
      const now = audio.ctx.currentTime;
      let last = null;
      for(const ev of audio.scheduled){ if(ev.updateAt !== undefined && ev.updateAt <= now) last = ev; if(ev.updateAt !== undefined && ev.updateAt > now) break; }
      if(last && (state.sel.m !== last.measureIdx || state.sel.s !== last.slotIdx)){ state.sel = { m: last.measureIdx, s: last.slotIdx }; renderScore(); renderState(); }
      if(now >= audio.stopAt){ stopPlayback(true); return; }
      audio.raf = requestAnimationFrame(tick);
    }
    audio.raf = requestAnimationFrame(tick);
  }
  function stopPlayback(refresh){ if(audio.raf){ cancelAnimationFrame(audio.raf); audio.raf = null; } audio.scheduled.forEach(ev=>{ if(ev.stop) try{ev.stop();}catch(_){} }); audio.scheduled = []; audio.playing = false; document.getElementById('btn-play').textContent = '▶'; if(refresh) render(); }

    reader.readAsText(f);
  });

  const STORAGE_KEY = 'abc-editor-saves';
  function getSaves(){ try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(_){ return []; } }
  function setSaves(list){ localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); }
  function exportState(){ return JSON.stringify({ headers: state.headers, pieceMeter: state.pieceMeter, pieceUnit: state.pieceUnit, pieceKeySig: state.pieceKeySig, pieceClef: state.pieceClef, measures: state.measures, timeChanges: state.timeChanges, keyChanges: state.keyChanges, clefChanges: state.clefChanges, repeats: state.repeats, tempo: state.tempo }); }
  function importStateJson(json){ try { const o = JSON.parse(json); Object.assign(state, o); state.sel = {m:0, s:0}; state.octave = 0; pushHistory(); render(); return true; } catch(e){ return false; } }

  document.getElementById('btn-new').addEventListener('click', ()=>{
    openPanel({ title:'Nouveau', body:'<small>Effacer le morceau ?</small>', hideActions:true, extraButtons:['Annuler','Effacer'],
      onExtra:(which)=>{ if(which === 'Effacer'){ state.headers = {X:'1', T:''}; state.pieceMeter='4/4'; state.pieceUnit='1/4'; state.pieceKeySig=0; state.pieceClef='treble'; rebuildMeasures(); pushHistory(); render(); } closePanel(); }, });
  });

  const panel = document.getElementById('panel');
  const panelTitle = document.getElementById('panel-title');
  const panelBody = document.getElementById('panel-body');
  const panelOk = document.getElementById('panel-ok');
  const panelCancel = document.getElementById('panel-cancel');
  let currentOnOk = null; let currentOnExtra = null;
  function openPanel({title, body, onMount, onOk, hideActions, extraButtons, onExtra}){
    panelTitle.textContent = title;
    let extraHtml = '';
    if(extraButtons && extraButtons.length){
      extraHtml = '<div class="actions" style="margin-top:6px;">' + extraButtons.map((b,i)=> '<button class="k '+(i===extraButtons.length-1?'primary':'')+'" data-extra="'+b.replace(/"/g,'&quot;')+'">'+b+'</button>').join('') + '</div>';
    }
    panelBody.innerHTML = body + extraHtml;
    currentOnOk = onOk || null; currentOnExtra = onExtra || null;
    panelOk.style.display = (hideActions || extraButtons) ? 'none' : '';
    panelCancel.style.display = (hideActions || extraButtons) ? 'none' : '';
    panel.classList.add('open');
    if(onMount) setTimeout(onMount, 50);
    if(extraButtons) setTimeout(()=>{ panelBody.querySelectorAll('[data-extra]').forEach(b=>{ b.addEventListener('click', ()=>{ if(currentOnExtra) currentOnExtra(b.dataset.extra); }); }); }, 50);
  }
  function closePanel(){ panel.classList.remove('open'); currentOnOk = null; currentOnExtra = null; }
  panelOk.addEventListener('click', ()=>{ if(currentOnOk) currentOnOk(); closePanel(); render(); });
  panelCancel.addEventListener('click', closePanel);

  document.querySelector('[data-hdr="X"]').addEventListener('click', ()=>{ openPanel({ title: 'X:', body: '<div class="row"><input id="hi" type="text" value="' + (state.headers.X||'') + '"/></div>', onMount: ()=> document.getElementById('hi').focus(), onOk: ()=>{ state.headers.X = document.getElementById('hi').value.trim(); pushHistory(); } }); });
  document.querySelector('[data-hdr="T"]').addEventListener('click', ()=>{ openPanel({ title: 'Titre', body: '<div class="row"><input id="hi" type="text" value="' + (state.headers.T||'') + '"/></div>', onMount: ()=> document.getElementById('hi').focus(), onOk: ()=>{ state.headers.T = document.getElementById('hi').value.trim(); pushHistory(); } }); });

  function scopePanel({title, renderControls, applyPiece, applyHere}){
    const onFirstMeasure = (state.sel.m === 0);
    const buttons = ['Annuler', 'Tout', onFirstMeasure ? null : 'Mes ' + (state.sel.m+1) + '+'].filter(Boolean);
    openPanel({ title, body: renderControls(), hideActions:true, extraButtons: buttons,
      onMount: ()=>{ if(typeof renderControls.mount === 'function') renderControls.mount(); },
      onExtra:(which)=>{
        if(which === 'Annuler'){ closePanel(); return; }
        if(which === 'Tout'){ applyPiece(); cleanupAccidentals(); pushHistory(); closePanel(); render(); return; }
        applyHere(); cleanupAccidentals(); pushHistory(); closePanel(); render();
      },
    });
  }

  document.querySelectorAll('[data-hdr="M"]').forEach(el => el.addEventListener('click', ()=>{
    const cur = meterAt(state.sel.m); const {num, den} = parseMeter(cur);
    let n = num, d = den; const denValues = [1,2,4,8,16];
    let unitDenom = parseInt(state.pieceUnit.split('/')[1], 10);
    const unitDenoms = [1,2,4,8,16,32];
    function controls(){
      return ('<div class="stepper"><button class="k" id="num-d">−</button><div class="val">N: <b id="num-v">'+n+'</b></div><button class="k" id="num-u">+</button></div>'+
              '<div class="stepper"><button class="k" id="den-d">−</button><div class="val">D: <b id="den-v">'+d+'</b></div><button class="k" id="den-u">+</button></div>'+
              '<small>Unité L:</small>'+
              '<div class="stepper"><button class="k" id="L-d">−</button><div class="val">L:1/<b id="L-v">'+unitDenom+'</b></div><button class="k" id="L-u">+</button></div>');
    }
    controls.mount = function(){
      const upd = ()=>{ document.getElementById('num-v').textContent = n; document.getElementById('den-v').textContent = d; document.getElementById('L-v').textContent = unitDenom; };
      document.getElementById('num-u').addEventListener('click', ()=>{ n = Math.min(16, n+1); upd(); });
      document.getElementById('num-d').addEventListener('click', ()=>{ n = Math.max(1, n-1); upd(); });
      document.getElementById('den-u').addEventListener('click', ()=>{ const i = denValues.indexOf(d); if(i<denValues.length-1){ d = denValues[i+1]; upd(); } });
      document.getElementById('den-d').addEventListener('click', ()=>{ const i = denValues.indexOf(d); if(i>0){ d = denValues[i-1]; upd(); } });
      document.getElementById('L-u').addEventListener('click', ()=>{ const i = unitDenoms.indexOf(unitDenom); if(i<unitDenoms.length-1){ unitDenom = unitDenoms[i+1]; upd(); } });
      document.getElementById('L-d').addEventListener('click', ()=>{ const i = unitDenoms.indexOf(unitDenom); if(i>0){ unitDenom = unitDenoms[i-1]; upd(); } });
    };
    scopePanel({ title:'Rythme', renderControls: controls,
      applyPiece: ()=>{
        state.pieceMeter = n + '/' + d; state.pieceUnit = '1/' + unitDenom;
        if(state.sel.m === 0) delete state.timeChanges[0];
        else state.timeChanges = {};
        rebuildMeasures();
      },
      applyHere: ()=>{
        if(state.sel.m === 0){ state.pieceMeter = n + '/' + d; state.pieceUnit = '1/' + unitDenom; delete state.timeChanges[0]; rebuildMeasures(); return; }
        state.pieceUnit = '1/' + unitDenom;
        state.timeChanges[state.sel.m] = n + '/' + d;
        for(let i = state.sel.m; i < state.measures.length; i++){ if(i > state.sel.m && state.timeChanges[i]) break; state.measures[i] = buildEmptyMeasure(meterAt(i)); }
        state.sel = {m: state.sel.m, s: 0};
      },
    });
  }));

  document.querySelectorAll('[data-hdr="K"]').forEach(el => el.addEventListener('click', ()=>{
    let sig = keyAt(state.sel.m);
    const labelOf = (s)=>{ if(s === 0) return '0 (Do/La m)'; if(s > 0) return s + '#'; return Math.abs(s) + 'b'; };
    function controls(){ return ('<div class="stepper"><button class="k" id="sig-d">♭−</button><div class="val"><b id="sig-v">'+labelOf(sig)+'</b></div><button class="k" id="sig-u">♯+</button></div>'); }
    controls.mount = function(){ const upd = ()=>{ document.getElementById('sig-v').textContent = labelOf(sig); }; document.getElementById('sig-u').addEventListener('click', ()=>{ sig = Math.min(7, sig+1); upd(); }); document.getElementById('sig-d').addEventListener('click', ()=>{ sig = Math.max(-7, sig-1); upd(); }); };
    scopePanel({ title:'Armure', renderControls: controls,
      applyPiece: ()=>{ state.pieceKeySig = sig; if(state.sel.m === 0) delete state.keyChanges[0]; else state.keyChanges = {}; },
      applyHere: ()=>{ if(state.sel.m === 0){ state.pieceKeySig = sig; delete state.keyChanges[0]; } else state.keyChanges[state.sel.m] = sig; }, });
  }));

  document.querySelectorAll('[data-hdr="CLEF"]').forEach(el => el.addEventListener('click', ()=>{
    let pick = clefAt(state.sel.m);
    function controls(){ return ('<div class="grid3" id="clef-pick"><button class="k symbol" data-clef="treble">𝄞</button><button class="k" data-clef="treble8" style="font-size:10px;">Sol-8</button><button class="k symbol" data-clef="bass">𝄢</button></div>'); }
    controls.mount = function(){ const refresh = ()=>{ document.querySelectorAll('#clef-pick .k').forEach(b=>{ b.classList.toggle('active', b.dataset.clef === pick); }); }; refresh(); document.querySelectorAll('#clef-pick .k').forEach(b=>{ b.addEventListener('click', ()=>{ pick = b.dataset.clef; refresh(); }); }); };
    scopePanel({ title:'Clé', renderControls: controls,
      applyPiece: ()=>{ state.pieceClef = pick; if(state.sel.m === 0) delete state.clefChanges[0]; else state.clefChanges = {}; },
      applyHere: ()=>{ if(state.sel.m === 0){ state.pieceClef = pick; delete state.clefChanges[0]; } else state.clefChanges[state.sel.m] = pick; }, });
  }));

  const app = document.getElementById('app');
  function setMode(width, height){
    let mode;
    if(width < 500) mode = 'narrow';
    else if(width < 900) mode = 'medium';
    else mode = 'wide';
    if(app.dataset.mode !== mode) app.dataset.mode = mode;
    app.classList.toggle('compact', height && height < 450);
  }
  if(typeof ResizeObserver !== 'undefined'){
    const ro = new ResizeObserver((entries)=>{
      for(const e of entries){ setMode(e.contentRect.width, window.innerHeight); }
    });
    ro.observe(app);
  } else {
    function checkW(){ setMode(app.getBoundingClientRect().width, window.innerHeight); }
    window.addEventListener('resize', checkW);
    checkW();
  }
  window.addEventListener('resize', ()=>{ setMode(app.getBoundingClientRect().width, window.innerHeight); });

  rebuildMeasures();
  pushHistory();
  render();
})();
</script>
