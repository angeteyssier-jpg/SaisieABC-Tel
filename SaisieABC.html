<script>
(function(){
  const NOTES = [
    {label:'Do',sub:'C',n:'C'},{label:'Ré',sub:'D',n:'D'},{label:'Mi',sub:'E',n:'E'},
    {label:'Fa',sub:'F',n:'F'},{label:'Sol',sub:'G',n:'G'},{label:'La',sub:'A',n:'A'},{label:'Si',sub:'B',n:'B'},
  ];
  const DURATIONS = [{label:'𝅗𝅥',d:2},{label:'♩',d:1},{label:'♪',d:0.5},{label:'♬',d:0.25}];
  const SHARP_NOTES = ['F','C','G','D','A','E','B'];
  const FLAT_NOTES  = ['B','E','A','D','G','C','F'];

  const state = {
    headers: { X:'1', T:'' },
    pieceMeter: '4/4', pieceUnit: '1/4', pieceKeySig: 0, pieceClef: 'treble',
    measures: [], sel: {m:0, s:0}, octave: 0,
    timeChanges: {}, keyChanges: {}, clefChanges: {}, repeats: {},
    tempo: 100, volume: 60,
    abcCollapsed: false, fullscreen: false,
  };

  // ===== history (undo/redo) =====
  const history = { stack: [], pos: -1, max: 100 };
  function snapshot(){
    return JSON.stringify({
      headers: state.headers, pieceMeter: state.pieceMeter, pieceUnit: state.pieceUnit,
      pieceKeySig: state.pieceKeySig, pieceClef: state.pieceClef,
      measures: state.measures, sel: state.sel, octave: state.octave,
      timeChanges: state.timeChanges, keyChanges: state.keyChanges,
      clefChanges: state.clefChanges, repeats: state.repeats,
      tempo: state.tempo, volume: state.volume,
    });
  }
  function pushHistory(){
    if(history.pos < history.stack.length - 1){
      history.stack = history.stack.slice(0, history.pos + 1);
    }
    history.stack.push(snapshot());
    if(history.stack.length > history.max) history.stack.shift();
    history.pos = history.stack.length - 1;
  }
  function loadFrom(snap){
    const o = JSON.parse(snap);
    Object.assign(state, o);
  }
  function undo(){
    if(history.pos > 0){
      history.pos--;
      loadFrom(history.stack[history.pos]);
      render();
    }
  }
  function redo(){
    if(history.pos < history.stack.length - 1){
      history.pos++;
      loadFrom(history.stack[history.pos]);
      render();
    }
  }

  function parseMeter(meter){
    if(!meter) return {num:4, den:4};
    if(meter === 'C') return {num:4, den:4};
    if(meter === 'C|') return {num:2, den:2};
    const m = meter.match(/^\s*(\d+)\s*\/\s*(\d+)\s*$/);
    if(m) return {num:parseInt(m[1],10), den:parseInt(m[2],10)};
    return {num:4, den:4};
  }
  function meterAt(idx){ let cur = state.pieceMeter; for(let i=0; i<=idx; i++){ if(state.timeChanges[i]) cur = state.timeChanges[i]; } return cur; }
  function keyAt(idx){ let cur = state.pieceKeySig; for(let i=0; i<=idx; i++){ if(state.keyChanges[i] !== undefined) cur = state.keyChanges[i]; } return cur; }
  function clefAt(idx){ let cur = state.pieceClef; for(let i=0; i<=idx; i++){ if(state.clefChanges[i]) cur = state.clefChanges[i]; } return cur; }
  function measureCapacity(meter){ const {num, den} = parseMeter(meter); return num * (4/den); }
  function effDur(t){ return t.dot ? t.dur*1.5 : t.dur; }
  function beamGroupUnit(meter){ const {num, den} = parseMeter(meter); if(den === 8 && num % 3 === 0 && num >= 6) return 1.5; return 4/den; }

  function buildEmptyMeasure(meter){
    const {num, den} = parseMeter(meter);
    const beatDur = 4 / den;
    const slots = [];
    for(let i=0; i<num; i++) slots.push({type:'rest', dur:beatDur, dot:false});
    return slots;
  }
  function rebuildMeasures(){
    const count = Math.max(state.measures.length, 6);
    state.measures = [];
    state.timeChanges = {}; state.keyChanges = {}; state.clefChanges = {}; state.repeats = {};
    for(let i=0; i<count; i++) state.measures.push(buildEmptyMeasure(state.pieceMeter));
    state.sel = {m:0, s:0};
  }

  // Decompose `amount` (in quarter units) into one or more "clean" durations as a sequence of {dur, dot}.
  // Used to express a leftover duration as one or more displayable slots (with dots if helpful).
  // Greedy with dotted values: try big-with-dot, then big plain, etc.
  function splitDurationGreedy(amount){
    const eps = 1e-6;
    const candidates = [
      // (value, base, dot)
      {val:6, base:4, dot:true},
      {val:4, base:4, dot:false},
      {val:3, base:2, dot:true},
      {val:2, base:2, dot:false},
      {val:1.5, base:1, dot:true},
      {val:1, base:1, dot:false},
      {val:0.75, base:0.5, dot:true},
      {val:0.5, base:0.5, dot:false},
      {val:0.375, base:0.25, dot:true},
      {val:0.25, base:0.25, dot:false},
      {val:0.1875, base:0.125, dot:true},
      {val:0.125, base:0.125, dot:false},
    ];
    const out = [];
    let rem = +amount.toFixed(6);
    while(rem > eps){
      let picked = null;
      for(const c of candidates){
        if(c.val <= rem + eps){ picked = c; break; }
      }
      if(!picked) break;
      out.push({ dur: picked.base, dot: picked.dot });
      rem = +(rem - picked.val).toFixed(6);
    }
    return out;
  }
  // Same but biased to subdivisions of a beat to align cleanly within the meter
  function splitDurationByBeat(offset, amount, beat){
    const eps = 1e-6;
    const out = [];
    let cur = +offset.toFixed(6); let rem = +amount.toFixed(6);
    // Step 1: align to the next beat boundary using small subdivisions (no dots in this fragment)
    const distToBeat = ((cur % beat) === 0) ? 0 : (beat - (cur % beat));
    if(distToBeat > eps && rem > eps){
      const toFill = Math.min(distToBeat, rem);
      // Use the largest plain (non-dotted) sub-beat that fits, repeat
      const subs = [4,2,1,0.5,0.25,0.125].filter(u => u <= beat/2 + eps);
      let used = 0;
      for(const u of subs){
        while(toFill - used >= u - eps){
          out.push({dur:u, dot:false});
          used = +(used + u).toFixed(6);
        }
      }
      cur = +(cur + used).toFixed(6); rem = +(rem - used).toFixed(6);
    }
    // Step 2: aligned. Emit beat-rests for whole beats. Use beat itself; if beat = 1.5 (compound), allow dotted noires.
    while(rem >= beat - eps){
      // Try a multi-beat group with dot if it cleanly fits, e.g. 3 beats → dotted half (val 3)
      // Otherwise just one beat.
      out.push({dur: (beat === 1.5) ? 1 : beat, dot: (beat === 1.5)});
      rem = +(rem - beat).toFixed(6); cur = +(cur + beat).toFixed(6);
    }
    // Step 3: leftover < beat
    if(rem > eps){
      const subs = [4,2,1,0.5,0.25,0.125].filter(u => u <= beat/2 + eps);
      let leftover = rem;
      for(const u of subs){
        while(leftover >= u - eps){
          out.push({dur:u, dot:false});
          leftover = +(leftover - u).toFixed(6);
        }
      }
    }
    return out;
  }

  // ===== Rebalance: NON-DESTRUCTIVE =====
  // After modifying slot at (m, anchorIdx) — its NEW eff duration is sl.dur (with dot).
  // Strategy:
  //   newDur = effDur(slots[anchorIdx])
  //   oldDur = previous eff duration of that same slot (passed in)
  //   delta  = newDur - oldDur
  //   - delta == 0: nothing to do
  //   - delta < 0  (slot SHRUNK): we have |delta| of free time after the slot.
  //                                Insert new slots after anchor whose total = |delta|,
  //                                each is a COPY of the anchor (same type, same hauteur if note).
  //                                Use splitDurationByBeat aligned with the new offset.
  //   - delta > 0  (slot GREW):    consume `delta` from the slots after anchor.
  //                                Walk forward: drop fully-eaten slots, partially-eaten slot keeps
  //                                its hauteur but dur is reduced. Re-decompose the leftover with
  //                                splitDurationByBeat.
  //   Anything beyond the end of the measure is clamped (the slot extends but measure overflows → truncate).
  function rebalanceMeasure(m, anchorIdx, oldEffDur){
    const meter = meterAt(m);
    const {den} = parseMeter(meter);
    const beat = 4/den;
    const cap = measureCapacity(meter);
    const meas = state.measures[m];
    const anchor = meas[anchorIdx];
    const newDur = effDur(anchor);

    // Compute used time before anchor
    let beforeUsed = 0;
    for(let i=0; i<anchorIdx; i++) beforeUsed += effDur(meas[i]);

    // If anchor alone exceeds remaining capacity, truncate
    if(beforeUsed + newDur >= cap - 1e-9){
      // Anchor consumes everything to end. If anchor overflows, we still keep it as-is
      state.measures[m] = meas.slice(0, anchorIdx + 1);
      return;
    }

    const delta = +(newDur - oldEffDur).toFixed(6);
    const eps = 1e-6;

    if(Math.abs(delta) < eps){
      // No size change, but caller still asked for rebalance (e.g. just hauteur changed): nothing to do.
      return;
    }

    if(delta < 0){
      // Slot SHRUNK by |delta|. Free time appears immediately after the anchor.
      const freeAmount = -delta;
      // Build replacement slots, each being a COPY of anchor at the right durations.
      const offsetAfterAnchor = beforeUsed + newDur;
      const pieces = splitDurationByBeat(offsetAfterAnchor, freeAmount, beat);
      const newSlots = pieces.map(p => {
        const copy = Object.assign({}, anchor, {dur: p.dur, dot: p.dot});
        return copy;
      });
      // Rebuild measure: [0..anchor] + newSlots + [anchorIdx+1 .. end]
      const tail = meas.slice(anchorIdx + 1);
      state.measures[m] = meas.slice(0, anchorIdx + 1).concat(newSlots, tail);
      // Now total may exceed `cap` if the existing tail still fits, normally fine.
      // But if total > cap, truncate from the right.
      truncateMeasureToCapacity(m, cap);
      return;
    }

    // delta > 0: slot GREW by delta. Consume delta from slots to the right.
    let need = delta;
    let cursor = anchorIdx + 1;
    while(need > eps && cursor < meas.length){
      const slot = meas[cursor];
      const dur = effDur(slot);
      if(dur <= need + eps){
        // fully eaten
        need = +(need - dur).toFixed(6);
        meas.splice(cursor, 1);
        // do not increment cursor (next slot took its place)
      } else {
        // partially eaten: keep hauteur (and dot? no — we'll re-decompose), reduce duration
        const remaining = +(dur - need).toFixed(6);
        // Compute new offset for the partial slot
        let off = 0;
        for(let i=0; i<cursor; i++) off += effDur(meas[i]);
        // Replace the partial slot with one or more slots (same hauteur) summing to `remaining`,
        // aligned on beat using splitDurationByBeat.
        const pieces = splitDurationByBeat(off + need, remaining, beat);
        const newCopies = pieces.map(p => Object.assign({}, slot, {dur: p.dur, dot: p.dot}));
        meas.splice(cursor, 1, ...newCopies);
        need = 0;
      }
    }

    // If we still need time and ran out of slots, the anchor effectively overflows; clamp.
    truncateMeasureToCapacity(m, cap);
  }

  function truncateMeasureToCapacity(m, cap){
    const eps = 1e-6;
    const meas = state.measures[m];
    let used = 0;
    for(let i=0; i<meas.length; i++){
      const d = effDur(meas[i]);
      if(used + d > cap + eps){
        // truncate measure here; the i-th slot would overflow
        state.measures[m] = meas.slice(0, i);
        return;
      }
      used += d;
    }
    // fill any slight underfill with a clean rest decomposition
    if(used < cap - eps){
      const meter = meterAt(m); const {den} = parseMeter(meter); const beat = 4/den;
      const tail = splitDurationByBeat(used, cap - used, beat).map(p=> ({type:'rest', dur:p.dur, dot:p.dot}));
      state.measures[m] = meas.concat(tail);
    }
  }

  function unitMultiplier(){
    const m = state.pieceUnit.match(/^\s*1\s*\/\s*(\d+)\s*$/);
    if(!m) return 1;
    const denom = parseInt(m[1],10);
    return denom / 4;
  }
  function effDToAbc(d){
    const v = d * unitMultiplier();
    const e = 1e-9;
    if(Math.abs(v - 1) < e) return '';
    if(Math.abs(v - 2) < e) return '2';
    if(Math.abs(v - 3) < e) return '3';
    if(Math.abs(v - 4) < e) return '4';
    if(Math.abs(v - 6) < e) return '6';
    if(Math.abs(v - 8) < e) return '8';
    if(Math.abs(v - 0.5) < e) return '/2';
    if(Math.abs(v - 0.25) < e) return '/4';
    if(Math.abs(v - 0.125) < e) return '/8';
    if(Math.abs(v - 1.5) < e) return '3/2';
    if(Math.abs(v - 0.75) < e) return '3/4';
    if(Math.abs(v - 0.375) < e) return '3/8';
    const denom = 16;
    const numer = Math.round(v * denom);
    function gcd(a,b){ return b?gcd(b,a%b):a; }
    const g = gcd(numer, denom);
    const a = numer/g, b = denom/g;

  function slotStr(t){
    let s = '';
    if(t.type === 'note'){
      s += t.acc || '';

      if(t.octave>=1) n = n.toLowerCase();
      s += n;
      if(t.octave>=2) s += "'".repeat(t.octave-1);
      else if(t.octave<=-1) s += ",".repeat(-t.octave);
    } else { s += 'z'; }
    s += effDToAbc(effDur(t));
    return s;
  }

  function keyAbc(sig){
    if(sig === 0) return 'C';
    if(sig > 0) return ['C','G','D','A','E','B','F#','C#'][sig];
    return ['C','F','Bb','Eb','Ab','Db','Gb','Cb'][-sig];

  function clefAbcSuffix(c){ if(c === 'bass') return ' clef=bass'; if(c === 'treble8') return ' clef=treble-8'; return ''; }
  function clefHumanLabel(c){ if(c === 'bass') return 'Fa'; if(c === 'treble8') return 'Sol-8'; return 'Sol'; }

  function buildBarSeparator(prevMi, mi){
    const prevEnd = (prevMi >= 0) && state.repeats[prevMi]?.end;
    const thisStart = state.repeats[mi]?.start;
    if(prevEnd && thisStart) return ':|:';
    if(prevEnd) return ':|';
    if(thisStart) return '|:';

  }
  function buildInlineFor(mi){
    const parts = [];
    if(mi === 0) return '';
    if(state.timeChanges[mi]) parts.push('[M:' + state.timeChanges[mi] + ']');
    const keyChange = state.keyChanges[mi];
    const clefChange = state.clefChanges[mi];
    if(keyChange !== undefined || clefChange){
      const sig = keyChange !== undefined ? keyChange : keyAt(mi);
      const cl  = clefChange ? clefChange : clefAt(mi);
      let inner = 'K:' + keyAbc(sig);

  function buildVoltaFor(mi){ const r = state.repeats[mi]; if(!r || !r.volta) return ''; return '[' + r.volta; }

  function renderAbc(){
    let header = '';
    if(state.headers.X) header += 'X:' + state.headers.X + '\n';
    if(state.headers.T) header += 'T:' + state.headers.T + '\n';
    header += 'M:' + state.pieceMeter + '\n';
    header += 'L:' + state.pieceUnit + '\n';
    header += 'Q:1/4=' + state.tempo + '\n';
    header += 'K:' + keyAbc(state.pieceKeySig) + clefAbcSuffix(state.pieceClef) + '\n';

    let body = '';
    state.measures.forEach((m, mi)=>{
      body += buildBarSeparator(mi - 1, mi);
      body += buildInlineFor(mi);
      body += buildVoltaFor(mi);
      const groups = computeBeamGroups(m, meterAt(mi));
      const groupOf = {};
      groups.forEach((g, gi)=>{ g.forEach((idx, k)=>{ groupOf[idx] = {gi, pos:k, len:g.length}; }); });
      m.forEach((t, si)=>{
        const s = slotStr(t);
        const cell = (mi === state.sel.m && si === state.sel.s) ? '<span class="sel">' + s + '</span>' : s;
        body += cell;

  }

  // ====== rendering (score) — TWO-LINE LAYOUT ======
  const SCORE_W = 360, SCORE_H = 200;
  const STAFF_TOP_Y = 30, LINE_GAP = 7, STAFF_GAP = 38;
  const LEFT_PAD = 50, RIGHT_PAD = 6;
  const MEASURES_PER_LINE = 3;
  function staffTopOfLine(line){ return STAFF_TOP_Y + line * STAFF_GAP * 1.7; }

  function noteY(staffTop, step, c){ const refStep = clefRefStep(c); const bottomLineY = staffTop + 4*LINE_GAP; return bottomLineY - (step - refStep) * (LINE_GAP/2); }
  function stepIndex(note, octave){ const map = {C:0,D:1,E:2,F:3,G:4,A:5,B:6}; return map[note] + 7*octave; }
  const TREBLE_SHARP_STEPS = { F:10, C:7, G:11, D:8, A:5, E:9, B:6 };
  const TREBLE_FLAT_STEPS  = { B:6, E:9, A:5, D:8, G:4, C:7, F:10 };
  const BASS_SHARP_STEPS   = { F:-4, C:-7, G:-3, D:-6, A:-9, E:-5, B:-8 };
  const BASS_FLAT_STEPS    = { B:-8, E:-5, A:-9, D:-6, G:-10, C:-7, F:-4 };
  function keySigAccidentals(sig, c){
    const out = [];
    if(sig > 0){ const map = c === 'bass' ? BASS_SHARP_STEPS : TREBLE_SHARP_STEPS; for(let i=0; i<sig; i++) out.push({sym:'♯', step: map[SHARP_NOTES[i]]}); }
    else if(sig < 0){ const map = c === 'bass' ? BASS_FLAT_STEPS : TREBLE_FLAT_STEPS; for(let i=0; i<-sig; i++) out.push({sym:'♭', step: map[FLAT_NOTES[i]]}); }

  function computeBeamGroups(meas, meter){
    const groupUnit = beamGroupUnit(meter); const eps = 1e-6;
    const groups = []; let curGroup = null; let offset = 0;
    function flush(){ if(curGroup && curGroup.length >= 2) groups.push(curGroup); curGroup = null; }
    for(let i=0; i<meas.length; i++){
      const t = meas[i]; const eD = effDur(t);
      const groupIdx = Math.floor((offset + eps) / groupUnit);
      const groupStart = groupIdx * groupUnit;
      const beamable = (t.type === 'note') && (eD <= 0.5 + eps);
      const crosses = (offset + eD) > (groupStart + groupUnit + eps);
      if(beamable && !crosses){
        if(curGroup && curGroup.startGroup === groupIdx){ curGroup.push(i); }
        else { flush(); curGroup = [i]; curGroup.startGroup = groupIdx; }
      } else flush();
      offset = +(offset + eD).toFixed(6);
    }
    flush();
    return groups;
  }

  function drawNoteHead(t, cx, color, c, drawFlag, stemUp, staffTop){
    let svg = '';

    const y = noteY(staffTop, step, c);
    const refStep = clefRefStep(c);
    if(step >= refStep + 10){ for(let s=refStep+10; s<=step; s+=2){ const ly = noteY(staffTop, s, c); svg += '<line x1="'+(cx-5)+'" y1="'+ly+'" x2="'+(cx+5)+'" y2="'+ly+'" stroke="'+color+'" stroke-width="0.7"/>'; } }
    if(step <= refStep - 2){ for(let s=refStep-2; s>=step; s-=2){ const ly = noteY(staffTop, s, c); svg += '<line x1="'+(cx-5)+'" y1="'+ly+'" x2="'+(cx+5)+'" y2="'+ly+'" stroke="'+color+'" stroke-width="0.7"/>'; } }
    if(t.acc==='^') svg += '<text x="'+(cx-9)+'" y="'+(y+3)+'" font-size="11" fill="'+color+'" font-family="serif">♯</text>';
    else if(t.acc==='_') svg += '<text x="'+(cx-9)+'" y="'+(y+3)+'" font-size="11" fill="'+color+'" font-family="serif">♭</text>';
    else if(t.acc==='=') svg += '<text x="'+(cx-9)+'" y="'+(y+3)+'" font-size="10" fill="'+color+'" font-family="serif">♮</text>';

    const hasStem = eD < 4;

    else if(eD <= 0.25 + 1e-6) flagCount = 2;
    else if(eD <= 0.5 + 1e-6) flagCount = 1;

      stemTipY = stemUp ? y - 19 : y + 19;
      svg += '<line x1="'+sx+'" y1="'+y+'" x2="'+sx+'" y2="'+stemTipY+'" stroke="'+color+'" stroke-width="0.8"/>';
      if(drawFlag){
        for(let f=0; f<flagCount; f++){
          const flagY = stemUp ? (stemTipY + f*4) : (stemTipY - f*4);
          if(stemUp) svg += '<path d="M '+sx+' '+flagY+' Q '+(sx+7)+' '+(flagY+4)+' '+(sx+4)+' '+(flagY+9)+'" stroke="'+color+'" stroke-width="1" fill="none" stroke-linecap="round"/>';
          else svg += '<path d="M '+sx+' '+flagY+' Q '+(sx-7)+' '+(flagY-4)+' '+(sx-4)+' '+(flagY-9)+'" stroke="'+color+'" stroke-width="1" fill="none" stroke-linecap="round"/>';

      }

  }
  function drawRest(t, cx, color, staffTop){
    let svg = '';
    const y = staffTop + 2*LINE_GAP;
    const eD = effDur(t);
    if(eD >= 4) svg += '<rect x="'+(cx-4.5)+'" y="'+(staffTop + LINE_GAP)+'" width="9" height="3.5" fill="'+color+'"/>';
    else if(eD >= 2) svg += '<rect x="'+(cx-4.5)+'" y="'+(staffTop + 2*LINE_GAP - 3.5)+'" width="9" height="3.5" fill="'+color+'"/>';
    else if(eD >= 1) svg += '<text x="'+(cx-4)+'" y="'+(staffTop + 3*LINE_GAP)+'" font-size="18" font-family="serif" fill="'+color+'">𝄽</text>';
    else if(eD >= 0.5) svg += '<text x="'+(cx-4)+'" y="'+(staffTop + 3*LINE_GAP)+'" font-size="18" font-family="serif" fill="'+color+'">𝄾</text>';
    else svg += '<text x="'+(cx-4)+'" y="'+(staffTop + 3*LINE_GAP)+'" font-size="18" font-family="serif" fill="'+color+'">𝄿</text>';
    if(t.dot) svg += '<circle cx="'+(cx+7)+'" cy="'+y+'" r="1.2" fill="'+color+'"/>';
    return {svg, headY: y};
  }

  function renderScore(){
    const selM = state.sel.m;
    document.getElementById('meas-num').textContent = selM + 1;
    document.getElementById('meas-pos').textContent = selM + 1;
    document.getElementById('slot-num').textContent = state.sel.s + 1;
    const measuresPerPage = MEASURES_PER_LINE * 2;
    const page = Math.floor(selM / measuresPerPage);
    const startM = page * measuresPerPage;
    const usable = SCORE_W - LEFT_PAD - RIGHT_PAD;
    const measureW = usable / MEASURES_PER_LINE;
    const ink = '#1a1a1a'; const sel = '#e24b4a'; const dim = '#888780';
    let svg = '<svg viewBox="0 0 '+SCORE_W+' '+SCORE_H+'" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">';
    for(let line=0; line<2; line++){
      const staffTop = staffTopOfLine(line);
      const lineStartM = startM + line * MEASURES_PER_LINE;
      for(let i=0;i<5;i++){ const y = staffTop + i*LINE_GAP; svg += '<line x1="'+(LEFT_PAD-25)+'" y1="'+y+'" x2="'+(SCORE_W-RIGHT_PAD)+'" y2="'+y+'" stroke="'+ink+'" stroke-width="0.55" opacity="0.55"/>'; }
      const headClef = clefAt(lineStartM); const headKey = keyAt(lineStartM); const headMtr = meterAt(lineStartM);
      if(headClef === 'bass'){ svg += '<text x="'+(LEFT_PAD-44)+'" y="'+(staffTop + LINE_GAP + 5)+'" font-size="32" font-family="serif" fill="'+ink+'" opacity="0.85">𝄢</text>'; }
      else { svg += '<text x="'+(LEFT_PAD-46)+'" y="'+(staffTop + 4*LINE_GAP + 5)+'" font-size="38" font-family="serif" fill="'+ink+'" opacity="0.85">𝄞</text>'; if(headClef === 'treble8') svg += '<text x="'+(LEFT_PAD-32)+'" y="'+(staffTop + 5*LINE_GAP + 6)+'" font-size="8" fill="'+ink+'" opacity="0.85">8</text>'; }
      let keyX = LEFT_PAD - 16;
      keySigAccidentals(headKey, headClef).forEach(acc=>{ const ky = noteY(staffTop, acc.step, headClef) + 4; svg += '<text x="'+keyX+'" y="'+ky+'" font-size="12" font-family="serif" fill="'+ink+'">'+acc.sym+'</text>'; keyX += 6; });
      if(line === 0){ const {num, den} = parseMeter(headMtr); const meterX = Math.max(keyX + 3, LEFT_PAD - 10); svg += '<text x="'+meterX+'" y="'+(staffTop + 1.7*LINE_GAP + 1)+'" font-size="12" font-family="serif" font-weight="bold" fill="'+ink+'" text-anchor="middle">'+num+'</text>'; svg += '<text x="'+meterX+'" y="'+(staffTop + 3.6*LINE_GAP + 1)+'" font-size="12" font-family="serif" font-weight="bold" fill="'+ink+'" text-anchor="middle">'+den+'</text>'; }
      for(let i=0;i<=MEASURES_PER_LINE;i++){ const x = LEFT_PAD + i*measureW; svg += '<line x1="'+x+'" y1="'+staffTop+'" x2="'+x+'" y2="'+(staffTop+4*LINE_GAP)+'" stroke="'+ink+'" stroke-width="'+(i===0?1.1:0.7)+'" opacity="0.7"/>'; }
      for(let i=0;i<MEASURES_PER_LINE;i++){
        const mIdx = lineStartM + i;
        if(state.measures[mIdx] === undefined) continue;
        let label = String(mIdx+1); const tags = [];
        if(mIdx > lineStartM || (mIdx > 0 && line > 0 && mIdx === lineStartM)){
          if(state.timeChanges[mIdx]) tags.push(state.timeChanges[mIdx]);
          if(state.keyChanges[mIdx] !== undefined) tags.push('K' + (state.keyChanges[mIdx]>=0?'+'+state.keyChanges[mIdx]:state.keyChanges[mIdx]));
          if(state.clefChanges[mIdx]) tags.push(clefHumanLabel(state.clefChanges[mIdx]));
        }
        if(tags.length) label += ' (' + tags.join(' ') + ')';
        svg += '<text x="'+(LEFT_PAD + i*measureW + 2)+'" y="'+(staffTop-3)+'" font-size="8" fill="'+dim+'">'+label+'</text>';
        const xL = LEFT_PAD + i*measureW; const xR = LEFT_PAD + (i+1)*measureW;
        const r = state.repeats[mIdx];
        if(r){
          if(r.start){ svg += '<line x1="'+(xL+2)+'" y1="'+staffTop+'" x2="'+(xL+2)+'" y2="'+(staffTop+4*LINE_GAP)+'" stroke="'+ink+'" stroke-width="2"/>'; svg += '<circle cx="'+(xL+6)+'" cy="'+(staffTop+1.5*LINE_GAP)+'" r="1.1" fill="'+ink+'"/>'; svg += '<circle cx="'+(xL+6)+'" cy="'+(staffTop+2.5*LINE_GAP)+'" r="1.1" fill="'+ink+'"/>'; }
          if(r.end){ svg += '<circle cx="'+(xR-6)+'" cy="'+(staffTop+1.5*LINE_GAP)+'" r="1.1" fill="'+ink+'"/>'; svg += '<circle cx="'+(xR-6)+'" cy="'+(staffTop+2.5*LINE_GAP)+'" r="1.1" fill="'+ink+'"/>'; svg += '<line x1="'+(xR-2)+'" y1="'+staffTop+'" x2="'+(xR-2)+'" y2="'+(staffTop+4*LINE_GAP)+'" stroke="'+ink+'" stroke-width="2"/>'; }
          if(r.volta){ const yV = staffTop - 11; svg += '<line x1="'+(xL+2)+'" y1="'+yV+'" x2="'+(xR-2)+'" y2="'+yV+'" stroke="'+ink+'" stroke-width="0.8"/>'; svg += '<line x1="'+(xL+2)+'" y1="'+yV+'" x2="'+(xL+2)+'" y2="'+(yV+4)+'" stroke="'+ink+'" stroke-width="0.8"/>'; svg += '<text x="'+(xL+5)+'" y="'+(yV+6)+'" font-size="8" fill="'+ink+'" font-weight="bold">'+r.volta+'.</text>'; }
        }
        const m = state.measures[mIdx];
        const x0 = LEFT_PAD + i*measureW + 10;
        const slotW = (measureW - 14) / Math.max(m.length, 1);
        const localClef = clefAt(mIdx); const localMeter = meterAt(mIdx);
        const beamGroups = computeBeamGroups(m, localMeter);
        const slotToGroup = {};

        const groupStemDir = beamGroups.map(g=>{ let sum = 0; for(const idx of g){ const t = m[idx]; sum += stepIndex(t.note, t.octave); } return (sum/g.length) < middleStep ? 'up' : 'down'; });
        const groupBeamData = beamGroups.map((g, gIdx)=>{
          const stemUp = groupStemDir[gIdx] === 'up';
          let extremeY = stemUp ? Infinity : -Infinity; const stemXs = [];
          g.forEach(slotIdx=>{ const t = m[slotIdx]; const cx = x0 + slotIdx*slotW + slotW/2; const sx = stemUp ? cx+3.3 : cx-3.3; const headY = noteY(staffTop, stepIndex(t.note, t.octave), localClef); const naturalTip = stemUp ? headY - 19 : headY + 19; if(stemUp) extremeY = Math.min(extremeY, naturalTip); else extremeY = Math.max(extremeY, naturalTip); stemXs.push({slotIdx, sx, headY}); });

          const cx = x0 + si*slotW + slotW/2;
          const isSel = (mIdx === selM && si === state.sel.s);

            const grp = slotToGroup[si];
            if(grp){
              const gIdx = grp.gIdx; const stemUp = groupStemDir[gIdx] === 'up'; const beamY = groupBeamData[gIdx].beamY;

              if(isSel) svg += '<circle cx="'+cx+'" cy="'+drawn.headY+'" r="8" fill="none" stroke="'+sel+'" stroke-width="0.7" opacity="0.4"/>';
            } else {
              const step = stepIndex(t.note, t.octave); const stemUp = step < middleStep;
              const drawn = drawNoteHead(t, cx, color, localClef, true, stemUp, staffTop);
              svg += drawn.svg;
              if(isSel) svg += '<circle cx="'+cx+'" cy="'+drawn.headY+'" r="8" fill="none" stroke="'+sel+'" stroke-width="0.7" opacity="0.4"/>';
            }
          } else {
            const drawn = drawRest(t, cx, color, staffTop);
            svg += drawn.svg;
            if(isSel) svg += '<circle cx="'+cx+'" cy="'+drawn.headY+'" r="8" fill="none" stroke="'+sel+'" stroke-width="0.7" opacity="0.4"/>';
          }
        });
        beamGroups.forEach((g, gIdx)=>{
          const data = groupBeamData[gIdx]; const stemUp = data.stemUp; const beamY = data.beamY; const stems = data.stems;
          const xStart = stems[0].sx; const xEnd = stems[stems.length-1].sx;
          const beamThickness = 2.5;
          const beamCount = Math.max(...g.map(idx=>{ const t = m[idx]; const eD = effDur(t); if(eD <= 0.125 + 1e-6) return 3; if(eD <= 0.25 + 1e-6) return 2; return 1; }));
          const dyOffset = stemUp ? beamThickness + 0.8 : -(beamThickness + 0.8);
          for(let bi = 0; bi < beamCount; bi++){ const yy = beamY + bi * dyOffset; svg += '<rect x="'+xStart+'" y="'+(yy - beamThickness/2)+'" width="'+(xEnd - xStart)+'" height="'+beamThickness+'" fill="'+ink+'"/>'; }
        });
      }
    }
    svg += '</svg>';
    document.getElementById('score').innerHTML = svg;
  }

  function selectedSlot(){ const m = state.measures[state.sel.m]; return m ? (m[state.sel.s] || null) : null; }
  function renderState(){
    document.getElementById('oct-val').textContent = state.octave > 0 ? '+'+state.octave : state.octave;
    const sl = selectedSlot();
    document.querySelectorAll('#dur-pad .k').forEach(b=>{ const activeD = sl ? sl.dur : 1; b.classList.toggle('active', parseFloat(b.dataset.dur) === activeD); });
    document.querySelectorAll('#alt-pad .k').forEach(b=>{ const activeAcc = (sl && sl.type==='note') ? (sl.acc || '') : ''; b.classList.toggle('active', activeAcc === b.dataset.acc && b.dataset.acc !== ''); });
    const m = state.sel.m;
    const sigLabel = (s)=> s === 0 ? '0' : (s>0 ? '+'+s : ''+s);
    document.getElementById('ctx-info').innerHTML = 'M:<b>' + meterAt(m) + '</b> · L:<b>' + state.pieceUnit + '</b> · K:<b>' + sigLabel(keyAt(m)) + '</b> · <b>' + clefHumanLabel(clefAt(m)) + '</b>';
    document.getElementById('tempo-v').textContent = state.tempo;
    document.getElementById('vol-v').textContent = state.volume;
    document.getElementById('btn-play').textContent = audio.playing ? '⏸ Pause' : '▶ Play';
    document.getElementById('btn-undo').disabled = (history.pos <= 0);
    document.getElementById('btn-redo').disabled = (history.pos >= history.stack.length - 1);
  }
  function render(){ renderScore(); renderAbc(); renderState(); }

  function selectNext(){
    let {m, s} = state.sel;
    if(s + 1 < state.measures[m].length){ state.sel = {m, s:s+1}; render(); return; }
    if(m + 1 < state.measures.length){ state.sel = {m:m+1, s:0}; render(); return; }
    // beyond last measure: create one and move into it
    state.measures.push(buildEmptyMeasure(meterAt(m)));
    state.sel = {m: state.measures.length - 1, s: 0};
    pushHistory();
    render();
  }
  function selectPrev(){ let {m, s} = state.sel; if(s > 0){ state.sel = {m, s:s-1}; render(); return; } if(m > 0){ state.sel = {m:m-1, s: state.measures[m-1].length - 1}; render(); return; } }
  function jumpMeasure(delta){
    const cur = state.sel.m;
    if(delta > 0 && cur === state.measures.length - 1){
      state.measures.push(buildEmptyMeasure(meterAt(cur)));
      state.sel = {m: state.measures.length - 1, s: 0};
      pushHistory();
      render(); return;
    }
    const target = cur + delta;
    if(target < 0 || target >= state.measures.length) return;
    state.sel = {m:target, s:0}; render();
  }

  // ====== Audio ======
  const audio = { ctx: null, master: null, playing: false, scheduled: [], stopAt: 0, raf: null };
  function ensureAudio(){
    if(!audio.ctx){
      audio.ctx = new (window.AudioContext || window.webkitAudioContext)();
      audio.master = audio.ctx.createGain();
      audio.master.connect(audio.ctx.destination);
    }
    audio.master.gain.value = state.volume / 200;
    if(audio.ctx.state === 'suspended') audio.ctx.resume();
  }
  function midiOfNote(note, octave, acc, keySig){
    const baseSemi = {C:0, D:2, E:4, F:5, G:7, A:9, B:11}[note];
    let midi = 60 + baseSemi + octave * 12;
    let alteration = 0;
    if(acc === '^') alteration = 1;
    else if(acc === '_') alteration = -1;
    else if(acc === '=') alteration = 0;
    else {
      if(keySig > 0 && SHARP_NOTES.slice(0, keySig).includes(note)) alteration = 1;
      else if(keySig < 0 && FLAT_NOTES.slice(0, -keySig).includes(note)) alteration = -1;
    }
    return midi + alteration;
  }
  function freqOfMidi(m){ return 440 * Math.pow(2, (m - 69)/12); }
  function previewNote(midi, durSec = 0.25){
    ensureAudio();
    const t = audio.ctx.currentTime + 0.005;
    const freq = freqOfMidi(midi);
    const osc = audio.ctx.createOscillator();
    const gain = audio.ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    const peak = 0.5;
    const a = 0.005;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(peak, t + a);
    gain.gain.setValueAtTime(peak, t + Math.max(durSec - 0.06, a));
    gain.gain.linearRampToValueAtTime(0, t + durSec);
    osc.connect(gain); gain.connect(audio.master);
    osc.start(t);
    osc.stop(t + durSec + 0.03);
  }
  function playSchedule(){
    ensureAudio();
    stopPlayback(false);
    audio.playing = true;
    document.getElementById('btn-play').textContent = '⏸ Pause';
    const startTime = audio.ctx.currentTime + 0.05;
    let t = startTime;
    const qDur = 60 / state.tempo;
    state.measures.forEach((m, mi)=>{
      const sig = keyAt(mi);
      m.forEach((slot, si)=>{
        const dur = effDur(slot) * qDur;
        if(slot.type === 'note'){
          const midi = midiOfNote(slot.note, slot.octave, slot.acc, sig);
          const freq = freqOfMidi(midi);
          const osc = audio.ctx.createOscillator();
          const gain = audio.ctx.createGain();
          osc.type = 'triangle';
          osc.frequency.value = freq;
          const a = 0.005, r = Math.min(0.05, dur * 0.3);
          gain.gain.setValueAtTime(0, t);
          gain.gain.linearRampToValueAtTime(0.5, t + a);
          gain.gain.setValueAtTime(0.5, t + dur - r);
          gain.gain.linearRampToValueAtTime(0, t + dur);
          osc.connect(gain); gain.connect(audio.master);
          osc.start(t);
          osc.stop(t + dur + 0.02);
          audio.scheduled.push(osc);
        }
        audio.scheduled.push({ updateAt: t, measureIdx: mi, slotIdx: si });
        t += dur;
      });
    });
    audio.stopAt = t;
    function tick(){
      if(!audio.playing) return;
      const now = audio.ctx.currentTime;
      let last = null;
      for(const ev of audio.scheduled){
        if(ev.updateAt !== undefined && ev.updateAt <= now) last = ev;
        if(ev.updateAt !== undefined && ev.updateAt > now) break;
      }
      if(last && (state.sel.m !== last.measureIdx || state.sel.s !== last.slotIdx)){
        state.sel = { m: last.measureIdx, s: last.slotIdx };
        renderScore(); renderState();
      }
      if(now >= audio.stopAt){ stopPlayback(true); return; }
      audio.raf = requestAnimationFrame(tick);
    }
    audio.raf = requestAnimationFrame(tick);
  }
  function stopPlayback(refresh){
    if(audio.raf){ cancelAnimationFrame(audio.raf); audio.raf = null; }
    audio.scheduled.forEach(ev=>{ if(ev.stop) try{ev.stop();}catch(_){} });
    audio.scheduled = [];
    audio.playing = false;
    document.getElementById('btn-play').textContent = '▶ Play';
    if(refresh) render();
  }

  // ====== editing actions ======
  function setNoteAtSelection(noteName){
    const sl = selectedSlot(); if(!sl) return;
    const dur = sl.dur, dot = sl.dot;
    const acc = (sl.type === 'note') ? sl.acc : '';
    state.measures[state.sel.m][state.sel.s] = { type:'note', note: noteName, octave: state.octave, dur, dot, acc };
    pushHistory();
    const midi = midiOfNote(noteName, state.octave, acc, keyAt(state.sel.m));
    previewNote(midi);
    render();
  }
  function setRestAtSelection(){
    const sl = selectedSlot(); if(!sl) return;
    state.measures[state.sel.m][state.sel.s] = {type:'rest', dur:sl.dur, dot:sl.dot};
    pushHistory();
    render();
  }
  function setDurAtSelection(d){
    const sl = selectedSlot(); if(!sl) return;
    const oldEff = effDur(sl);
    sl.dur = d;
    // dot stays as-is (separate button)
    rebalanceMeasure(state.sel.m, state.sel.s, oldEff);
    const newLen = state.measures[state.sel.m].length;
    if(state.sel.s >= newLen) state.sel.s = newLen - 1;
    pushHistory();
    const cur = selectedSlot();
    if(cur && cur.type === 'note'){
      const midi = midiOfNote(cur.note, cur.octave, cur.acc, keyAt(state.sel.m));
      previewNote(midi, Math.min(0.4, effDur(cur) * 60 / state.tempo));
    }
    render();
  }
  function toggleDotAtSelection(){
    const sl = selectedSlot(); if(!sl) return;
    const oldEff = effDur(sl);
    sl.dot = !sl.dot;
    rebalanceMeasure(state.sel.m, state.sel.s, oldEff);
    const newLen = state.measures[state.sel.m].length;
    if(state.sel.s >= newLen) state.sel.s = newLen - 1;
    pushHistory();
    const cur = selectedSlot();
    if(cur && cur.type === 'note'){
      const midi = midiOfNote(cur.note, cur.octave, cur.acc, keyAt(state.sel.m));
      previewNote(midi);
    }
    render();
  }
  function toggleAccAtSelection(acc){
    const sl = selectedSlot();
    if(sl && sl.type === 'note'){
      sl.acc = (sl.acc === acc) ? '' : acc;
      pushHistory();
      const midi = midiOfNote(sl.note, sl.octave, sl.acc, keyAt(state.sel.m));
      previewNote(midi);
      render();
    }
  }
  function changeOctave(delta){
    state.octave = Math.max(-2, Math.min(3, state.octave + delta));
    const sl = selectedSlot();
    if(sl && sl.type === 'note'){
      sl.octave = Math.max(-2, Math.min(3, sl.octave + delta));
      const midi = midiOfNote(sl.note, sl.octave, sl.acc, keyAt(state.sel.m));
      previewNote(midi);
    }
    pushHistory();
    render();
  }

  // wire UI
  const notesCol = document.getElementById('notes-col');
  NOTES.forEach(n=>{ const b = document.createElement('button'); b.className = 'k'; b.innerHTML = n.label + '<span class="sub">' + n.sub + '</span>'; b.addEventListener('click', ()=> setNoteAtSelection(n.n)); notesCol.appendChild(b); });
  const durPad = document.getElementById('dur-pad');
  DURATIONS.forEach(d=>{ const b = document.createElement('button'); b.className = 'k symbol'; b.dataset.dur = d.d; b.textContent = d.label; b.addEventListener('click', ()=> setDurAtSelection(d.d)); durPad.appendChild(b); });
  const altPad = document.getElementById('alt-pad');
  [{label:'♯',acc:'^'},{label:'♭',acc:'_'},{label:'♮',acc:'='}].forEach(a=>{ const b = document.createElement('button'); b.className = 'k symbol'; b.dataset.acc = a.acc; b.textContent = a.label; b.addEventListener('click', ()=> toggleAccAtSelection(a.acc)); altPad.appendChild(b); });
  document.getElementById('dot-btn').addEventListener('click', toggleDotAtSelection);
  document.getElementById('oct-up').addEventListener('click', ()=> changeOctave(+1));
  document.getElementById('oct-down').addEventListener('click', ()=> changeOctave(-1));
  document.getElementById('cur-prev').addEventListener('click', selectPrev);
  document.getElementById('cur-next').addEventListener('click', selectNext);
  document.getElementById('meas-prev').addEventListener('click', ()=> jumpMeasure(-1));
  document.getElementById('meas-next').addEventListener('click', ()=> jumpMeasure(+1));
  document.getElementById('btn-rest').addEventListener('click', setRestAtSelection);

  document.getElementById('btn-del').addEventListener('click', ()=>{
    const sl = selectedSlot();
    if(sl){
      state.measures[state.sel.m][state.sel.s] = {type:'rest', dur:sl.dur, dot:sl.dot};
      pushHistory();
      render();
    }
  });
  document.getElementById('btn-undo').addEventListener('click', undo);
  document.getElementById('btn-redo').addEventListener('click', redo);

  function ensureRepeat(m){ if(!state.repeats[m]) state.repeats[m] = {}; return state.repeats[m]; }
  document.getElementById('btn-rep-start').addEventListener('click', ()=>{ const r = ensureRepeat(state.sel.m); r.start = !r.start; pushHistory(); render(); });
  document.getElementById('btn-rep-end').addEventListener('click', ()=>{ const r = ensureRepeat(state.sel.m); r.end = !r.end; pushHistory(); render(); });
  document.getElementById('btn-volta1').addEventListener('click', ()=>{ const r = ensureRepeat(state.sel.m); r.volta = (r.volta === 1) ? 0 : 1; pushHistory(); render(); });
  document.getElementById('btn-volta2').addEventListener('click', ()=>{ const r = ensureRepeat(state.sel.m); r.volta = (r.volta === 2) ? 0 : 2; pushHistory(); render(); });

  document.getElementById('tempo-u').addEventListener('click', ()=>{ state.tempo = Math.min(240, state.tempo + 5); render(); });
  document.getElementById('tempo-d').addEventListener('click', ()=>{ state.tempo = Math.max(30, state.tempo - 5); render(); });
  document.getElementById('vol-u').addEventListener('click', ()=>{ state.volume = Math.min(100, state.volume + 10); ensureAudio(); render(); });
  document.getElementById('vol-d').addEventListener('click', ()=>{ state.volume = Math.max(0, state.volume - 10); ensureAudio(); render(); });

  document.getElementById('btn-play').addEventListener('click', ()=>{ if(audio.playing) stopPlayback(true); else playSchedule(); });
  document.getElementById('btn-stop').addEventListener('click', ()=> stopPlayback(true));

  document.getElementById('btn-fs').addEventListener('click', ()=>{
    state.fullscreen = !state.fullscreen;
    document.getElementById('app').classList.toggle('fullscreen', state.fullscreen);
    document.getElementById('btn-fs').textContent = state.fullscreen ? '⛶ ✕' : '⛶';
  });

  document.getElementById('abc-toggle').addEventListener('click', ()=>{
    state.abcCollapsed = !state.abcCollapsed;
    document.getElementById('abc-out').classList.toggle('collapsed', state.abcCollapsed);
    document.getElementById('abc-toggle-icon').textContent = state.abcCollapsed ? '▶' : '▼';
  });

  document.getElementById('btn-add-meas').addEventListener('click', ()=>{
    openPanel({
      title: 'Ajouter une mesure',
      body: '<small>Insérer par rapport à la mesure ' + (state.sel.m+1) + '</small><div class="scope-row" style="grid-template-columns: 1fr 1fr;"><button class="k" id="addleft">À gauche</button><button class="k primary" id="addright">À droite</button></div>',
      hideActions: true,
      onMount: ()=>{
        function shiftKeys(map, threshold, inclusive){ const out = {}; for(const k of Object.keys(map)){ const i = parseInt(k,10); const shift = inclusive ? (i >= threshold) : (i > threshold); out[shift ? i+1 : i] = map[k]; } return out; }
        document.getElementById('addleft').addEventListener('click', ()=>{
          const meter = meterAt(state.sel.m);
          state.measures.splice(state.sel.m, 0, buildEmptyMeasure(meter));
          state.timeChanges = shiftKeys(state.timeChanges, state.sel.m, true);
          state.keyChanges  = shiftKeys(state.keyChanges,  state.sel.m, true);
          state.clefChanges = shiftKeys(state.clefChanges, state.sel.m, true);
          state.repeats     = shiftKeys(state.repeats,     state.sel.m, true);
          state.sel = {m: state.sel.m, s: 0}; pushHistory(); closePanel(); render();
        });
        document.getElementById('addright').addEventListener('click', ()=>{
          const meter = meterAt(state.sel.m);
          state.measures.splice(state.sel.m+1, 0, buildEmptyMeasure(meter));
          state.timeChanges = shiftKeys(state.timeChanges, state.sel.m, false);
          state.keyChanges  = shiftKeys(state.keyChanges,  state.sel.m, false);
          state.clefChanges = shiftKeys(state.clefChanges, state.sel.m, false);
          state.repeats     = shiftKeys(state.repeats,     state.sel.m, false);
          state.sel = {m: state.sel.m+1, s: 0}; pushHistory(); closePanel(); render();
        });
      },
    });
  });

  const panel = document.getElementById('panel');
  const panelTitle = document.getElementById('panel-title');
  const panelBody = document.getElementById('panel-body');
  const panelOk = document.getElementById('panel-ok');
  const panelCancel = document.getElementById('panel-cancel');
  let currentOnOk = null;
  function openPanel({title, body, onMount, onOk, hideActions}){ panelTitle.textContent = title; panelBody.innerHTML = body; currentOnOk = onOk || null; panelOk.style.display = hideActions ? 'none' : ''; panelCancel.style.display = hideActions ? 'none' : ''; panel.classList.add('open'); if(onMount) setTimeout(onMount, 50); }
  function closePanel(){ panel.classList.remove('open'); currentOnOk = null; }
  panelOk.addEventListener('click', ()=>{ if(currentOnOk) currentOnOk(); closePanel(); render(); });
  panelCancel.addEventListener('click', closePanel);

  document.querySelector('[data-hdr="X"]').addEventListener('click', ()=>{ openPanel({ title: 'Numéro X:', body: '<div class="row"><span class="field-label">X:</span><input id="hi" type="text" value="' + (state.headers.X||'') + '"/></div>', onMount: ()=> document.getElementById('hi').focus(), onOk: ()=>{ state.headers.X = document.getElementById('hi').value.trim(); pushHistory(); } }); });
  document.querySelector('[data-hdr="T"]').addEventListener('click', ()=>{ openPanel({ title: 'Titre', body: '<div class="row"><span class="field-label">T:</span><input id="hi" type="text" value="' + (state.headers.T||'') + '"/></div>', onMount: ()=> document.getElementById('hi').focus(), onOk: ()=>{ state.headers.T = document.getElementById('hi').value.trim(); pushHistory(); } }); });

  function scopePanel({title, renderControls, applyPiece, applyHere}){
    openPanel({
      title,
      body: renderControls() + '<small>Appliquer à :</small><div class="scope-row"><button class="k" id="scope-cancel">Annuler</button><button class="k" id="scope-piece">Tout</button><button class="k primary" id="scope-here">Mesure ' + (state.sel.m+1) + '+</button></div>',
      hideActions: true,
      onMount: ()=>{
        if(typeof renderControls.mount === 'function') renderControls.mount();
        document.getElementById('scope-cancel').addEventListener('click', ()=>{ closePanel(); });
        document.getElementById('scope-piece').addEventListener('click', ()=>{ applyPiece(); pushHistory(); closePanel(); render(); });
        document.getElementById('scope-here').addEventListener('click', ()=>{ applyHere(); pushHistory(); closePanel(); render(); });
      },
    });
  }

  document.querySelector('[data-hdr="M"]').addEventListener('click', ()=>{
    const cur = meterAt(state.sel.m); const {num, den} = parseMeter(cur);
    let n = num, d = den; const denValues = [1,2,4,8,16];
    let unitDenom = parseInt(state.pieceUnit.split('/')[1], 10);
    const unitDenoms = [1,2,4,8,16,32];
    function controls(){
      return ('<div class="stepper"><button class="k" id="num-d">−</button><div class="val">Num: <b id="num-v">'+n+'</b></div><button class="k" id="num-u">+</button></div>'+
              '<div class="stepper"><button class="k" id="den-d">−</button><div class="val">Dén: <b id="den-v">'+d+'</b></div><button class="k" id="den-u">+</button></div>'+
              '<small>Unité par défaut L: (tout le morceau)</small>'+
              '<div class="stepper"><button class="k" id="L-d">−</button><div class="val">L: 1/<b id="L-v">'+unitDenom+'</b></div><button class="k" id="L-u">+</button></div>');
    }
    controls.mount = function(){
      const upd = ()=>{ document.getElementById('num-v').textContent = n; document.getElementById('den-v').textContent = d; document.getElementById('L-v').textContent = unitDenom; };
      document.getElementById('num-u').addEventListener('click', ()=>{ n = Math.min(16, n+1); upd(); });
      document.getElementById('num-d').addEventListener('click', ()=>{ n = Math.max(1, n-1); upd(); });
      document.getElementById('den-u').addEventListener('click', ()=>{ const i = denValues.indexOf(d); if(i<denValues.length-1){ d = denValues[i+1]; upd(); } });
      document.getElementById('den-d').addEventListener('click', ()=>{ const i = denValues.indexOf(d); if(i>0){ d = denValues[i-1]; upd(); } });
      document.getElementById('L-u').addEventListener('click', ()=>{ const i = unitDenoms.indexOf(unitDenom); if(i<unitDenoms.length-1){ unitDenom = unitDenoms[i+1]; upd(); } });
      document.getElementById('L-d').addEventListener('click', ()=>{ const i = unitDenoms.indexOf(unitDenom); if(i>0){ unitDenom = unitDenoms[i-1]; upd(); } });
    };
    scopePanel({
      title:'Rythme',
      renderControls: controls,
      applyPiece: ()=>{ state.pieceMeter = n + '/' + d; state.pieceUnit = '1/' + unitDenom; state.timeChanges = {}; rebuildMeasures(); },
      applyHere: ()=>{
        state.pieceUnit = '1/' + unitDenom;
        const newMeter = n + '/' + d;
        state.timeChanges[state.sel.m] = newMeter;
        for(let i = state.sel.m; i < state.measures.length; i++){ if(i > state.sel.m && state.timeChanges[i]) break; state.measures[i] = buildEmptyMeasure(meterAt(i)); }
        state.sel = {m: state.sel.m, s: 0};
      },
    });
  });

  document.querySelector('[data-hdr="K"]').addEventListener('click', ()=>{
    let sig = keyAt(state.sel.m);
    const labelOf = (s)=>{ if(s === 0) return '0 (Do/La m)'; if(s > 0) return s + (s === 1 ? ' dièse' : ' dièses'); return Math.abs(s) + (Math.abs(s) === 1 ? ' bémol' : ' bémols'); };
    function controls(){ return ('<div class="stepper"><button class="k" id="sig-d">♭ −</button><div class="val"><b id="sig-v">'+labelOf(sig)+'</b></div><button class="k" id="sig-u">♯ +</button></div>'); }
    controls.mount = function(){ const upd = ()=>{ document.getElementById('sig-v').textContent = labelOf(sig); }; document.getElementById('sig-u').addEventListener('click', ()=>{ sig = Math.min(7, sig+1); upd(); }); document.getElementById('sig-d').addEventListener('click', ()=>{ sig = Math.max(-7, sig-1); upd(); }); };
    scopePanel({ title:'Armure', renderControls: controls, applyPiece: ()=>{ state.pieceKeySig = sig; state.keyChanges = {}; }, applyHere: ()=>{ state.keyChanges[state.sel.m] = sig; }, });
  });

  document.querySelector('[data-hdr="CLEF"]').addEventListener('click', ()=>{
    let pick = clefAt(state.sel.m);
    function controls(){ return ('<div class="grid3" id="clef-pick"><button class="k symbol" data-clef="treble">𝄞</button><button class="k" data-clef="treble8" style="font-size:11px;">Sol-8</button><button class="k symbol" data-clef="bass">𝄢</button></div>'); }
    controls.mount = function(){ const refresh = ()=>{ document.querySelectorAll('#clef-pick .k').forEach(b=>{ b.classList.toggle('active', b.dataset.clef === pick); }); }; refresh(); document.querySelectorAll('#clef-pick .k').forEach(b=>{ b.addEventListener('click', ()=>{ pick = b.dataset.clef; refresh(); }); }); };
    scopePanel({ title:'Clé', renderControls: controls, applyPiece: ()=>{ state.pieceClef = pick; state.clefChanges = {}; }, applyHere: ()=>{ state.clefChanges[state.sel.m] = pick; }, });
  });

  rebuildMeasures();
  pushHistory();
  render();
})();
</script>
